front:
  text: 皇元風雅羣英姓氏卷之一
  hash: sha256:eefe169d1d5c9e7a5f44a53a6692286afd8e5da9197fffc4dd5e56edab54587a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_000-1a}
body:
  text: 伯顔丞相郝天挺史紫微盧踈齋貫酸齋許魯齋張仲疇李道復虞伯生張野夫元明善鮮于伯機趙子昻程雪樓閻靜軒卷之二交趾王徐參政劉御史梁宣慰何理問張天師吳宗師滕玉霄馮海粟吳草廬李伯宗柳道傳陳濟淵馬伯庸龍麟洲杜竹處俞石澗卷之三安竹齋明普彥文子方歐陽圭齋袁伯長杜清碧楊仲弘李竹所何吾山劉時中吳敬庭李長源楊鵬翼陳自堂卷之四劉須溪劉立雪劉養吾揭曼石羅澗谷孫伯善黃南卿湯子文劉雲山申屠致逺趙半間羅滄洲張周卿周石原王性存趙心逺趙季文胡尊生連伯正宋本孫用復黃河清胡古愚劉明叟卷之五髙若鳯張叔暘許獻臣趙蒙齋倪中豈倪若水范德機孫存吾張息堂甘東溪薩天錫林彥􅙫李源道夏果齋胡斗南陳中山宋梅洞龔子敬梁隆吉李古淡李誠泉彭容庵仇仁近吳漢儀卷之六何頥貞黃子肅張希孟趙茂原楊逹可吳仁傑鄧彧之陳敬翁蕭南軒陸文圭陳魚村易炎正張嗣良何太虛陳晉齋甘虛庭凌虛谷髙孤雲應居仁姓氏畢詩之為教存乎性情苟無得於斯則其道謂之幾絶可也皇元近時作者迭起庶幾風雅之遺無愧騷選然而朝廷之制作或不盡傳於民間山林之髙風必不俯諧於流俗以詠歌為樂者固嘗病其不備見也清江傅説卿行四方得時賢詩甚多卷帙繁浩廬陵孫存吾略為詮次凡數百萹而求豫為之題辭豫觀其編以靜修劉夢吉先生為之首自我朝觀之若劉公之髙識逺志人品英邁卓然不可企及冠冕斯文固為淂之前後能賦之賢未易枚舉偶有未及非逸之也若乃僕區區曹鄶之詩者斯人情性之所發自擊壤來有是矣然體製隨丗道升降音節因風土變遷以近代言唐詩不與宋詩同晚唐難與盛唐匹我朝混一海宇方科舉未興時天下能言之士一寄其情性于詩雖曰家藏人誦而未有能集中州四裔文人才子之句彚為一編以傳丗行後者廬陵孫君存吾有意編類雕刻以為一代成書其志亦可尚已吾嘗以為中土之詩沉深渾厚不為綺麗語南人詩尚興趣求工于景意間此固關乎風氣之殊而語其到處則不可以優劣兮也編詩者當以是求讀者亦以是觀則淂之矣子其遍厯風騷之國而搜訪焉庶乎是集可無遺憾若夫可否去取自有當令宗匠在至元二年丙子三月晦日旴江南窗謝升孫子順父序皇元朝野群英姓氏卷之一鄧善之盧彥威王繼學王儀伯馬昻夫曹子貞段惟德李齊賢張氷溪錢雪界段天祐李兩山吳養浩祝直清上官伯圭祝元美周鈞山李仲公梁彥中夏誠中王秋江王虛白蔡九思張伯逺龔楚清黃伯玉白仁壽王子東吳遜齋蔡舜謨康秋山吳宜甫方寒巖楊厚巖姚江村方景山卷之二薛宗海黃晉卿李坦之范藥莊胡石塘戴祖禹鄧牧心倪元鎮陳剛中李鶴田趙青山歐陽伯恭劉起潛吳正傳于介翁卷之三王蘭思朱本𥘉查廣居田師孟黃君瑞康里巙張天師薛玄卿張一無黃松瀑于仲元危太朴楊季包淝川鄭汝和舒元易張南臯危琴樂韓中村况肩吾吕元卿陳小庭章養吾許存我劉恭叔葉千林林仁山卷之四四愛題詠虞伯生吳宗師馬祖常髙新甫張天師太乙子夏紫清歐陽奎齋揭曼碩玉倫徒王士點謝草池詹厚齋程登庸吳月灣彭孟圭李進齋李絅齋朱訥山梅野詩序虞伯生詹厚齋真山民江學庭揭希韋許伯昭謝南窗黃朴齋周老山曾德厚周梅邉周溪邊周幕溪黃誠性傅東郊黃季嬴劉叔逺熊澗谷卷之五孛术魯翀理伯容甘恪陳是若劉孟曅劉夢羲張小山章伯亮拜帖穆爾趙由儕郭君彥張鳴善貟怡然楊信可鄧德良李宗洌王尚志徐天逸施性𥘉傳謙則卷之六熊勿軒羅太瘦雷機毛靜可陳復齋陳野雲潘心月林德暘趙芝室羅梅我劉草窗張奎翁李孟陽凃雪坡凃竹逸危希尹鄭元晉吳西墅十雪題詠李草窗嚴春山葉水村袁安道陳應江王劒川李蒙齋陳天霽鄭溥孫平齋劉南金十臺懷古姓氏畢
