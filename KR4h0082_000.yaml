front:
  text: 皇元風雅羣英姓氏卷之一
  hash: sha256:eefe169d1d5c9e7a5f44a53a6692286afd8e5da9197fffc4dd5e56edab54587a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_000-1a}
body:
  text: 伯顔丞相郝天挺史紫㣲盧踈齋貫酸齋許魯齋張仲疇李道復虞伯生張野夫元明善鮮于伯機趙子昻程雪樓閻静軒卷之二交趾王徐參政劉御史梁宣慰何理問張天師呉宗師滕玉霄馮海粟呉草廬李伯宗柳道傳陳濟淵馬伯庸龍麟洲杜竹處俞石澗卷之三安竹齋明普彦文子方歐陽圭齋袁伯長杜清碧楊仲弘李竹所何吾山劉時中呉敬庭李長源楊鵬翼陳自堂卷之四劉須溪劉立雪劉養吾掲曼石羅磵谷孫伯善黄南卿湯子文劉雲山申屠致逺趙半閑羅滄洲張周卿周石原王性存趙心逺趙季文胡尊生連伯正宋本孫用復黄河清胡古愚劉明叟卷之五髙若鳯張叔暘許獻臣趙蒙齋倪中豈倪若水范德機孫存吾張息堂甘東溪薩天錫林彦􅙫李源道夏果齋胡斗南陳中山宋梅洞龔子敬梁隆吉李古淡李誠泉彭容庵仇仁近呉漢儀卷之六何頥貞黄子肅張希孟趙茂原楊逹可呉仁傑鄧彧之陳敬翁蕭南軒陸文圭陳魚村易炎正張嗣良何太虚陳晉齋甘虚庭凌虚谷髙孤雲應居仁姓氏畢詩之爲教存乎性情苟無得於斯則其道謂之㡬絶可也皇元近時作者迭起庶㡬風雅之遺無愧騷選然而朝廷之制作或不盡傳於民間山林之髙風必不俯諧於流俗以詠歌爲樂者固嘗病其不備見也清江傅說卿行四方得時賢詩甚多卷帙繁浩廬陵孫存吾略為詮次凡数百萹而求予為之題辭予觀其編以静脩劉夢吉先生為之首自我朝觀之若劉公之髙識逺志人品英邁卓然不可企及冠冕斯文固為淂之前後能賦之賢未易枚舉偶有未及非逸之也若乃僕區區曹鄶之詩者斯人情性之所發自擊壤来有是矣然體製隨丗道升降音節因風土变遷以近代言唐詩不與宋詩同晚唐難与盛唐匹我朝混一海宇方科舉未興时天下能言之士一寄其情性扵詩雖曰家蔵人誦而未有能集中州四裔文人才子之句彚爲一編以傳丗行後者廬陵孫君存吾有意編類雕刻以爲一代成書其志亦可尚已吾嘗以為中土之詩沉深渾厚不為綺麗語南人詩尚興趣求工扵景意間此固關乎風氣之殊而語其到䖏則不可以優劣兮也編詩者當以是求讀者亦以是觀則淂之矣子其徧厯風騷之國而捜訪焉庶乎是集可無遺憾若夫可否去取自有當令宗匠在至元二年丙子三月晦日旴江南牎謝升孫子順父序皇元朝野群英姓氏卷之一鄧善之盧彦威王繼學王儀伯馬昻夫曹子貞段惟德李齊賢張氷溪錢雪界段天祐李兩山呉養浩祝直清上官伯圭祝元美周鈞山李仲公梁彦中夏誠中王秋江王虚白蔡九思張伯逺龔楚清黄伯玉白仁壽王子東呉遜齋蔡舜謨康秋山呉宜甫方寒巖楊厚巖姚江村方景山卷之二薛宗海黄晉卿李坦之范葯莊胡石塘戴祖禹鄧牧心倪元鎮陳剛中李鶴田趙青山歐陽伯恭劉起潜呉正傳于介翁卷之三王蘭思朱本𥘉查廣居田師孟黄君瑞康里巙張天師薛玄卿張一無黄松瀑于仲元危太樸楊季包淝川鄭汝和舒元易張南臯危琴樂韓中村况肩吾吕元卿陳小庭章養吾許存我劉恭叔葉千林林仁山卷之四四愛題詠虞伯生呉宗師馬祖常髙新甫張天師太乙子夏紫清歐陽奎齋掲曼碩玉倫徒王士點謝草池詹厚齋程登庸呉月湾彭孟圭李進齋李絅齋朱訥山梅野詩序虞伯生詹厚齋眞山民江學庭掲希韋許伯昭謝南䆫黄朴齋周老山曾德厚周梅邉周溪邊周幕溪黄誠性傅東郊黄季嬴劉叔逺熊磵谷卷之五孛术魯翀理伯容甘恪陳是若劉孟曅劉夢羲張小山章伯亮拜帖穆尒趙由儕郭君彦張鳴善貟怡然楊信可鄧德良李宗洌王尚志徐天逸施性𥘉傳謙則卷之六熊勿軒羅太痩雷機毛静可陳復齋陳野雲潘心月林德暘趙芝室羅梅我劉草牎張奎翁李孟陽凃雪坡凃竹逸危希尹鄭元晋呉西墅十雪題詠李草牎嚴春山葉水村袁安道陳應江王劒川李蒙齋陳天霽鄭溥孫平齋劉南金十臺懷古姓氏畢
