亦有隱淪懷濟丗何時歸獵載非熊灤江曉月灤江曉月漾玻璃皓景沉沉碧海西監牧平沙時洗馬趣朝青鎖政聞雞鍾聲破霧騰珠剎橋影垂虹枕玉溪夙德祠臣勞扈從恩承紫誥又春泥松林夜雨百萬蒼虬幾雪霜夜深和雨激滄浪秦金賜爵揔東岱漢王搜十負柏梁劒戟森嚴堅歲暮佩環鏘奏際時良千年琥珀應流地服餌身輕久帝鄉天山秋獮駕辛天山校獵埸夜嚴精騎裹糇糧鷹鞲脫臂髙橫塞雉箭穿雲急解囊豈但薦毛供爼豆要知閲武固金湯斂圍賜宴千軍醉駝背纍毛揔兔羊陵臺晚眺李陵行處莽平原秪見荒臺思愴然野日斷鴻空送晚塞雲歸鶴不知年千重牙帳開周後萬里長城啓漢前雅調蚤傳來魏闕賡歌尚擬頌堯天薛玄卿送文郎中奉使交趾天子龍飛統萬邦玉符封檢下殊方逺人盡是雕題獠奉使唯應粉署郎翡翠飛時銅柱􅊜鷓鴣啼處石門荒炎風苦雨煩珍重蔞葉檳榔取次嘗次韻歐陽檢閲濠池觀荷行行濠池上亭亭見長荷瓊葩艷𥘉日碧芰卷輕波深蒲曉色亂微雨晚香多方舟時自移髙軒或來過豈無河朔飲聊復發商歌商歌一慷慨此物奈君何野宿山簡虞博士王待制迢迢野宿山峯巒何崔嵬朝登猛虎嘨莫宿玄猿哀高風四靣發花草為誰開傳聞章皇帝此地昔徘徊龍駕竟不返浮雲空往來秀色九天外巨㚑不敢摧飄搖散襟帶覽結何悠哉宋顯父祕書惠海子北門之什次韻答之得君佳句見君情春半間從海上行紅杏啼鶯沙苑邃緑楊嘶馬漢堤平玉山地勢連雙闕金水河流注夾城万乘以仁懷逺迹逰觀宜著魯諸生燕粟總管玩芳亭子粟氏林亭好飄飄借馬遊藥闌當戶密花徑近城幽未許朝參懶聊為逸興留使君行樂處風物為春柔送陳都事銓選雲南兼簡李廉訪送君銓選使滇池部落諸夷善品題明月先經夔子北長風却度夜郎西山㴠塞雨驊騮骨花壓蠻雲杜宇啼為問霜臺李廉訪白頭官滿尚羇栖送朱本𥘉之玉降官西山紫翠簇芙蓉師住逍遙苐一峰慎勿挽弓思射鹿秪須鑄鐵學降龍間穿曉月鋤芙藥醉拂秋凨卧古松應憶京華舊逰處蓬萊坊畔五雲重髙逺堂數椽茅屋雲中出一抹青山坐上看讀罷黃庭春雨後刺桐花落鳥聲寒贈聶尊師青山寂寂雨瀟瀟一箇長松翠欲飄白髮道人年八十小樓間坐説前朝遊張公洞簡常守劉道中赤烏二載發㚑竒空洞深沉道路危翠竇下攢山瀑落紫岩中廓石膏垂鐵船通海時難遇金鼎調元事可期秪恐使君同變化白螺來往少人知張一無寄薛玄卿上界真人金馬貴山中道士草衣輕一彈指頃三千劫何日蓬萊問淺清黃松瀑自麻仙至茟架道中作三步五步歇六日七日晴豈不念我歸春色相送迎前宵杜酒散行將及清明紅紫小零落嚶嚶相和鳴叢薄山礬花玩之有餘馨亦欲寄所思歸鴻巳宵征悠悠不可極惻惻難為情荒荒誰與語脈脈曵杖行飯山道院萬鍾鼎食不到我正自不必西山餓飯山雲氣如炊煙三餐而返腸果然臨川丞相有素願何處獨無魚羮飯勸君飯客先飯窮往往乞丐皆英雄題髙麗五明馬海波不動關梁通虬髯使者來吳中名騅額間挂明月四蹄猶帶龍堆雪仰妹不受田家芻大官之羊五味俱賢才萬里不難致粳粃不充盱老矣次韻謝新荔海國仙人剪絳霞年年一朵到山家眼中玉色如何晏席上風流得孟嘉野客不分唐殿帶老臣并按建溪茶醉來往事都休問且擘輕紅對晚花寒食客中明朝便典黑貂裘寒食寧無數日留煙斷舊嘗悲介子火衰今不祀商丘百年盡付風吹柳柳雨逺隨山入樓安有五侯鯖到我自修茶品試香篝墨梅去年曽訪林君復煙水蒼茫鶴未歸不似對君橫小幅一枝和雪照柴扉客語舊時供奉曲歌者亦無人伹感歲年晚不知天地春客猶談寶慶吾亦及咸淳何處楊花過飛來點角中午日丗故一炊黍吾生百錬銅客情傷髮白醒眼對榴紅逺岫冥冥雨綀衣細細風欲論千古恨不見楚南公于仲元度車庸關思親車庸之關髙嵯峨霜乾水淺寒無波大風捲沙聚作嶺火車碾斷深成河商女踏歌喫馬乳胡兒行鼓捶駱駝斜陽駐馬一回首故鄉萬里秋雲多危太朴臨川人暮冬種稻南谷口凶歲囷倉虛晚值老農語出口三嘻吁幸有髙亢田種麥給群需有麥且勿憂無麥將焉如昔謂崖谷底其俗異黃農浪迹城府歸却愛淳朴風獵夫不射鴈云與兄弟同羽毛豈知道天理諒無終徐人歌季子有劒秋水色徐君見之惜不得徐君墓上荒草寒季子解劒挂樹間一死一生見交義嗟哉延陵吳季子楊季豫章人晚憩澗北亭我性喜消散東園時獨行髙亭俯絶澗下有流泉聲秀不翳繁蔭朱華散微馨踟蹰淡忘歸夕露沾我纓人生忽如寄何乃苦營營優遊在空谷飲水有餘情夏日山中讀書翳翳嘉大隂結廬三四椽南風五月中日夕聞鳴蟬居間復奚為涵泳聖人言時於會心處掩卷自欣然送别鎦伯章歸省時鎦方悼亡故并致其意斗酒酌未盡離人去匆匆歸心逐海月飛繞香爐峰峰前緑蘿樹下有五畒宮上堂壽尊親手把黃金鍾入室獨無依風吹羅慢空雖有兩小妾顔色如花紅不敵伉儷情虛為夭冶容人生百年內哀樂本無窮自非曠士懷寧免勞其中心堅抱節義行止慎其躬贈言匪諧謔朂尓保令終包淝川淮幽居雲作交遊山作賔道心為主自安貧柴荆無鑰見同物竹帛有名終纍人緑水一潭澄靜性青山萬疊褁間身紛紛望拜馬蹄下不見胸中萬斛塵七夕欲理凌波踏造舟不知滿架勝蒙鳩漢隂抱甕蒼顔老不上今宵乞巧樓謾成三春胡蝶誰云夢六月蒼蠅詎可憎未怪康衢中有虎每疑太極裏無僧周德可蘭溪人送衣篇長城萬里飛秋沙弓馬夜驚雪作花龍泉吐光射天地是妾掩鏡夫辭家此時惜别方壯年年年花發園中煙征鴻無書日苦短牛女夜夜銀河邊萬瓦欲霜楓似綺親送寒衣數千里匣鵉顧影凰孤飛山過望夫道湘水湘水無情漾白波望夫山石浮青螺長途行處意慘愴誰家嬌女終夜歌衛霍功髙尤黷武善馬未歸羝不乳關河回首路迢遙愁雲四山水南浦夕陽孤館停征軺一身百慮雙涕交中宵無人語聲絶風吹燭短山月髙寄逺邊風驚枕簟漢月耿房帷何處懷人切停梭見鴈時寒生衣莫寄瘦盡鏡先知願子長努力效忠歸未遲陳敬齋呈蔡府判東風一夜拂清寰如許文明治象還萬古乾坤一東魯七閩日月兩西山寒梅寂寂春華麗喬木森森古意間獨奏瑶琴生客恨有誰隔月聽潺湲舞劎歌曉騎白鶴入滄海手携青龍浴寒水背負河圖天地文或變或化疑神鬼始對雙鵉出林坰終與孤鶴翔風墜翩翩又在瑶池間戲與群仙買歡醉青龍顧我浩氣疲欲假明月橫波睡我亦假之一霎間徑然飛去天牛間千呼万喚不肯下且吐風雨飛漫漫呈方逹齊端平諌臣心似鐵忠肝落𥿄天地恱羅浮山下種梅花獨倚西窗看晴雪古來老鳯生鵉兒錦雲兩翼星斗披朝浴春風芹藻池夜眠涼月槐杏枝君不見丹山一溪水化作春陽時雨飛千門教渴不苦早木草潤澤生華輝方逹齊真吾師薰風吹我面臯比兑使青燈照雨思舒元易聖節詩樂奏雲門金闕髙春風泛酒入蒲萄九重天上尊堯舜万歲聲中拜禹皋仁藹乾坤知帝業明同日月見秋毫願推大道為君壽不用瑶池薦海桃偰丗南贈墨士魚胞万杵成玄玉應是柯仙得妙傳鐵硯毛錐為密友何時海上别回仙王玄翰南山有猛虎南山有猛虎欲以赤手屠山下一老人見謂尓甚愚衝冠與裂背所詫乃匹夫古來功名士遐攬王伯圖幾先非快意道逺慎前謨奈此謬其逢試之誠巳疏竒中或偶然再往類難虞丈夫雖賭命慷慨易長途苟無金石堅何以當變渝苟無忠誠心何以涉﨑嶇斯言願三復斂祍愧弗如吾行庸可驚聊取一笑娛且盡飲斗酒長揖歸衡廬高况梅擬古楚人有和氏懷寶空待價玉石苟未分胡事哭長夜人生豈不辰物物該造化賢哉荷蓧翁託身以耕稼張南臯贈丹士天地爐中有太丹朝飛東海莫西山一年三百六十粒十粒輕拋去不還危琴樂送芳潤葉道士二十四岩凌紫清琪花瑶草日𥘉晴抱琴曽侍群仙宴記得鈞天一兩聲韓中村鴻門宴花膺繡膊伯抹額勇士如門森劒戟沛公對酒顔如灰主人重瞳光照席重瞳座上身如寄巵酒未吞心已醉醉酣不辨真天人百万貔貅眼中睡春融玉帳香風開嗚嗚帳下箏琶哀目前等作万口計軍聲四面歡如雷沛公唯喏非無意袖中暗挈秦天地此時可想聽得異四面軍聲皆漢騎征婦歎虎頭將軍眼如電領兵夜渡黃河靣良人腰懸大羽箭遼東掠地遼西戰一𥿄紅箋寄春怨十年消息無歸便日長花柳暗庭院斜倚粧樓倦針線心憶良人嗔不見手擲金彈打雙燕無術平戎報明主恨身不是竒男子倘妾當年未嫁夫請學明妃獻西虜嶽王墓妖星墮地芒角赤龍劎悲吼風蕭瑟中原王氣挽不回將軍一死鳴毛擲秦家小貌真戲劇播弄造化榣樞極指讎為親忠且逆隻手上遮天眼力九關茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶噴激古墳埋冤血空碧風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斫出荒苔痕獻作吾皇輔天石對月吟霜風捲地霜氣乾碧空照水生晴寒天公合就七寶團何年轉向玻璃盤婆娑桂樹籠仙窟夜夜飛從海上出遂使時光挽不留盡向婆娑影中沒幾人緑髮紅顔好照見顔衰髮應稿年去年來無盡時政恐月中人亦老客窗見月空沉吟碧紗如霧愁人心燭花撲散香滿襟下階踏碎梧桐隂憶去年江湖渺渺白鷗前歸路春風憶去年細雨孤燈村店夢冷煙殘雪落梅天驛行多避官人馬水宿怕逢綱吏船行李半肩吟卷重過津恐索稅詩錢况肩吾縣尹題梅卷牡丹池館閙春殘多少詩人𬒳眼瞞我有癯仙最知巳一枝留與雪中看吕元卿晚宿郎官湖半煙半雨樹扶踈畫出無暉水墨圖最是一天秋月白不隨魚課入官湖月夜洞庭舟中陪九江茶漕五哥同知宴酒邊索詩遂賦朔風扇鬢向君山歲晚霜華為改顔吟望滄浪湘水逺醉歌欵乃洞庭寬那能袖劒逰蓬島何似乘槎訪廣寒莫道嶽陽無醉客洞賔元只在人間陳小庭大孤山至湖口大孤大孤何渺茫小孤誰説嫁彭郎鞋山對面四十里屹立宛在湖中央行轉清江過湖口波濤如此今何有天公助我半帆風江神勸汝一杯酒章養吾次韻徐可齋嘉禾馬上見寄丗事悠悠兩鬢塵始知今古一郵亭章廬春動吾猶懶蕙帳寒生子獨醒萬里關河秋鴈斷千年書劒夜燈青東風又是離愁處芳草萋二白鷺汀許存我次韻吳叔廉山村回文田繞青山好住家短籬踈圃接丘麻煙村逺近棲鴉亂竹岸髙低飛鷺斜泉噴石間岩湧雪霧浮堤外柳吹花連雲碧色秋風冷眠犢黃昏草長芽劉恭叔夜坐江亭明月出林抄大風吹漸髙軒窗墮圭璧竹樹起波濤鄰笛悲歡併江鴻去住勞倚欄惆悵久霜露􅊜綈𫀆城中至日我道何曽長城中獨重冬酒殽分市卒冠履祝家公日晷空江見梅花亂丗逢故鄉還往在筋力愧兒童葉干林送李石泉風雲令人廋關河怕酒醒過橋春水緑送客晚山青君馬巳先發我舟湭暫停臨分耿無語江上雨冥冥葉天趣孟明章貢感寓顔曾志道德汲汲思競辰盜跖膾人肝白首井惡人是非兩忘羊萬古同埃塵何如盡棄置宴坐觀日輪風吹紫藤花䔩䔩沾衣巾興發自一杯陶然泰和春秋夜和韻西風何處來鼻觀古香發夜深耿無寐踏破松窗月芙人期不至跂望雙背裂一掬可憐心青燈照愁絶皇元風雅卷之三
