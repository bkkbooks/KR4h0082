front:
  text: 皇元風雅卷之三
  hash: sha256:363a0b0b07ca9d4e4fb96ca92b1a3d00d961d5bb4e0380fb9605001b7321e063
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_003-1a}
body:
  text: 安竹齋送白雲平章舟人停棹酒停斟試听筵前送客吟離恨早知如此苦交情不台恁為深白雲境界三更夢紅葉園林两地心從此卓茅亭上客抱琴何処遇知音明普彦題商山四皓圗刘氏何如吕氏安尺書便尓闖重関空將鬢雪驚隆隼不道啼紅慘玉顔鴻鵠声寒悲曉殿紫芝香冷怨秋山千年猶昧深根術又落巴童橘樹間文子方次元復𥘉韵送虞伯生代祀江瀆二首成均十載宛遺經未識沙墩長短亭旌斾曉霞穿化日文章秋月映華星鳥鳴春晝岷江白鶻汶天低隴樹青四海車書今混一摩挲劒閣重鐫銘出宿春城宿霧低閱人老眼似層梯功名愧我蠅鑚紙文采憐君玉在泥蜀道連雲春繫馬巴山踏月夜聞雞贈言却笑瀛洲客吟落梅花日又西贈别任毅走御史行䑓陜西金天行秋河漢凉星鞀夜起尚書郎隴山晴樹熈化日燉煌楚道霑飛霜天邉鵉鵠意自逺草間狐兎无苦傷丈夫樹業方如此探别不用愁中腸和寗致陶幽懷時雨息氛翳髙林嘒風蝉端居愜孤尚圗書静當軒涼颸薄櫺戸㣲爽生簡編客來聊与楽客去自復眠徜徉永仐夕庶以全吾天送馬伯庸御史奉使関隴聖朝啓文運同軌來无方夫君起天関崛起千仞翔脩辝陋史漢高步追黄堂廼祖尚書君樹立何堂堂昔在帝丗祖榮身事戎行風雲一朝㑹奕丗傳芬芳矧君擢髙科有業未易量斯文繫政教治忽慎弛張丗豈无勇者舎君吾何望勿爲守鉛槧局束徒苦傷僦屋京城居去君百㪯趾聞君起冠豸僮走亦欣喜况當逺于征无言詎能巳朝風號空桒衆草日披靡河関尚瘡痍聖度乃弘偉繄彼􅉼天休能不懷愧耻艱危見臣節維持頼風紀温言表遺忠生氣凛不死乃知烈丈夫豈独魯連子題楚山春曉圗荆門雪霽江樹芳巫峽冉冉愁雲長山猿杜䳌呌落月風􅎈露沐何蒼凉六龍從東来曉氣開扶桒天髙雨絶人事変觧環結珮空相望渚宫西澨連三湘畫中隱隱听鳴榔安得置我棲其傍爲君一曲歌滄浪袁伯長送華山隱者黒髩祠官佩水蒼万松深処響琳琅黄柑有法能為酒紫术无飢可當粮招鶴舞空山月冷檄龍吹雨海風凉瑶池欲問長生訣碧澗研朱寫緑章次韻呈周儀之虞伯生英英雲中君含思歌太乙廻鵉舞天葩流粲曉莫述報之不成章玉雪耿素質臨風發長謡庸以永今日昔斈空岩居之人怒且怠哀猿雜山狖驚笑欲我害天隱神所藏别之空悵慨桃源閟深竇亦復知晋代道逢斈仙人御氣不飲酒我笑𥘉无言彼巳嗔我否哀哉守其愚繫石猶在肘冥化隨悲風淪淪骨不朽羲娥挾双輈冉冉若見迫丹䑓嗽靈霞瓊蕋生尺宅控搏无須臾詭幻巳千百慎此隂陽機迯虚脫其厄竒樹生南薫清坐弹五絃涼風邈永古白雲赴蒼煙丗故日巳偷俛仰隨歳年折腰倘為酒猶足青簡傳少年恣青雲歡至无復恋一為関河行常恐不得見新鴈雲中來飛飛落南逺歸心耿无寐寒更促浮箭次韻送友教授閩中欎欎大古樹叢生散珠玕明時炳陽德寥落歘歲寒天風西北來凍海繁層瀾芳朽各有性盛衰詎无端貿貿氷上屦黯黯塵中冠宿志不得酧奮飛戢其翰伊南蹇一士覊鴻河之干手持大雅篇八音佐王官墻隂卧朝日薄飯不滿盤邂逅喜我同金石生肺肝出処非故意低徊耿相看閩山渺雲海東望通三韓居夷垩有在取琴為君弹送邵元道仲連匡丗姿揮手却秦軍掩𬒮停白日登車抗浮雲射書誠草草孤城死生分辝榮敦厚俗矯抗離其群虞卿舌轉丸揣事精㣲芒事危見交態窮愁名益光黄金散逝水白璧凝飛霜丈夫有定志得失非豫防梅生一尉㣲喋喋正天紀洗心洞玄化削跡无妻子龍変孰為驯蝉蛻乃真止松廻風泠泠水落石齒齒襄陽孟浩然拂衣歸故山放浪岩壑深流泳遺人間㪯䄂林花落擊楫江鷗还羊公何堕淚水声日潺二送丗茂許省椽歸武昌岷江下奔流日夜東南趍艱虞六十載蜀客无完居纎脩掛晴練五老為之庐招彼素人心蒼翠垂流珠峩峩銀䑓公懷宝耿不攄青桐濯孫枝下此佳鳯雛絢爛五色翼披霞表亨衢清者冥鴻逺逸㒷蒼鷹俱食竹恋苦志餐風養真腴誓將八極周覧得為貞符歳月諒有盡雲端復躊躇躊躇固吾事荏苒悲征途蒼莾鵎鵡洲日没楓葉赤昻昂處士恨蔓草化為碧之士輕且儇之人何急窄至今千処下投筆五鋒鏑銀城大古雪俛仰一消釋雍容詩書郎浩氣烈金石徘徊登臨意寒波净如席相逢各万里未契淪夙昔咿嚘語未罄征鴈起瞑色凄凉衣冠聚山海窮畢弋翳翳桒榆老人物渺可識停驂望前坡去馬記𥘉驛歐陽元功延祐二年二月十七日侍宴北省臣本江南一布衣恩榮今日及寒㣲台躔列漢光相射湛露迎陽晝未晞仙醖飲來生羽翼宫衣晋得奉庭闈酒闌車馬如流水回望紅雲遶闕飛題孫氏壽慶堂孫母歐陽九袠登外家譜諜自庐陵髙年備養人俱羡同姓升堂我未能好客郎君深巷轍讀書稚子小窓灯朝廷屡賜尚方帛更待廻鵉織誥綾題澧州謝家建通済橋慶雲龍日護雲根玉樹薰薌接澧沅太傅功晋召伯埭相君心競謝公墩巳誇螮蝀綿今古猶羡封胡偉弟昆珍重盧溝溝上月時隨車駟勞于門過洞庭二首白沙隱隱見金鰲殿閣慿虚結􅌟牢天水渾融浮太極神人幽顯隔秋豪龍堂深閟靈栖冷象緯低垂客枕髙欲作庿堂迎送曲杜紅蘅碧尽離騷媧星摶五擲虚空屹立君山面勢雄一畫犠圗天地骨九江鯨觀鬼神功𥚑飄帝子蒼茫外楽奏鈎天傾洞中頗恨當年鄒魯客觀瀾未到楚諸熊夜宿寺前農家漢南旅店巳星稀倦宿田家帶落暉䔥寺依山聊復尓鄴侯送酒是耶非風餐井斍凉生飯露坐俄驚月在衣老子漫遊吾漫送登山臨水澹忘帰西明道人每一相見去必求詩余亦不能郤武昌堤上水雲身三十年來識道人只爲漫遊相見少故知臨别贈言頻幢幢車馬紅塵老靡靡江山白髪新邂逅一回詩一首錦囊千首未爲貧寄諸弟七絶長樂鍾声拆號時三台八座列参差自憐手把天瓢水一滴郷関不得私聖主宮中遊幸踈日臨秘閣看芸儲今朝蘭省𥘉開試清曉玉音催着書省垣東畔至公堂十五年前戦藝埸飽食大官无𥙷報两科來此校文章御史承差鎻院門使臣傳語出天閽試宫𬒳命連鏕入同榜三人入謝恩仁廟𥘉科射䇿郎如今斑白殿朝行東風昨夜聞帰鴈夢遶江南烟水長薊門城下過堦塔一一行人通竈間今朝送客又还入那忍更投名利関别駕祠前雪水深弟兄沙上把離樽三年不洗來時褐要看淋漓别酒痕早朝扶摇九万透雲霄鳯闕龍池歩歩瑶駞背負琛金絡索象身備駕玉逍遥衣冠俯伏傳呼岳干羽低回看舞韶湖海布衣瞻盛事他時田里夢天朝杜清碧与趙子昻集䝨爲壽東觀道家蓬萊山神人來往乎其間銀鈎势壓蛟龍榜玉佩声聞虎豹関秋露满天濡緑髪晨光出海曜朱顔金凾更注長生籙林下種菊巳斑斑送趙編修往年𥘉記抵京師正類機雲入洛時未識鰲頭分赤管先傳馬首控青絲瓊林舊醉家家酒金刹新題処処詩此日揚州帰去路錦衣光彩照城池寄題周待制悠然閣大江之東彭蠡南周家髙閣与雲叅秋風猿狖啼青嶂夜雨蛟龍起碧潭繞屋千藂生杞梓通簷百尺長楩柟何時共此登臨樂指點平川得縦談真州賈生索賦孩児茶吾聞孩兒茶始來自殊方古人譯其名和以龍麝香賈生得妙訣品製非尋常清晨持遺我今我試与嘗味腴甘且美頓洗葵藿腸惜无瑶瓊報裁詩謾誇張燦爛黄金芽錯落明月章波浪盤蛟螭雲霞廻鳯凰好將龍鳯餅褁以玉雪囊特之献天子𥙷益未可量能令齒頰生玉液却囬麯蘗升明光諸公以懷李白詩分韻送李茂逺後以酒字索賦遂綴五言一首樟江水逵逵民俗多雜揉李君專檄來號令粛廵掫遂令万家市安集日豊阜春風有歌姬夜月无吠狗築堤捍水災皆自將軍手至今此邦人秝誦常在口我來自京師始得一聚首綵過日以数言論竟開剖有如済丗方乃尓困升斗孰云勞積多反使歳月乆方今天子聖賢知在左右銓曹每推擇往往雜瓊玫此行看薦進直入紆組經莫負平生心㚻使斯民壽豈敢為贈言裁詩侑盃酒送李伯循帰山中巳聞盤谷最深幽便欲從君遂此遊春氣和柔朝採薬秋風清徹夜乗舟岩花冉冉誰晋客汀草纎纎独倚楼楊柳新條不堪折只須買酒喚離愁和楊仲弘老來自愛黄叔度少日空期魯仲連髙卧独无田二頃曵𥚑誰有客三千滄江渺渺浮鴎鷺白日翩翩換歳年只憶江東楊少尹劇談終夜不須眠楊仲弘送虞伯生赴召幾年簮笔侍明光共取才華𥙷衛郎祀事必稽周典籍頌声多假漢文章雲垂逈野鳴鞘逺月滿髙城下漏長縱獵合祛誇盛美願言作賦継班揚送朱澤民之京師櫰山挾海奠京師氣势紆餘尽北陲鴈度塞雲秋色逺鵲鳴宫樹曉光遟四方英俊皆來萃一代經綸属有為君有長林希屈賈好將詞賦重當時送彭萬里平居郷鄙係瞻听逺渉京畿迂寵靈席厎波濤秋淼淼枕前星斗夜熒熒肯如龍劒重藏匣誰識牛刀始發硎將相与人殊勢分秪應双眼為君青擬辝京師囊衣托載道傍車人事匆匆嵗欲徂風雨五更雞乱呌関河千里鴈相呼蕪菁散漫根猶美桒柘䔥條葉半枯却上髙丘重回首五雲繚繞帝王都㳄韻陳子仁黄河禹功䟽鑿適憂勤宇内山川自此分无氣渾淪通地脉孤光迢逓貫天文母金伏土秋當孕隂火潜淵夜欲焚万里窮源何日遂片帆西上破層雲早朝掖垣迢逓到城回魏闕蒫莪此日開赤芾㑹延宵仗引朱輪争道曉鍾催三泉忽報藏金甲万歳猶聞献玉盃楽奏象箾從此畢小臣思見鳯凰來錢塘懷古四首斜界鈎陳通大道中分魏闕對層峦雲生殿上金炉暗露下庭前玉井寒江漢飛龍俄杳杳滄𬈑泛鷁竟漫漫中天㑹合寕非数坐見蒼生奠枕安山回禁禦入雲長無復陳兵衛两廂千古金鍾埋野草万年珠樹落秋霜龍文不徙陽人聚鳥篆終帰軹道傍九市塵埃來衮衮一江風浪去茫茫西湖清濁自天開鴻鴈鳬鷖日往來黄道星辰環太乙紫雲宫殿擁蓬萊能丈競奏王褒頌献壽深傾阿母盃九域輿圗今混一百年耆舊自興哀化人宫殿𬒳層阿棟宇髙低日擁波翠石文章題日月宝珠光𦦨烛山河空乗說法黄龍听貝葉繙經白馬䭾誰謂一无超衆有秪今塵土重來過宗陽宫中秋對月老君壇上凉如水坐看氷輪轉二更大地山河㣲有影九天風露寂无声蛟龍並出扶金榜鵉鳯双飛載玉笙未信弱流三万里此身今夕到蓬瀛九月御氣排空宝扇開金衣照日近臣來絲囊巳進千秋録黼座还称万壽杯王子吹簘双鳯舞羲娥攬轡六龍回侍臣此日沾恩賜散作祥風遍九垓東湖即事四首爲王侯本齋賦朝來千騎出城闉爲向東湖踏早春素練抺林雲氣薄明珠穿草露華新山花献笑開簷畔野馬忘機戯水濵記取當年賢太守及時爲楽与斯民夏月湖中裘氣多南風曡曡卷長莎漁翁舟楫衝蘋藻遊女衣裳擘芰荷膾切銀絲甞異味腔傳金縷唱新歌君侯用意仍深逺即此光輝豈㓕磨暫停麾蓋擁輕舟此日湖山属莫秋采采黃花登几案離離紅樹散汀洲傾壷浮蟻杯頻竭下著鮮鱗網乍牧莫向錢塘誇往事白蘇未許檀風流雲氣低藏十万家東湖飛雪又交加玉禾舊布仙山種瑶樹新開帝所花伹听两岐歌瑞麥何勞八月泛靈槎侯門自有相仍客賸賦篇車後丗誇九日別友人客中佳節罷登髙独立凄凉感二毛紫陌泥塗秋汨汩黒山風雨夜嘈嘈幽人侈有觀魚楽壯士慚无汘馬勞得失古今俱一律惟應痛飲讀離騷次田師孟西曹即事韻隱吏重來右掖𥘉清明時節乱花舒霧迷黄閣霏霏重雨散彤庭點點踈李耳舊藏周典礼䔥何元得漢圖書經綸事業煩公等要使皇文日粲如題鄧善之袁伯長諸大史詔編囯史有程期正是諸郎儤直時虎士守門宫杳杳雞人傳箭漏遲遲窓間夜雨銷銀烛城上春雲壓彩旗才人各稱天下選書成當継古人爲贈賈囯英郎中挺生雄傑氣昻昂服事朝家𬒳寵光鸚鵡盃中春正好鳯凰池上日偏長新裁楽府傳宫体舊着朝衣帶御香忠孝两全人所羨只仐慈母在髙堂遣興二首庭樹號蝉日巳凉塞雲横鴈夜何長挾書万里干明主仗劒三年别故郷西北諸山連朔漠東南衆水隔荆揚淹晋不共慙蘇子莫遣貂裘壓雪霜往歳㗸盃意氣舒願從童子誦詩書巳荒陶令松三逕猶守揚雄宅一區春樹花殘收夏果海門潮落買江魚如今也足成吾趣何事侯門欲曵𥚑紀夢海上垂綸巳有年閑居无事夢朝天蒼龍觀闕東風裏黄道星辰北斗邉盛際只今逢五百前程何許隔三千楊雄曾奏甘泉賦應有声名逹帝前送殷囯華之饒州教授送君行李欲何如楚囯䔥條戦伐餘西塞人烟連草莽南江波浪入空虚遺民罕作先王服故府徒存博士書往事悠悠多泯汝好從黎老問終𥘉望海海門東望路漫漫風颶无時縱惡湍白霧漲天隂氣盛滄浪􅉼日曉光寒豈无方士求靈薬亦有幽人把釣竿與俗浮沉何足道願乗浮舶肆遐觀題息齋竹石行前怪石起参差篁竹叢深使客疑如過潇湘江上路鷓鴣声断日斜西寄題羅氏山莊黄石山原風物幽賤子往年甞一遊舊行檿柘巳成徑新刈禾麻應满睡馮衍元忘白首嘆謝安當爲蒼生憂餘杭溪上明日發愁殺楊花吹客舟題先天觀圖浩浩大古石雕鏤矜嵳我瓊林化飛騫宝􅌟通欝羅矯首視三光丹青相盪摩上隣列仙居西移瑶池柯玉蛟亦受令鞭撻廻盤渦巍巍双華表飛鳥不敢過玄鶴時一來潜鱗净无波心迹㑹虚湛神光隱鳴鼉𬗟彼巢居子凝睇佩女蘿天風入紫京百靈莫誰何朗言渾沌後龍馬方負河視之杳不見嘉名表山阿冥思有至理熟視猶摩挲李竹所題蘇李泣别圗我去君晋可奈何明朝烟雨隔関河當年胡婦分携処想見中郎淚更多過采石独卧空山五百年喚醒除是老坡仙沉香亭北花成土采石江頭月在天遺跡不妨晋狡獪多情猶自狎婢姢余生若在開元日也向長安斈醉眠何吾山贈琴舟趙海月五首瓏瓏花雨客屏香理尽哀絃曲轉長海上帰來望郷土風回依約夢霓裳莫年鉄杖身差徤何處銅盤月共將幸自金丹堪點化不須秋樹說荒凉倦遊何處不逢春猶記臨風度碧雲客裏看花同是夢囊中有道未為貧黒貂裘在閑隨意黄鵠歌成墓可人聞有琴材在樵㸑勞君妙斵一揮斤超摇万里一枯槎脫略塵凡三朶花自與秋風同客夢曽随明月落誰家江湖量大容浮瓠雨露春深斈種瓜却得先生有新曲如何能觧理黄荂楊柳風烟蜃氣昏秭帰花月碧潇春水雲别後行千里儋泊相遭得幾人見說周旋惟我我定知僵走隔塵塵初心未證圎通悟猶恐隨身認作真劉時中古採蓮曲長安女児淑且儂日日棌蓮溪水中笑挿荷花照溪水韶容欲與花争紅溪中荷花深幾許溪上時時聞笑語紅酣緑縟不見人應在荷花更深処帰時夜􅋽溪水清扣舷踏歌盪槳行荷葉盖頭花㔩鬢溪上月明潮已平望夫磯望夫山頭日欲頺望夫山下江声哀山頭日日風雨悪江上不見行人回空山亭亭幾朝莫猶記行人去時路知君渡河長不帰恨不當年遂君去此身化石千仞磯石猶可懸心不移長江水涸黄埃飛行人應有帰來時對月凉宵在前墀佳月墮我側此月如此心曠朗一片白開樽起相娯佳月即佳客月如感知已為我好顔色此時还独醒柰此明月夕呉敬庭古意四首我志在林壑而与丗沉浮是非復非是此語真謬悠所願適其適冨貴何足求有酒同醉醒商歌動清秋得意巳志辨白雲散岩幽斜陽在逺樹㣲風動髙荷䔥蕭湖亭上今夕凉巳多遇此素心人清言洗煩痾樽酒相与歡竟坐酣且歌揮手謝塵丗不楽復如何夏日苦炎热但願一夕凉及此秋氣深蟋蟀鳴近床物情亦知時催製公子裳戸牖當綢繆嵗晏饒風霜感此發斈儆終然惜流光隂陽有代謝寒暑相推移人生百年内行楽當及時昨日猶朱顔今日生白髭所以遺丗事飲酒不復辝寄傲南窓下千載真吾師新春喜晴歳序更五日人皆恱春晴宮曹喜休暇瘦馬成郊行氷消明水緑霧散山光明寒梅送餘香幽禽弄秋声覧物俱得時悠然起深情蹇余佐兹邑慙負吏隱名撫字心轉勞催科政何成願言兆豊年擊壌歌太平偶成㣲官覊此身逺投数千里觸暑渉長江晨夕不遑止殊方寒氣早秋意亦如此嵗月倐如流感嘆成坐起繭絲將奈何終當就料理送呉済川脫頴貴毛遂投筆知班生子携束書去而有千里程曉𬒮江風寒夜枕霜月明觀光丈夫事惜别兒女情㑹當拾青紫壯志酧平生夏日述懷屏跡逺囂紛息交歎孤陋蕭然一室間圗史分左右瓶花眩餘春炉烟靄渚晝坐觀羽虫化卧聞穴蟻開青山自偃蹇相對如有舊我家陵峯下溪水清可潄誤身投塵覊三年此紆綬素餐亦知愧民瘼未能究白雲渺何之念之令人痩陶令帰去來深漸着鞭後李長源題峽州黄河城下水澄澄送别秋風似洞庭李白形骸須放蕩并州豪傑爲凋零十年道路双蓬鬢万古乹坤一草亭八月崤陵霜樹老傷心休折柳條青上清宫蒼梧雲氣赤城霞錦谷鈞天帝子家仙掌髙承九霄露霓旗遥駐五雲車昆明火刼驚人丗瀛海風濤撼客搓醉裏忽逢王子晋玉簘吹上碧桃花楊鵬翼正旦有感干戈短景去匆匆回首南朝一夢中丗事尽隨天道北春正依舊斗杓東四时玉烛堪調爕万囯車書想混同寂寞荒山老松樹看渠梅柳競春風華清宮四海笙歌属一家􅌐山宫殿倚烟霞烛龍正照三郎宴野鹿偷衘第一花大抵失人迂致乱未知亡囯不由奢自從西蜀蒙塵後幾使殘民望翠華頴亭懸厓髙築此亭孤落日登临酒十壷雲破九山開曡嶂天低三楚入平蕪断碑黄絹空塵迹逺水白鷗如昼圗對此風煙巳䔥􅎈扁舟何必到西湖送真善卿帰秦中少年錦帶佩呉鈎曽伴秦陵俠士遊沙苑草青春試馬岳連雲净晚登楼十年