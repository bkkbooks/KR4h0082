重覆冒利涉用終吉回睨向所經千障隱朝日青林外盤紆黃流中蕩潏後來未渠央君子冝戰栗獨石解鞍及亭午稍欣烟霧收蒼然衆山出歷歷如雕􅦒前瞻一石獨靈官居上頭頗聞去年夏水激龍騰湫走避登屋山半夜齊呀咻幸兹溪澗中今作清淺流宴安不可懷變化成難求翠華渺在望行矣無淹留李陵臺日暮宫道邊土室容小憩漢將安在哉荒臺猶倣佛低廽為之久懷古增歔欷長風吹曠野飛雨千里至䔥條蒼山根草木餘爽氣嘗憐司馬公豫集多深意奏對實至情論録存大義史臣司述作遺則敢失墜上都分院晨興過桓州旭日生蒼凉舉頭見觚稜金碧何魏煌洪河貫其前青山環四傍莫從玉堂署鼇峰虼中央升階對閣老官燭分餘光琴冊森在側談笑來清觴在列無所為陳詩詠黃唐帝鄉豈不樂父母不得將起視雲漢低垂星爛寒芒南飛有冥鴻邈哉天際翔檐子窪自從始出關數日走崖谷迢迢度偏嶺險尽平水陸坡陀皆土山髙下紛起伏連天暗豐草不復見林木行人烟際來牛羊雨中牧颯然衣裳單咫尺異寒燠竚立方有懷相逢乃問俗畏途冝疾驅更傍灤河宿金陵送人歸豫章巳覺栖遲懶曵𥚑可能為我強躊躇一帆秋色紅塵外千里江關白鴈𥘉建鄴水清誰共飲潯陽潮斷定無書黃金未尽朱顔在莫種桃花學隱居李坥之紈扇行誰家玉貌蒙清霏手揮紈扇臨東池瀟湘搖波月弄影碧波疑見湘江妃淚痕竹上猶未滅一尺氷紈萬愁結風吹翠䄂卷寒煙汗入紅肌凝素雪深閨無人凉氣早輕薄恩情易衰老昔隨胡蝶上春衣今逐流螢向秋草不見班姬染翰時空遺漢宮題扇詩千年怨墨巳流落一天霜露沾人衣髙將軍白鷂歌淮西猛士髙將軍新護驍禽𬒳凉素調之弗顧情未狎跨馬臂出城東去征鴻作字雲邊斜聳身直上誰能遮天寒日暮望不見北風萬里吹瑶花雲飛忽斷鴻飛却短草長煙際沙漠但餘孤色搖清秋未許纎毫生碧落歸來珍衛不解鞲親手餧肉供飢㗋英雄遇合固有分可惜驚塵俱白頭姑蘇臺吳王宴罷歌臺晚斜日清江映䦨檻臺上西施醉捧心江邊東越愁嘗膽鴟夷裏尸去不還麋鹿散迹遊其間秋深明月照高樹驚烏啼落丹楓寒功名獨羡陶朱子一葉扁舟弄雲水范藥莊杭州人燕山聞䳌燕山三月𥘉三夜聽得啼䳌第一聲同是小樓孤燭下主人睡熟客心驚胡石塘永康人題崔録事女真驄馬圖天恩洽騎十二間短䇿不知行路難漠漠空州望不盡電光掣過須臾間蹄髙髙屈汗溝出駿骨隱隱隆於山窟泉沙草不得足勞多食薄心知慚十年甕牖間書瑟展卷見圖真太息女真年少面如盤華屋平生隔風日青驄肉破擁尻睢黃金校具褒綏拂三品芻豆空自多行見火花繞銅歷題秋江喚渡道旁木葉如渥丹歸急不知行路難青嶂碧溪自喚渡蹇驢破帽西風寒裹頭長須甚德色肩輕不借有餘力人間塵土深復深謹勿重賦招隱吟贈相士黃電目憶昔待詔金馬門方伎雜遝車蓋繁黃生蔡子最絶出髙堂不奈笙歌喧廬陵老翁才五尺旴母江頭眼空碧相人豈不二子如秋風夜雨歸無宅長身博士老一簞皋比那博儒生酸人生榮華無足夢桃笙竹枕長䦨干黃翁勿嘆無家苦華屋連雲更何𥙷蜀莊一日不百錢炳炳幽光二千年題風雨漁舟圖細柳新蒲春巳滿飄風急雨浪如顛漁人若解忘魚意繫却扁舟卧碧煙戴祖禹越人天馬圖歌月支天馬難再得誰向君家貌真蹟駿毛皎潔骨肉勻騄駬驊騮敢同色當得超逸真絶倫皎如玉龍下天門朝馳駿坂飛匹練莫浴深淵浮赤雲四蹄飽踏咸陽月滿身猶帶燕山雪只愁玄霧閟神姿未許清塵汙汙血飄然却立精神聚想見落筆驚風雨他年開匣君勿驚照室神光夜飛去鄧牧心杭州人贈友人我在越君在吳携書邀我遊西湖我還吳君適越遙隔三江共明月明月可望佳人參差與君携手西湖上相思空誦停雲詩知君去掃嚴陵墓秪把清樽酹黃土浮雲茫茫江水深感慨空勞弔今古孤山山下見陳實連騎東來踏春色湖邊千樹花正繁莫待春風吹雪白有酒如澠有肉如陵鼓趙瑟彈秦筝與君長醉不用醒何必千秋万歲名倪元鎮蘇州人聽袁子方彈琴蕙帳凝夕清髙堂流月明芳琴發綺席列坐散煩緩回翔别鵠意縹眇孤鵉鳴一寫氷霜操掩抑寄餘情與張貞居雲林館燕集分韻得春字青苔網庭除曠然無俗塵依微樵路接曲密農圃鄰鳴禽巳變夏踈花尚駐春坐對盈樽酒欣從心所親春日雲林齊居臨池春流駃掃地夕隂滿正襟味道言超遙坐溪館嵐嶺當書榻煩襟一舒散靡靡松華黃逐逐雲氣暖石梁青苔合於焉人跡斷故非與丗疏冥棲遂忘返寄懷鄭徴士谷口子真今最賢父别欎欎夢相牽好營秫田多釀酒欲買茅屋尚無錢兄病每書賖藥劵客來唯候煮茶煙闔閭城東有艇子憶尓青燈相對眠送别甘允從一首來尋墨沼雲林下共愛女蘿緣石牀喚人鸚鵡語猶澀當户枇杷子半黃奉橘定應題百顆籠鵝即可寫千行䔵亭書法人間少好去山隂泛野航奉懷張外史隂壑慘慘緑苔生碧雲亭亭多逺情松杉鶴去轉簘瑟洲渚花落自縱橫從君下榻住十日看我鼓枻出層城洞口􅌲巢無恙不定應間閣著書成次韵薩未錫寄張外史谷口路微山木合溫衣空翠不曽晴飢猿攀檻為人立寒犬號林如豹聲小閣秋深聽雨卧長空日出采芝行道心得失巳無夢沐髮朝真候五更陳剛中天台人中書大丞相安公延說四書因以詩呈帶礪家聲耀八寰中書獨壓紫薇班捧持日月祥雲上洗滌山河湛露間絲竹正歌淇奧美赤松聊伴穀城間聖門别有經綸事更對青燈話孔顔交趾使還少年偶此請長纓命落南州一羽輕万里上林無鴈到三更函谷有雞鳴金戈影裏丹心苦銅鼓聲中白髮生巳喜歸來身健在夢回猶覺瘴魂驚出承天門又騎官馬過中原䄂有芝泥詔墨狠嶺海孤臣天咫尺五雲回首是都門開平即事天開地闢帝王州河朔風雲拱上游雕影逺盤青海月鴈聲斜度黑山秋龍岡上繞三千陌月殿香飄十二摟莫笑青衫窮太史御妒曽見衮龍浮金陵六代帝王州寒煙滿石頭星河天北轉江漢水東流步絡金蓮雨歌殘玉樹秋白頭有漁者猶說景陽樓鄂渚晚晀黃鶴樓前木葉黃白雲飛盡鴈茫茫櫓聲搖月歸巫峽燈影隨潮過漢陽庾令有塵汙簡冊祢生無土蓋文章闌千只有當年柳留與行人記武昌鳯凰臺鳯皇臺上野烏啼笳鼓連雲日又西天地無情潮寂寞英雄有恨黍髙低殘桁夜雨迷朱雀荒塜秋風怨白雞空有斷碑蒼蘚裏千年留得謫仙題銅雀臺古臺百尺生野蒿昔誰築此當塗高上有三千金步搖滿陵松柏圍鳯綃西飛燕子東伯勞塵問泉下路迢迢龍帳銀箏紫檀槽怨入漳河翻夜濤人生過眼草上露白骨何由見歌舞獨不念漢家長陵一抔土玉匣珠𥜗鎖秋雨吳宫子夜歌紫貝樓闕欎金香暖雲七十紅鴛鴦玉蟬笑擁霞銷裳星河不墮宫漏長緑樽灔灔麟髓泣露重花寒秋不濕歈歌一聲起雪濤海龍夾陛如人立誰知淺嚬娥半掃中有殘螢滿愁沼越兵曉踏西風來碧波一夜芙蓉老居庸關卑稜稜石確確車聲彭彭鬪石角馬蹄蹴石石欲落不知何年鬼斧鑿僅與青天通一握上有藤束萬仞之崖下有泉噴千仞之壑大行羊腸蜀剱閣身熱頭痛縣度索一夫當關萬夫却未必有此竒巘崿吾皇神聖混地絡烽火不紅停夜柝但有地險今猶昨我扶瘦笻且倦腳欲叩往事雲漠漠平沙風起鳴凍雀神州八景太液秋風一鏡拭開秋萬頃碧天倒浸琉璃影寒飈夜捲雪波去且闕珠宫黛光冷三千歌棹搖緑煙濕鬟吹墮黃金蟬琪樹颼颼紅鯉躍衮龍正宴瑶池仙瓊華春隂一峰亭亭湧寒玉露花不墜瑶草緑珠樓千尺漢星間天風吹下笙韶曲萬年枝上槲葉滿小鵉倀倀繞龍𬋩金棍曉御翠華來三十六宫碧雲暖居庸曡翠斷崕萬仞如削鐵烏飛不度蒼石裂嵯岈枯木無碧柯六月大隂飛急雪寒沙茫茫幽關道駱駝夜吼黃雲老征鴈一聲起長空風吹草低山月小金臺夕照危坡十二青雲梯老樹偃伏猶躬圭長𥚑巳曵星辰去殘陽猶掛盧溝西召南六百年宗社一日黃金重天下精躔寶氣夜不收又見斷霞明朔野盧溝曉月長橋彎彎卧海鯨河水不濺水崢嶸逺雞數聲燈火杳殘蟾猶映長庚橫道上征車鐸聲急霜花如錢馬鬛濕忽驚沙際金影搖白鷗飛下黃蘆立四山晴雪凍雀無聲庭檜響水花酒簷大如掌平明起視岩壑間插天瓊瑶一千丈夕陽微漏光嵯峨倚欄更覺爽氣多雲間落葉有徑否想見樵叟猶青簑玉泉垂虹雪波碧擁千崕髙落花點點浮寒瑶日斜忽有五彩氣飛止太空橫作橋古寺殘鍾答鈴語回首前村猶急雨輕綃欲翦一幅秋又逐西風過南浦薊門飛雨黑雲如鴉漲川谷雷湧電躍風折木半天萬點捲海來森森胦也如銀竹鳯城無數笙歌樓珠簾半捲西山秋誰知羈客家萬里一燈正擁寒衾愁李鶴田廬雪中寄友石角雲層道路難黑風三日書漫漫吟笻直指西湖柳合與梅花共此寒趙青山廬陵人銅雀臺朝望西陵墓夕望西陵墓望望不復歸月朝人十五月朝十五可奈何更對空幃作歌舞銅雀昻然飛不去當時美人髮垂素我生不如陵上樹年年樹根穿入土歐陽伯恭廬陵人題蘇武李陵泣别圖祈連山前箭如雨渤海海邊羝不乳同是肝腸十九年白髮君歸朝故主臣心有血一斗許亦欲隨君歸釁鼓五千健兒五千母臣若獨歸魂魄苦空將老淚寄君歸歸拜茂陵墳上土劉起潜送黃修永之武夷杜淸碧學眼中塵土政昏昏華蓋風髙翠入雲一代風流超晋宋百年禮樂寄河汾波寬好看魚龍化天逺空憐鴈鶩群亦有平生觀海意出門萬里獨慚君鶴延頸他邊照影遲花明柳净思依依年深色重丹砂頂日暖光浮白雪衣晴月夢回三島去看雲思上九霄飛玉簘聲斷秋宵冷應有仙人憶未歸燕萬里來從海外村定巢時聽語頻頻簾風半捲重門曉社雨𥘉晴二月春尾上係詩成往事堂中學舞是前身華堂茅屋依然坐幾處相逢舊主人吳正傳秋懷江南木葉飛江北百草黃風煙淡莾蒼悵望川途長寒魚聚其群鴻鴈忽成行俯仰念時物索居耿凄凉昔我二三友敦好攻文章漂零轉相失尺素不得將人生四方志企尓揚聲光登山豈無車涉河亦有航真誠諒不隔離别庸何傷赤壁圖草荒殘壘怒濤秋遙想英雄淚自流風火千年消伯氣江山一幅掛清愁丈夫不學曹孟德生子當如孫仲謀機㑹不來形勝在狂歌弔古漫悠悠送陳生北上万里長風入馬蹄江干舊隱掩間扉乾坤清氣隨詩卷官塞征塵上客衣日落太行孤鳥沒天髙燕闕五雲飛提携喜有王維在回首南山莫便歸于介翁感古引孔明梁父吟深不滿於齊相烏乎天若祚漢孔明不死天下事未可知吾於此重不滿焉建安天下如潰瓜一榻之外非吾家黃屋飄颻定何許龍為魚兮鼠為虎老瞞詐力敢欺天朵頥羊鼎方垂涎紫髯將軍一攘臂控荆引越三千里慷慨山東大耳兒南飛烏鵲栖無枝草廬一語君臣契目中久矣無吳魏堂堂大義凛不磨靈關剱閣爭嵯峨昨夜西南一星落六尺之孤竟誰托渭水旌旗歸故都江上空存八陳圖抱膝長歌出師表古柏蒼蒼為誰老皇元風雅卷之二
