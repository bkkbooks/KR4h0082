front:
  text: 皇元風雅卷之二
  hash: sha256:fdacca22a08cca0481f21e5400eab9c6b855b3d3b8684eff4e29eb80b8b11065
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_002-1a}
body:
  text: 交趾王大明殿侍宴班陪玉筍侍紅雲日表熙熙瑞氣溫万派朝宗滄海闊衆星環拱紫宸尊雍容湛露歌詩什倣佛鈞天入夢魂孤孽秋毫皆帝力願忠赤報深恩送駕至上都過關口而回控轡追隨寶馬群古長城外送金根仙蹤縹眇鵉聲逺客路﨑嶇燕尾分喜見重瞳開日表何勞八翼夢天門梅岩有約人知不幾處朱欄看白雲送元明善赴京江流脉脉草離離黃鶴磯頭酒一巵報國忠心憐我老論文半面識君遲正當舉鼎調梅日又是長亭折柳時收拾琴書㱕路穩鳯城依約更相期送李尨川平章赴闕雪灑長亭酒滿斟楚山千曡水千尋梅清半識平生面桐老相知太古心鴈影南樓孤月冷馬頭北闕五雲深二毛越叟情無限獨向南窗䄂手吟挽卜憐吉歹河南王哲人萎矣棟梁傾回首西風沸暗零三丗功名今古史百年過客短長亭手扶紅日名猶在身就黃糧夢不醒記取汾陽舊勳業紫薇留種繼芳馨万嵗山侍宴碧漢嗚鵉隔丗塵玉京開宴㑹星辰舞回鰲背千山雪酒上龍顔万國春物𬒳仁風榮御苑水流聖澤溢天津越南羈旅陪賔列咫尺光瞻日月新駐馬渡頭大别山頭漢口前吳王磯下沔城邉立殘秋水隔灘鷺噪落夕陽何處蟬赤壁冷煙銷魏卒黃州淡月照坡仙英雄瀟灑名俱在我愛吟狂不愧天鄂館書懷䔥然孤館起凄風半壁青燈照病容滴碎秋心窗外雨𫾣殘曉夢枕邉鍾衡陽鴈斷三千路巫峽猿啼十二峰不尽關山回首處暮雲曡曡水重重秋晚睡覺海水盈盈漏轉籌霜風吹角出譙樓夢殘淡月五更曉心逺孤雲萬里秋玉帛幾年賔上國詩書半丗老中州平生事業渾如昨無奈青燈照白頭徐參政題吳城山石砮碆砮碆砮中應雙一在陳庭一此鄉楛苛已隨毛血化石稜尤作劒鋒剛知音士適逢坡老得寶神隂相豫章廟令收藏要如法試看垂矢在東房劉侍史九日按上都過陵丘瘦馬行吟萬壑中浮萍身丗幾西東山空雨洗千崖翠灑薄顔添半面紅滿徑荒叢摧夕露一庭黃葉走秋風陸丘又過重陽節流落天涯愧老翁過陸丘縣白露擁蒼石紅葉浸寒水騎馬下山來啼鳥忽驚起梁宣慰過湖登樓樓前秋水健帆開樓外秋風舞䄂回萬里梯航通鳥道四時風雨護龍堆江山如此不一醉歲月幾何能再來欲問老髯求鐡笛夜深吹上紫荆臺何理問題宜春臺山外青山樓外樓楚雲迢遞暮天秋千年綵鳯鳴髙阜一道長虹鎖碧流舉目但知天地闊憑䦨不管古今愁二仙縹眇成陳迹我亦飄然賦逺遊張天師四景𥘉日暉暉照翠苔庭前昨夜碧桃開一簾香霧微風動知是仙人騎鶴來深院棋聲日正長博山添火試沉香道人鞭起龍行雨帶得東潭水氣凉天際涼風似水流山中瑶草不知秋黃庭讀罷無餘事鈇笛一聲間倚樓養就還舟不怕寒獨騎黃鵠上雲端笑談借得天家雪散作琪花滿石壇吳宗師獲五印三茅山道童遇白兔入穴掘之得一玉印乃九老仙都君印宋宣和時物也瑶瑛篆刻鎮華陽猶帶宣和雨露香玉兔有靈開地藏金童無意得天章九重臺上增春色萬里書中耿夜光喜遇明時薦神瑞三君珍重互宏綱六月十六日早朝偶成八句寄山中諸友五年四覩六龍飛又領群仙覲紫薇金殿煙雲浮黼几玉階日月麗旌旗群臣奉璽勤三讓國母臨朝重萬機遙食蟠桃知幾次客星還照釣魚磯滕玉霄合星移次福江西萬馬攢蹄夜不嘶鼓角聲隨山月上旌旗影拂海雲低心惟一正千官肅事不多言萬法齊帶得天邊新雨露曉看春意滿鋤犂謫㑹昌二首莫道文章不直錢布衣親到玉皇前好詩未足三千首又為梅花入瘴煙錦衣來作夜郎客紈扇忽逢春夢婆太平宰相知我者誰使醉後狂言多舟中拍拍有懷天可語落落不遇吾何歸廬山蒼蒼江水急明日鶴背西風飛贈弓秋蟾瓊花十里小樓紅醉吞牛斗眠長虹十年四海分萍蓬一笑邂逅滕王洪床頭回首黃金空但覺耿耿盤心胸問蟾何不歸蟾宫自有老月留身中誰受一粒金丹紅學得𥿄上畫墨龍白晝呼吸風雲從須刻霧暗天𪷟濛妙處巧奪造化工不復知有陳所翁君不見金陵壁上不點瞳點瞳霹靂驚江東我欲煩君具毫楮畫一小龍回顧母普令天下生孝心不向江湖長驗雨感寓六首宇宙忽空闊飲馬萬里流平生負兩眼及此行寓州天清健鶻運木脫飢鷹投長風吹海雨濯我紫綺裘相逢半遊俠把酒髯如虬慷慨說史記歷歷山川秋向來衣帶水日短何無舟吾愛東方朔髙揖金馬門向非玩六合安肯來崑崙昻昻九尺身談辨黃河翻誰知上書意蛾眉非自婚不見馬相如俯首猶監恩人生非桃李何故不自言吾愛李太白玩丗如遊龍自知天上謫何必人間容海風吹緑髮䔥蕭卧雲松我昔夢見之遺以金芙蓉淸輝恍在眼月落蛾眉峰西風桂花落我上天台山仙子扶我手冷然蒼水環乘鵉者誰子飛烟渺難攀三生此遊戲弄影銀河灣空山忽風瀑四顧鳴潺湲長揖馬子微此豈非人間春風如緑波淡蕩洛陽柳髙樓語錦瑟落花泛緑酒何人白鼻騧家茸紫貂䄂一字或未識銀莵懸兩肘煌煌貝宫珠乃落緯肅手爰居偶鍾鼓犧牛竟文繍終然同一尽豈復論好醜誰知草玄者窮巷間白首船頭書十乘船尾酒百壷酒盡書在眼落月如明珠忽悮八陳法縱橫始河圗惜哉經丗士未有窺唐虞季子相六國所見惟隂符元日對雨冷雲卷雨宿岩阿又見東風長薜蘿宇宙千年光霽少關河百戰亂離多鐵心不入利名冶緑鬢堪供歲月梭試筆尋詩詩未穩梅花樹下少婆娑湖西小樓不如載酒此憑䦨水色山光蔚可餐紫翆挾春排坐濕玻瓈湧月入窗寒蒼茫白鳥明幽嶼掩染飛花漾碧湍但領風光入吟嘨畫船綺袖不須看所見何時結屋亦雲根隔水人家可輞川萬仭雲山疑曉碧一弓風日弄秋妍虛名豈用傳身後俠氣猶能纍眼前料理寒香微雨外巳拚䔥散待流年吟到吟到西風黃葉枯新愁幾點落寒蘆乾坤萬象俱吾有煙雨一䦨何處無流水悠悠吾道在浮雲優援丗情踈午窗喚醒華胥夢古木岩頭聞鷓鴣訪隱西風短褐飛黃埃何不從我遊蓬萊狂歌醉舞下山去後夜月明騎鶴來吟人吟人瘦倚曲䦨干酒醒香銷午夢殘燕子不耒春社去一簾踈雨杏花寒夜雨未到黃昏緊間門怒雷挾雨過前村老夫熟睡渾不覺風捲濤聲入夢魂半生半生獨受春風淺萬感相隨秋夜長隱几無眠聽落葉松梢搖雨濺山房僧舍一枕松風入夢清空庭夜雨暗禪燈山中酷愛僧居好得似山中不著僧馮海粟題黃鶴樓鶴樓千尺倚晴䦨大别山青舞峻鵉昨日英雄無問處依然江漢湧波瀾題揚州瓊花錦帆隱隱到天涯古道殘楊泣暮鴉莫為龍舟更惆悵廣陵依舊看瓊花題墨時魚平生骨氣占南風玉色鬐鱗海汣通莫與粉紅參石首天機衮衮水流東旌表申孝子門竹尉輕輿到處安水溫半菽尽情歡寸心不暫三暉置万須何如一畒寬高蓋門閭華黼黻班衣嵗月老巾冠遙憐續漢書申孝千古申屠又有蟠吳草廬自警二首前丙宍十八歲作氣昏嗜卧愛非輕才到更𥘉困倦生必有事焉常恐恐直教心要強惺惺縱當意思沉如醉打起精神坐到明著此一鞭能勇猛做何事業不能成元來一片虛靈府埋沒經年滓穢埸不特通時多走逸覺於靜處亦飛揚晝間常𬒳事牽引夜後猶隨夢擾攘喚起主人翁警省自家三徑不容荒題閣皂山漢吳仙跡兩峰齊欲拾瑶花路恐迷寶殿青紅疑地湧林巒蒼翠接天低九重香案分雲篆八景琅函記玉題仙鶴翔空清似水步虛聲在朵梅西題蘇李泣别圗節旄盡矣自須存此日生還侍主恩右杖謾循椎結泣平陵有子廣無孫書李伯時九歌圖後李家畫手入神品楚賢流風清凛凛誰遣巫陽呌帝閽為招江上歸耒魂音紛紛音紛紛柱髙辰逺聰不聞扶桑𥘉瞰海橫雲司命播物泥在鈞洪纎厚薄無齊雲公無渡公無渡衡風起螭黿怒夜猿啾啾天欲雨天欲雨迷歸路歲晏山中採蘭杜靈修顧顧復去莫怨瑶臺神女妬坎二鼓進芳醑耻作蠻巫小腰舞千年往事今如新摩挲舊畫空愴神騰身輕舉一回首楚天萬里江湖春送陳小庭之廬山匡廬幾千仞崔嵬上有天仙相往來我欲遊之未遐逺君今往矣何時回我遊我意亦無他君遊君意還如何豈為昔人詩句好豈為其間僧舍多天地升在最髙頂谷簾界天直下懸銀河我觀此水注湖注東注入海復隨海日騰湧上天偏飛灑飛灑浩浩蕩蕩無塵界萬生活動增姿態流轉無窮萬萬載更萬萬載匡廬山不改晦庵畫像贊義理密微蠶絲牛尾心胸恢廓海闊天髙豪杰之才聖賢之學景星慶雲泰山喬嶽寧可無頃風吹枯木不搖水激方輪不動畢竟有木有輪惹起風號水湧雖如泡影露電也𬒳眼根覷見諸有都㱕變壞萬劫一空長在李伯宗送邵天常㱕山摶風徑擬九霄飛志業誰知與願違虎豹關深書未逹雞豚社逺夢先歸香侵客路花方盛緑滿家山蕨正肥去後且從間處樂徴書有日到柴扉柳道傳八月二日大駕北巡將校獵于散不刺詔免漢宫扈從南旋有期喜而成詠天子龍飛啓聖時乾坤闔闢載清夷幸從在鎬承周宴重喜臨邊舉漢儀御宿常時嚴虎衛吉行惟日望鵉旗詔恩許免陪驂乘却愧長楊賦未竒還次桓州塞雨𥘉乾草未霜穹廬秋色滿沙場割鮮爼上薦黃鼠獻獲鞍間縣白狼别部烏桓知幾驛他時稽落是何方長雲西北天如水想見旌旗翰海光過長城道德藩墉億万年長城謾與朔雲連秦人骨肉皆為土漢地封疆巳罷邊飲馬窟深泉動脉牧羝沙晚草生煙神京近在玄溟北九域開荒際幅貟京城偶成毳幕承空拄繡楣綵繩亘地掣文霓辰祈忽動祠光下甲帳徐開殿影齊芍藥名花圍簇坐蒲萄法酒坼新泥御前賜酺千官醉坐覺中天雨露低同楊仲弘應舉和袁集賢上都雜詩九首出塞行瞻日趍朝喜近天離宫來苑囿馳道絶風煙瑶水巡非逺峒山曆更綿甘泉多法從獻賦憶當年雨水漸衣黑雲沙際日黃煙開才黯淡日出巳蒼凉徇俗髙簷帽清心小蒃香端居万里念蕙草惜微芳謡俗隨方異溝途隔舍迷醺人唯馬踵勸客有駝蹄殿角孤光净城隅雜樹低天涯中夜舞如意昔曾携天潢猶白白雲幕故青青積潦槯車軸髙風墜箭翎宫塗丹赭聖殿戶紫金釘女樂蓬萊祕哀簘動杳冥幄殿曾雲陳轅門積雪峯竒鷹皆戴角御馬盡飛龍瀚海將臨幸云亭望陟封青丘大羽獵有事待玄冬曹務惟章句宫曹自法程齊扉侵雨潤宴几得風清歷歷三刀夢行行萬里城明年遂耕隱深仗酒為名經逰還絶塞際遇復清朝天暑無蒙綌輕寒巳禦貂盤空虀屢薦觴至酒頻澆貧病諳為客何慚帶减腰公子青絲轡主孫緑􅚫車宴酣風小定舞破日西斜手擲宫中果神行海上槎築郿母自厚儉德不期夸水草方方善弓瓠户户便合圍同婦女從戍到曾玄雪毳千家帳氷瓢百眼泉浚稽山更北長望斗光縣送臨川謝有源赴閩醫提領一路青山荔子叢華山西望粵臺東家風蘭玉庭階上官事參苓藥籠中鷁首去乘潮浪白蠣房催薦酒醅紅福州自是炎蒸少臘雪飛花落半空題有源圖書卷後官章文學範精同摹印書兼篆刻工猶是古人傳信息雕蟲元不在楊雄贈黃伯中從臨川吳先生卒業因之奉蕳夫子祠垣舊巴山闕里門具瞻誰可並友愛益宜尊往卒諸生業行穿頁谷村亂流黃濁湧迎宿緑隂繁想到趍函丈承聞服緒言心將經義治理並聖詮存藻繢終迷質條枚實自根須無遵近軌㑹有企前轅伊闕如堪攬河汾欲併吞道𥘉由巳致舌豈要人捫正要薰陶學全稀色笑溫歸裝當稇載館饋且盤飱羡爾方朝旭暫豫未夕昏仰懷駒皎皎深感兔爰爰搖席今承間緘辝莫憚煩度幾薦鳯觜兼得嗜熊蹯鯁膳何勞祝因兹寄不諼陳濟淵龍額山巔崖穼出衆峯前隱約潜龍枕爪眠怪木秋凋頤露角寒泉春湧鎮龍涎身橫雲外三千尺眼看人間幾百年莫待始皇驅入海早升