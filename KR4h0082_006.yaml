front:
  text: 皇元風雅卷之六
  hash: sha256:cf9de00e764c9af6081a54ea8591cd56d06246d8189fa462b005857b406cc44f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_006-1a}
body:
  text: 何頥貞長沙留别董仲逹陳君直歲晚客衣薄揮毫更舉杯五年差一别兩月却重來南屋夜相語北風船未開他年苕霅上回首定王臺黃子肅古意呈仲章貢侍御娉婷二八女絶色妙難畫新莊薄鉛華照影修竹下盛年事夫壻錦玉耀精舍雖非伯鵉妻倦然惜春夜琴餘月當軒默默倚風榭寄語東家兒紅顔莫輕嫁梧桐生髙岡雲氣涵空清南枝挂孤月上有蒼鵉鳴大匠揮玉斧渾然合天成置之白玉堂𬒳之絃歌聲一彈松風來再鼓溪月明子期人巳往青山為誰情題竹外一枝梅花仙摽何處耒一笑倚寒玉晴窗見踈林座上春可掬山隂帶殘雪水影兼逺緑珍重孤竹君嵗寒伴函獨贈醫人黃子厚悠悠溪上山疊疊山下雲幽人不出户芝草日以春伯也種丹杏心與孤鴻輕仲也搗玄霜西風林間聲丗降運不齋病隨人心生芳章何所無誰能擷其英吾宗幼幼方積久用更精金丹有時合白日升蓬瀛春晚春老他鄉奈老何可人紅紫漸無多間來緑柳坡頭路記得流鶯弟一歌題春江小景圗小艇無人載緑陰白鷗門外笋成林不知多少山中雨染得一江春水深塘懷友舟泊風林一鴈聞白蘋紅蓼共思君月明江水多於海雨後秋山碧似雲登福山遇僧偶出欲扣禪關未有詩滿山空翆􅊜人衣行間趺在到西月試看白雲歸未歸鷲嶺雲間杖屨幽竹風松影共悠悠何人分得憎家榻坐看南山一片秋贈汪玉成千里還家獨抱琴象山杳在白雲林曉寒莫厭江東路人倚梅花雪意深友人見訪不遇君乘白鶴下青雲我入春山聽曉鶯可惜小樓風雨過無人收拾万松聲尋故人適興一尋君君家在白雲幽花春後見落葉夜深聞隨意坐苔石呼童煮澗芹不須談丗事詩思正紛紛留别相尋復相别把酒意如何雲石有時合風湍無定波此生無出處一笑對嵯峨長揖下山去暮煙浮女蘿哭朱教授竹所日問竹乎安妻然泣白鵉講堂春寂寂歸路夜漫漫前席成虛設斯文巳不刋些聲雲谷外落月帶霜寒天運不已嵗事又春學巳可乎作自勉詩呈李𥘉教授諸公東風一笑可人心旋瀝新醅對柏斟山色未勻春意淺梅花巳老白雲深半軒依竹間聽雨千里懷人欲抱琴試問樵溪隔年意碧波東注渺難尋送三山張國寶府掾美歸三山星斗髙貼天三山潮汐走百川張公平生飲中仙襟度脫落神飄然三山神人不敢友天風吹度金鰲顛掃清案牘待明月平鋪緑水栽紅蓮公庭無人山色落時有雙燕歸簾前樵溪夜雨深一尺城外明朝翠如織春歸草木不可遮黯淡巳作離别色離别兮奈何若有人兮佩女蘿公不顧兮山之阿滄海渺渺浮雲多縣令行石田海上秋不熟抱琴入山翠如簇白雲一榻流水深獨對青松結茅屋西風喚起泥塗身野冠來見天上人靈丹一粒肯分與便當負水供炊薪題髙都事戴松二牛圗東風吹浪翻平林吳江咫尺移春隂牧童曉出不知雨日暮歸去清溪深一童驅牛涉古岸草煙慘淡迷目觀雙蹄湧出層水間蒼峽蹴翻石雲斷一童踞䇿溪中流溪風不動波悠悠恍然顧影驚自失尚疑身跨蒼龍遊平瀾逺峰結寒色至今宇宙留墨迹可憐三子人不識我欲問之漢津客送素庵劉揔管歸當年繡斧出九天倐如白雲下長川千峰收雨作秋色至今梧竹吟寒泉熙臺重來又三載干將出匣光不改水壷盡貯明月秋風露𬈑溟接滄海海空迢迢行玉麟霜影蕩漾龍蛇驚石田歸來紫芝好䇿馬更入南山青南山歌兩岥何如陽春生物物不知魯人頌泮水何如弦歌一千里昆也虎渡河寬也蒲作鞭何如樵溪九曲落葉靜平鋪緑水栽紅蓮紫薇殿前列藩輔華蓋滄滄五星聚夔龍蹩􅍷天一方蟋蟀吟秋桂枝暮蓬萊楓葉昨夜秋瓊樓夢覺題金甌銀河橫空白鵉去安得追逐鈞天遊送僧定觀歸詩僧百丈來復作五臺别丁然振金錫桂子落秋雪山空白雲間風息萬籟滅相思何處無江湖一明月張希孟過長白山范文正公書堂長白何岧嶤下有讀書室人云小范老於焉競晨夕蕭蕭翳荆榛落落林泉石拳拳往瞻拜共共如相及維宋慶曆間群賢麟鳯集孰先天下憂一統經綸白中朝固有人西夏諒難國力言出師凶深慮手澤失炳幾先見明韓冨有慚德奈何時相隘欲碎和氏璧向非仁廟知千載血應碧至今忠義氣髙壓万仞壁所以德業髙要知清苦積功臣自古多動為冨貴役視公平生心霄壤邈相隔但能一善兼亦足千年塞遺容揭日星未覺關塞黑長歌泉行詩風林撼秋色晨興用俞立之韻寒碧洲䀶淺深青地勢平岩姿呈雅淡樹影碎空門窗納一天曉人懷千古榮移床髙處坐遙看日東生惜鶴十首鶴仙禽也由凡翼非其比恆不為丗人所愛而愛之者往往皆山林中人蓋物以氣合理勢然也余嘗得其尤者一豢之既久翩蹮與人相習日者為田嫗傷其脛丸病兩月斃惜哉因取其始末作十詩以慰其不幸云尓購鶴野處幽獨甚千金得令威挾雲出塵綱領月到柴扉縻足妨揚去遮亭使學飛至今湖上路樹石亦光輝友鶴雲雨手反覆紛紛知巳誰玄裳真莫逆皓首誓相期把酒或前舞逰山時後隨會看作人語細與話瑶池病鶴渠本仙家物胡為久不安強行時榻翼欹立恐遺丹誰藥相如渴獨憐范叔寒一鳴雖確確猶自徹雲端醫鶴饋藥人空數乘軒氣漸低無心吞餅餌何處覔刀圭暴日資丹火抔泉洗雨泥謾令通臂友時復憶幽棲挽鶴共處人煙外誰期禍及身九臯空有恨四野欲無春華表雲應淚瑶臺月亦塵當年林處士泉下定相親招鶴歌徹楚人些冥冥恨亦增楓林空落月蕙悵亦寒燈仰問天無語呼聞谷謾應料隨風露氣飛入亂山層瘞鶴非為恩惟蓋徙逰歲月深忍令一抔土埋盡九皋心致奠攄幽憤為名著德音小松栽尺許悠久庶能尋憶鶴玉立昻藏意山中我與君幾年逰賞共一夕死生分徐步間窺沼髙飛逺帶雲為誰重起舞倚仗立斜曛夢鶴繡幌燈昏處依依見瘦軀引吭如有欣側頂不容呼枕上行雲繞松梢落月孤堪憐漆園叟謾為蝶遽遽圗鶴百計無從見明窗吮筆圖研朱漆霞頂屑玉抹雲襦野狀難非似山居亦勝無却愁風露夜拔宅上天衢趙茂原贈郭山長歸括蒼兼蕳葉縣尹林府判夜聽春雨鳴雨晴君欲行君行向何處回覽括山青括山万疊青未了漠漠蒼煙嗝飛鳥三年官冷不得歸歸夢時時度雲嶠竹雞鈎輈啼夢殘落花如雪春風寒客途塵土何漫漫握手未許攀征鞍東關且盡雙樽歡東關柳如帶中有别離態折贈不可持依依自相待宦逰江海事多違我輩論交金石在舉頭咫尺天涯别行李瀟瀟浸明月出門大笑心激烈良儔往往多契闊每一思之生白髮白髮生何足驚志士慷慨期晚成酒澆磊傀澆不平况復不飲難為情長歌散作陽關聲子先歸兮我暫停丈夫耿耿氣肯灑兒女淚浩蕩天地間清流豈常聚郭公子休徘徊京城二月鶯花開束書早上黃金臺黃金臺上多英才拾取青紫實快哉秋來我亦逺逰計萬里殷勤定相遇到手功名俱得意却誦如今長短句曉寒曲曲欄廉纎杏花雨博山煙飛裊晴縷夢回金帳春融融鵎鵡騖寒隔窗語美人曉粧靈滿梳柳風吹香入氍毹翠鬟嫋嫋綰不斷寶叉壓鬢紅珊瑚丫鬟捲簾採桃華驚起一雙黃蛺蝶秋宵吟平林薄暮風淅瀝黃金滿地秋狼藉新月出嶺光欲流萬籟無聲夜寥閴誰家美人吹鳯蕭彩鵉對舞摩青霄闌干縹眇碧雲逺天風入骨涼蕭蕭銅壷水寒銀箭澀玉露滴空衣袂􅊜缸花落盡爐煙收幽懷耿耿生新愁寒螿啼碎人間秋楊逹可渡江寫懷手挽天河落九𬈑浪聲淘盡丗間塵一川光浸梅花月萬頃波涵棣蕚春風雨不忘歸海意乾坤未老濟川人此溪浩蕩流千古回首春山更麼青吳仁傑送汪水雲入湘碧水波翻海亦摧奮身鰲背護蓬萊忍隨天上紅雲散却馭關中紫氣回大道有形須變化玄關無鑰任敲推携琴更拜蒼梧野猶想南薰入調來鄧彧之即景樹影禽聲門半開墻東一徑沒蒿來池塘通得官溝水時送青萍幾點來絶句清風左右涼滿室芷花香琴聲偶然斷不是客來妨藝藝陌上人藝藝陌上人各為衣食謀寒飢稍不迫彼亦無譏求豈知衣食外復有千端憂憂樂本皆然悵然寸心休掩卷夢中有得意覺來還自喜掩卷嗒無言殘日在書几江橋樹次阮魯詹韻江橋樹日日斜陽暮春風吹落花半隨流水去花落有盡時水流無斷處阮詩附江橋樹荏苒年華暮迎得行人來送得行人去落葉成秋風行人在何處宿山家秋深客路巳無聊此宿何堪更寂寥雨葉響林人語寂風燈近竹客心搖村醪味薄愁先醉野叟倩親語漸驕椎有兒童忘丗故向人欹鼾到明朝聽琴桐花門巷小立久忽聞琴海鶴天風急山猿秋雨深一時真得趣千載有知音雖是無絃逹何由會此心落葉二首秋庭晝無人落葉自滿地端居觀物化人生亦如寄朝聞鳴蟬惄夕巳見其蛻嵗晏共蕭條臨風發遙喟落葉日巳深庭樹日巳瘁樹猶不枝梧葉亦甘委棄寧隨高風飛母隨流水逝飛者或繞樹逝者眇無除陳敬翁晚過玉林西齊二首佳客因乘興能耒慰寂寥空山多宿約好語在今宵白苧秋風急青簾市酒遙半升無處問清抱可能消庭雨俱鍾盡燈花待客詩三生今夜宿此道幾人知分契情何厚林髙語自竒直為知巳用非敢傲當時月下琵琶不似潯陽縣哀絲帶客愁素娥窺夜曲明鏡入南州指滑鶯𥘉語腔新柳共柔向前兒女恨腸斷漢宮秋柳邊漁笛莫是章臺路青絲舞未休楚江歸去釣湘竹語孤舟一葉秋生樹何人夜倚樓舊時明月衷吹過白蘋洲𥘉夜獨坐興悠悠答階日腳收客衣涼誤葛池月夜私秋物遣身猶纍心間徑夫幽故人情分好渾不記淹留晚坐緑隂深處寺日暮坐幽人水影光𥘉劫苔䀶塔半身荒江無過客髙竹是比鄰夫信淸談少因看麈尾塵過胡震亨幽居欲復問何處行遲稍認門路隨幽草入巷與緑隂分市盡人𥘉逺言忘意獨在所經得才俊猶足慰斯文清曉過鶴上仙人仙人睡方起松日髙數尺入戶聞琴聲停步立苔石間情契幽絶每坐忽終夕長揖道香清歡言正蒲席贄分宜縣丞吳子彥道合無論見神交早為詩十年諸老盡一淡半生知池草今無夢山隂復有期絶疑汚具眼猶意得吾癡蕭南軒寄吳子彥歸江東鳴鵉誰倚洞簘過黃鶴樓前舊脫靴天上佳期今夕共江東歸思白雲多清風明月故人識有酒無魚良夜何莫學鄉音唱蘆葉桂花滿載待西河寄黃尚雅莫惜隔年期行當與子違門深紅葉字秋入菊花詩酒熟蟹將到魲肥膾可思西堂風露重早下讀書幃先一𥘉丁丑新正試筆傴指蘧年逝今朝曆又新野煙癡作晚山雨細勻春舉丗貪為苦空門懶是真聊將雙碧眼趺坐閲時人陸文圭燒筍賦竹字韻先生朝盤厭首蓿筍味得全差勝肉蒼頭掃地犀角出赤焰燒空龍尾秃土膏漸渴外欲枯火亥微􅊜中巳熟撥灰可惜衣殘錦解籜猶憐膚濯玉青青無分長兒孫草草為人供口腹李家丞相蒸葫蘆石家美人煮豆粥去毛留項有何好搗韭作虀空自速不如野人工食淡自辦行厨入修竹句衷曾參玉版師胸中會書篔簹谷主人不問不須嗔昨夜西風響林屋陳魚村題按仙樓五老峯前第一山天開緑野待公間令威白鶴重來日老子青牛又度關花木四時三月裏樓臺一簇五雲間我來便有凌風想為問先生覔大還易炎正環秀樓萬碧穹環類九嶷危樓空翠接清漪山人本是山中客山外看山山更竒張嗣良尋梅夢中寄荒遐騎驢一放棄野梅過流水香斷無尋處天寒歲又晏偃蹇傷幽素獨行山谷深積雪迷歸路曉行夢魂短短春宵殘喈喈雞語催征鞍東方倣佛淡月䁱柳露細拂征衫寒僮僕前行指豫路那個長亭經某處離情莽莽不分明黯淡孤村煙半樹何大虛畈步作隂靄通煙碎作霏春風吹入暖成泥女郎挑菜不知􅊜調笑相携過水西除夜風縈縈雨霏霏寒輕新柳潤春到落梅稀筠籃入市買紅燭煙火