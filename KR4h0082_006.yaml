front:
  text: 皇元風雅卷之六
  hash: sha256:cf9de00e764c9af6081a54ea8591cd56d06246d8189fa462b005857b406cc44f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_006-1a}
body:
  text: 何頥貞長沙留别董仲逹陳君直歳晚客衣薄揮毫更㪯杯五年差一别两月却重来南屋夜相語北風舡未開他年苕霅上回首定王䑓黄子肅古意呈仲章貢侍御娉婷二八女絶色妙難畫新庄薄鉛華照影脩竹下盛年事夫壻錦玉耀精舎雖非伯鵉妻倦然惜春夜琴餘月當軒黙黙倚風榭寄語東家兒红顔莫輕嫁梧桐生髙岡雲氣涵空清南枝掛孤月上有蒼鵉鳴大匠揮玉斧渾然合天成寘之白玉堂𬒳之絃歌声一弹松風来再鼓溪月明子期人巳往青山為誰情題竹外一枝梅花仙摽何処耒一笑倚寒玉晴窓見踈林座上春可掬山隂帶殘雪水影兼逺緑珍重孤竹君嵗寒伴函独贈醫人黄子厚悠悠溪上山曡曡山下雲幽人不出户芝草日以春伯也種丹杏心与孤鴻輕仲也搗玄霜西風林間声丗降運不齋病随人心生芳章何所无誰能擷其英吾宗㓜㓜方積乆用更精金丹有时合白日升蓬瀛春晚春老他郷奈老何可人紅紫漸无多閑来緑柳坡頭路記得流鶯弟一歌題春江小景圗小艇无人載緑陰白鷗門外笋成林不知多少山中雨染得一江春水深塘懐友舟泊風林一鴈聞白蘋紅蓼共思君月明江水多於海雨後秋山碧似雲登福山遇僧偶出欲扣禅関未有詩滿山空翆􅊜人衣行間趺在到西月試看白雲帰未帰鷲嶺雲間杖屦幽竹風松影共悠悠何人分得憎家榻坐看南山一片秋贈汪玉成千里還家独抱琴象山杳在白雲林曉寒莫厭江東路人倚梅花雪意深友人見訪不遇君乗白鶴下青雲我入春山听曉鶯可惜小楼風雨過无人収拾万松声尋故人適㒷一㝷君君家在白雲幽花春後見落葉夜深聞随意坐苔石呼童煑澗芹不須談丗事詩思正紛紛留别相尋復相别把酒意如何雲石有時合風湍無定波此生無出處一笑對嵯峨長揖下山去暮煙浮女蘿哭朱教授竹所日問竹乎安妻然泣白鵉講堂春寂寂歸路夜漫漫前席成虚設斯文巳不刋些声雲谷外落月帶霜寒天運不已嵗事又春斈巳可乎作自勉詩呈李𥘉教授諸公東風一笑可人心旋瀝新醅對柏斟山色未勻春意淺梅花巳老白雲深半軒依竹閑聴雨千里懷人欲抱琴試問樵溪隔年意碧波東注渺難尋送三山張國宝府掾美歸三山星斗髙貼天三山潮汐走百川張公平生飲中仙襟度脫落神飄然三山神人不敢友天風吹度金鰲顛掃清案牘待明月平鋪緑水㘽紅蓮公庭無人山色落時有双燕歸簾前樵溪夜雨深一尺城外明朝翠如織春歸草木不可遮黯淡巳作離别色離别兮奈何若有人兮佩女蘿公不顧兮山之阿滄海渺渺浮雲多縣令行石田海上秋不熟抱琴入山翠如簇白雲一榻流水深獨對青松結茅屋西風喚起泥塗身野冠來見天上人靈丹一粒肯分与便當負水供炊薪題髙都事戴松二牛圗東風吹浪翻平林呉江咫尺移春隂牧童曉出不知雨日暮帰去清溪深一童驅牛渉古岸草煙惨淡迷目觀双蹄湧出層水間蒼峡蹴翻石雲断一童踞䇿溪中流溪風不動波悠悠恍然顧影驚自失尚疑身跨蒼龍遊平瀾逺峰結寒色至今宇宙留墨跡可怜三子人不識我欲問之漢津客送素庵劉揔管歸當年綉斧出九天倐如白雲下長川千峰収雨作秋色至今梧竹吟寒泉熈䑓重來又三載干將出匣光不改水壷盡貯明月秋風露𬈑溟接滄海海空迢迢行玉麟霜影蕩漾龍蛇驚石田歸來紫芝好䇿馬更入南山青南山歌两岥何如陽春生物物不知魯人頌泮水何如弦歌一千里昆也虎渡河寛也蒲作鞭何如樵溪九曲落葉静平鋪緑水㘽紅蓮紫薇殿前列藩輔華盖滄滄五星聚䕫龍䠥􅍷天一方蟋蟀吟秋桂枝暮蓬萊楓葉昨夜秋瓊楼夢斍題金甌銀河横空白鵉去安得追逐鈞天遊送僧定觀歸詩僧百丈來復作五䑓别丁然振金錫桂子落秋雪山空白雲閑風息萬籟㓕相思何處無江湖一明月張希孟過長白山范文正公書堂長白何岧嶤下有讀書室人云小范老於焉競晨夕䔥蕭翳荆榛落落林泉石拳拳往瞻拜共共如相及維宋慶暦间群䝨麟鳯集孰先天下憂一統經綸白中朝固有人西夏諒难囯力言出师凶深慮手澤失炳幾先見明韓冨有慚徳柰何时相隘欲砕和氏璧向非仁廟知千載血應碧至今忠義氣髙壓万仞壁所以徳業髙要知清苦積功臣自古多動為冨貴役視公平生心霄壌邈相隔但能一善兼亦足千年塞遺容揭日星未斍関塞黒長歌泉行詩風林撼秋色晨興用俞立之韻寒碧洲㾗淺深青地势平岩姿呈雅淡樹影碎空門窓納一天曉人懷千古荣移床髙処坐遥看日東生惜鶴十首鶴仙禽也由凡翼非其比恒不為丗人所爱而爱之者往往皆山林中人盖物以氣合理势然也余嘗得其尤者一豢之既乆翩蹮与人相習日者為田嫗傷其脛丸病两月斃惜哉因取其始末作十詩以慰其不幸云尓購鶴野処幽独甚千金得令威挟雲出塵綱領月到柴扉縻足妨颺去遮亭使斈飛至今湖上路樹石亦光輝友鶴雲雨手反覆紛紛知巳誰玄裳真莫逆皓首誓相期把酒或前舞逰山时後随㑹看作人語细与話瑶池病鶴渠本仙家物胡為乆不安強行时榻翼欹立恐遺丹誰薬相如渴独怜范叔寒一鳴雖确确猶自徹雲端醫鶴饋薬人空数乗軒氣漸低无心吞餅餌何処覔刀圭暴日資丹火抔泉洗雨泥謾令通臂友时復憶幽棲挽鶴共処人烟外誰期禍及身九臯空有恨四野欲无春華表雲應淚瑶䑓月亦塵當年林処士泉下定相親招鶴歌徹楚人些㝠㝠恨亦增楓林空落月蕙悵亦寒灯仰问天无語呼聞谷謾應料随風露氣飛入乱山層瘞鶴非為恩惟盖徙逰歲月深忍令一抔土埋尽九皐心致奠攄幽憤為名著徳音小松㘽尺許悠乆庶能尋憶鶴玉立昻藏意山中我与君幾年逰賞共一夕死生分徐歩閑窺沼髙飛逺帶雲爲誰重起舞倚仗立斜曛夢鶴綉幌灯昏処依依見痩軀引吭如有訢側頂不容呼枕上行雲遶松梢落月孤堪怜漆園叟謾爲蝶遽遽圗鶴百計无從見明䆫吮筆圖研朱漆霞頂屑玉抹雲襦野狀難非似山居亦勝无却愁風露夜拔宅上天衢趙茂原贈郭山長帰括蒼兼蕳葉縣尹林府判夜听春雨鳴雨晴君欲行君行向何処回覧括山青括山万疊青未了漠漠蒼煙嗝飛鳥三年官冷不得帰帰夢時時度雲嶠竹雞鈎輈啼夣殘落花如雪春風寒客途塵土何漫漫握手未許攀征鞍東関且尽双樽歡東関柳如帶中有别離態折贈不可持依依自相待宦逰江海事多違我軰論交金石在㪯頭咫尺天涯别行李潇瀟浸明月出門大笑心激烈良儔往往多契闊毎一思之生白髪白髪生何足驚志士慷慨期晚成酒澆磊傀澆不平况復不飲難爲情長歌散作陽関声子先帰兮我暫停丈夫耿耿氣肯洒兒女淚浩蕩天地間清流豈常聚郭公子休徘徊京城二月莺花開束書早上黄金䑓黄金䑓上多英才拾取青紫實快哉秋來我亦逺逰計萬里殷勤定相遇到手功名俱得意却誦如今長短句曉寒曲曲欄廉纎杏花雨博山煙飛裊晴縷夢回金帳春融融鵎鵡騖寒隔䆫語美人曉粧靈滿梳柳風吹香入氍毹翠鬟嫋嫋綰不断宝釵壓鬢紅珊瑚丫鬟捲簾採桃華驚起一双黄蛺蝶秋宵吟平林薄暮風淅瀝黄金滿地秋狼藉新月出嶺光欲流萬籟无声夜寥閴誰家美人吹鳯䔥彩鵉對舞摩青霄闌干縹緲碧雲逺天風入骨凉䔥蕭銅壷水寒銀箭澁玉露滴空衣袂􅊜缸花落尽炉煙收幽懐耿耿生新愁寒螿啼碎人間秋楊逹可渡江冩懷手挽天河落九𬈑浪声淘尽丗間塵一川光浸梅花月萬頃波涵棣蕚春風雨不忘帰海意乾坤未老済川人此溪浩蕩流千古回首春山更麽青呉仁傑送汪水雲入湘碧水波翻海亦摧奮身鰲背護蓬萊忍随天上紅雲散却馭関中紫氣回大道有形須変化玄関无鑰任敲推携琴更拜蒼梧野猶想南薰入調來鄧彧之即景樹影禽声門半開墻東一逕没蒿來池塘通得官溝水時送青萍幾點來絶句清風左右凉满室芷花香琴声偶然断不是客來妨芸芸陌上人芸芸陌上人各爲衣食謀寒飢稍不迫彼亦無譏求豈知衣食外復有千端憂憂楽本皆然悵然寸心休掩卷夢中有得意斍来還自喜掩卷嗒無言殘日在書几江橋樹次阮魯詹韻江橋樹日日斜陽暮春風吹落花半隨流水去花落有盡时水流無断処阮詩附江橋樹荏苒年華暮迎得行人来送得行人去落葉成秋風行人在何處宿山家秋深客路巳無聊此宿何堪更寂寥雨葉響林人語寂風灯近竹客心摇村醪味薄愁先醉野叟倩親語漸驕椎有兒童忘丗故向人欹鼾到明朝聽琴桐花门巷小立乆忽聞琴海鶴天風急山猿秋雨深一時真得趣千載有知音雖是无絃逹何由㑹此心落葉二首秋庭晝无人落葉自滿地端居觀物化人生亦如寄朝聞鳴蝉惄夕巳見其蛻嵗晏共䔥條臨風發遥喟落葉日巳深庭樹日巳瘁樹猶不枝梧葉亦甘委棄寕隨高風飛母隨流水逝飛者或遶樹逝者眇无除陳敬翁晚過玉林西斎二首佳客因乗興能耒慰寂寥空山多宿约好語在今宵白苧秋風急青帘市酒遥半升无処問清抱可能消庭雨俱鍾盡燈花待客詩三生今夜宿此道幾人知分契情何厚林髙語自竒直為知巳用非敢傲當時月下琵琶不似潯陽縣哀絲帶客愁素娥窺夜曲明鏡入南州指滑鶯𥘉語腔新柳共柔向前児女恨腸断漢宮秋柳邊漁笛莫是章䑓路青絲舞未休楚江帰去釣湘竹語孤舟一葉秋生樹何人夜倚楼舊時明月衷吹過白蘋洲𥘉夜独坐興悠悠荅堦日脚収客衣凉悞葛池月夜私秋物遣身猶累心閑逕夫幽故人情分好渾不記淹留晚坐緑隂深處寺日暮坐幽人水影光𥘉刼苔㾗塔半身荒江无過客髙竹是比隣夫信淸談少因看麈尾塵過胡震亨幽居欲復问何処行遟稍認門路隨幽草入巷与緑隂分市盡人𥘉逺言忘意獨在所經得才俊猶足慰斯文清曉過鶴上仙人仙人睡方起松日髙数尺入戸聞琴声停歩立苔石閑情契幽絶毎坐忽終夕長揖道香清歡言正蒲席贄分宜縣丞呉子彦道合无論見神交早為詩十年諸老盡一淡半生知池草今无夢山隂復有期絶疑汚具眼猶意得吾癡蕭南軒寄呉子彦帰江東鳴鵉誰倚洞簘過黄鶴楼前舊脫靴天上佳期今夕共江東帰思白雲多清風明月故人識有酒無魚良夜何莫斈鄉音唱芦葉桂花滿載待西河寄黄尚雅莫惜隔年期行當与子違門深紅葉字秋入菊花詩酒熟蟹将到魲肥膾可思西堂風露重早下讀书幃先一𥘉丁丑新正試筆傴指蘧年逝今朝暦又新野煙癡作晚山雨细匀春舉丗貪為苦空門懶是真聊將双碧眼趺坐閱時人陸文圭燒筍賦竹字韻先生朝盤厭首蓿筍味得全差勝肉蒼頭掃地犀角出赤燄燒空龍尾秃土膏漸渴外欲枯火亥㣲􅊜中巳熟撥灰可惜衣殘錦觧籜猶怜膚濯玉青青無分長兒孫草草為人供口腹李家丞相蒸葫芦石家美人煑豆粥去毛留項有何好擣韭作虀空自速不如野人工食淡自辦行厨入脩竹句衷曾叅玉版師胸中㑹書篔簹谷主人不问不須嗔昨夜西風響林屋陳魚村題按仙楼五老峯前第一山天開緑野待公閑令威白鶴重來日老子青牛又度関花木四時三月裏楼䑓一簇五雲間我來便有凌風想為問先生覔大還易炎正環秀楼萬碧穹環類九嶷危楼空翠接清漪山人本是山中客山外看山山更竒張嗣良尋梅夢中寄荒遐騎驴一放棄野梅過流水香断无尋処天寒歳又晏偃蹇傷幽素独行山谷深積雪迷帰路曉行夢魂短短春宵殘喈喈雞語催征鞍東方彷彿淡月䁱柳露細拂征衫寒僮僕前行指予路那个長亭經某処离情莽莽不分明黯淡孤村煙半樹何大虚畈歩作隂靄通煙碎作霏春風吹入煖成泥女郎挑菜不知􅊜調笑相携過水西除夜風縈縈雨霏霏寒輕新柳潤春到落梅稀筠籃入市買紅烛煙火