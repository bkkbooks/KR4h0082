林麓清無羣從混梅花冷伴二翁間他時白集歸舟月别去先生不汗顔陳天霽蘇武羝雪北海守莭海上艱關十九年孤臣凍死不呼天忍將膝與羊俱跪誓把心同莭共堅衰鬢霜飛甘卧窖剛腸氷透只餐旃當時不為求芻牧千古高飛更凛然鄭溥鄭綮驢雪灞橋吟思長憶飄然灞水涯此時此景客那知風前䇿蹇蕭蕭逺橋外衝寒去去遲飛絮一鞍披野服落梅雙鬢染吟髭思清如許寧無句定恐當年有逸詩孫平齋孫康書雪夜映讀書偷光不肯學康衡千古先生以介名造物憐人共清白夜窗無月亦光明恍疑藜杖吹煙照誰信銀河剪水成他日烏臺霜凛凛依然氣概老書生劉南金歐陽詩雪禁體題詩鹽絮紛紛語濫觴如何説馬到驪黃比方明禁千餘字條令昭垂六乙堂頴士筆矛成束手坡翁戰鐵可爭光采薇只把霏霏説刪後多安床上床十臺懷古友人耒自杭遞示濟南王十臺懷古詩讀之感慨不已天江山故宫歌舞遺迹千載之上英雄遊焉千載之下狐兔行焉俯仰廢興熟能無情而詩人尤甚發為詠歌詞雖不同而意氣吻合若物之鳴以類而應余安得妄言哉余生好遊嘗聞馬子長杜拾遣覽觀四方山川之勝以壯其文心切慕之異時浮江淮泝沅湘上巴峽過秦漢故都歷燕趙齊魯之埸所見如十臺尚多訪遺老詢故實舉觴三酹之足以發一時之興決宿昔之願歸而讀馬社之詩文以證其所得焉耳姑蘇臺百花洲上姑蘇臺吳王宴時花正開半空畫燭西子醉三更鈇甲東門來吳波渺渺吳山簇不見嬌顰倚闌曲丹楓落月怨帝鳥碧草東風驚走鹿闔廬丘墓相連處應恨夫差迷不悮斷指千年血未乾遊魂夜哭臺前路章華臺靈王傾國崇臺宇按劒章華睨中土并裳伏地走諸侯鍾鼓凌空震三楚騁驕不顧伍子謀落成乞與吳丘遊孤舟竟走江上路塊土獨枕山中愁十年伯氣終蕭瑟回首華容歸不得飢魂漂泊啼秋煙細腰却舞新王前朝陽臺神娥縹眇髙唐上楚宫樓閣森相向丹楓蒼桂涌孤闕錦石清江簇連嶂行雲冥冥飛雨寒孤猿咽咽千花間翠旗龍駕杳何處斷魂殘夢愁空山微臣宋玉誇此賦當日襄王豈真遇千古秋風恨未平髙泉飛落三巴怒黃金臺昭王鋭志夷青社築土懸金奉賢者四方劒佩集強燕千里強燕空駿馬郭君自舉先群豪樂生獨步超凡曹酬恩一雪伯國恥建功並倚雲天髙君臣意氣千年少落日荒墟沒秋草黃金買賁滿長安惆悵英雄布衣老戲馬臺項王戰馬從東來意氣蹴踏全秦摧入關不並沛公轡還鄉却上彭城臺重瞳按劒風雲靡万匹騰空煙霧起凄涼垓下泣名騅零落江濵餘數騎寄奴千載心爭雄登髙把酒臨秋風詐移晉鼎非男子君看百戰東城死歌風臺沛宫置酒君王歸酒酣思慘風雲飛兒童環臺和擊笻父老滿座同沾衣一歌豐沛白日動再歌淮楚長波湧龍髯氣拂半空寒虎士心馳四方勇山河蕭瑟長陵荒野中怒響猶飛掦歌臺未傾風未息故卿之恨那有極望思臺桐人氣迫前星黯思子宮城歲華晚髙臺有恨碧草新大野無蹤金犢逺一朝弄兵兒罪輕百年鍾愛天倫深戾園魂魄夜寂寂胡城風雨秋隂隂漢宮樓觀連天起方士熏香召仙鬼望思望思終不歸茂陵老淚如傾水銅雀臺半空髙棟翔金雀王扆繐帷塵漠漠西陵老樹暝色寒建安殘妓春情薄曲終紅袖辝尊前詹傾斷甓飛人間分香淚老恨不滅秋風吹入桃花班漢家一片如膏土肯為姦雄載歌舞銷盡曹暪万古魂落日漳河咽寒雨鳯凰臺金陵王氣飛祥雲鳯凰臺上聲和鳴鳯耒春風花冥冥鳯去秋風荒草生嬌娥舞散高城暮青山回隔丹丘路斜陽門巷語鳥衣細雨汀洲飛白鷺江空天闊鳯影遙謫仙吟斷誰能招六朝宫闕煙蕭蕭月明夜半人吹蕭凌敲臺太明天子遊南國紅粉三千臺百尺歌鍾激浪楚日白簾櫳凝樹湘雲碧凌虛髙宴金輿來侍臣押笑朱顔開臺城宫扉銷花柳寄奴土障生塵埃昏昏醉夢春風几不顧江東數千里酒罷歌闌帝業銷青山空映當塗水秋懷江南木葉飛江北百草黃花煙淡莾蒼悵望川途長寒魚聚其群鳴鴈忽成行俯仰念時物索居耿凄涼昔我二三友敦好攻文章漂零轉相失尺素不得將人生四方志企尓揚聲光登山豈無車涉水亦有航直誠諒不隔離别庸何傷匆匆意不懌獨步登高丘群山紛虬蟠前當大河流八月草木凋万里風雲愁寒晶蕩白日孤鴻去悠悠鴻飛不可極其下禹九州古來英雄士百戰橫戈矛念我當壯年弗獲兹地遊豈無干時略欲往誰見收君看天馬駒失足羞釐牛我居雖􅒡中無營淡昏晨出門少朋徒入室誰與言揚揚夸毗子短衣踞髙軒馮時笑蹇拙詎識我所存冥心玩群動大化爭飛奔西風振稿木白露零芳蓀榮悴俯仰間物理豈待論勗哉栖遲士母為怨衝門和黃溍卿客杭見寄一從君客江城去詩思凄涼酒盞空天末倚樓孤岫雨春深閉户落花風半生政恐才名誤万里誰憐意氣同坐憶王孫詠招隱萋萋草色向人濃書問蕭條巳半年知君近賣過湖船江花日暮吹紅雪店樹春晴起緑煙客裏光隂遽如許人間岥路正茫然離羣得似遊從樂𥿄貴塘日万萹翰林學士巴西彥天祿儒臣漢丗雄一笑吟邊餘故老並遊方外亦清風吳天有象星應聚驥馬成群服巳空十載神交未相識卧淹幽谷恨羈窮皇元風雅卷之六終
