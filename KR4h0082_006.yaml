林麓清无羣從混梅花冷伴二翁閑他時白集帰舟月别去先生不汗顔陳天霽蘇武羝雪北海守莭海上艱関十九年孤臣凍死不呼天忍將膝与羊俱跪誓把心同莭共堅衰鬢霜飛甘卧窖剛腸氷透只餐旃當時不為求芻牧千古高飛更凛然鄭溥鄭綮驢雪㶚橋吟思長憶飄然㶚水涯此時此景客那知風前䇿蹇蕭蕭逺橋外衝寒去去遟飛絮一鞍披野服落梅双鬢染吟髭思清如許寕无句定恐當年有逸詩孫平齋孫康書雪夜映讀書偷光不肯斈康衡千古先生以介名造物怜人共清白夜牎无月亦光明恍疑藜杖吹煙照誰信銀河剪水成他日烏䑓霜凛凛依然氣㮣老書生劉南金歐陽詩雪禁体題詩塩絮紛紛語滥觴如何說馬到驪黄比方明禁千餘字條令昭垂六乙堂頴士筆矛成束手坡翁戦鉄可争光采薇只把霏霏說刪後多安床上床十䑓懷古友人耒自杭逓示済南王十䑓懷古詩讀之感慨不已天江山故宫歌舞遺跡千載之上英雄游焉千載之下狐兔行焉俛仰廢興熟能无情而詩人尤甚發為詠歌詞雖不同而意氣脗合若物之鳴以類而應余安得妄言哉余生好游甞聞馬子長杜拾遣覧觀四方山川之勝以壯其文心切慕之異時浮江淮泝沅湘上巴峽過秦漢故都歴燕趙齊魯之埸所見如十䑓尚多訪遺老詢故實㪯觴三酹之足以發一時之㒷決宿昔之願歸而讀馬社之詩文以證其所得焉耳姑蘇䑓百花洲上姑蘇䑓呉王宴時花正開半空畫燭西子醉三更鈇甲東門來呉波渺渺呉山簇不見嬌顰倚闌曲丹楓落月怨帝鳥碧草東風驚走鹿闔庐丘墓相連処應恨夫差迷不悮断指千年血未乾游魂夜哭䑓前路章華䑓靈王傾囯崇䑓宇按劒章華睨中土并裳伏地走諸侯鍾鼓凌空震三楚騁驕不顧伍子謀落成乞与呉丘游孤舟竟走江上路塊土獨枕山中愁十年伯氣終䔥瑟回首華容歸不得飢魂漂泊啼秋煙細腰却舞新王前朝陽䑓神娥縹緲髙唐上楚宫楼閣森相向丹楓蒼桂涌孤闕錦石清江簇連嶂行雲㝠㝠飛雨寒孤猿咽咽千花間翠旂龍駕杳何処断魂殘夢愁空山㣲臣宋玉誇此賦當日襄王豈真遇千古秋風恨未平髙泉飛落三巴怒黄金䑓昭王鋭志夷青社築土懸金奉賢者四方劒佩集強燕千里強燕空駿馬郭君自㪯先群豪樂生獨歩超凡曹酬恩一雪伯囯恥建功並倚雲天髙君臣意氣千年少落日荒墟没秋草黄金買賁滿長安惆悵英雄布衣老戯馬䑓項王戦馬從東來意氣蹴踏全秦摧入関不並沛公轡還郷却上彭城䑓重瞳按劒風雲靡万疋騰空煙霧起凄凉垓下泣名騅零落江濵餘数騎寄奴千載心争雄登髙把酒臨秋風詐移晋鼎非男子君看百戦東城死歌風䑓沛宫置酒君王歸酒酣思慘風雲飛兒童環䑓和擊笻父老滿座同沾衣一歌豊沛白日動再歌淮楚長波湧龍髯氣拂半空寒虎士心馳四方勇山河䔥瑟長陵荒野中怒響猶飛掦歌䑓未傾風未息故卿之恨那有極望思䑓桐人氣迫前星黯思子宮城歲華晚髙䑓有恨碧草新大野无蹤金犢逺一朝弄兵兒罪輕百年鍾爱天倫深戾園魂魄夜寂寂胡城風雨秋隂隂漢宮楼觀連天起方士熏香召仙鬼望思望思終不歸茂陵老淚如傾水銅雀䑓半空髙棟翔金雀王扆繐帷塵漠漠西陵老樹暝色寒建安殘妓春情薄曲終紅䄂辝尊前詹傾断甓飛人間分香淚老恨不㓕秋風吹入桃花班漢家一片如膏土肯爲奸雄載歌舞銷尽曹暪万古魂落日漳河咽寒雨鳯凰䑓金陵王氣飛祥雲鳯凰䑓上声和鳴鳯耒春風花㝠㝠鳯去秋風荒草生嬌娥舞散高城暮青山廻隔丹丘路斜陽門巷語鳥衣細雨汀洲飛白鷺江空天闊鳯影遥謫仙吟断誰能招六朝宫闕煙䔥蕭月明夜半人吹䔥凌敲䑓太明天子游南囯紅粉三千䑓百尺歌鍾激浪楚日白簾櫳凝樹湘雲碧凌虚髙宴金輿來侍臣押笑朱顔開䑓城宫扉銷花柳寄奴土障生塵埃昏昏醉夢春風几不顧江東数千里酒罷歌闌帝業銷青山空映當塗水秋懷江南木葉飛江北百草黄花煙澹莾蒼悵望川途長寒魚聚其群鳴鴈忽成行俛仰念時物索居耿凄凉昔我二三友敦好攻文章漂零轉相失尺素不得将人生四方志企尓揚声光登山豈无車渉水亦有航直誠諒不隔离别庸何傷怱怱意不懌獨歩登高丘群山紛虬蟠前當大河流八月草木凋万里風雲愁寒晶蕩白日孤鴻去悠悠鴻飛不可極其下禹九州古來英雄士百戦横戈矛念我當壯年弗獲兹地游豈無干時略欲往誰見収君看天馬駒失足羞釐牛我居雖􅒡中无營澹昏晨出門少朋徒入室誰与言揚揚夸毗子短衣踞髙軒馮時笑蹇拙詎識我所存㝠心玩群動大化争飛奔西風振槁木白露零芳蓀榮悴俛仰間物理豈待論勗哉栖遟士母為怨衝門和黄溍卿客杭見寄一從君客江城去詩思凄涼酒盞空天末倚楼孤岫雨春深閉户落花風半生政恐才名誤万里誰怜意氣同坐憶王孫詠招隠萋萋草色向人濃書問䔥條巳半年知君近賣過湖船江花日暮吹紅雪店樹春晴起緑烟客裏光隂遽如許人間岥路正茫然離羣得似游從楽𥿄貴塘日万萹翰林斈士巴西彦天禄儒臣漢丗雄一笑吟邊餘故老並游方外亦清風呉天有象星應聚驥馬成群服巳空十載神交未相識卧淹幽谷恨覊窮皇元風雅卷之六終
