輿知元風雅前集巻八欽定四庫全書元風雅前集巻九元傅習編髙若鳳題朱進士御賜詩憶昔霓裳清夢還廣寒宫殿鬰㠝岏神龍久矣乘雲去猶有驪珠落世間遊白鹿洞書院碧瓦參差儼杏壇白雲深鎻洞門閒不宗朱氏元非學㸔到匡廬方是山十里松風潮洶洶一溪泉雨佩珊珊便當卜築書䑓近五老峯前任往還送謝有源閩中醫官出山只為有源長􅄆作人間六月凉從此不憂丹荔渴寳塘一派冷於霜班資髙下不須論一歩青雲亦上恩小試參差醫國手有人稱是野航孫贈相士張月梅清光萬里飛銀闕嵗晏天寒桂香歇含章殿是廣寒宫月似梅花梅似月世間有梅有開落天上有月有圓缺乾坤清氣鍾於人千古不摩方寸鐵月邪梅邪杳莫辨净色含香兩竒絶西山有雨南浦雲反覆紛紛異凉熱槎仙老眼閲人多獨獨來尋㶚橋雪月梅已寒雪更寒窮年三友長相㸔論詩論相神自完出門一笑天地寛張叔暘送滕玉霄我恨江上水不能洗離愁又恨江上水不能為我留日黯黯雲悠悠胡不推出黄金毬照我一笑送沙鷗俎豆萬古相賡酬風流此老黒貂裘飲乾海水蛟龍憂人間雙鬢秋筆底巫峽流傲睨幾何同一漚識我不識吾何求安得從此長嬉遊昔日間今瀛洲江水洗得離愁不為我留住江上頭三百尺酒樓五百斛酒舟許獻臣次韻浦平章致仕君恩許老重増秩相印封回不再關石以補天還袖手雲能成雨便歸山力將富貴推身外倒捲乾坤入酒間綠野堂前㸔絲竹古今誰得似君閒題賔月堂人生自是人間客月亦天邊寄此身彼此虚空無着處誰歟是主復誰賔趙䝉齋題釣䑓君因卿相隠我為利名來羞見先生面黄昏過釣䑓倪中豈贈張原性金華尉天風吹雁秋影寒客子晨出燕城關青龍嘶烟杂錫鑾腰螭割玉羅翠乾金花出匣雙虯蟠盪射􅄔女光欄杆春萱花暖金樹合酒光入鬢顔渥丹風雲落筆神鬼泣眼見老鐵生詰盤朝棲崑崙圃夕飲砥柱湍但恨雲路無停翰東海百尺青琅玕倪若水過揚州雉堞平來塹擁沙綠蕪深處見人家山河舊影藏秋月關塞新聲起暮笳玉蕋已為庭下草蒺藜不是眼中花當年鳳舸經行處枯栁無枝寄宿鴉范徳機過西芹路隠岩崖逈橋通屋舍重鳥啼黄葉寺泉注白雲峯市販賖柑柿畬耕間竹松行人報山郡失喜問萍蹤延平江閣山勢包平險津流合衆源詎知從事劍不類大夫魂光彩潛猶見精忠死尚存幽靈如可問吾意豈忘言奉同亷訪使君洎寮友遊愛同寺閩粤古城東千岩半梵宫冐寒尋水石盡日倚虛空鐘鼓何須急壺觴亦有終翩翩北海寺碑版翠無窮寄武夷杜徴君洞居清隠士時接武夷君斾影岩前見山香石上聞不為圭組累焉有市朝分暫得同麋鹿終朝試與羣題張伯雨題東坊藁次韻騷靈逝矣不堪呼幾欲南遊信楚巫城郭烟濤乘白帝星河風露挹黄姑幽人昔恨九關豹佳士今猶千里駒久客資君相慰藉可能無意謝飛鳬送黄中庸歸吟法樂洞前曽一遊君家聞處洞西頭石潭正照猿猱月山藥曽經虎豹秋豈意吳城祠下路共尋楊子岸頭舟胸中富有天官學莫為周南久滯留蓮房憶得花神一笑懽六郎家住小江干佳人怨等秋風近稚子眠聽浦雨寒强為折來開户牖誰將鎔出擬盃盤少年太守思兄弟戢戢青頭莫謾看桂子盡輸金粟三千斛換得瓊枝數㸃秋定是月中嘉種失却從世上異香浮石岩夜見呼猿摘藥臼晴敲伴兎秋十月天台誰得見西風吹夢落山頭送夏蘭同知㑹昌承聞吉日上江船佐命分符落雁邊野館溪頭三晉雪山城留下七閩烟庭春花氣迷銅墨市瞑溪聲學管絃何日周廬尋夜直倍知報政九重天瀉露亭初秋白露降爽氣廹虛幃薄林方泥泥洒漠復霏霏暗襲玉堂悄斜飄金掌微鶴眠寒屢警螢火濕猶飛葉垂知月朗花艶怯朝晞蘭飲畏朝墜草霑傷夕歸為霜當夙戒去日漫增欷俜停吳宫女三月採薔薇挹彼枝上香散入舞裳衣千嵗亦不滅但恐願相違君子保世澤在久愈光輝題廣居家藏東坡竹古籐尺五霜烟交不見長身見墨梢千載髙風猶一日莫妨儋耳住無茅贈廣居查尊師逺遊查君學道戀名山廬結東南紫翠問更憶皇州春色好却辭仙館曙光閒千年城郭逐人去八月星河奉使還莫為崑崙無覔處早將詩賦動江關奉寄翰林鄧侍講曩承持節江之東騎􅚪再上蓬萊宫蓬萊仙人歌白鶴聲落五湖烟雨中世間爵祿不易致何獨去就如飄風朝廷禮樂須制作六經隠義資發䝉論思廟堂集耆碩啟口寧讓前諸公閉門讀書古都市四輩冠蓋方隆隆我生生長在窮谷那有文字争人雄謬䝉引喻百僚上負祿府署慚無功一别十年還又五昔者少壯今成翁誰知復客七閩下隔二千里來詩筒羸軀頓醒瘴癘惡賴以慰此心忡忡粤王城南浪白日粤王城西花正紅經石門鎮揺落石門秋水清殘僧樓宇映沙明買船欲上旴江去路轉峯南聞雁聲㑹約尋麻源不果暫逺雲霞觀却希山水音珠星聨社下璧月動江潯始集寳氣亭復趨金精岑輟棹更垂釣推書時弄琴石門生佳景麻源籠曉雲是邦遇賢守佳致契幽尋樽俎廹清好絃歌彰古心羣中宜鳳集泓下或龍吟頗愧塵務通還為旅宿侵一行混吏執千載負圖琛既往事莫究于茲念方深姑山如有意遂許一登臨順昌道中冉冉秋序髙勞勞客程促如何霜霰交不見原野肅顛岸絢夕紅古澗漾寒綠非惟藤蔓敷亦復芳氣馥物生固有常氣候殊過續以茲羸疾身動往居瘴毒念彼閩村人田稀口如粟耕種上青雲妻孥力凉燠吁嗟公私弊羣需待其熟安得亷恥吏俾之食常足上以承恩光下以厚風俗丹心映皓首我何自拘束玉䑓曉出玉䑓道山川稍夷曠只愁灘石際磊落更萬状市樓倚崖岸山頂列石障是中更有人隠約葱倩上我願從之遊長風渉𤣥閬還歸保精路髙視神目王空濛飛鳥過慘淡回波放由來心力疲㑹意乃益壮至懐安縣又入福州山城