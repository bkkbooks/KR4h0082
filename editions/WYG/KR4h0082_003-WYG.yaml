遇金鼎調元事可期祗恐使君同變化白騾來徃少人知張一無寄薛𤣥卿上界真人金馬貴山中道士草衣輕一彈指頃三千刼何日蓬萊問淺清黄松瀑自麻仙至筆架道中作三歩五歩歇六日七日晴豈不念我歸春色相送迎前宵社酒􅄆行將返清明紅紫小零落嚶嚶相和鳴叢薄山礬花玩之有餘馨亦欲寄所思歸鴻已宵征悠悠不可極惻惻難為情荒荒誰與語脉脉曵杖行飯山道院萬鍾鼎食不到我正自不必西山餓飯山雲氣如炊烟三飡而返腸果然臨川丞相有素願何處獨無魚羮飯勸君飯客先飯窮徃往乞丐皆英雄題髙麗五明馬海波不動闗梁通虬髯使者來吳中名騅額間掛明月四蹄猶帶龍堆雪仰秣不受田家蒭大官之羊五味俱賢才萬里不難致糠粃不充吁老矣次韻謝新荔海國仙人剪絳霞年年一朶到山家眼中玉色如何晏席上風流得孟嘉野客不分唐殿帶老臣并按建溪茶醉來往事都休問且擘輕紅對晚花寒食客中明朝便典黒貂裘寒食寕無數日留烟斷舊嘗悲介子火衰今不祀商邱百年盡付風吹栁一雨逺隨山入樓安有五侯鯖到我自脩茶品試香篝墨梅去年曽訪林君復烟水蒼茫鶴未歸不似對君横小幅一枝和雪照柴扉客語舊時供奉曲歌者亦無人但感嵗年晚不知天地春客猶談寳慶吾亦及咸淳何處楊花過飛來照角巾午日世故一炊黍吾生百鍊銅客情傷髪白醒眼對榴紅逺岫冥冥雨疎衣細細風欲論千古恨不見楚南公于仲元度居庸闗思親居庸之闗髙嵯峨霜乾水淺寒無波大風捲沙聚作嶺大車碾斷成深河商女踏歌喫馬乳胡兒行鼔搥駱駝斜陽駐馬一回首故鄉萬里秋雲多元風雅後集巻五欽定四庫全書元風雅後集巻六元孫存吾編危太樸臨川人暮冬種稲南谷口凶嵗囷倉虚晚值老農語出口三嘻吁幸有髙亢田種麥給群需有麥且勿憂無麥將焉如昔謂厓谷底其俗異黄農浪迹城府歸却受淳朴風獵夫不射雁云與兄弟同羽毛豈知道天理諒無終徐人歌季子有劍秋水色徐君見之惜不得徐君墓上荒草寒季子解劍掛樹間一死一生見交義嗟哉延陵吳季子楊季子豫章人晚憩澗北亭我性喜消散東園時獨行髙亭俯絶澗下有流泉聲秀木翳繁隂朱華散微馨踟蹰淡忘歸夕露沾我纓人生忽如寄何乃苦營營優游在空谷飲水有餘情夏日山中讀書翳翳嘉木隂結廬三四椽南風五月中日夕聞鳴蟬居閒復奚為涵泳聖人言時于㑹心處掩巻自欣然送别劉伯章歸省時劉方悼亡故并致其意斗酒酌未盡離人去匆匆歸心逐海月飛遶香爐峰峰前緑蘿樹下有五畆宫上堂夀尊親手把黄金鍾入室獨無依風吹羅幔空雖有兩小妾顔色如花紅不敵伉儷情虛為夭冶容人生百年内哀樂夲無窮自非曠士懐寕免勞其中心堅抱節義行止慎其躬贈言非諧謔朂爾保令終包淝川淮幽居雲作交游山作賔道心為主自安貧柴荆無鑰見同物竹帛有名終累人緑水一潭澄静性青山萬叠褁閒身紛紛望拜馬蹄下不見胸中萬斛塵七夕欲理凌波踏造舟不知滿架勝䝉鳩漢隂抱甕蒼頭老不上今宵乞巧樓漫成三春蝴蝶誰云夢六月蒼蠅詎可憎未怪康衢中有虎每疑太極裏無僧周徳可蘭溪人送衣篇長城萬里飛秋沙弓馬夜驚雪作花龍泉吐光射天地是妾掩鏡夫辭家此時惜别方壮年年年花發園中烟征鴻無書日苦短牛女夜夜銀河邊萬尾欲霜楓似綺親送寒衣數千里匣鸞顧影鳳孤飛山過望夫道湘水湘水無情漾白波望夫山頭浮青螺長途行處意惨愴誰家嬌女終夜歌衛霍功髙猶黷武善馬未歸羝不乳闗河回首路迢遥浮雲西山水南浦夕陽孤館停征軺一身百慮雙睇交中宵無人語聲絶風吹燭短山月髙寄逺邊風驚枕簟漢月耿房帷何處懐人切停梭見雁時寒生衣莫寄痩盡鏡先知願子長努力效忠歸未遲陳敬齋呈蔡府判東風一夜拂清寰如許文明治象還萬古乾坤一東魯七閩日月兩西山寒梅寂寂春華麗喬木森森古意閒獨奏瑶琴生客恨有誰隔月聽潺湲舞劍歌曉騎白鶴入滄海手擕青龍浴寒水背負河圖天地文或變或化疑神鬼始對雙鸞出林坰終與孤鶴翔風墜翩翩又在瑶池間戯與群仙買歡醉青龍顧我浩氣疲欲假明月横波睡我亦假之一霎間徑然飛去天牛間千呼萬喚不肻下且吐風雨飛漫漫呈方逹齋端平諌臣心似鉄忠肝落紙天地悦羅浮山下種梅花獨倚西窓看晴雪古來老鳳生鸞児錦雲兩翼星斗披朝浴春風芹藻池夜眠凉月槐杏枝君不見丹山一溪水化作春陽時雨飛千門教渴否苦早木草潤澤生華輝方逹齋真吾師薫風吹我面臯比免使青燈照雨思舒元易聖節詩樂奏雲門金闕髙春風泛酒入蒲萄九重天上尊堯舜萬嵗聲中拜禹臯仁藹乾坤知帝業明同日月見秋毫願推大道為君夀不用瑶池薦海桃偰世南贈墨士魚胞萬杵成𤣥玉應是柯仙得玅傳鉄硯毛錐為宻友何時海上别回仙王𤣥翰南山有猛虎南山有猛虎欲以赤手屠山下一老人見謂爾甚愚沖冠與裂背所詫乃匹夫古來功名士遐攬王伯圖幾先非快意道逺慎前謨奈此謬其逢試之誠已疏竒中或偶然再往類難虞丈夫雖賭命慷慨易長途茍無金石堅何以當變渝茍無忠誠心何以渉﨑嶇斯言願三復歛衽愧弗如吾行庸可驚聊取一笑娛且盡飲斗酒長揖歸衡廬髙况梅擬古楚人有和氏懐壁空待價玉石茍未分胡事哭長夜人生豈不辰物物該造化賢哉荷蓧翁託身以耕稼張南臯贈丹士天地爐中有大丹朝飛東海莫西山一年三百六十粒十粒輕抛去不還危琴樂送芳潤葉道士二十四年凌紫清琪花瑶草日初晴抱琴曾侍群仙宴記得鈞天一兩聲韓中村鴻門宴花膺綉膊帕抹額勇士如門森劍㦸沛公對酒顔如灰主人重瞳光照席重瞳座上身如寄巵酒未吞心巳醉醉酣不辨真天人百萬貔貅眼中睡春融玉帳香風開嗚嗚帳下筝琶哀目前等作萬口計軍聲四面歡如雷沛公唯喏非無意袖中暗挈秦天地此時可想聽得異四面軍聲皆漢騎征婦歎虎頭將軍眼如電領兵夜渡黄河面良人腰懸大羽箭遼東掠地遼西戰一紙紅牋寄春怨十年消息無歸便日長花栁暗庭院斜倚江樓倦針線心憶良人嗔不見手擲金彈打雙燕無術平戎報明主恨身不是竒男子倘妾當年未嫁時請學明妃獻西虜岳王墓妖星墮地芒角赤龍劍悲吼風蕭瑟中原王氣挽不回將軍一死鴻毛擲秦家小児真戱劇播弄造化揺樞極指仇為親忠且逆隻手上遮天眼力九闗茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古坟埋寃血空碧風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斵出荒苔痕獻作吾皇補天石對月吟霜風捲地霜氣乾碧空照水生晴寒天公合就七寳圑何年轉向玻瓈盤婆娑桂樹籠仙窟夜夜飛從海上出遂使時光挽不留盡向婆娑影中沒幾人緑髪紅顔好照見衰顔髪應槁年去年來無盡時政恐月中人亦老客窓見月空沉吟碧紗如霧愁人心燭花撲散香滿襟下堦踏碎梧桐隂憶去年江湖𣺌𣺌白鷗前歸路春風憶去年細雨孤燈村店夢冷烟殘雪落梅天驛行多避官人馬水宿怕逢網吏船行李半肩吟巻重過津恐索稅詩錢况肩吾縣尹題梅巻牡丹池舘閙春殘多少詩人被眼瞞我有癯仙最知已一枝留與雪中看吕元卿晚宿郎官湖半烟半雨樹扶疎畫出元暉水墨圖最是一天秋月白不隨魚課入官湖月夜洞庭舟中陪九江茶漕烏格同知宴酒邊索詩遂賦朔風扇鬢向君山嵗晚霜華為改顔吟望滄浪湘水逺醉歌欸乃洞庭寛那能袖劍遊蓬島何似乘槎訪廣寒莫道岳陽無醉客洞賔元只在人間陳小庭大孤山至湖口大孤大孤何𣺌茫小孤誰説嫁彭郎鞋山對面四十里屹立宛在湖中央行轉清江過湖口波濤如此今何有天公􅂇我半帆風江神勸汝一杯酒章養吾次韻徐可齋嘉禾馬上見寄世事悠悠兩鬢塵始知今古一郵亭草廬春動吾猶懶蕙帳寒生子獨醒萬里關河秋雁斷十年書劍夜燈青東風乂是離愁處芳草萋萋白鷺汀許存吾次韻吳叔㢘山村回文田繞青山好住家短籬疎圃接丘麻烟村逺近棲鴉亂竹㟁髙低飛鷺斜泉噴石間岩湧雪霧浮堤外栁吹花連雲碧色秋風冷眠犢黄昏草長芽劉恭叔夜坐江亭明月出林杪大風吹漸髙軒窓墮圭壁竹樹起波濤隣笛悲歡併江鴻去住勞倚欄惆悵久霜露濕綈袍城中至日我道何曾長城中獨重冬酒殽分市卒冠履祝家公日晷空江見梅花亂世逢故鄉還往在筋力愧兒童葉千林送李石泉風雪令人痩闗河怕酒醒過橋春水緑送客晚山青君馬巳先發我舟猶暫停臨分耿無語江上雨㝠㝠葉天趣感寓顔曽志道徳汲汲思競辰盗跖膾人肝白首甘惡人是非兩忘羊萬古同埃塵何如盡棄置宴坐觀日輪風吹紫藤花䔩䔩沾衣巾興發自一盃陶然太和春秋夜和韻西風何處來鼻觀古香發夜深耿無寐踏破松窓月美人期不至跂望雙眥裂一掬可憐心青燈照愁絶元風雅後集巻六欽定四庫全書元風雅後集巻七元孫存吾編
