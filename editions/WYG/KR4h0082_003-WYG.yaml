body:
  text: 安竹齋送白雲平章舟人停棹酒停斟試聽筵前送客吟離恨早知如此苦交情不合恁為深白雲境界三更夢紅葉園林兩地心從此草茅亭上客抱琴何處遇知音明普彦題商山四皓圖劉氏何如吕氏安尺書便爾闖重關空將鬢雪驚隆凖不道啼紅惨下顔鴻鵠聲寒悲曉殿紫芝香冷怨秋山千年猶昧深根術又落巴童橘樹間文子方次元復初韻送虞伯生代祠江瀆之二首成均十載宛遺經未識沙墩長短亭旌斾曉霞穿化日文章秋月映華星鳥鳴春晝岷江白鶻沒天低隴樹青四海車書今混一摩挲劍閣重鐫銘出宿春城宿霧低閲人老眼似層梯功名愧我蠅鑽紙文采憐君玉在泥蜀道連雲春繫馬巴山踏月夜聞鷄贈言知笑瀛洲客冷落梅花日又西贈别任毅夫御史行臺陜西金天行秋河漢涼星軺夜起尚書郎隴山晴樹熈化日燉煌埜道霑飛霜天邊鸞鵠意自逺草間狐兎無苦傷丈夫樹業方如此探别不用愁中腸和寗致陶幽懐時雨息氛翳髙林嘒風蟬端居愜孤尚圖書静當軒凉颸薄櫺户微爽生簡編客來聊與樂客去自復眠徜徉永今夕庻以全吾天送馬伯庸御史奉使關隴聖朝啟文運同軌來無方夫君起天闕崛起千仞翔脩辭陋史漢髙歩追黄堂乃祖尚書君樹立何堂堂昔在帝世祖榮身事戎行風雲一朝㑹奕世傳芬芳矧君擢髙科有業未易量斯文繫政教治忽慎弛張世豈無勇者舍君吾何望勿為守鉛槧局束徒苦傷僦屋京城居去君百舉趾聞君起冠豸僮走亦欣喜况當逺于征無言詎能已朝風號空桑衆草日披靡河關尚瘡痍聖度乃𢎞偉翳彼涵大休能不懐愧恥艱危見臣節維持賴風紀温言表遺忠生氣凛不死乃知烈丈夫豈獨魯連子題楚山春曉圖荆門雪霽江樹芳巫峽冉冉愁雲長山猿杜鵑呌落日風灑露沐何蒼凉六龍從東來曉氣開扶桑天髙雨絶人事變解環結佩空相望渚宫西澨連三湘畫中隠隠聽鳴榔安得置我棲其傍為君一曲歌滄浪袁伯長送華山隠者黒髩祠官佩水蒼萬松深處响琳琅黄柑有法能為酒紫术無饑可當粮招鶴舞空山月冷檄龍吹雨海風凉瑶池欲問長生訣碧澗研朱寫綠章次韻呈周儀之虞伯生英英雲中君含思歌太乙迴鸞舞天葩流粲曉莫述報之不成章玉雪耿素質臨風發長謡庻以永今日昔學空岩居之人怒且怠哀猿雜山狖驚笑欲我害夫隠人所藏别之空悵慨桃源閟深竇亦復知晉代道逢學仙人御氣不飲酒我笑初無言彼已嗔我否哀哉守其愚繫石猶在肘冥化隨悲風淪淪骨不朽羲娥挾雙輈冉冉若見廹丹臺𠻳雲霞瓊蕋生尺宅控搏無須㬰詭幻巳千百慎此隂陽機逃虛脱其厄竒樹生南薰清坐彈五絃凉風邈永古白雲赴蒼烟世故日已偷俛仰隨嵗年折腰倘為酒猶足青簡傳少年恣青雲歡至無復戀一為關河行常恐不得見新雁雲中來飛飛落南逺歸心耿無寐寒更促浮箭次韻送友教授閩中鬱鬱太古樹叢生散珠玕明時炳陽徳寥落歛嵗寒天風西北來凍海繁層瀾芳朽各有性盛衰誰無端寛寛氷上履黯黯塵中冠宿志不得酧奮飛戢其翰伊南蹇一士覊鴻河之干手持大雅篇八音佐王官墻隂卧朝日薄飯衣滿盤邂逅喜我同金石生肺肝出處非故意低徊耿相㸔閩山𣺌雲海東望通三韓居夷聖有在取琴為君彈送邵元道仲連匡世姿揮手却秦軍掩袂停白日登車抗浮雲射書誠草草孤城死生分辭榮敦厚俗矯抗離其羣虞卿舌轉丸揣事精微茫事危見交態窮愁名益光黄金散逝水白璧凝飛霜丈夫有定志得失非豫防梅生一尉微喋喋正天紀洗心洞𤣥化削迹無妻子龍變孰為馴蟬脱乃真止松迴風泠泠水落石齒齒襄陽孟浩然拂衣歸故山放浪岩壑深流咏遺人間舉袖林花落擊節江鷗還羊公何墮淚水深日潺潺送世茂許省掾歸武昌岷江下奔流日夜東南趨艱虞六十載蜀客無完居纎脩掛晴練五老為之廬招彼素人心蒼翠垂流珠峩峩銀臺公懐寳耿不攄青桐擢孫枝下此佳鳳雛絢爛五色翼披霞表亨衢清者㝠鴻逺逸興蒼鷹俱食竹戀苦志餐風養真腴誓將八極周覧得為真符嵗月諒有盡雲端復躊躇躊躇固吾事荏苒悲征途蒼莽鸚鵡洲日沒楓葉赤昂昂處士根蔓草化為碧之士輕且儇之人何急窄至今千載下投筆懼鋒鏑銀城太古雪俯仰一消釋雍容詩書節浩氣烈金石不盡登臨意寒波净如席相逢各萬里末契淪夙昔咿嚘語未罄征雁起暝色凄涼衣冠聚山海窮畢弋翳翳桑榆老人物𣺌可識停驂望前坡去馬記初驛歐陽元功延祐二年二月十七日侍宴北省臣夲江南一布衣恩榮今日及寒微合躔列漢光相射湛露迎陽晝未稀仙醖飲來生羽翼宫衣留得奉庭闈酒䦨車馬如流水回望紅雲遶闕飛題孫氏夀慶堂孫母歐陽九袠登外家譜牒自廬陵髙年備養人俱羨同姓升堂我未能好客郎君深巷轍讀書稚子小窓燈朝廷屢賜尚方帛更待迴鸞織誥綾題澧州謝家建通濟橋慶雲龍日䕶雲根玉樹薫薌接澧沅太傅功留召伯埭相君心競謝公墩已誇螮蝀綿今古猶羨封胡偉弟昆珍重盧溝溝上月時隨車駟勞于門過洞庭二首白沙隠隠見金鼇殿閣慿虛結構牢天水渾融浮太極神人幽顯隔秋毫龍堂深閟靈栖冷象緯低垂客枕髙欲作廟堂迎送曲杜紅蘅碧盡離騷媧星搏玉擲虛空屹立君山面勢雄一畫犧圖天地骨九江鯨觀鬼神功裾飄帝子蒼茫外樂奏鈞天澒洞中頗恨當年鄒魯客觀瀾未到楚諸熊夜宿寺前農家漢南旅店已星稀倦宿田家帶落暉蕭寺依山聊復爾鄴侯送酒是耶非風餐幷覺涼生飯露坐俄驚月在衣老子漫遊吾漫送登山臨水憺忘歸西明道人每一相見去必求詩余亦不能却武昌堤上水雲身三十年來識道人只為謾遊相見少故知臨别贈言頻憧憧車馬紅塵老靡靡江山白髪新邂逅一回詩一首錦囊千百未為貧寄諸弟七絶長樂鐘聲拆號時三台八座列參差自憐手把天瓢水一滴鄉闗不得私聖主宫中遊幸疎日臨閟閣㸔芝儲今朝蘭省初開試清曉玉音催著書省垣東畔至公堂十五年前戰藝塲飽食大官無𥙷報兩科來此校文章御史承差鎻院門使臣傳語出天閽試官被命連鑣入同榜三人入謝恩仁廟初科射䇿郎如今斑白殿朝行東風昨夜聞歸雁夢遶江南烟水長薊門城下過堦塔一一行人通竈間今朝送客又還入那忍更投名利關别駕祠前雪水深弟兄沙上把離樽三年不洗來時褐要㸔淋漓别酒痕早朝扶揺九萬透雲霄鳳闕龍池歩歩瑶駞背負琛金絡索象身偹駕玉逍遥衣冠俯伏傳呼岳干羽低徊㸔舞韶湖海布衣瞻盛事他時田里夢天朝杜清碧與趙子昂集賢為夀東觀道家蓬萊山神人來往乎其間銀鈎勢壓蛟龍榜玉佩聲聞虎豹關秋露滿天濡綠髪晨光出海曜朱顔金函更注長生籙林下種竹已斑斑送趙編脩往年初記抵京師正類機雲入洛時未識鼇頭分赤管先傳馬首控青絲瓊林舊醉家家酒金刹新題處處詩此日揚州歸去路錦衣光彩照城池寄題周待制悠然閣大江之東彭蠡南周家髙閣與雲叅秋風猿狖啼青嶂夜雨蛟龍起碧潭繞屋千叢生杞梓通簷百尺長楩柟何時共此登臨樂指㸃平川得縱談真州賈生索賦孩兒茶吾聞孩兒茶始來自殊方古人譯其名和以龍麝香賈生得妙訣品製非尋常清晨待遺我今我試與嘗味腴甘且美頓洗葵藿腸惜無瓊瑶報裁詩謾誇張燦爛黄金芽錯落明月章波浪盤蛟螭雲霞廻鳳凰好將龍鳳餅裹以玉雪囊持之獻天子補益未可量能令齒頰生玉液却回麯蘖升明光諸公以懐李白詩分韻送李茂逺後以酒字索賦遂綴五言一首漳江水逵逵民俗多雜揉李君專檄來號令肅廵掫遂令方家市安集日豐阜春風有歌姬夜月無吠狗築堤捍水災皆自將軍手至今此邦人稱謂常在口我來自京師始得一聚首經過日以數言論竟開剖有如濟世方乃爾困升斗孰云勞積多反使嵗月久方今天子聖賢知在左右銓曹每推擇往往雜瓊玖此行㸔薦進直入紆組綬莫負平生心要使斯民夀豈敢為贈言裁詩侑盃酒送李伯循歸山中已聞盤谷最深幽便欲從君遂此遊春氣和柔朝採藥秋風清徹夜乘舟岩花冉冉難留客汀草纎纎獨倚樓楊栁新條不堪折只湏買酒喚離愁和楊仲𢎞老來自愛黄叔度少日空期魯仲連髙卧獨無田二頃曵裾誰有客三千滄江𣺌𣺌浮鷗鷺白日翩翩換嵗年只憶江東楊少尹劇談終夜不湏眠楊仲𢎞送虞伯生赴召幾年簪筆侍明光共取才華補衛郎祀事必稽周典籍頌聲多假漢文章雲垂逈野鳴鞘逺月滿髙城下漏長縱獵合袪誇盛美願言作賦繼班揚送朱澤民之京師懐山挾海奠京師氣勢紆餘盡北陲雁度寒雲秋色逺鵲鳴宫樹曉光遲四方英俊皆來萃一代經綸属有為君有長材希屈賈好將詞賦重當時送彭萬里平居鄉鄙係瞻聽逺渉京畿近寵靈席底波濤秋淼淼枕前星斗夜熒熒肻如龍劍重藏匣誰識牛刀始發硎將相與人殊勢分秪應雙眼為君青擬辭京師囊衣托載道傍車人事匆匆嵗欲徂風雨五更雞亂呌關河千里雁相呼蕪菁散漫根猶美桑柘蕭條葉半枯却上髙丘重回首五雲繚繞帝王都次韻陳子仁黄河禹功䟽鑿實憂勤宇内山川自此分元氣渾淪通地脉孤光迢遞貫天文母金伏玉秋當孕隂火潛淵夜欲焚萬里窮源何日遂片帆西上破層雲早朝掖垣迢遞到城回魏闕嵳峩此日開赤芾㑹筵霄仗引朱輪争道曉鐘催三泉忽報藏金甲萬歳猶聞獻玉盃樂奏象箾從此畢小臣思見鳳凰來錢塘懐古斜界鈎陳通大道中分魏闕對層巒雲生殿上金爐暗露下庭前玉井寒江漢飛龍俄杳杳滄溟泛鷁竟漫漫中天㑹合寧非數坐見蒼生奠枕安山回禁禦入雲長無復陳兵衛兩廂千古金鐘埋野草萬年珠樹落秋霜龍文不徙陽人衆鳥篆終歸軹道傍九市塵埃來滚滚一江風浪去茫茫西湖清濁自天開鴻雁鳬鷖日往來黄道星辰環太乙紫雲宫殿擁蓬萊能文競奏王褒頌獻夀深傾阿母盃九域輿圖今混一百年耆舊自興衰化人宫殿被層阿棟宇髙低日擁波翠石文章題日月寳珠光􅆋燭山河空桑説法黄龍聽貝葉繙經白馬馱誰謂一無超衆有秪今塵上重來過宗陽宫中秋對月老君壇上凉如水坐㸔氷輪轉二更大地山河微有影九天風露寂無聲蛟龍並出扶金榜鸞鳳雙飛載玉笙未信弱流三萬里此身今日到蓬瀛九月御氣排空寳扇開金衣照日近臣來絲囊已進千秋錄黼座還稱萬夀盃王子吹簫雙鳳舞羲娥攬轡六龍回侍臣此日沾恩賜散作祥風遍九垓元風雅前集巻五欽定四庫全書元風雅前集巻六元傅習編楊仲𢎞東湖即事四首為王侯本齋賦朝來千騎岀城闉為向東湖􅂿早春素練冪林雲氣薄明珠穿草露華新山花獻笑開簷畔海鳥忘機戯水濵記取當年賢太守及時為樂與斯民夏月湖中爽氣多南風叠叠巻長波漁翁舟楫衝蘋藻㳺女衣裳擘芰荷膾切銀絲嘗美味腔傳金縷換新歌君侯用意仍深逺即此光輝豈滅磨暫停麾葢擁輕舟此日湖山屬莫秋采采黄花登几案離離紅樹散汀洲傾壺浮蟻杯頻竭下箸鮮鱗網乍收莫向錢塘誇徃事白蘇未許擅風流雲氣低藏十萬家東湖飛雪又交加玉禾舊布仙山種瑶樹新開帝所花但聴兩岐歌瑞麥何勞八月泛靈槎侯門自有相如客賸賦髙車後世誇九日别友人客中佳節罷登髙獨立淒涼感二毛紫陌泥塗秋汩汩黒山風雨夜嘈嘈幽人侈有觀魚樂壯士慙無汗馬勞得失古今俱一律惟應痛飲讀離騷次田師孟西曹即事韻隠吏重來右掖初清明時節亂花舒霧迷黃閣霏霏重雨散彤庭㸃㸃疎李耳舊藏周典禮蕭何元得漢圖書經綸事業煩公等要使皇文日粲如題鄧善之袁伯長諸太史詔編國史有程期正是諸郎儤直時虎士守門宫杳杳雞人傳箭漏遲遲窓間夜雨銷銀燭城上春雲壓彩旗才大各稱天下選書成當繼古人為贈賈國英郎中挺生雄傑氣昂昂服事朝家被寵光鸚鵡盃中春正好鳯凰池上日偏長新裁樂府傳宫體舊著朝衣帶御香忠孝兩全人所羡只今慈母在髙堂遣興二首庭樹號蟬日已涼塞雲橫雁夜何長挾書萬里干明主仗劍三年别故鄉西北諸山連朔漠東南衆水隔荆揚淹留不去慙蘇子莫遣貂裘壓雪霜徃嵗銜盃意氣舒願從章子誦詩書已荒陶令松三徑猶守揚雄宅一區春樹花殘收夏果海門潮落買江魚如今也足成吾趣何事侯門欲曳裾紀夢海上垂綸已有年閑居無事夢朝天蒼龍觀闕東風裏黃道星辰北斗邉盛際只今逢五百前程何許隔三千揚雄曽奏甘泉賦應有聲名達帝前送殷國華之饒州教授送君行李欲何如楚國蕭條戰伐餘西塞人烟連草莽南江波浪入空虚遺民罕作先生服故府徒存博士詩徃事悠悠多冺沒好從黎老問終初望海海門東望路漫漫風􅄓無時縱惡湍白霧漲天隂氣盛滄浪涵日曉光寒豈無方士求靈藥亦有幽人把釣竿與俗浮沉何足道願乗浮舶肆遐觀題息齋竹石行前怪石起參差篁竹叢深使客疑如過瀟湘江上路鷓鴣聲斷日斜西寄題羅氏山莊黄石山原風物幽賤子往年嘗一遊舊行檿柘已成徑新刈禾麻應滿疇馮衍無忘白首歎謝安當為蒼生憂餘杭溪上明日發愁殺楊花吹客舟題先天觀圖浩浩太古石雕鏤矜嵳峩瓊林花飛騫寳構通鬱羅矯首視三光丹青相盪摩上隣列仙居西移瑶池柯玉蛟亦受令鞭撻回盤渦巍巍雙華表飛鳥不敢過𤣥鶴時一來潛鱗憚伏波心迹會虛湛神光隠鳴鼉緬彼巢居子凝睇佩女蘿天風入紫京百靈莫誰何朗言渾沌後龍馬方負河視之杳不見嘉名表山阿㝠思有至理熟視猶摩挲李竹所題蘇李泣别圖我去君留可奈何明朝烟雨隔闗河當年胡婦分擕處想見中郎淚更多過采石獨卧空山五百年喚醒除是老坡仙沉香亭北花成土采石江頭月在天遺跡不妨留狡獪多情猶自狎嬋娟余生若在開元日也向長安學醉眠何吾山贈琴師趙海月五首瓏瓏花雨客屛香理盡哀絃曲轉長海上歸來望鄉土風回依約夢霓裳莫年鐵杖身差健何處銅盤月共將幸自金丹堪㸃化不須秋樹説荒凉倦遊何處不逢春猶記臨風度碧雲客裏看花同是夢囊中有道未為貧黒貂裘在閑隨意黄鶴歌成莫寄人聞有琴材在樵㸑勞君玅斵一揮斤迢遥萬里一枯槎脱畧塵凡三朶花自與秋風同客夢曽隨明月落誰家江湖量大容浮瓠雨露春深學種𤓰却得先生有新曲如何能解理皇荂楊栁風烟蜃氣昏秭歸花月碧蕭春水雲别後行千里淡泊相遭得幾人見説周旋惟我我定知僵走隔塵塵初心未證圓通悟猶恐隨身認作真劉時中古採蓮曲長安女兒淑且濃日日採蓮溪水中笑挿荷花照溪水韶容欲與花争紅溪中荷花深幾許溪上時時聞笑語紅酣綠縟不見人應在荷花更深處歸時夜凉溪水清扣船踏歌盪槳行荷葉盖頭花㔩鬢溪上月明潮巳平望夫磯望夫山頭日欲頽望夫山下江聲哀山頭日日風雨惡江上不見行人回空山亭亭幾朝暮猶記行人去時路知君渡河長不歸恨不當年逐君去此身化石千仞磯石猶可懸心不移長江水涸黄埃飛行人應有歸來時對月凉霄在前墀佳月墮我側此月如此心曠朗一片白開樽起相娛佳月即佳客月如感知巳為我好顔色此時還獨醒奈此明月夕吳敬庭古意四首我志在栖壑而與世沉浮是非復非是此語真謬悠所願適其適富貴何足求有酒同醉醒商歌動清秋得意巳忘辨白雲􅄆岩幽斜陽在逺樹微風動髙荷蕭蕭湖亭上今夕凉巳多遇此素心人清言洗煩疴樽酒相與歡竟坐歡且歌揮手謝塵世不樂復如何夏日苦炎熱但願一夕凉及此秋氣深蟋蟀鳴近床物情亦知時催製公子裳户牖當綢繆嵗晏饒風霜感此發學儆終然惜流光隂陽有代謝寒暑相推移人生百年内行樂當及時昨日猶朱顔今日生白髭所以遺世事飲酒不復辭寄傲南窓下千載真吾師新春喜晴嵗序更五日人皆悦春晴官曹喜休暇痩馬成郊行氷消湖水緑霧􅄆山光明寒梅送餘香幽禽㺯新聲覧物俱得時悠然起深情蹇余佐茲邑慚負吏隠名撫字心轉勞催科政何成願言兆豐年擊壤歌太平偶成微官覊此身逺投數千里觸暑渉長江晨夕不遑止殊方寒氣早秋意亦如此嵗月倐如流感歎成坐起繭絲將奈何終當就料理送吳濟川脱頴貴毛遂投筆知班生子㩦束書去而有千里程曉袂江風寒夜枕霜月明觀光丈夫事惜别兒女情㑹當拾青紫壮志酬平生夏日述懐屏迹逺囂紛息交歎孤陋蕭然一室間圖史分左右瓶花皎餘春爐烟靄清晝坐觀羽蟲化卧聞穴蟻鬬青山自偃蹇相對如有舊我家陵峰下溪水清可潄誤身投塵鞅三年此紆綬素餐亦知愧民瘼未能究白雲𣺌何之念之令人痩陶令歸去來深慚着鞭後李長源題峽州黄河城下水澄澄送别秋風似洞庭李白形骸須放蕩幷州豪傑為凋零十年道路雙蓬鬢萬古乾坤一草亭八月崤陵霜樹老傷心休折栁條青上清宫蒼梧雲氣赤城霞錦谷鈞天帝子家仙掌髙承九霄露霓旗遥駐五雲車昆明火刼驚人世瀛海風濤撼客槎醉裏忽逢王子晉玉簫吹上碧桃花楊鵬翼正旦有感干戈短景去忽忽回首南朝一夢中世事盡隨天道北春正依舊斗杓東四時玉燭堪調爕萬國車書想混同寂寞荒山老松樹看渠梅栁競春風華清宫四海笙歌屬一家驪山宫殿倚烟霞燭龍正照三郎宴野鹿偷銜第一花大抵失人隨致亂未知亡國不由奢自從西蜀䝉塵後幾使殘民望翠華潁亭懸崖髙築此亭孤落日登臨酒十壺雲破九山開叠嶂天低三楚入平蕪斷碑黄絹空塵迹逺水白雲如畫圖對此風烟已瀟灑扁舟何必到西湖送真善卿歸秦中少年錦帶