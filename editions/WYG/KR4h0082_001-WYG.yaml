body:
  text: 劉静脩先生名因字夢吉保定人裕宗皇帝在青宫聞其賢以資善大夫召至京師未幾以親老求歸養居數嵗朝廷尊仰徳義拜集賢學士又以疾辭踰年遂不起年纔四十有五縉紳惜之黄金臺燕山不改色易水無新聲誰知數尺臺中有萬古情區區後世人猶愛黄金名黄金亦何物能為賢重輕徳輝照九仞鳳鳥纔一鳴伊誰腐䑕棄坐見饑鳶争周道日東漸二老皆西行養民以致賢王業自此成黄金與山平不救兵縱横落日下荒臺山水有餘清翟節婦兵塵浩無際烈士難自全婦人無九首志欲不二天燕山翟氏女既嫁夫防邊一朝聞死事徤婦增慨然生有如此夫早寡非所憐求尸白刄中負土家山前事去哀益深義盡身可捐無兒欲何為所依惟黄泉鄉鄰救引訣烈日丹衷懸誰辦節孝翁重賦睢陽賢我昨過其鄉山水猶清妍聞風髪如竹飄蕭動疎烟千年吟詩臺峩峩太寧巔為招馮太師和我節婦篇有大如天地有大如天地日夜長乾乾有小如螻蟻營營誰使然我亦形蹟中豈得獨安閒萬物相為用錯綜盈兩間如身百骸具少一為不完有形無虛生豈予獨贅偏森然氣分内既有不可鐫蝮蛇誰宥之生生亦能延安有人道尊堙滅獨不傳乾乾以為師餘者一聽天燕平學仙臺碣石來海際西南奄全燕中有學仙臺燕平欲升天燕平骨巳朽遺臺猶相傳雖復生青松嵗久摧為烟極目望海波不見三山顛三山巨鼇簪山人蟣蝨然使無不足論信有亦可憐大塊如洪罏金石能久堅天地㑹有盡何物為神仙空山無笙鶴落日下饑鳶今古非一臺浩歎秋風前登武陽朝遊樊子館晚上武陽城潮接滄溟近山從碣石生斷虹雲淡白返照雨踈明日暮悲吟發樵歌已慘情易臺望中孤鳥入消沉雲帶離愁結暮隂萬國河山有燕趙百年風氣尚遼金物華暗與秋光老杯酒不隨人意深無限霜松動岩壑天教揺落助秋吟山家馬蹄踏水亂明霞醉袖迎風愛落花怪見溪童出門望鵲聲先我到山家巴延丞相度梅關馬首經從庾嶺歸王師到處悉平夷擔頭不帶江南物只挿梅花一兩枝鞭一節髙兮一節低幾回敲鐙月中歸雖然三尺無鋒刃百萬雄師屬指揮郝天挺麻姑山路入尋幽景便嘉石田瑶草帶烟霞注經洞古亡遺檢養藥爐存失舊砂青鳥空傳王母信綵鸞應到玉皇家岩扉不掩春長在老却碧桃無數花史紫薇江南曲風凄露冷江南岸瑟瑟寒波秋練練採蓮歌斷紅雲空蘋葉蘆花結新怨鴛鴦鸂鶒俱可憐相呼相喚沙觜眠白頭漁子揺蒼烟一雙飛上枯樹顛荒塚謡荒岡斷壠誰家墳經年無主蒿草繁土崩棺蝕漆燈滅狐狸作巢生子孫牧童燒火山葉赤花磚迸裂松行根牯牛作羣來礪角折碑盡是淚土痕夕陽未下燐火出隂風刺刺雲昏昏精靈月下相往來嚘嚶砉歘如人言君不見昨日城中車馬客又來尋地為真宅盧疎齋題太白墓大雅清風久不聞一杯聊為洗荒墳朱絃三歎無今古説與江東日暮雲婺源縣齋書事竹樹映清曉坐聞山鳥鳴瓶花香病骨簷雨挾詩聲客亦非餘子春無負此生明朝予問俗吟罷却須晴書梓山堂經室問俗來山郭攜春到竹溪花香破禪寂林樾受鶯啼欲和觀音偈聊乘醉墨題閒雲若留客不肻為余西題子陵釣臺雲山蒼蒼兮烟木稠石灘潺潺兮江水流故人兮冕旒先生兮羊裘使人皆先生兮誰其伊周使人不先生兮誰其巢由可仕止久速兮舍聖人將焉求清風一絲兮豈為名鈎焦黄荔丹兮香火千秋岸下幾篙兮榮辱之舟先生一笑兮白雲收貫酸齋白兆山桃花岩美人一别三千年思羙人兮在我前桃花染雨入白兆信知塵世逃神仙空山亭亭伴朝暮老樹悲啼發紅霧為誰化作神仙區十丈風烟隔淮浦暖翠流香春自活手撚殘霞皆細末幾回雲外落清嘯羙人天上騎丹鶴神遊八極栖此山流水杳然心自閒解劍長歌一壺外知有洞府無人間酒酣仰天呼太白眼空四海無纎物明月滿山招斷魂春風何處求顔色羙人篇仙風彫雪玲瓏温吳姬剪月纎纎昏行雲補髻翠光滑鳳凰呌落空山月手摘閒愁八字分青山恨重畫不伸肌濃汗膩朱粉勻背人揮淚粧無痕霜刀自製石榴裙閉門不識諸王孫緑烟薰暖藍田玉羅帶隨風換粧束飛鳥銜怨過長門芳菲不忍韶華屋連環歩窄玉珮响霓裳䄂濶東風長釧鬆腕痩覺多情舉指搔天天亦癢枕香帳冷蘭燈沉落花不入芙蓉衾三山路杳銀河深彩鸞髙訴愁人心天與美人傾國色不知更與羙人節夢裡梅花夢我身萬古千年一明月君山行北溟魚背幾千里負我大夢遊弱水蓬萊隔眼不盈拳碧落香銷吹不起茜裙女兒懐逺遊逺人不歸明月羞寳釵綰髻翠欲流風鬟十二照暮秋女媧鍊石補天手手拙石開露天醜瓊樓玉宇亦人間直指示君君見否斯須魚去夢亦還白雲與我遊君山畫龍歌老墨糊天霹靂死手擘明珠換眸子一潜淵澤久不躍泥活風鬚色深紫虬髯老子家燕城怒吹九龍無餘燈手提百尺隂山氷連雲塗作蒼龍形槎牙爪角隨風生逆鱗射月干戈聲人間仰視翫且聽參辰散落天人驚瀟湘浮黛蛾睂輕太行不讓蓬萊青烈風倒雪銀河傾珊瑚盞濶堪不平吸來噴出東風迎春色萬國生龍庭七年旱絶堯生靈九年澇漲舜不耕爾來化作為霖福為吾大元山海足觀日行丁已春三月余之所謂寳陀山顛有石曰盤陀往觀之初疑其大不可量既歸宿作詩時方夜半僧魯山同賦六龍受鞭海水熱夜半金烏變顔色天河蘸電斷鼇膊刀擊珊瑚碎流雪朔方野客隨雲閒乘風來遊海上山飛驤拖空渡香水地避中原雜聖凢壮鰲九尺解霜鼔痩紋巨犬自掀舞驚看月下墨花鮮欲作新詩受龍女人生行此丈夫國天吳立濤欺地窄乾坤空濶落春㠶身在東南憶西北采石歌采石山頭日頽色采石山下江流雪行客不過水無跡難以斷魂招太白我亦不留白玉堂京華酒淺湘雲長新亭風雨夜來夢千載相思各斷腸别離情吁别離之苦兮蒼梧之野春草青黃陵廟前春水生日暮湘裙動輊翠脩竹亭亭染紅淚又聞垓下虞姬泣斗帳初驚楚歌畢佳人閣淚棄英雄劍血不銷原草碧何物謂之别離情肝腸剥剥如銅聲不如斫其竹剪其草免使人生為情老題廬山太平宫山上清風山下塵碧沙流水淺如春不知松外誰敲月驚動南華夢􅂻人蘆花被僕過梁山泊有漁父以蘆花為被僕尚其清欲易之以紬者翁曰君尚其清願以詩輸之採得蘆花不涴塵緑莎聊復藉為裀西風刮夢秋無際夜月生香雪滿身毛骨已隨天地老聲名不讓古今貧青綾莫為鴛鴦妬欵乃聲中别有春題陳北山扇五首秋鳴無數醉秦娥却把輊風惹扇羅明月碧澄天似水此山雲氣動纎波紅旭如鉛海上來蒼蒼烟霧小蓬萊東風昨夜醇如酒醉得桃花滿樹開翠幙低垂䕶午隂碧瓶裡面水痕深東風截斷人間熱勾引清凉養道心一簾明月倚欄杆宇宙尤宜就裏看飛上仙槎河漢近手招沆瀣海銅盤功成不用服丹砂笑指雲霞搃是家清曉山中三尺雪道人神氣是梅花許魯齋趙氏南莊曉起北窓涼清談戢羽觴入簾花氣重落地燕泥香夢􅂻青山好吟邉白日長秋風載書籍相對築茅堂和先生姚公去去迷途莫問津問來還恐不知真因時用舍固有命與道巻舒還在人百尺竿頭愁據險一庵林下樂為鄰孰輊孰重何須問夢想故園桑柘春贈竇先生行二首西山山下覔幽村水竹鄰居擬卜君豈意天書下白屋便收行李入青雲功名准自英雄立得失防因去就分萬里風沙𣺌南北請歸消息幾時聞莫謝風沙老不禁斯民久已渴商霖願推往古明倫學用沃吾君濟世心甫治看將變長治呻吟爾復化謳吟千年際㑹真難得好要先生着意深偶成萬物備吾身身貧道未貧觀時見物理主敬得天真心爽星辰夜情新草木春自怜斵喪後能作太平民病起花透香風入短櫺草抽新綠倚柴荆正憂多病作身累且喜幽居見物情花為可觀遭夭折草因無用得欣榮世間巧拙都相半不許區區智力争謝梁安撫惠田晚來乗興入幽居擬即君侯置一區令徳久思親慷慨佳田今許乞膏腴太行西對千峰玉淇水東窺萬斛珠幸着此身於此老願從樂正五人俱張仲疇送許魯齋歸山諸相纍纍入省闈先生何事獨西歸心隨道隠貧非病老得身閒古亦稀行色一杯燕市酒春風二月楚山薇到家巳及蠶生日布穀催耕隴麥肥李道復偶成日午山中道停驂進歩難鹻侵苔逕滑風入毳袍寒在國終無補全身尚未安一樽茅店酒强飲不成歡喜雨誰調元氣入淋漓枯槁回生只片時依舊野雲無着莫髙天濶地任風披寄東宫二首艱難勤扈從俯仰盡周旋小試屠龍技翻成抱虎眠脱鈎魚縱壑漏網鳥冲天萬事從今始灰心未死前十年陪顧問一旦决安危自合成功去應慙識事遲長城徒自壊孤注妄相疑辟糓求仙者髙名百世師初科知貢舉百年塲屋事初行一夕文星聚帝京豹管敢窺天下士龍顔誰占日邊名寛容極口論時事衣被終身荷聖情願得真儒佐眀主白頭應不負平生金陵懐古西風刮耳過黃蘆萬水東流草樹枯蟾窟一年秋色近鵲橋萬里客心孤青山故國新豐樹芳草王孫舊酒壚壮志未磨天地濶劍光夜夜照江湖虞伯生和李平章秋谷小車詩雨餘宫草隠晴沙相國朝天試帝車班馬晝移温室樹鳴鸞晨度掖垣花搴帷每命賢俱載趣駕頻煩使至家此日龍門誰執御擁經正履待金華和周待制朝回即事三十六竿吹鳳凰九重春色絢天光卿雲微動旌旗暖湛露初晞草木香貝葉神師東渡嶺金輿馴象北浮洋小臣職在歌功徳拜手陳詩對日長岡子原呈王學士岡子原頭春色濃小車晨出看東風雨餘林潤人烏好日暖沙平我馬同西引峰巒來座上東觀樓觀起天中詠歸莫作匆匆晚倘解相逢擊壤翁奎章閣讀進中巻玉堂䇿士詔儒臣御筆親題墨色新省樹坐移簷底日宫壺馳賜殿頭春虞庭制作䕫龍盛漢代文章賈董醇書閣暮年偏感遇但歌天保播皇仁與趙子期趨閣雜賦日出風生太液波畫橋影􅂻彩船過橋頭栁色深如許應是偏承雨露多雨浥輊塵道未乾朝回隨處借花看墻東千樹垂楊栁飛絮來時近馬鞍春雲冉冉度宫城樓雪初融水未生行過御溝成久立起頭枝上有啼鶯屏風圍坐鬢毿毿絳蠟揺光照暮酣京國多年情盡改忽聽春雨憶江南待漏宫門聽鑰開袖中進巻总賢才奏名殿裏千花合傳詔堦前好雨來千花拂檻栁垂絲晝刻傳呼淑景遲聖主自看新進䇿侍臣簪筆立多時文章光焰過長虹來者無窮往者空頭白眼昏心力盡髙堂深夜燭揺紅送伯長待制扈駕之上都日色蒼涼映赭袍時巡無乃聖躬勞天連閣道晨留輦星散周廬夜属櫜白馬錦韀來騕褭紫駞銀甕出蒲萄從官車騎多如雨只有揚雄賦最髙寄池州司直同知使過池陽聞上日好懐浩蕩為君開江干維檝車馬集亭上持盃風雨來中夜魚龍聽語競明年鴛鷺候朝回九華山色翠可食為問謫仙安在哉寄張伯雨隠居聞道無人識麋鹿來依積海深每從雲氣得芝术莫怪丹光穿樹林茅君自騎一虎下木客或與群猿吟知子此時正相憶遲余躡屩度千岑送朱仁卿過旴江羨子南歸旴水上過從為我問臨川幾家橘柚霜垂屋何處蒹葭月滿船應有交遊憐逺道好從父老説豐年寒機早晚成春服一一平安報日邊興聖宫朝退次韻袁伯長見貽是日上加尊號大禮成告謝宗廟集即東出奉祠齋宫翠蓋重重寳扇斜從官穿栁散慈鴉過宫路逺紆天步上夀杯深閣雨花玉貫兩虹通象錦衣成五綵鍊雲霞奉祠東出蓬萊道春水鳬鷖踏漢槎别成都我到成都纔九日駟馬橋下春水生渡江相送謝主意過鄉不留非我情鸕鷀輕篾下溪足鸚鵡小窻知客名幸得郫筒酒易醉夜深冲雨漢州城廿五日即事呈閣老諸學士松隂鵠立候宫車風送宫花着白鬚水影漸移簾側畔鶯聲只在殿東隅近床擬進新琴操載筆難題古畫圖太液雨餘波浪動龍舟初試散魚鳬贈星上人潭北湘南無影樹一花吹渡海門潮天香滿室定初起雲氣上衣身欲飄寳月夜寒龍在鉢銀河秋近鵲來橋豈無一个卭州竹與爾孤松伴寂寥送可無上人五公昔講時聽者不起坐虛窻悉銷殞何由見人我名字誰與安説義話已墮尚自無亦無更問可不可不見天雨花誰能拾餘朶賦凝雲石海石不盈握隤然如委雲危岑集逺思虚竇棲微薰天髙太華斷日落香爐分几硯永清潤文章俄氤氲潛雷起神谷震驚天上聞亟視恐無及化為九龍文送兄徳脩南還老兄五月來作客八年不見頭搃白五人兄弟四人在忽憶中郎淚沾臆我家蜀西忠孝門無田無宅惟書存兄雖筦庫完父䕃弟竊餘澤承君恩文章不如仲氏好叔氏最少今亦老五郎十歲未知學嗟我何為長逺道諸兒讀書俱不多又不力耕知奈何憂來毎得二三㕛看花把酒臨風哦蜀山嵯峨歸未得盤盤仙壠臨川側碧梧翠竹手所移應與青松各千尺南風吹雪河始氷只歸烏㡌何㷀㷀明年乞身向天子共讀父書歌太平澧州謝家通濟橋澧有蘭兮沅有芷相望涓涓隔秋水蛟龍迴夜隠波深虹霓乘晨駕空起千年石尉何西東天下有道津梁通朝祠東皇蒼雲中行人無忌懐謝公題南野亭門外輕塵接市扃坐中春色自幽亭雲横北極知天近日轉東華覺地靈前澗魚遊留客釣上林鶯囀把杯傾莫誇韋曲花無賴獨擅東南雨後青題九歌圖太乙神君號東皇玉質要玅含和陽生生炁始通微茫綿綿蒸空神中央浮英上羅文天章覆冒下滿谷與阬旁塞無間靈無方靈來乘柔往乗剛湘君夫人鎮相望清温静好非滛傷司命元老元氣昌手執藜杖色老蒼厯劫夀命不可量少君之壽同其長離無異體合有常出入萬化終不亡晶明發晨上扶桑海天赫赫真金芒質錬不滅長垂光河源混混流湯湯伯也坐視無逃將千古萬古何堂堂彼幽為厲為强梁朝狸暮豹方鴟張精魂熠燿志氣荒招之不反巫無良屈生作歌沉九湘世人傳聲罕尋詳祝融仙子調𤣥黄九神出圖百怪藏不信請視虞公章題趙子昂馬圖憶昔從公侍書殿天閑過目如飛電池邊儘有吮毫人神駿誰能誇獨善今公騎鯨隘九州人間空復看驊騮惟應御氣常相逐黄竹雪聲千萬秋元風雅前集巻一欽定四庫全書元風雅前集巻二元傅習編張野夫夀李秋谷璿階曾共近清輝一旦雲鵬九萬飛再入中書今亦有兩封上國古全稀霜侵吟袖趨朝去香惹宫袍侍講歸同使斯文躋夀域且休回首北山薇元明善寄翰苑諸公蒼烟綠樹滿汀沙負手行吟日又斜江水有時窮地脉海雲何處是天涯生前幾醉樽中酒夢􅂻曾來海上槎惆悵懐人重回首晚風吹盡紫薇花送湖南李直夫憲使君去湖南我上京思君欲見又蕪城滄波留月能歸海江雁拖雲不到衡一代豪華誰逺識百年敬畏䕶靈名好來不作男兒事有水可漁山可耕送董慎齋左丞討賊負劍先驅意氣閒也勝局蹐着儒冠古來每説從軍樂此去不辭行路難使節再臨民志定兵鋒一舉賊心寒書生奮力效馳逐要寫功名久逺看題天冠山仙翁昔往天冠山夜呵鬼神衛爐丹丹成飛去杳不還藥池丹井猶山間翩翩學子風佩環華欀鉅欐青雲端思𤣥尋躅果安訪鶴歸月落前溪灣跋南岳夀寧觀碑後朱陵靈臺天柱巍太虚空洞綠烟屝上館赤帝朱鳥飛祝融宅南參為旗羲娥兩曜愁蔽􅃜象緯臨逼嗟低迷四觀燕吳與秦齊恒嵩泰華孰崇卑五氣順布百志熈流祥物阜宣后祗雨風露雷豈其私恵爾下土尸者誰中有異人餐赤芝夜眠秋霞晝天倪衣以青雲裳白霓風車八極驂兩螭七十二峯足幽棲琳宫貝闕輝陸離潛光煉魄如嬰兒大丹入咽無渇饑誰其思之呉宗師神變倐忽方張施泠然御風𣺌何之太君歲晏嘉予期千秋萬歲受鴻釐皇圖景運永以丕手持芙蓉朝紫薇旋飈天闔此來歸彰靈答貺逹爾垂磨崖䥴我瑶華辭鮮于伯機望嶧山東方巨鎮宗岱宗羣仙列侍臣妾同西南崛起一萬仞却立不屈如争雄何年天星下天宫墜地代作青芙蓉外如刻削中空同閬風𤣥圃遥相通我昔東遊訪青童羣仙招我遊中峯悔不絶粒巢雲松失身誤落塵網中如今可望不可到艤舟空羡㝠飛鴻神仙可學事亦晚安用屑屑悲秋蓬吾聞嶧陽有孤桐鳳凰鳴處朝陽紅安得斵為寳琴獻天子為民解愠歌南風趙子昂送吳汀洲七閩南去路﨑嶇五馬承恩出帝都地氣喜聞今有雪民生寧似昔無襦山城羙酒傾鸚鵡雨館春深聽鷓鴣他日相思應悵恨離筵不忍賦驪駒采石天門日湧大江來牛渚風生萬壑哀青眼故人携酒共雙睂今日為君開蒼崖直下蛟龍吼白浪横空鶴鵲回南眺青山懐李白沙頭官渡苦相催過岳武穆王墓岳王墳上草離離秋色荒凉石獸危南渡君臣輕社稷中原父老望旌旗英雄已死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲即興春隂栁絮不能飛雨足蒲牙綠更肥政恐前呵驚白鷺獨騎欵段遶河歸絶句三首庭槐風静綠隂多睡起茶餘日影過自笑老來無復夢閒看行蟻上南柯橘子花開香四隣綠隂如染净無塵幽齋獨坐鳥聲樂萬累不干心地春自有天地有此溪泓澄百折净無泥我家溪上無人到只疑身在青玻瓈漫興四首竹色雨餘碧蟬聲風際清方池含綠水中有纎鱗行浮沉各異態亦足悦吾情坐久不成起待得月華明露生夜將半淡然無所為草根䖝鳴歇松梢螢度遲城市多塵雜令人心不怡兹丘亦可老已與白雲期春晴浩無端野望欣有矚山花炫桃李澗影瀉松竹鳴鶴聞九臯白駒在空谷好鳥何處來啼破林煙綠揚舲清河流開篷素秋曉斕斑被岩花委蛇順流􅇨天晴去雁髙野濶行人少故園歸有期客愁浄如掃和子俊感秋秋至忽十日天宇豁然清凉飈旦夕至林木發商聲良夜不我與慨然心自驚古人久己逝念之動中情苦心攖世患只博身後名今我將無同聊復得此生東郊晨興理孤㮄薄言東郊遊清風吹我衣入袂凉颼颼幽花媚時節弱藻依寒流山髙碧雲歛日出白烟收曠野得我懷欣然消我憂中流望城郭匆匆佳氣浮人生亦已煩恵養要須周約身不願餘尚恐乏所求且當置弗念變化終歸休奉隆福召命赴都過徳清别業驟暄氣候變幽園卉物凄山雲石上起春鳥雨中歸牽衣憐稚子舉案愧山妻苦被虚名累未得遂髙棲雪石同子俊遊何山次韻同是清閒客俱為放浪遊晴山依雪壯野水帶氷流風急松杉亂年登薺麥收生涯須未老吾欲覔莬裘送耶律伯强得請歸東平侍父麟鳳出瑞世不受虞衡拘郊藪亦可遊豈必在軒除明時靡遺才治世容隠居振衣齊魯間脱屣風露衢衆進我獨退卓然君子儒西漢有芳躅東門祖兩疏路人亦嗟惜哀哉二大夫伊余獨何幸乃得尾送車恨不生羽翰與子東南俱臨分無以贈善保千金軀贈别夾谷公二首驅馬原隰間經時不遑休昔來日在斗今去麥已秋王事有稗益晏安非所求翩翩晨風翼一舉逝莫留誰令匏𤓰繫自懐離别憂青青蕙蘭花含英在中林春風一披拂胡能見幽心相去千餘里㑹合大江潯促席談今古知我亦何深此别雖非逺離思𣺌難任公其愛體素尚無金玉音春隂日出晨景淡散髮步中庭仰見濯濯栁春風暢人情兹晨豈不佳誰能念隂晴人生亦良晚疲勞竟何營萬事可撥置舍道焉求成出都都邑何雄麗車馬日夕喧鷄鳴趨蘭省日夕不遑眠兹晨奉明詔馳馹東西奔雪積原野白路脩烟塵昏馬鳴朔風起吏士惨無言還顧望帝鄉更覺勞心魂我今無家客斷蓬離本根願為雙飛鶴奮飛入青雲張詹事遂初亭青山遶神京佳氣溢芳澗林亭去天尺萬狀争自獻年多嘉木合春晚餘花殿雕闌留戱蝶畫梁語嬌燕退食鳴玉珂友于此中宴鐘鼓樂清時衣冠集羣彦朝市塵易侵圖書味方逺紛華雖在眼道勝安用戰初心良已遂雅志由此見何事江湖人山林未成願送瓜爾佳分省陜西憶昔長楊獵于時始識公堂堂九尺幹落落萬夫雄補衮彌縫宻能書㸃畫工勞謙延士類豈弟到兒童黄閣歸人望青雲有父風驅馳常扈從奏對毎留中暫輟尚書履榮分陜右弓秦山依畫錦燕雪感飛蓬粉署趨承舊瀛洲忝竊同因分動鄉思飛夢到江東題商徳符所畫桃源春曉圖宿雲初散青山濕落紅繽紛春水急桃花源裏得春多洞口輕烟揺綠蘿綠蘿揺烟掛絶壁飛流直下三千尺瑶草離離滿澗阿長松落落凌空碧鷄鳴犬吠自成村居人至老不相識瀛洲仙客知仙路㸃染丹青寄輕素何處有山如此圖移家欲向山中住題二喬圖長江東去水㴞㴞誰謂河廣不容刀中有喬家女兒淚何意師昏隨二豪龍虎相争欲相啖鸞鳳鎩翮將安逃不見當時老諸葛獨聘醜婦何其髙書事四首贈孫思順溪上東風吹栁花溪頭春色净無沙白鷗自信忘機事𤣥鳥猶知有歲華錦纜牙檣非昨夢鳳笙龍管是誰家令人長憶東陵子擬問田園學種𤓰天涯相遇兩相知對榻清談玉屑霏芳草謾隨愁共長青春不與客同歸薰風池館蛙聲老落日簾櫳燕子飛南浦他年重到日湖山應識謝𤣥暉露下碧梧秋滿天砧聲不斷思綿綿北來風俗猶存古南渡衣冠不及前苜蓿搃肥宛騕褭琵琶曾泣漢嬋娟人間俛仰成今古何待他年始惘然層顛官閣幾時脩檻外長江空自流白露已零秋草綠斜陽雖好暮雲稠平南籌策張華得治内人才葛亮優景物未窮登覽興角聲孤起甕城秋感興三月江南鶯亂啼百花爛熳栁依依殘紅無數迷歌扇嫩綠多情妬舞衣寳鴨焚香川上瞑畫船撾鼓月中歸只今零落秋風裏把酒無言對落暉題山堂手種青松一萬栽山堂留得翠屏隈推窻綠竹排檐入臨水紅桃對鏡開山雉雊迎朝日去野禽啼傍夕陽來山妻亦有幽棲志數日遲留不肯回過故廢苑一片中原地紛紛幾戰争至今將不去留與後人耕題秋胡戱妻圖相逢桑下説黄金料得秋胡用計深不是别來渾未識黄金聊試别來心丙吉問牛博陽隂徳澤堂廊民物周流鬢髮蒼尚為吳犍駐車問諸公但飽大官羊題陶母待賔手巻范逵誠孝廉陶侃固英特英特未可知門有孝廉客傷哉陶母貧剪髮易酒食此意固自佳此髮足可惜此髮足可惜兒心將奈何丈夫淡相與豈以酒食多平生郭林宗何如茅季偉程雪樓寄牧庵參政黄雀山頭楚觀鐘喚醒塵夢欠從容歸來坐聽春林雨還憶簾前翠萬重閻静軒梅杖涷遍西湖萬玉柯春風入手重摩娑較量龍竹能香否比並鳩藤奈俗何聲破夢寒霜滿戸影隨詩瘦月横波只知功到調羮盡不道扶持力更多元風雅前集巻二欽定四庫全書元風雅前集巻三元傅習編交趾王
