body:
  text: 大明殿侍宴班陪玉筍侍紅雲日表熈熈瑞氣温萬派朝宗滄海濶衆星環拱紫宸尊雍容湛露歌詩什彷彿鈞天入夢魂孤孽秋毫皆帝力願殫忠赤報深恩送駕至上都過關口而回控轡追隨寳馬羣古長城外送金根仙蹤縹緲鸞聲逺客路﨑嶇燕尾分喜見重瞳開日表何勞八翼夢天門梅岩有約人知不幾處朱欄看白雲送元明善赴京江流脉脉草離離黄鶴磯頭酒一巵報國忠心憐我老論文半面識君遲正當舉鼎調梅日又是長亭折栁時收拾琴書歸路穏鳳城依約更相期送李龍川平章赴闕雪滿長亭酒滿斟楚山千叠水千尋梅青半識平生面桐老相知太古心雁影南樓孤月冷馬頭北闕五雲深二毛越叟情無限獨向南窓袖手吟輓布拉吉達河南王哲人萎矣棟梁傾回首西風涕暗零三世功名今古史百年過客短長亭手扶紅日名猶在身就黄梁夢不醒記取汾陽舊勳業紫薇留種繼芳馨萬嵗山侍宴碧漢鳴鸞隔世塵玉京開宴㑹星辰舞迴鼇背千山雪酒上龍顔萬國春物被仁風榮御苑水流聖澤溢天津越南覊旅陪賔列咫尺光瞻日月新駐馬渡頭大别山頭漢口前吳王磯下沔城邊立殘秋水隔灘鷺噪落夕陽何處蟬赤壁冷烟銷魏卒黄州淡月照坡仙英雄瀟洒名俱在我愛狂吟不媿天鄂館書懐蕭然孤館起凄風半壁青燈照病容滴碎秋心窓外雨敲殘曉夢枕邊鐘衡陽雁斷三千路巫峽猿啼十二峰不盡關山回首處暮雲叠叠水重重秋晚睡覺海水盈盈漏轉籌海風吹角出譙樓夢殘淡月五更曉心逺孤雲萬里秋玉帛幾年賔上國詩書半出老中州平生事業渾如昨無奈青燈照白頭徐參政題吳城山石砮碆砮碆砮中應雙一在陳庭一此鄉楛笴已隨毛血化石稜尤作劍鋒鋼知音士適逢坡老得寳神應相豫章廟令收藏要如法試看垂矢在東房劉侍史九日按上都過陸丘痩馬行吟萬壑中浮萍身世幾西東山空雨洗千崖翠酒薄顔添半面紅滿逕荒叢摧夕露一庭黄葉走秋風陸丘又是重陽節流落天涯愧老翁過陸丘縣白露擁蒼石紅葉侵寒水騎馬下山來啼鳥忽驚起梁宣慰過湖登樓樓前秋水健㠶開樓外秋風舞袖回萬里梯航通鳥道四時風雨䕶龍堆江山如此不一醉嵗月幾何能再來欲問老髯求鐵笛夜深吹上紫荆臺何理問題宜春臺山外青山樓外樓楚雲迢遞暮天秋千年綵鳳鳴髙阜一道長虹鎖碧流舉目但知天地濶凭欄不管古今愁二仙縹緲成陳迹我亦飄然賦逺遊張天師四景初日暉暉照翠苔庭前昨夜碧桃開一簾香霧微風動知是仙人騎鶴來深院棋聲日正長博山添火試沉香道人鞭起龍行雨帶得東潭水氣凉天際凉風似水流山中瑶草不知秋黄庭讀罷無餘事鐵笛一聲閑倚樓養就還丹不怕寒獨騎黄鶴上雲端笑談借得天家雪散作琪花滿石壇吳宗師獲玉印三茅山道童遇白兎入穴掘之得一玉印乃九老仙都君印宋宣和時物也瑶瑛篆刻鎮華陽猶帶宣和雨露香玉兎有靈開地藏金童無意得天章九重臺上増春色萬里書中耿夜光喜遇明時薦神瑞三君珍重䕶宏綱六月十六日早朝偶成八句寄山中諸友五年四覩六龍飛又領羣仙覲紫薇金殿烟雲浮黼几玉階日月麗旌旗羣臣奉璽勤三讓國母臨朝重萬幾遥食蟠桃知幾次客星還照釣魚磯滕玉霄題闕台星移次福江西萬馬攢蹄夜不嘶鼔角聲隨山月上旌旗影拂海雲低心惟一正千官肅事不多言萬物齊帶得天邊新雨露曉看春意滿鋤犁謫㑹昌二首莫謂文章不直錢布衣親到玉皇前好詩未足三千首又為梅花入瘴烟錦衣來作夜郎客紈扇忽逢春夢婆太平宰相知我者誰使醉後狂言多舟中拍拍有懐天可語落落不遇吾何歸廬山蒼蒼江水急明日鶴背西風飛贈弓秋蟾瓊花十里小樓紅醉吞牛斗眠長虹十年四海分萍蓬一笑邂逅滕王洪床頭回首黄金空但覺耿耿盤心胷問蟾何不歸蟾宫自有老月留身中誰受一粒金丹紅學得紙上畫墨龍白晝呼吸風雲從頃刻霧暗天濛濛玅處巧奪造化工不復知有陳所翁君不見金陵壁上不㸃瞳㸃瞳霹靂驚江東我欲煩君具毫楮畫一小龍回顧母普令天下生孝心不向江湖長驗雨感寓六首宇宙忽空濶飲馬萬里流平生負兩眼及此行寓州天清健鶻運木脱肥鷹投長風吹海雨濯我紫綺裘相逢半遊俠把酒髯如虬慷慨説史記厯厯山川秋向來衣帶水目短何無舟吾愛東方朔髙揖金馬門向非玩六合安肻來崑崙昂昂九天身談辨黄河翻誰知上書意蛾睂不自婚不見馬相如俛首狗監恩人生非桃李何故不自言吾愛李太白玩世如遊龍自知天上謫何必人間容海風吹綠髮蕭蕭卧雲松我昔夢見之遺以金芙蓉清輝恍在眼月落娥睂峰西風桂花落我上天台山仙子扶我手冷然蒼水環乘鸞者誰子飛烟𣺌難攀三生此遊戯弄影銀河灣空山忽風瀑四顧鳴潺湲長揖馬子微此豈非人間春風如綠波淡蕩洛陽栁髙樓語錦瑟落花泛綠酒何人白鼻騧䝉茸紫貂袖一字或未識銀莵懸兩肘煌煌貝宫珠廼落緯蕭手爰居偶鐘鼓犧牛竟文繡終然同一盡豈復論好醜誰知草𤣥者窮巷閉白首船頭書十乘船尾酒百壺酒盡書在眼落月如眀珠忽悟八陣法縱横始河圖惜哉經世士未有窺唐虞季子相六國所見惟隂符元日對雨冷雲捲雨宿岩阿又見東風長薜蘿宇宙千年光霽少關河百戰亂離多鐵心不入利名冷綠鬢堪供嵗月梭試筆尋詩詩未穏梅花樹下少婆娑湖西小樓不如載酒此凭欄水色山光蔚可餐紫翠挾春排坐濕玻瓈湧月入窓寒蒼茫白鳥鳴幽嶼掩染飛花漾碧湍但令風光入吟嘯畫船綺袖不湏看所見何時結屋亦雲根隔水人家可輞川萬仞雲山凝曉碧一弓風日弄秋妍虛名豈用傳身後俠氣猶能累眼前料理寒香微雨外已􅂸蕭散待流年吟到吟到西風黄葉枯新愁幾㸃落寒蘆乾坤萬象俱吾有烟雨一門何處無流水悠悠吾道在浮雲擾擾世情疎午窓喚醒華胥夢古木岩頭聞鷓鴣訪隠西風短褐飛黄埃何不從我遊蓬萊狂歌醉舞下山去後夜月明騎鶴來吟人吟人痩倚曲欄杆酒醒香消午夢殘燕子不來春社去一簾疎雨杏花寒夜雨未到黄昏𦂳閉門怒雷挾雨過前村老人熟睡渾不覺風捲濤聲入夢魂半生半生獨受春風淺萬感相隨秋夜長隠几無眠聽落葉松梢揺雨濺山房僧舍一枕松風入夢清空庭夜雨暗禪燈山中酷愛僧居好得似山中不着僧馮海粟題黄鶴樓鶴樓千尺倚晴闌大别山前舞峻鸞昨日英雄無問處依然江漢湧波瀾題揚州瓊花錦帆隠隠到天涯古道殘陽泣暮鴉莫為龍舟更惆悵廣陵依舊看瓊花題墨肘魚平生骨氣占南風玉色鬐鱗海汐通莫與粉紅參石首天機衮衮水流東旌表申孝子門竹熨輕輿到處安水温半菽盡情歡寸心不暫三暉置萬頃何如一畆寛髙盖門閭華黼黻斑衣嵗月老巾冠遥憐續漢書申孝千古申屠又有蟠吳草廬自警二首前丙寅十八嵗作氣昏嗜卧愛非輕纔到更初困倦生必有事焉常恐恐直教心要强惺惺縂當意思沈如醉打起精神坐到明着此一鞭能勇猛做何事業不能成元來一片虗靈府埋沒經年澤穢塲不特通時多走逸覺於静處亦飛揚晝間常被事牽引夜後猶隨夢擾攘喚起主人翁警省自家三徑不容荒題閤皂山漢吳仙跡兩峯齊欲拾瑶花路恐迷寳殿青紅疑地湧林巒蒼翠接天低九重香案分雲篆八景琅函記玉題仙鶴翔空清似水歩虛聲在朶雲西題蘇李泣别圖節旄盡矣自湏存此日生還侍主恩右校漫循椎結泣平陵有子廣無孫書李伯時九歌圖後李家畫手入神品楚賢流風清凛凛誰遣巫陽呌帝閽為招江上歸來魂音紛紛音紛紛柱髙辰逺聰不聞扶桑初暾海橫雲司命播物泥在鈞洪纎厚薄無齊勻公無渡公無渡衝風起螭黿怒夜猿啾啾天欲雨天欲雨迷歸路嵗晏山中採蘭杜靈脩顧顧復去莫怨瑶臺神女妬坎坎鼓進芳醑恥作蠻巫小腰舞千年往事今如新摩挲舊畵空愴神騰身輕舉一回首楚天萬里江湖春送陳小庭之廬山匡廬幾千仞崔嵬上有天仙相往來我欲遊之未遐逺君今往矣何時回我遊我意亦無他君遊君意還如何豈為昔人詩句好豈為其間僧舍多天池升在最髙頂谷簾界天直下懸河我觀此水注湖注東注入海復隨海日騰湧上天徧飛洒飛洒浩浩蕩蕩無塵界萬生活動増姿態流轉無窮萬萬載更萬萬載匡廬山不改晦庵畫像贊義理宻微蠶絲牛毛心胷恢廓海濶天髙豪傑之才聖賢之學景星慶雲泰山喬岳寕可無頃風吹枯木不揺水激方輪不動畢竟有木有輪惹起風號水湧雖如泡影露電也􅀍眼根覷見諸有都歸變壊萬刼一空長在元風雅前集巻三欽定四庫全書元風雅前集巻四元傅習編李伯宗送邵天常歸山搏風徑擬九霄飛志業誰知與願違虎豹關深書未逹鷄豚社逺夢先歸香侵客路花方盛綠滿家山蕨正肥去後且從閒處樂徴書有日到柴扉栁道傳八月二日大駕北廵將校獵於賽音布拉克詔免漢官扈從南旋有期喜而成詠天子龍飛啟聖時乾坤闔闢載清夷幸從在鎬成周宴重喜臨邊舉漢儀御宿常時嚴虎衛吉行惟日望鸞旗詔恩許免陪驂乘却愧長楊賦未竒還次桓州塞雨初乾草未霜穹廬秋色滿沙場割鮮俎上薦黃鼠獻獲鞍間懸白狼别部烏桓知幾族他時稽落是何方長雲西北天如水想見旌旗瀚海光過長城道徳藩墉億萬年長城漫與朔雲連秦人骨肉皆為土漢地封疆已罷邊飲馬窟深泉動脉牧羝沙暖草生煙神京近在𤣥溟北九域開荒際幅員京城偶成毳幕承空拄綉楣綵繩亘地掣文霓辰旗忽動祠光下甲帳徐開殿影齊芍藥名花圍簇坐蒲萄法酒拆新泥御前賜酺千官醉坐覺中天雨露低同楊仲𢎞應舉和袁集賢上都雜詩九首出塞行瞻日趨朝喜近天離宫來苑囿馳道絶風煙瑶水廵非逺峒山厯更綿甘泉多法從獻賦憶當年雨水漸衣黒雲沙際日黄烟開纔黯淡日出已蒼涼徇俗髙簷㡌清心小篆香端居萬里念蕙草惜微芳謡俗隨方異溝途隔舍迷醺人唯馬湩勸客有駝蹄殿角孤花靚城隅雜樹低天涯中夜舞如意昔曽携天潢猶白白雲幕故青青積潦摧車軸髙風墜雁翎宫塗丹赭堊殿户紫金釘女樂蓬萊秘哀簫動杳冥幄殿層雲陣轅門積雪峯竒鷹皆戴角御馬盡飛龍瀚海將臨幸云亭望陟封青丘大羽獵有事待𤣥冬曹務唯章句官規自法程齋扉侵雨潤宴几得風清厯厯三刀夢行行萬里城明年遂耕隠深仗酒為名經遊還絶塞際遇復清朝大暑無䝉綌輕寒已御貂盤空虀屢薦觴至酒頻澆貧病諳為客何慚帶減腰公子青絲轡王孫綠􅚫車宴酣風小定舞破日西斜手擲宫中果神行海上槎築郿毋自厚儉徳不期奢水草方方善弓弧户户便合圍同婦女從戍到曽𤣥雪毳千家帳氷瓢百眼泉浚稽山更北畏望斗光懸送臨川謝有源赴閩醫提領一路青山荔子叢華山西望粤西東家風蘭玉庭堦上宫事參苓藥籠中鷁首去乘潮浪白蠣房催薦酒醅紅福州自是炎蒸少臘雪飛花落半空題有源圖巻後官章文學範相同摹印書兼篆刻工猶是古人傳信息雕蟲元不在揚雄贈黄伯中從臨川吳先生卒業因之奉簡夫子祠垣舊巴山闕里門具瞻誰可並友愛益宜尊往卒諸生業行穿百谷村亂流黄濁湧迎宿綠隂繁想到趨凾丈承聞服緒言心將經義治理並聖詮存藻繪終迷質條枚實自根須無遵近軌㑹有企前轅伊闕如堪攬河汾欲併吞道初由巳致舌豈待人捫正要薫陶學全稀色笑温歸装當稛載饋館且盤飱羡爾方朝旭慚予未及昏仰懐駒皎皎深感兎爰爰瑶席今承間緘辭莫憚煩庶幾薦鳳觜兼得嗜龍蟠鯁鱔何勞祝因兹寄不諼陳濟淵龍額山巔崖突出衆峯前隠躍潛龍枕爪眠怪木秋凋露頭角寒泉春湧鎮龍涎身横雲外三千尺眼看人間幾百年莫待始皇驅入海早升雷雨上青天海青怒挾孤風海外來脩翎如劍斫雲開潛身陡縮千尋起得意雄攀上㸃回萬里老拳無脱腦滿鞲英氣不凡村山狻野雉休回首神物無心到草萊萬夀山萬夀山頭尺五天空同直下小如拳五更霧冷乾坤濕六月風酸甲子偏細草已肥燕地馬竒兵先鎖漢江船行人莫問征南事墮看蘇杭在眼前馬伯庸寄邵允文故友經年别如今髪白無清秋江鷺浴長夏野猿呼客舍栖書册齋頭具筍蒲知賢不能薦羞澁望東吳南征積雨關河濕今朝日始晴浮船下夜瀬覔酒近春城鵝鴨將雛出牛羊傍母行獨憐無侣客萬里又南征寄題杜隠居忠學齋徴君家住武夷山白鶴𤣥猿夜叩關船泛清泠凡九曲屋分丹壁只三間世人往往知名姓仙子時時定品班孔壁秦灰天未喪幾多魚豕待重刪桃花馬白毛紅㸃巧安排勾引春風背上來莫觧雕鞍橋下洗恐隨流水泛天台琉璃簾吳儂巧製玉玲瓏翡翠蝦鬚逈不同萬縷横陳銀色界一塵不入水晶宫月華逺射離離白燭影斜穿細細紅相隔神仙纔咫尺靈犀一㸃若為通聶古栢題韓文公祠嶽竒海怪早相知何事中朝未可歸佛縱有靈那在骨僧如得道又無衣符分䑓峽天終定福近宫墻意更微俎豆荒凉誰繼廩摩挲石刻重歔欷過采石采石江頭秋月白蛾眉亭下灘聲咽綉衣玉斧曉霜寒同是天涯苦行客酒仙一去海生塵青山玉尺埋衣巾清江白鳥自今古岸草汀花空復春我欲御風遊八表醉裏髙情覔三島閶闔雲深不可攀回首江南數峯小九華山一名蓮花峰在貴溪江上青芙蓉遥遥隔秋浦九莖風露寒萬壑烟霞古瑶草含芳春青松立亭午安得一把茅移家白雲塢鄱陽道中江上秋風吹斷鴻江頭開遍木芙蓉幾家籬落依紅樹萬壑烟霞鎖翠峰南國風光一盃酒故園魂夢五更鐘舉頭日近長安遂閶闔雲深第幾重九日鄱江里同行諸公滄浪木落塞鴻飛佳節芝山酒一巵黄菊且陪今日醉鐵冠不受晚風吹滕王閣上雨雲黒戱馬䑓前草樹衰何似淵明千古意一篇清絶去來辭琵琶洲昌國寺前楓樹秋琵琶洲畔暮雲愁沙頭潮落灘聲急疑是潯陽淚未收鄱陽和程世民廵警官年少將軍意氣雄乃翁憲府舊乘驄魯中詩禮有庭訓江右衣冠多士風玉樹青葱秋色裏明珠炫爛月華中滕王閣上重回首後夜相思寄别鴻望玉笥山弗克登覧留詩萬年宫西南山水窟玉笥號竒絶羣岫來陂陀孤峰立撐嵲邃洞烟蘿青危澗幽泉咽正是南昌尉于兹悟仙訣一覧快心目洗滌中膓熱嗟予敢告勞馳驅待環轍五月登武夷清流清且冽扁舟九曲中兩崖千尺鐵嵗暮復何之清江夜飛雪山靈似笑我身世苦覊紲願言解塵纓林泉飬吾拙春遊桃葉渡頭春水生長安橋上草長青百年深向花時飲嬴得城南幾醉醒清逺縣尹楊觀政有竒蹟復能詩文民僚服其化士大夫過者靡不稱頌故贈此加勉焉玉節星軺下嶺南萬山空翠雜烟嵐傳聞清逺多佳政花滿春城月滿潭風流文采楊忠肅南北雄竒古峽山怪底蠻江無語鳥絃歌終日水雲間梅嶺題知事手巻黄金臺上客大庾嶺頭春如是無詩句梅花也笑人題碧澗堂在瑞州鳳凰山傳李八百女弟明香真人故居舊有迷仙洞上刻仙容聞説明香早學仙華堂突兀故山顛四圍亭檻青雲上兩岸樓臺綵水邊龍虎丹成知九轉鳳凰飛去已千年旌旗八百俱塵迹惟有坡翁麗句傳萬安縣邂逅一樓偏髙明舊有公畧張憲僉和劉素庵一詩用題於左五雲閣上北風寒十八灘頭叠亂山庾嶺一枝春信早龍泉三尺土花斑蠻烟瘴雨霜天曉畫㦸清香晝日閑倚遍欄杆動髙興一聲道唱水雲間次韻宗道御史過峽蒼崖􅏭嵲奔東流玉節招揺漾彩舟雲鎖千山蕭寺古霜清百尺瘴江秋白猿一去空長笑􅔕馬南來得壯遊聞道遐荒歆帝力家家麥飯老林丘番禺道中玉斧飛霜大庾南萬松蒼翠洗烟嵐雲迷梧野山羅㦸月滿韶江水潑藍椰子漿寒殊似蜜荔枝香暖絶勝柑中朝耆舊如相問鳥語啾啁正未堪和元帥伊埓呼圗克公子强横竟以賍敗同憲岳公齊髙王馬二憲掾實共事云好雨崇朝洗瘴滛越王臺上一登臨鰐魚已逝白波静遊鯤變化滄溟深六祖泉臨千嵗水百蠻航貢五方金九重貝闕雲深處萬里孤雲寸草心題叅政髙公荒政碑廬山挿天千仞青明公髙節逾稜層西江月冷秋無際明公此心清徹底厭渠道上豺虎多手搏不待弓與戈前年魃虐徧南國饑者以充僵者立洪州父老遮道傍上書乞留涕泗滂豐碑大字記荒政要使遺愛如甘棠我來觀風聞此語未見儀容心已許願公從此召赴中書堂早為四海蒼生作霖雨龍麟洲陳平章席上題琵琶亭老大嫦娥負所天忍將離恨寄哀絃江心正好看秋月却把琵琶過别船春日即興四首一夜東風到海棠千桃萬杏不成粧老夫無分穿紅海日拂銅瓶浸錦香二月桃花煖欲然墻南美錦正芊綿底須更覔逃秦叟遶屋春紅即洞仙病來桑扈老媻姗痩䇿東風興未闌野菜黄雲山薺雪風光何處不堪㸔枯藤處處領春華遮莫東風顫㡌紗㸃破蕪菁黄世界一枝香雪小梨花赤壁踣吕摧袁虎視耽阿瞞氣勢捲江南磯頭一霎東風轉天下江山自此三葉友竹名留字景良著聖徳延壽錄為萬世師法資治通鑑君鍳君兮臣鍳臣世間何有敗亡人若還鍳古猶為逺夏后何嘗可鍳殷讀古史治亂睿智聰明允執中萬幾四海一家同奈何生長承平後聞見無非只後官杜竹處恵山寺行殿渡江五馬竟忘歸愁見年年雁北飛千里版圖非故國六朝基緒幾危機烟藏經葉閒僧錫風落松花上客衣前代衣冠已塵上空留碑碣枕斜暉題鄉僧智安石山磊落亭磊落如痴也似頑精神半在嵌岩間鬼工驅得平泉石吟客來逢飯顆山虎伏不驚飛將怒羊蹲誰識牧仙閒詩成个个頭應㸃師亦拈花為解顔元風雅前集巻四欽定四庫