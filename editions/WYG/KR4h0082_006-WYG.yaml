羅浮山下種梅花獨倚西窓看晴雪古來老鳳生鸞児錦雲兩翼星斗披朝浴春風芹藻池夜眠凉月槐杏枝君不見丹山一溪水化作春陽時雨飛千門教渴否苦早木草潤澤生華輝方逹齋真吾師薫風吹我面臯比免使青燈照雨思舒元易聖節詩樂奏雲門金闕髙春風泛酒入蒲萄九重天上尊堯舜萬嵗聲中拜禹臯仁藹乾坤知帝業明同日月見秋毫願推大道為君夀不用瑶池薦海桃偰世南贈墨士魚胞萬杵成𤣥玉應是柯仙得玅傳鉄硯毛錐為宻友何時海上别回仙王𤣥翰南山有猛虎南山有猛虎欲以赤手屠山下一老人見謂爾甚愚沖冠與裂背所詫乃匹夫古來功名士遐攬王伯圖幾先非快意道逺慎前謨奈此謬其逢試之誠已疏竒中或偶然再往類難虞丈夫雖賭命慷慨易長途茍無金石堅何以當變渝茍無忠誠心何以渉﨑嶇斯言願三復歛衽愧弗如吾行庸可驚聊取一笑娛且盡飲斗酒長揖歸衡廬髙况梅擬古楚人有和氏懐壁空待價玉石茍未分胡事哭長夜人生豈不辰物物該造化賢哉荷蓧翁託身以耕稼張南臯贈丹士天地爐中有大丹朝飛東海莫西山一年三百六十粒十粒輕抛去不還危琴樂送芳潤葉道士二十四年凌紫清琪花瑶草日初晴抱琴曾侍群仙宴記得鈞天一兩聲韓中村鴻門宴花膺綉膊帕抹額勇士如門森劍㦸沛公對酒顔如灰主人重瞳光照席重瞳座上身如寄巵酒未吞心巳醉醉酣不辨真天人百萬貔貅眼中睡春融玉帳香風開嗚嗚帳下筝琶哀目前等作萬口計軍聲四面歡如雷沛公唯喏非無意袖中暗挈秦天地此時可想聽得異四面軍聲皆漢騎征婦歎虎頭將軍眼如電領兵夜渡黄河面良人腰懸大羽箭遼東掠地遼西戰一紙紅牋寄春怨十年消息無歸便日長花栁暗庭院斜倚江樓倦針線心憶良人嗔不見手擲金彈打雙燕無術平戎報明主恨身不是竒男子倘妾當年未嫁時請學明妃獻西虜岳王墓妖星墮地芒角赤龍劍悲吼風蕭瑟中原王氣挽不回將軍一死鴻毛擲秦家小児真戱劇播弄造化揺樞極指仇為親忠且逆隻手上遮天眼力九闗茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古坟埋寃血空碧風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斵出荒苔痕獻作吾皇補天石對月吟霜風捲地霜氣乾碧空照水生晴寒天公合就七寳圑何年轉向玻瓈盤婆娑桂樹籠仙窟夜夜飛從海上出遂使時光挽不留盡向婆娑影中沒幾人緑髪紅顔好照見衰顔髪應槁年去年來無盡時政恐月中人亦老客窓見月空沉吟碧紗如霧愁人心燭花撲散香滿襟下堦踏碎梧桐隂憶去年江湖𣺌𣺌白鷗前歸路春風憶去年細雨孤燈村店夢冷烟殘雪落梅天驛行多避官人馬水宿怕逢網吏船行李半肩吟巻重過津恐索稅詩錢况肩吾縣尹題梅巻牡丹池舘閙春殘多少詩人被眼瞞我有癯仙最知已一枝留與雪中看吕元卿晚宿郎官湖半烟半雨樹扶疎畫出元暉水墨圖最是一天秋月白不隨魚課入官湖月夜洞庭舟中陪九江茶漕烏格同知宴酒邊索詩遂賦朔風扇鬢向君山嵗晚霜華為改顔吟望滄浪湘水逺醉歌欸乃洞庭寛那能袖劍遊蓬島何似乘槎訪廣寒莫道岳陽無醉客洞賔元只在人間陳小庭大孤山至湖口大孤大孤何𣺌茫小孤誰説嫁彭郎鞋山對面四十里屹立宛在湖中央行轉清江過湖口波濤如此今何有天公􅂇我半帆風江神勸汝一杯酒章養吾次韻徐可齋嘉禾馬上見寄世事悠悠兩鬢塵始知今古一郵亭草廬春動吾猶懶蕙帳寒生子獨醒萬里關河秋雁斷十年書劍夜燈青東風乂是離愁處芳草萋萋白鷺汀許存吾次韻吳叔㢘山村回文田繞青山好住家短籬疎圃接丘麻烟村逺近棲鴉亂竹㟁髙低飛鷺斜泉噴石間岩湧雪霧浮堤外栁吹花連雲碧色秋風冷眠犢黄昏草長芽劉恭叔夜坐江亭明月出林杪大風吹漸髙軒窓墮圭壁竹樹起波濤隣笛悲歡併江鴻去住勞倚欄惆悵久霜露濕綈袍城中至日我道何曾長城中獨重冬酒殽分市卒冠履祝家公日晷空江見梅花亂世逢故鄉還往在筋力愧兒童葉千林送李石泉風雪令人痩闗河怕酒醒過橋春水緑送客晚山青君馬巳先發我舟猶暫停臨分耿無語江上雨㝠㝠葉天趣感寓顔曽志道徳汲汲思競辰盗跖膾人肝白首甘惡人是非兩忘羊萬古同埃塵何如盡棄置宴坐觀日輪風吹紫藤花䔩䔩沾衣巾興發自一盃陶然太和春秋夜和韻西風何處來鼻觀古香發夜深耿無寐踏破松窓月美人期不至跂望雙眥裂一掬可憐心青燈照愁絶元風雅後集巻六欽定四庫全書元風雅後集巻七元孫存吾編四愛題詠虞伯生江東葉凱翁至京師訪予芝亭之上適予謁告得數見焉見其雅適而端慎介不違于和易不茍于汎知其為孔老通家之佳士也又從知其能以道行交神明致風雨則其素守可知已間出書一巻袖中則故宋遺士詹府僉程國録為其先人成甫氏所著四愛堂詩文也所謂四愛者陶淵明愛菊周茂叔愛蓮又附益以林逋仙之梅黄魯直之蘭者也並植此物於庭户之間而尚友四君子言將同其愛者焉故曰四愛云爾又有所謂半隠者成甫之長子元翁隠于是而求先志焉言半者以其半待凱翁也凱翁言出山游四方非有世俗之求也願得見名士大夫如泰華黄河者得一言以詠四愛焉亦所以報父兄也欲為之序引云夫愛出於仁者也仁者天地生物之心人以天地生物之心為心則玩夫生物之理而見天地之心焉亦無所不愛也而所愛亦豈徒然哉即一物之生而知其與道為體也其樂烏可已哉是故思有以成其愛而非私也我之培煦之潤之附益其不及而防閑逺去其為害者皆其事也古之君子因物以致寓其意焉非溺情于形質之偏也姑以周子愛蓮之説論之竊意夫日用彛倫之間飲食男女之欲同行而異情者非出于淤泥而不染者乎明睿洞照安行無為而不矜詫以索隠行怪者乎非所謂濯清漣而不妖者乎不蔓不枝者純一不雜之謂也亭亭净植者中立不倚之謂也此其所以為可愛者乎推是言也餘二子之意就其所詣安有流連光景之患乎葉君隠居辟地其必有得于此若夫善頌則在能賦者云蜀人虞集敘至順癸酉二月八日吳宗師方今文采重奎章光照芝山四愛堂梅蘂春融氷雪界蓮花晚静水雲鄉湘纍往矣蘭為佩陶令悠然菊泛觴千古髙風猶一日迢迢歸夢楚江長馬伯庸幽蘭有真性佳菊有至節娟娟出水蓮露下玉洗白杲杲空谷梅嵗晏立氷雪屬愛在君子畜之以為徳至順癸酉四月十三日侍講伯生老友子邀予賦詩媿不能工姑此以塞命也祖常再拜馬公辭翰妙天下凱翁珍藏之集髙新甫愛菊隠逸情愛蓮清潔志愛梅違世俗愛蘭絶世累性愛固有殊亦各在適意偉哉四君子趣同而世異人品有定論寓物盡髙致遼遼千載下孰能遵道義葉公逹尚友所愛兼其四猗歟后來人先志慎勿墜太𤣥天師彭澤以節髙春陵以道鳴雙井詩之雄西湖隠而清因其有所愛希賢動吾情爰知君子堂貴實不貴名太乙子東籬秋色净芳沼晚華滋雪落清澗曲風生楚江湄幽景尚依然髙懐邈難追道人繼芳躅千載有餘思老屋四五椽草徑臨清池四時各代謝芬芳常在茲朂哉著令徳永與古人期夏紫清十畆烟霞曲徑深四時佳興足幽尋菊芳梅綻清詩骨蘭秀蓮香肅道心半隠肻堂嚴繼志百年喬木易成隂通家自有全書在閒倚南窓聽玉琴歐陽𤣥葉凱翁來京師受知吳宗師又為名公卿所愛禮得四愛堂詩甚富此行真不虛也為賦五絶亭亭净植自中通千古知心太極翁幾度廬山㸔明月玉簪浮出白龍宫右濂翁愛蓮粲粲中央色不偏風霜揺落義熈年男兒一種剛腸味不讓隆中老子先右淵明愛菊紛紛桃李下成溪騎馬山人聽曉雞如此暗香相慰藉徴書猶到六橋西右君復愛梅榦少花濃雨露深政縁猶有市朝心豫章太史春秋筆不遣山王預竹林右魯直愛蘭涪陵翁解識㫪陵薛映何如刺史𢎞葉氏堂中和尚友不縁花有愛和憎右葉氏四愛堂廬陵歐陽𤣥揭曼碩蓮菊梅蘭四愛堂父兄子弟愛無忘對花便擬書徴士學道唯求接素王孝友家傳人所羡横斜句好興偏長百年心賞千年意一種風流四種香王倫徒原有梅兮隰有蘭君子之愛何幽閒陟崔嵬兮履潺湲胡不歸樂山之間㟁有菊兮渚有蓮君子之愛何清妍雜佩有贈勿棄捐胡不歸兮樂嵗年瓊臺石室何威夷親之所愛子所思托根厚土深且滋春雨秋露無巳時王士㸃予所愛兮崇蘭植之兮堂間思夫君兮山谷紉翠佩兮雜青綸蘭芳歇兮日在山欲從之兮不得閒予所愛兮脩蓮植之兮堂前思夫君兮濓之水濯冠纓兮叩漁舷蓮馨富兮水泥烟欲從之兮不我賢予所愛兮秋菊植之兮堂隩思夫君兮柴桑巾漉酒兮杯生馥菊英黄兮江波縮欲從之兮不我復予所愛兮湘梅植之兮堂隈思夫君兮淛之湖吟清淺兮句容裁梅枿素兮雪飛埃欲從之兮勿予猜謝草池梅蘭蓮菊各争誇風月平章屬大家四愛堂前親手種乾坤生意四時花詹厚齋友人葉成甫世家永豐梅林而松溪元貞丙申動適彼樂郊之想慕孟氏三遷之風徙居睦樂池頭相厥幽勝結廬三間竹樹茂美一池灌園手植梅蘭蓮菊又取濂溪淵明和靖山谷諸老之説揭中堂榜曰四愛以寄四時雅興清矣哉且以永日且以盡年有以自老矣而數僅中夀二子元翁凱翁皆恂恂善與人交凱遊方之外元好脩而文於屋東偏闢小室號半隠面修竹竹外憧憧而囂塵不到清琴横床儒書堆案不矜名不眩能能世其家而大之者余每過之喜其有隠者趣為之賦小詩四愛名堂名匪誇梅蘭蓮菊當傳家誰知半隠琴書趣出色堂前四愛花程登庸元翁出詹同舍所為四愛詩正有契於予懐去年夏予訪詹山道過焉愛其顯而隠駐車縱歩者久之意元翁仙是未逺也今乃知經始于成甫而元翁復闢半隠以居琴書于是更肻堂矣蘭蓮菊梅分四時而専美合一堂而集芳受乾坤清氣者夫誰不愛然父愛之子不翦之者已無况推其所以愛之者而隠焉又充所以愛其身者以顯其父母焉吾知元翁之愛不徒在是而九原有知所以愛其子孫者又甚于愛是四者矣是則蘭在庭階尤宜若夫春秋之異其時山川之異其種湯佩之異其用説雖不同義同一隠至若實與蓮同一夏葉與菊同一秋色與梅同一冬又有無時而不春者先四愛亦宜然則上堂如有見也出户如有聞也人知元翁之愛未必知元翁之思也既以是諗來者其季吾徒也又以是勉之吳月灣梅蘭蓮菊儲天地之清氣洩山澤之幽芳春秋冬夏各專其一時之美露生之物以臭味見取于人者未能或之先也孟方王君示余以詹山老先生所為葉氏半隠四愛堂記雋永數四筆芳墨潤流溢頰舌間但覺四物之美並萃于一朝而忘其為草英木華之迭出于四時也蓋昔之鍾是愛者吾聞其人矣屈子之于蘭也淵明之于菊也茂叔和靖之于蓮也梅也匪徒愛之而已其人品實似之故以蘭配屈以菊配淵明蓮配茂叔梅配和靖人莫得而易之者世之稱是四物而是四賢也已可不言而喻矣是豈偶然者哉且四賢之愛是物也亦各取其一耳而今也以四愛名堂取四賢之所取者兼而有之不已㤗乎是殆不然詩云髙山仰止景行行止愛以四言則四時之見是物也如見四賢焉聞其風而興起所以自處者必有在矣徒愛云乎哉抑以其半隠名者得非欲沐蘭之芳翫蓮之潔而徘徊菊梅之間也歟孟方其為我質之詹山延祐􅏤申至後同郡吳存敬書彭孟老老人與成甫葉君友甚稔予亦從侍次識之今去之十二年而兩家子弟復胥于榮山慨二父之不復作且出四愛堂詩求和予為之掩巻涕零因次韻以志二士之感云免胄宗風衆共誇當時二父許通家重來四愛人何在淚濕斯堂幾度花李進齋喜怒哀懼愛惡欲人之情性之發也夫愛七者之一耳好尚于是乎觀之愛其所當愛者天理之公衆人之所同也反是則人欲之私一已之獨而巳葉君成甫植蘭蓮菊梅于庭以四愛扁其所居之堂以為四時之可愛者莫是若終其身不渝元翁之愛之視成甫益加既又築室于堂之東曰半隠其意若曰是隠者所愛也則能繼其先君子之志豈特同乎衆人而已哉然而草木外物也内而禮義之悦心有甚于愛是四者即其外以信其内則無一物不在所愛之中矣元翁心醇而氣清進之以道則由愛親以愛人愛人而愛物知所差等夫孰非性情之體用乎行矣堂且顯而隠不終于隠亦半之謂也元翁勉之葉氏世家梅林于予為同里今所居曰睦樂已一再遷予因記之亦以寓閭井之愛云爾至治辛酉孟冬李晉敬書李絅齋余曩嵗與里中葉公游君數數為予言吾先君成軒之遷居睦樂也林木薈蔚屋廬靖深環植梅蘭蓮菊取前賢題詠揭諸壁扁堂曰四愛以為游息之所地偏心逺庶幾乎古逸民之風焉子盍為我記之余適走東西未暇也越一紀返吾故而元翁已謝世矣追念舊游如夢而覺元翁恨不可作記其可以不作乎余惟天地以生物為心而人與物得之以為心是以善觀物者知物之理無以異夫天之理也故觀糓種可以識仁心觀牕草可以騐生意視葉君之愛同一機耳愛属仁仁非天地之心乎以我之心體物之心而天地之心可見矣所愛其不在茲乎或曰草木之可愛者蕃矣四者之愛抑豈有所擇歟曰非也夫人之心静躁不同者好亦異故悦紛華者必朝市奔競之流甘淡泊者必山林遺逸之士譬諸草木吾臭味也世固有愛牡丹而誇國色者矣愛海棠而羡紅粧者矣甚者碾綉轂而縱春遊燒銀燭而酣夜飲者矣彼之所愛不已淺乎吾恐物交物引之而已矣人欲肆天理安在哉必也滋之以九畹而弔湘纍之孤忠採之於東籬而慕處士之清節誦净植之説吟香影之詩又若親炙濂溪之旁而徘徊孤山之下也同前修于千載萃四愛于一堂目擊而道存心領而神悟吾之所愛不已深乎所得不已多乎若曰天之生材必有所為言其體不及其用可乎胡不即是四者而觀之蓋浴湯可以事神飲水可以延夀或分甘而念母或調鼎而相君用耶非耶是猶一念之愛擴而充反而求由親親而民物無二夲也用舍聽之于天吾無所容吾力而天之所以與我者可不知所自愛乎元翁之子可順好學而多藝是理也其知之矣今以季父凱翁命來速記且曰願無忘先君之好故樂告之亦以寓予掛劍之意云至順辛未嵗七月既望里人李粲記朱訥山成軒葉君捨梅林故家而三遷睦樂池頭結廬退隠蒔蘭種蓮栽菊挿梅以取四時生香不斷之意桂子蘭孫又能繼志述事誠可嘉尚敬歩詹山髙韻繕寫呈似幸恕其率文炳載拜相傳清白事非誇翁季同心有幾家賸喜生香香不斷蘭蓮梅菊四時花幽香净植搃堪誇老圃秋容别一家雪後暗香吟興逺故林還有幾株花梅野詩敘虞伯生近代楊補之作梅自負清痩有持入徳夀宫者内中頗不便于逸興謂曰村梅因自題曰奉勅村梅集嘗見故家有藏徐熈墨杏花者用筆圓潤有篆籀法亦恨楊不能知此也今監書博士丹丘生忽用此法寫生大快人意存渾厚之意于清真去衰陋之氣為纎弱所以為佳也譬如少陵煩花晴昊之雄壮視昏月淺水為何如耶樂平錬師葉凱翁舊號野梅予曰以野標梅未足盡梅之趣以梅名野庶乎廣莫之風請更曰梅野而以丹邱之畫冠之永作証據使錢塘臨江二君聞余此論猶當俯首歎伏也虞集詩昔結絲絇侍帝宸青鞋今許向江津憑君先付梅花説白髪相看意更親初凱翁先欲南還欲僕作詩送行而僕今先有行色故為題此為他日一笑之資也詹厚齋江路夢初回猶疑香是雪野意正微茫疎影寒窓月元風雅後集巻七欽定四庫全書元風雅後集巻八元孫存吾編真山民陳雲岫愛騎驢君不學少陵騎驢京華春一生旅食長悲辛又不學浪仙騎驢長安市凄涼落葉秋風裏却學雪中騎驢孟浩然冷濕吟􅌱敲吟鞭梅花溪上日來往身迹懶􅄆人中仙有時清霜松下露松風蕭蕭驢耳䜿㨿鞍傲兀四無人牧子騎牛相爾汝勸君勸君但騎驢行路穏姑徐徐九折畏途鞭快馬年來曽覆幾人車江學庭同知旴江人題雙紅橋雙虹鎻湖湖水長影揺洞庭吞三湘霜飛八月橘柚熟我欲打舡聞水香晴天晚照過湖曲厯厯逺樹波茫茫客中有懐不得盡無人同上三髙堂揭希韋送人上京天上吟仙笑相覔松間坐客飯青精真遊不知白日晚身世相與浮雲輕冥冥落花啼鳥静窅窅風燈寒泉鳴丈夫邂逅志萬里滄浪水清宜濯纓許伯昭縣丞荷花艶態繁粧似六郎汙泥不染豈尋常西湖十里今非昔何處笙歌有異香相者玉鑑石中求玉誰之玉鑑上無塵知幾塵除却江東雲谷子眼髙四海許何人謝南窓縣尹送人北上風雲萬里思帝鄉匣劍夜夜飛神光山林嵗月負疇昔鷄鳴裹飯挑書嚢我觀蔡君自竒士玉壺氷壑清如此終然未泄磊落胸朝朝問道川江水水暖飛舸輕河曲長淮清古人成敗生眼底莫為感慨牽閒情黄金䑓上需賢急行矣去作新豐客當今太平十二䇿他年語我須厯厯黄朴齋縣丞酬趙倅鷗渚時秋望河漢二氣相循環姹女嫁紫車千秋方生顔生顔一何好身與浮雲閒入宴東華䑓出游蓬萊山振衣徃從之杳𣺌不可攀貽我金玉章化此鐵石頑長懐學道人紫氣占函關幽居幽居無别事野興足清歡置石妨書案移花傍藥欄蔽門松老大夾徑竹平安自與兒童語從來耐嵗寒周老山和蓮渠貧女吟妾無千丈䋲雙丸任渠犇妾無一星金竹笥空長存孤燈耿寒績一春不出門母家今何在血染雙啼痕雖然貧未嫁嫁了那忍言古來惟玉奴不肻負東昏嗟來市門倚父母豈不思懐友里陌依稀故友廬一生一死竟何如烟荒樹影誰留劍秋老蘆花不寄書數㸃夕陽鴉載犢一拳秋水鷺窺魚世間何事非焦鹿天地無情可奈吁平山來盱平山先生桃源隠君子也不見數年矣少微一星忽見盱壘比争先覩之出處語嘿有道存焉小子何足以知之徳公不出城亦必有以也人住桃源意自春蓬萊弱水𣺌無塵擬隨陶令尋歸路却訝龎公肻入城水弔晉題應有句碑捫唐刻豈無情太原漁者無勞問盡識神仙真姓名贈數者吳洪範先天妙算泄河圖天後精微寄洛書獨在明夷説箕子聖人微意果何如宇宙由來厯幾秋盛寒偏在五更頭後來誰有天津耳每到斜陽怕上樓酬李鶴雲江城寒寂厯菊欲為誰秋夢裡闗河隔愁邊嵗月流翩翩雲外鶴泛泛水中鷗何限斜陽樹無題莫上樓曾徳厚水底梅虛明元不累形骸花信仍須日月催雲母帳空𤣥鶴怨珊瑚枕卧老龍猜夀陽宫女凌波襪白水真人玉鏡䑓悟得一般清意味振衣長嘯歩莓苔題耕隠堯舜吾君堯舜民一犁新雨一簑雲灞陵山上齊眉者嵗嵗春風欲獻芹周梅邊贈墨梅士我家丹霞梅一枝玉為骨似氷為肌平生不受霜雪欺世上塵土那能緇此花自是天上竒君能㸃染超補之筆挾造化梅不知相逢一笑添一痴春風滿意桃李蹊豈復顧此寒與微庭前夜雨春漏遲一聲山月聞子規周溪邊贄撫州章萬廬盱江相去無百里我聞公名諠兩耳聞名十載猶未面便似未曽來擬峴一來邂逅及五峰人言我盍一見公公之勳名宣宇宙文武全才今未有章公得象是相家異時公亦當宣麻我來見公無他事為公欲求四大字區區蓋頭一把茅一如鷦鷯深林之一巢又如窮僧貧道寕忍餓却向齋堂敷床展席施粥常滿座喜公筆墨妙更精須公大書特書大姓名為吾四溪寒塾傳千載之芳馨臨川自昔有墨池善書無過王羲之羲之但能作小楷今公字畫又更大我來一見萬户侯識公便是韓荆州軍中撫有百萬之貔貅門下豈無三千珠履之英游長歌歌已語未休問公還能一為握髪否周幕溪岳陽樓乘風來叩洞庭君送我樓心慰舊聞水憤荆湘江欲合天隣吳楚地曽分千㠶過雨紅揺日一島撑空翠擁雲嵗月悠悠閒獨倚若為憂樂話希文黄誠性讀文山集三百餘年樂育恩晚從科目得斯人﨑嶇嶺海期年國零落毡毛萬死身諸葛未亡猶有漢包胥欲泣更無秦挑燈慷慨歌梁父鬢髪蕭森動鬼神傅東郊鐵環歌傳言京使舟次漢陽次日扼泥挽不起聚賈舟起之得鉄鎻長莫可紀于是鎔作數百環懼而復投之水或曰吳王作此鎻江也楊廷秀得一環以示予異甚索歌誌之楊君手執一鐶鐵吳事驚傳向人説横江鐵鎻是何年千古沉淪共魚鱉抗津扼險尚豪勢毋乃當時謀計拙想當爐冶力錬時一國生靈走炎熱火燄連空氣吐雲此鎻得完農噐鐵益州刺史龍鑲東火冷烟消吳已滅英雄有恨在天地淚入江湖流不竭蓬萊使者都水衡夜泊溪陽江上月挽船欲去不可起倐聚千艘同撇捩馮夷震懼蛟蜃驚千丈連環中斷絶重如金石鏗有聲猶帶吳人舊精血天教尤物出人世豈誠奸邪毋僣竊方今聖化開隆平四海車馬同軌轍君從何處得有此直欲珊瑚隨手裂紫金白髪世所珍往往貪惏作妖孽願將此鐵示兒孫滄海揚塵須共閲不然化作莫耶精斬取長橋蛟百截山行松老崖空樹欲傾緩行微歩荅新晴春深雨過花如夢風暖鶯回樹有聲縹緲蓉城雲作户依稀緱嶺鶴吹笙惟應眼底皆詩句一夜推敲直到明和荅兆五姪青年那似爾白髪已尋余負郭耕無畆傳家業有書士貧天理定老病世情疎雅得陳元諒時能問索居次韻東岩琴碁書畵四美人圖宫槐葉暗午風清閒弄瑶琴寄此情祗恐闗睢風已變調哀絃促不成聲沉機黙黙對枰棋妙着緘情有所思誰信華清當局者峨眉風急馬行遲李氏夫人信手揮書名千古出中閨盈盈錦上回文字不有詩人為品題玉軸輕輕巻復舒内中名畫世間無可憐山店兒啼夜不似文姫别虜圖黄季嬴候張伯陽州判不至奉寄海風吹􅄆虜山雪洒向瑶䑓照明月因之欲訪三蓬萊望斷雙鸞翠烟滅且持寳斧窮南溟片㠶飛渡遥山青幽尋丹碧採芝草松風竹露春泠泠江邊忽遇蟾宫客江草江花盡相識春風一笑訪驂鸞三十六峰搃春色峰顛孤鶴飛且鳴徘徊似欲難為情雲深林暝杳莫辨時時照影臨溪清我時感此生幽趣笑折瑶草寄仙佀白鷗飛去猶未來門掩青山更風雨登幔亭有懐杜清碧先生浙游幔亭髙聳碧天寒杖履躋攀香靄間澗竹吟風將過雨岩花笑日伴雲閒遥憐浙水生離思獨立閩山想别顔極目㑹稽何處是孤峰落落水潺潺劉叔逺寄黄士謙放歌出東林思弄川上雪清風吹湖波驚􅄆波上月美人載美酒舉棹揺秋霜把酒勸青天青天忽盈觴揚㠶掛白雲鷗鷺同飛揚歌罷一長笑忽然江水長懐君不可見流恨滿瀟湘熊澗谷木綿歌秋陽收盡枝頭露烘綻青囊翻白絮田婦擕籃採得歸渾家指作機中布大兒來覔襦小兒來覔袴半擬償私債半擬輸官府竹籠旋着活火薫蠧虫母子走紛紛尺鐵碾出瑶空雪一弓彈破秋江雲中虛外泛槎成索晝夜踏車聲落落車聲才憐催上機知作誰人身上衣小女背面臨風泣憶曽隨母園中拾覽鏡鏡是何年製我是何年生朝朝長見面相對如弟兄昔年照我時如弟顔色好今年照我時如兄顔色老願鏡團團光皓皓兄弟百年永相保鏡中覧髪昨日一須白今日一須白次苐白欲盡白盡何須摘人頗笑衰朽我自謂竒特賴有古鏡知元不拒老色却思父母恩對此空歎息秋日江村短短竹籬三五家獨樹作橋横淺沙山頭昨夜雨初過秋水一村茨菇花元風雅後集巻八欽定四庫全書元風雅後集巻九元孫存吾編冨珠哩翀題周益公墨跡今觀益公帖老氣肅鋒鋩孫氏青毡永宜開寳墨堂題益公荅孫魯齋帖丞相裁詩荅布衣殷勤辭翰搃珠璣秋風吹落蒼松樹二百年來此道非孫義方夀慶堂誰似孫家鶴髪親昇平重見至元春主兒不必公侯貴日聚詩書福縉紳理伯容江西憲掾餞陳中山渉羡一樽酒别我同年兄同清更同苦春曉都門行南樓又相識即别難為情浩浩長江流忍聽陽闗聲甘恪餞理伯容赴江西憲掾朝辭江漢水暮宿匡廬山番易匡廬下中有蛟龍闗龍君閲出久風飄司往還理子賢良資神鬼敢有奸逍遥十二仙遲去聲子湖之顔髙髙肅政䑓去去登清班坐觀黄鵠起邈焉不可扳端逢縻處士文酒樂餘閒陳是若餞伯容南浦秋髙蒲葉黄驄馬行行之豫章渥洼神骨特竒俊龍沙勁氣故蒼茫貂蟬入直月未曉􅞄豸當途劍倍光人材已是科名得送君猶是望文昌劉孟曄餞伯容沿檄東行玉節光匡廬雙劍照寒芒文星移次傍南斗楚水餘波及豫章白簡分明千里月清標氣肅九秋霜斯文幸托蘇天庇泮水春融芹藻香劉夢羲餞伯容白髪重游漢水濵爨桐幸遇按絃人詩書潜玩簟瓢樂山水清幽戱筆新天霽蟾宫髙獨歩霜寒栢府寂無人一樽好共南樓月别棹西江浩蕩春張小山四明人次韻酸齋君山行蜀江湘流合千里中有蒼崖壓秋水仙人金冠坐鐵船反披紫裘初醉起小龍二女相從遊眉山低壓青黛羞寄書不通雙淚流三十六宫明月秋花邊閒䄂玉堂手老來頓覺嫦娥醜岳陽樓下喚開門神仙幾年曽醉否抉雲老鶴去不還青青一㸃天涯山天劍歌將軍躍馬來南荒腰間古劍白練光鸊鵜塗香魑魅泣寒芒熠熠勾陳蒼龍髯髙釘珠堂月玉華曽拂樓蘭雪為君盡斬奸臣頭天狗三更下䑛血章伯亮雲南人次韻唐佐自京庠歸覲天邊清湛如璜水筆底生春多秀士摩空三百六十字凖擬明年獻天子西江千樹梅正花家人祝鵲催還家愧我汗青頭欲白夢到雲南與天地行路難奉君七寳鳳凰之綉柱五色麒麟之錦裳王母九霞觴中之酒秦女萬縷爐中之香去年紅花今年開昨日紅顔今日老一生三萬六千日歡日願多愁日少對吳歌㸔楚舞歌舞忽忽變今古歸去來莫行路拜特穆爾唐古氏溪山春曉興來無事上幽亭雨過郊園一片春路失前山雲氣重帆收逺浦客舟停笛笙野舘二三曲燈燭林炯四五星坐久不堪聞杜宇東風吹我酒初醒趙由儕述祖詩悠悠我祖始于軒丘撫厯髙陽秩秩大猷爰自伯益舜錫旱游中衍事商造父御周征彼徐方熊熊有功邑于趙城大河之東建氏晉國耿先其封成宣喻日畏夏愛冬㟁賈作難嬰臼立孤襄子始大常山得符於赫列侯懋建丕圖肅矣武靈兆配有虞西漢子都生長河間暨于唐末今族居燕卜遷大梁世系綿綿厚徳豐功宜永其傳中罹多難南厯江沱眷焉吾宗豐水居多百川有原衆條有柯庸脩家牒克俾無訛顧予伯仲憂患多更瞻歎古烈自愴其生其生豈偶三辰垂精徳業未進敢不戰兢我心伊何常念厥初感彼霜露愴焉踟躇奉先如在宗戚相於亦有諼草髙堂可娛惟忠惟孝立身有夲嗟爾後進朂哉自勉萬有能銷斯道無冺温恭朝夕云胡不謹顯親揚名俾昌俾熾善保家聲期于勿替尚念前人留心譜系受天之慶逺及苗裔臨川吳先生讀之而歎曰純粹忠厚自徳性流出油然冲和之意真古人之詩也盖其有夲是以若此又曰中山年少于吾吾不敢以友命之也㤗定甲子十月十九日國子司業蜀郡虞集書思親詩予讀魯齋許文正公七月望日思親詩因見其天理沛然自胸襟流出永感者聞之必増其悲具慶偏侍者由此寕不加敬自思兄弟往年當䘮亂之餘不幸失怙藉慈母教養成人真昊天罔極之思也輙推廣其意而述五言古詩一篇五十二句以紀平居之懐納之書藏將示後人俾知所自云爾􅏤戍嵗二月望日中山居士趙由儕識一自先君逝行將四十春音容尋日夢感慨試詳陳巳歎生縁淺還思故國屯吳江悲血戰粤嶠困車轔共叱艱危甚尤驚賦斂頻朔風吹廣野赤日照流塵既洒呼天淚方為辟地民撫時非往昔感憤竟湮淪翕霍傳梅外倉黄問水濵諸孤隨弱母大慟向秋旻越嵗寕戈甲歸鄉辦穸窀酹觴號雪夜扶柩履霜晨家緒中微甚人問事一新孩提慙不肖操守賴慈親絡緯燈前教䄡䄖膝下馴田廬勤保任門户幾憂辛文獻由先徳扶持荷化鈞宣華明晚景荆樹際芳辰眉夀斟瓊蟻春暉奉綉茵雖非登執要自不厭清貧努力尊天爵勤心報大倫歸全期不忝化俗異還淳信墨存家乗傳芳待後人年年思雨露嵗嵗省松筠至念通天地長歌感鬼神珍藏歸韞匵大孝慕終身郭君彦真定人海東青海東俊鳥異鵰鶚金晴玉爪不凡材八月風髙度海來劍翮怒斫雲陣開虞人設網心獨苦獲之不敢觸毛羽為言此鳥獻天子年年進入明光裏驛使長懐萬里憂傷者還同殺人罪君不見唐太宗魏公入奏久未去不知鐵鷂死䄂中小臣但願聖皇脩徳放此鳥自有鳳凰逺啣瑞圖飛下五雲表入京五首虎踞龍蟠十二門王侯第宅若雲屯百蠻入貢天威逺四海朝元國勢尊曉日旌旗明禁路春風簫鼔沸名園唐虞堯舜今皇是未必江潭老屈原蓬萊御氣挹晨赮萬國河山擁帝家金殿勢吞滄海日玉樓光映赤城霞巨鰲偃蹇乘丹闕舞鳳飄颻翼翠華遥望至尊遊幸處六龍髙駕五雲車鳳凰城闕壓金湯龍虎旌旗䕶未央萬國衣冠朝玉座百蠻歌舞進瑶觴花迎宫扇紅雲曉日照天袍翠霧光江海小臣無以報空將詩句美成康大明宫闕勢岧嶤萬嵗聲髙山動揺金殿九重明日月玉樓十二挿雲霄青絲馬上王孫貴丹轂車中趙女嬌自是鳳城春色好肻將心事許漁樵翠輦毡車往復回風清九陌障黄埃錦袍公子呼鷹出茜㡌僧官躍馬來雲外笙歌聲宛轉水邊樓閣勢崔嵬少年自有㸔花興欲賦觀光愧不才野寺晚景寺對清溪水遶闗冷然鐘鼔翠微間樓䑓無影日沉海松檜有聲風滿山猿嘯石亭遊客􅄆龍歸雲洞老僧閒詩成一笑歸來晚獨掉扁舟泛月還送泗州同知偰世南赴任夢喜三刀驗之官正少年龍纒倚天劍虹遶載春船淮泗名先振湘潭政可傳門闌多喜氣屢見出英賢錦衣臨泗水仙境足吟哦煙樹連淮逺雲山入楚多濟川功不少經世意如何㑹見沙堤上春風响玉珂西山道院幽居絶瀟洒深院鹿成群山色開窓得泉聲隔竹聞猿啼臨水樹風送渡溪雲客至渾無事談詩到夜分宫詞宫娃辮髪綰垂鬟嬌面團如白玉盤出入紅門能走馬綉衣縹緲似乘鸞年少宫官着綉衣麒麟寳帶束腰圍日斜醉出金門裏騎得龍閑白馬歸閒居春晚深巷絶行人一鳥鳴髙樹不知春色深花落夜來雨早春湖上栁芽黄淺不勝春沙暖泥香草色新鸂鶒雙飛湖水濶相思愁殺倚欄人秋郊路穿黄葉林馬嘶秋色裏白鳥何處來飛下野塘水張鳴善平陽人李陵䑓晚眺雲黄沙白遶平原獨立崇䑓思黯然地僻尚知秦逺塞草青不是漢新年非慚歩武賢王後反欲捐生太史前誰謂茂陵明似日重光惟照漠南天秋興亭次韻巫峽秋濤萬里長荻花楓葉亂蒼茫青山礙目無閒地白雁牽愁有夕陽神禹栢殘扶大氣長庚星墜静南荒已將今古同行客何必登臨憶侍郎題史橘齋山水手巻神仙中人丞相子五色玉立瑶池芝謝傅風流歌舞處羊公慷慨登臨時興來酒洒雲烟遶身後名隨日月遲安得飈車從上下蓬萊指㸃看參差見釣者宇宙俱為客江湖獨釣翁笛聲吹海月竿影倚秋風天定行藏拙時清禮法通古今惟范蠡落落幾人同送人游廬山曽到匡廬境巉峰際碧空萬松無路入一水與天通白鹿眠晴晝青猿嘯晚風洪厓如可約吾亦訪雲中次盧參書御溝水韻二首華清波色漢陽溝不似粼粼暖緑柔飄盡上林紅萬㸃又從天上送春愁堤頭春漲碧琉璃堤外春隂海子時同是玉泉山下水可憐波浪太參差員怡然闗中人送陳文理還京師十年不見老元龍髯鬢蕭蕭帶朔風萬里闗河秋月白九重宫闕曉雲紅功名有分皆身外聚􅄆無憑似夢中問我能來定何日移家今在五門東元風雅後集巻九欽定四庫全書元風雅後集巻十元孫存吾編訪原頭范君才長憶原頭范隠君我來踪跡不相聞林鳩屋角啼清晝山犬籬邊卧白雲藥石猶能資疾病丹青元不畫功勳藻陂家主應遥念一路秋陽草樹薫脩琴桐梓年深半裂開嶧陽道士獨憐才細磨蛇腹秋風起輕鑿龍池夜雨來此日銘邊重注字當年爨下欲成灰何時試鼔陽春曲預拂空山小石䑓月中桂雪風吹老樹婆娑輪滿芳枝長漸多萬古秋香懸宇宙一枝清影照山河雲間啣子無黄鵠天上㸔花有素娥折向人間應不識九重清露濕鳴珂寳應寺塔五色雲中現七層不知何代法門興歸來逺客長迎望老去閒僧已倦登金鐸無聲風不起寳瓶有影日初升時聞梵唄盤空下知是檀那夜施燈楊信可臨江人和揭曼碩兼懐武昌名勝親友日以疎江漢日以深孤雲懐海嶠倦翮思長林終然念所知沿流動悲吟豈無後日期邈若隔千岑安得好風來冷然入中襟日與親友㑹微言自規箴和盧子儀寄懐盧肅政止巴陵王侯人生有知遇永懐不可忘俯視萬丈淵仰睇千仞岡青山何其髙江水空自長忽憶石澴叟别我半載强昨者從湘中嵗晏歸朔方孤舟渡淮水遺我滿滄浪迢迢天際雲青青陌上桑次韻酬吕文學後㑹未可必前路轉多山鷄鳴發孤舘蒼凉雲樹間俯視清溪流仰睇髙鳥還念此别離情南山正孱顔鹿角站阻風風送洞庭沙維舟隠荻花水枮魚上罶秋老燕移家日暮長河急天寒去路賒故鄉三十驛歸夢遶天涯奉別存初郎中臨湘月下泛舟西風吹老白蘋洲天上郎星月下遊過雁影沉湘水碧斷猿聲入楚山秋歌翻白苧猗蘭泣夢落黄陵帝子愁夜半鐘聲天曉角猶疑身在鳳池頭望池州作黄蘆瑟瑟草油油樓閣參差瞰碧流萬里長江秋色逺一㠶斜日過池州鄧徳良南昌人渉圃林塘草樹接江干一日三回渉圃㸔白雁不來縁地煖黄花微痩覺秋乾隔溪烟火人家静傍水樵蘇野氣寒柴户反闗生事了晚松種罷雨漫漫晚眺晚歩從容出薜蘿吟詩聊當竹枝歌寒流漸縮溪船少臘雪不成山霧多官賦人歸荒嶺路野燒烟起夕陽坡江鄉盡處閩鄉近老盡塘蒲無雁過送陳杏林赴潮州醫學教授三千驛路上灘船九品醫官半百年藥市得錢添月俸杏林收穀當公田北書漸覺江鴻少南食初嘗海鱷鮮不用越巫驅瘴癘家家傳取衛生篇寓舍春晚柘隂初合豆初畦門掩春寒落絮遲薄暮一樽還獨酌坐看微雨濕荼䕷中秋憶家千里星河一鏡圓杜陵児女隔秋烟遥憐此夕柴門裏相對清樽説去年早冬過聶氏西江别墅紅葉青山載酒行山人新結野庵成西簷一樹梧桐好他日重來聽雨聲清景亭邉秀作堆竹聲松影共徘徊野藤繞屋多秋實時見山禽引子來李宗冽盱江人題嶽溪禪林精舍朝遊適嘉霽遂暢尋山願厓日破層隂晨經罷幽殿年深樹益繁像古閣重建夜來天地霜松色了無變宛然巉崪間廬岳復茲見山僧四五人屢訪期識面和傅伯永月夜泛舟夕霏巳掃林緑波際遥天浮雲蕩倒影相與渡清川愛此山水趣聞歌心益便沿洄隨意逺落月照歸船古隴頭吟天寒隴水嗚嗚咽夜領銳兵從此發海風吹人眼欲枯上隴猶㸔嶺西月悲笳蕭蕭霜滿天十里一堠烽火連去年初度彈筝峽今年復引月支泉從軍辛苦事征討將軍功大殘兵老秋夕江上水舘螢飛入沉沉夜未眠衆星揺雨後孤月轉河邉草木寕悲候江山不記年忽聞吹管急况有估人船代項氏怨并敘燕山項氏其夫江南人行賈燕薊間聘項與居未幾夫死項時年二十奉柩回江南誓以夫餘貲養姑以自終比至姑改適項勵志孑居以守夫祀余憫其事而賦之少無依倚老何堪白髪婆娑亂不簮夢裏尚思江北好悔將夫婿𦵏江南贈深上人處處隨縁到經年此托蹤不言鄉國逺惟指對門峰王尚志臨川人暹國迴使歌并敘暹赤眉遺種天厯初嘗遣使入貢今天子嗣位繼