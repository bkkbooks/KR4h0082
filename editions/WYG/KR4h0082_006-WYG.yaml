黄龍宻衛至尊臨睡翻一榻風寒凛坐暖重茵夜色深門外飛花天地曉爐邊定䇿帝王心玉笙吹徹江南雨人擁羅衾正醉吟嚴春山撫州人韓王堂雪帝星夜度紫薇宫滕六先驅擁玉驄立處袍生風絮白坐間烟暖地爐紅宋家數百年天下普弟兩三盃酒中榻外有人方鼾睡夢回花月小樓東葉水村龍泉人伊川門雪游楊侍立户屨天寒侍講帷先生暝目坐如尸丈函立久已潛悟尺瑞積深渾不知白室虛生初見頃紅爐㸃化且休時一家教法清和異伯子春風更可師袁安道袁安卧雪髙卧洛陽世界瓊瑶别一船出門半歩即風寒飛花上下山河異卧榻中間天地寛無過客來行迹少作干人態此時難立身大節當然耳豈意清髙却得官陳應江李愬灌雪襲平蔡柵玉龍戰罷舞殘鱗常侍乘虛夜進兵槽馬疾騰乘殺氣池鵝亂擊雜軍聲文城風急嚴師律洄曲雲低壓賊營士女迎門笑相語曉來春滿蔡州城王劍川王猷溪雪訪戴安道心事微茫剡曲流夜寒風定六花收山川一色天如畫上下交光月在舟自醉自吟懐𣺌𣺌興來興去水悠悠歸歟怕折堂前竹首問平安如昨不李䝉齋李及郊雪訪林和靖漠漠長堤溢絮漫使君來叩隠君闗天寒誰信五馬出湖凛惟隨一鶴還林麓清無群從混梅花冷伴二翁閒他時白集歸舟月别去先生不汗顔陳天霽蘇武羝雪北海守節海上間闗十九年孤臣凍死不呼天忍將膝與羊俱跪誓把心同節共堅衰鬢霜飛甘卧窖剛腸氷透只餐㫋當時不為求芻故千古髙飛只凛然鄭溥鄭綮驢雪灞橋吟思長憶飄然灞水涯此時此景客那知風前䇿蹇蕭蕭逺橋外冲寒去去遲飛絮一鞍披野服落梅雙鬢染吟髭思清如許寕無句定恐當年有逸詩孫平齋孫康書雪夜映讀書偷光不肻學匡衡千古先生以介名造物憐人共清白夜窓無月亦光明恍疑黎杖炊烟照誰信銀河剪水成他日烏䑓霜凛凛依然氣槩老書生劉南金歐陽詩雪禁體題詩鹽絮飛飛語濫觴如何説馬到驪黄北方明禁千餘字倐令昭垂六乙堂頴士筆茅成束手坡翁戰鐵可争光采薇只把霏霏説删後多安床上床吳師道十䑓懐古姑蘇䑓百花洲上姑蘇䑓吳王宴時花正開半空畫燭西子醉三更鐵甲東門來吳波𣺌𣺌吳山簇不見嬌顰倚闌曲丹楓落月怨啼烏碧草東風驚走鹿闔廬邱墓相連處應恨夫差迷不悟斷指千年血未乾游魂夜哭䑓前路章華䑓靈王傾國崇䑓宇按劍章華睨中土弁裳伏地走諸侯鐘鼔凌空震三楚騁驕不顧伍子謀落成乞與吳邱游孤舟竟走江上路塊土獨枕山中愁十年伯氣終蕭瑟回首華容歸不得饑魂漂泊啼秋烟細腰却舞新王前朝陽䑓神娥縹緲髙唐上楚宫樓閣森相向丹楓蒼桂涌孤闕錦石清江簇連嶂行雲㝠㝠飛雨寒孤猿咽咽千花間翠旂龍駕杳何處斷魂殘夢愁空山微臣宋玉誇此賦當日襄王豈真遇千古秋風恨未平髙泉飛落三巴怒黄金䑓昭王鋭志夷青社築土懸金奉賢者四方劍佩集强燕千里風塵空駿馬郭君自舉先群豪樂生獨歩超凡曹酬恩一雪伯國恥連功並倚雲天髙君臣意氣千年少落日荒墟沒秋草黄金買貴滿長安惆悵英雄布衣老戱馬䑓項王戰馬從東來意氣蹴踏全秦摧入闗不共沛公轡還鄉却上彭城䑓重瞳按劍風雲靡萬疋騰空烟霧起凄凉垓下泣名騅零落江濵餘數騎寄奴千載心争雄登髙把酒臨秋風詐移晉鼎非男子君㸔百戰英雄死歌風䑓沛宫置酒君王歸酒酣思慘風雲飛兒童環䑓和擊節父老滿座同沾衣一歌豐沛白日動再歌淮楚長波湧龍髯氣拂半空寒虎士心馳四方勇山河蕭瑟長陵荒野中怒响猶飛揚歌䑓未傾風未息故鄉之恨那有極望思䑓桐人氣迫前星黯思子宫成嵗華晚髙䑓有恨碧草新大野無蹤金犢逺一朝弄兵兒罪輕百年鍾愛天倫深戾園魂魄夜寂寂湖城風雨秋隂隂漢宫樓觀連天起方士熏香召仙鬼望思望思終不歸􅌗陵老淚如傾水銅雀䑓半空髙棟翔金雀玉扆繐帷塵漠漠西陵老樹暝色寒建安殘妓春情薄曲終紅袖辭尊前簷傾斷甓飛人間分香淚老恨不滅秋風吹入桃花斑漢家一片如膏土肻為奸雄載歌舞銷盡曺暪萬古魂落日漳河咽寒雨鳳凰䑓金陵玉氣飛祥雲鳳凰䑓上聲和鳴鳳來春風花冥冥鳳去秋風荒草生嬌娥舞散髙城暮青山迥隔丹邱路斜陽門巷語烏衣細雨汀洲飛白鷺江空天濶鳳影遥謫仙吟斷誰能招六朝宫闕烟蕭颯月明夜半人吹簫凌歊䑓大明天子遊南國紅粉三千䑓百尺歌鐘擊浪楚日白簾櫳凝樹湘雲碧凌歊髙宴金輿來侍臣狎笑朱顔開䑓成宫扉鎖花栁寄奴土障生塵埃昏昏醉夢春風幾不顧江東數千里酒罷歌䦨帝業銷青山空映當途水秋懐三首江南木葉飛江北百草黄風烟淡莽蒼悵望川途長寒魚聚其羣鴻雁忽成行俯仰念時物索居耿凄凉昔我二三友敦好攻文章漂零轉相失尺素不得將人生四方志企爾揚聲光登山豈無車渉水亦有航真誠諒不隔離别庸何傷忽忽意不懌獨歩登髙丘羣山紛虬蟠前當大河流八月草木凋萬里風雲愁寒晶蕩白日孤鴻去悠悠鴻飛不可極其下禹九州古來英雄士百戰横戈矛念我當壮年弗獲茲地游豈無干時畧欲徃誰見收君㸔天馬駒失足羞氂牛我居雖㕓中無營澹昏晨出門少朋從入室誰與言楊楊夸毗子短衣踞髙軒逢時笑蹇拙詎識我所存㝠心玩羣動大化争飛奔西風振槁木白露零芳蓀榮悴俯仰間物理豈待論朂哉栖遲士毋為怨衡門和黄晉卿客杭見寄三首一從君客江城去詩思凄凉酒盞空天末倚樓孤岫雨春深閉户落花風半生政恐才名誤萬里誰憐意氣同坐憶王孫咏招隠萋萋草色向人濃書問蕭條已半年知君近買過湖船江花日暮吹紅雪店樹春晴起緑烟客裏花隂遽如許人間岐路正茫然離羣得似從遊樂紙貴錢塘日萬篇翰林學士巴西彦天禄儒臣漢世雄一笑吟還餘故老並游方外亦清風吳天有象星應聚驥馬成羣眼巳空十載神交末相識卧淹幽谷恨羇窮元風雅後集巻十二
