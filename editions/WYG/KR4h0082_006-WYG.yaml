body:
  text: 長沙留别董仲逺陳君直嵗晚客衣薄揮毫更舉杯五年嗟一别兩月却重來南屋夜相語北風船未開他年苕霅上回首定王䑓黄子肅古意呈仲章貢侍御娉婷二八女絶色妙難畫新粧薄鉛華照影脩竹下盛年事夫婿錦玉耀精舍雖非伯鸞妻惓然惜春夜琴餘月當軒黙黙倚風榭寄語東家兒紅顔莫輕嫁梧桐生髙岡雲氣涵空清南枝掛孤月上有蒼鸞鳴大匠揮玉斧渾然合天成置之白玉堂被之絃歌聲一彈松風來再鼔溪月明子期人已往青山為誰情題竹外一枝梅花仙標何處來一寒倚寒玉晴窓見疎林座上春可掬山隂帶殘雪水影兼逺綠珍重孤竹君嵗寒伴幽獨題醫人黄子厚悠悠溪上山叠叠山下雲幽人不出户芝草日以春伯也種丹杏心與孤鴻輕仲也搗𤣥霜西風林間聲世降運不齊病隨人心生芳草何所無誰能擷其英吾宗幼方積積久用更精金丹有時合白日昇蓬瀛春晚春老他鄉奈老何可人紅紫漸無多閒來綠栁坡頭路記得流鶯第一歌題春江小景圖小艇無人載綠隂白鷗門外笋成林不知多少山中雨染得一江春水深錢塘懐友舟泊風林一雁聞白蘋紅蓼共思君月明江水多於海雨後秋山碧似雲登福山遇僧偶出欲叩禪關未有詩滿山空翠濕人衣竹間倚杖到西日試看白雲歸未歸鷲嶺雲間杖屨幽竹風松影共悠悠何人分得僧家􅒽坐看南山一片秋贈江玉成千里還家獨抱琴象山杳在白雲林晚寒莫厭江東路人倚梅花雪意深友人見訪不遇君乘白鶴下青雲我入春山聽曉鶯可惜小樓風雨過無人收拾萬松聲尋故人適興一尋君君家在白雲幽花春後見落葉夜深聞隨意坐苔石呼童煑澗芹不須談世事詩思正紛紛留别相尋復相別把酒意如何雲石有時合風湍無定波此生無出處一笑對嵳峩長揖下山去暮烟浮女蘿哭朱教授竹所日問平安竹凄然泣白鸞講堂春寂寂歸路夜漫漫前度成虛設斯文已不刋些聲雲谷外落葉帶微寒天運不已嵗時又春學已可乎作自勉詩呈李初教授諸公東風一笑可人心旋瀝新醅對客斟山色未匀春意淺梅花已老白雲深半軒依竹閒聽雨千里懐人欲抱琴試問樵溪隔年意碧波東注𣺌難尋送三山張國寳府椽美歸三山星斗髙貼天三山潮汐走百川張公平生飲中仙襟度脱落神飄然三山神人不敢友天風吹度金鼇顛掃清案牘待明月平鋪綠水栽紅蓮公庭無人山色落時有雙燕歸簾前樵溪夜雨深一尺城外明朝翠如織春歸草木不可遮黯淡已作離别色離别兮奈何若有人兮佩女蘿公不顧兮山之阿山之阿滄海𣺌𣺌浮雲多縣令行石田海上秋不熱抱琴入山翠如簇白雲一榻流水深獨對青松結茅屋西風喚起泥塗身野冠未見天上人靈丹一粒肻分與便當負水耕炊薪題髙都事戴崧二牛圖東風吹浪翻平林吳江咫尺移春隂牧童曉出不知雨日暮歸去清溪深一童驅牛渉古㟁草烟惨淡迷目觀雙蹄湧出層水間蒼峽蹴翻石雲斷一童踞䇿溪中流溪風不動波悠悠恍然顧影驚自失尚疑身跨蒼龍遊平瀾逺峯結寒色至今宇宙留墨跡可憐三子人不識我欲問之漢津客送素庵劉搃管歸當年繡斧出九天倐如白雪下長川千峰收雨作秋色至今梧竹吟寒泉熈䑓重來又三載干將出匣光不改氷壺盡貯明月秋風露溟溟接滄海海空迢迢行玉麟霜影蕩漾龍蛇驚石田歸來紫芝好䇿馬更入南山青南山歌兩岐何如陽春生物物不知魯人頌泮水何如弦歌一千里昆也虎渡河寛也蒲作鞭何如樵溪九曲落葉静平鋪綠水栽紅蓮紫薇殿前列藩輔華盖滄滄五色聚䕫龍䠥􅍷天一方蟋蟀吟秋桂枝暮蓬萊楓葉昨夜秋瓊樓夢覺題金甌銀河横白鸞去安得追逐鈞天遊送僧定觀歸詩僧百丈來復作五䑓别丁然振金錫桂子落秋雪山空白雲閒風息萬籟滅相思何處無江湖一明月張希孟過長白山范文正公書堂長白何岧嶤下有讀書室人云小范老于焉競晨夕蕭蕭翳荆榛落落林泉石巻巻往曕拜共共如相及維宋慶厯間群賢麟鳳集孰先天下憂一統經綸白中朝固有人西夏諒難國力言出師凶深慮手澤失炳幾先見明韓富有慚徳奈何時相隘欲碎和氏璧向非仁廟知千載血應碧至今忠義氣髙壓萬仞壁所以徳業髙要知辛苦積功臣自古多動為富貴役視公平生心霄壤邈相隔但能一善兼亦足千年塞遺容揭日星未覺關塞黒長歌景行詩風林撼秋色晨興用俞立之韻寒碧洲痕淺深青地勢平岩姿呈雅淡樹影碎空明窓納一天曉人懐千古榮移床髙處坐遥看日東生惜鶴十首鶴仙禽也由凡翼非其比恒不為世人所愛而愛之者往往皆山林中人盖物以氣合理勢然也余嘗得其尤者一豢之既久翩躚與人相習日者為田嫗傷其脛丸病兩月斃惜哉因取其始末作十詩將以慰其不幸云爾購鶴野處幽獨甚千金得令威挾雲出塵網領月到柴扉縻足妨颺去遮亭使學飛至今湖上路樹石亦光輝友鶴雲雨手反覆紛紛知已誰𤣥裳真莫逆皓首誓相期把酒或前舞遊山時後隨㑹看作人語細與話瑶池病鶴渠夲仙家物胡為久不安强行時搨翼欹立欲遺丹誰藥相如渴獨憐范叔寒一鳴雖确确猶自徹雲端醫鶴饋藥人空數乘軒氣漸低無心吞餅餌何處覔刀圭暴日資丹火杯泉洗雨泥謾令通臂友時復憶幽棲挽鶴共處人烟外誰期禍及身九臯空有恨四野欲無春華表雲應唳瑶臺月亦塵當年林處士泉下定相親招鶴歌徹楚人些㝠㝠恨亦増楓林空落月蕙帳亦寒燈仰問天無語呼聞谷謾應料隨風露氣飛入亂山層瘞鶴非為恩帷蓋從遊嵗月深忍令一抔上埋盡九臯心致奠攄幽憤為銘著徳音小松栽尺許悠久庻能尋憶鶴玉立昂藏意山中我與君幾年遊賞共一夕死生分徐歩閒窺沼髙飛逺帶雲為誰重起舞倚杖立斜曛夢鶴繡幌燈昏處依依見痩軀引吭如有訴側頂不容呼枕上行雲遶松稍落月孤堪憐漆園叟謾為蝶蘧蘧圖鶴百計無從見明窓吮筆圖研朱漆霞頂屑玉抹雲襦雅状雖非似山居亦勝無却愁風露夜㧞宅上天衢趙茂原贈郭上長歸括蒼兼簡葉縣尹林府判二公夜聽春雨鳴雨晴君欲行君行向何處回覧括山青括山萬叠青未了漠漠寒烟隔飛鳥三年官冷不得歸歸夢時時度雲嶠竹鷄鈎輈啼夢殘落花如雪春風寒客途塵土何漫漫握手未許攀征鞍東關且盡雙樽歡東關栁如帶中有别離態折栁不可持依依自相待宦遊江海事多違我輩論交金石在舉頭咫尺天涯别行李蕭蕭浸明月出門大笑心激烈良儔往往多契濶每一思之生白髪白髪生何足驚志士慷慨期晚成酒澆磊傀澆不平况復不飲難為情長歌􅄆作陽關聲子先歸兮我暫停丈夫耿耿氣肻洒兒女淚浩蕩天地間清流豈常聚郭公子休徘徊京城二月鶯花開束書早上黄金䑓黄金䑓上多英才拾取青紫實快哉秋來我亦逺遊計萬里殷勤定相遇到手功名俱得意却誦如今長短句曉寒曲曲欄亷纎杏花雨博山烟飛裊晴縷夢回金帳春融融鸚鵡驚寒隔窓語美人曉粧雲滿梳栁風吹香入氍毹翠鬟嫋嫋綰不斷寳釵壓鬢紅珊瑚丫鬟捲簾採桃葉驚起一雙黄蛺蝶秋宵吟平林薄暮風淅瀝黄金滿地秋狼藉新月出嶺光欲流萬籟無聲夜寥閴誰家美人吹鳳簫彩鸞對舞摩青霄欄杆縹緲碧雲逺天風入骨凉蕭蕭銅壺水寒銀箭澁玉露滴空衣袂濕缸花落盡爐烟收幽懐耿耿生新愁寒螿啼碎人間秋楊逹可渡江寫懷手挽天河落九溟浪聲淘盡世間情一川光浸梅花月萬頃波涵棣蕚春風雨不忘歸海意乾坤未老濟川人此溪浩蕩流千古回首青山更麽青吳仁傑送汪水雲入湘碧水波翻海亦摧奮身鼇背䕶蓬萊忍隨天上紅雲􅄆却馭關中紫氣回大道有形須變化𤣥關無鑰任敲推擕琴更拜蒼梧野猶想南薰入調來鄧或之即景樹影禽聲門半開墻東一逕沒蒿萊池塘通得官溝水時送青萍幾㸃來絶句清風左右凉滿室芷花香琴聲偶然斷不是客來妨芸芸陌上人芸芸陌上人各為衣食謀寒饑稍不迫彼亦無誅求豈知衣食外復有千端憂憂樂夲皆然悵然寸心休掩巻夢中有得意覺來還自喜掩巻嗒無言殘日在書几江橋樹次阮魯詹韵江橋樹荏苒年華暮迎得行人來送得行人去落葉成秋風行人在何處阮書附江橋樹日日斜陽暮春風吹落花半隨流水去花落有盡時水流無斷處宿山家秋深客路已無聊此宿何堪更寂寥雨葉响林人語寂風燈近竹客心揺村醪味薄愁先醉野叟情親語漸驕惟有兒童忘世故向人欹鼾到明朝聽琴松花門巷小立久忽聞琴海鶴天風急山猿秋雨深一時甚得趣千載有知音雖是無絃逹何由㑹此心落葉二首秋庭晝無人夜葉自滿地端居觀物化人生亦如寄朝聞鳴蟬悲夕已見其蛻嵗晏共蕭條臨風發遥喟落葉日已深庭樹日已瘁樹猶不枝梧葉亦甘委棄寕隨風髙飛毋隨流水逝飛者或遶樹逝者𣺌無際陳敬翁晚過玉林西齋二首佳客因乘興能來慰寂寥空山多宿約好語在今宵白苧秋風急青帘市酒遥半升無處問清抱可能消庭雨俱錘盡燈花待客詩三生今夜宿此道幾人知分契情何厚林髙語自竒直為知已用非敢傲當時月下琵琶不似潯陽縣哀絃帶客愁素蛾窺夜曲明鏡入南洲指滑鶯初語腔新栁共柔向前兒女恨腸斷漢宫秋栁邉漁笛莫是章䑓路青絲舞未收楚江歸去釣湘竹語孤舟一葉秋生樹何人夜倚樓舊時明月裏吹過白蘋洲初夜獨坐興悠悠苔堦日脚收客衣凉悞葛池月夜私秋物遣身猶累心閒逕未幽故人情分好渾不記淹留晚坐緑隂深處寺日暮坐幽人水影光初刼苔痕塔半身荒江無過客髙竹是比鄰未信清談少因㸔麈尾塵過胡震亨幽居欲復問何處行遲稍認門路隨幽草入巷與綠隂分市盡人初逺言忘意獨存所經得才俊猶足慰斯文清曉過鶴上仙人仙人睡方起松日髙數尺入户聞琴聲停歩立苔石閒情契絶幽每坐忽終夕長揖道香清歡言正蒲席贄分宜縣丞吳子彥道合無論見神交早為詩十年諸老盡一淡平生知池草今無夢山隂復有期絶疑汚具眼猶意得吾痴蕭南軒寄吳子彦歸江東鳴鸞誰倚洞簫歌黄鶴樓前舊脱靴天上佳期今夕共江東歸思白雲多清風明月故人識有酒無魚良夜何莫學鄉音唱蘆葉桂花滿載待西河寄黄尚雅莫惜隔年期行當與子違門深紅葉字秋入菊花詩酒熟蟹將到鱸肥鱠可思西堂風露重早下讀書帷元風稚前集巻十一欽定四庫全書元風雅前集巻十二元傅習編先一初丁丑新正試筆屈指蘧年逝今朝厯又新野烟痴作晚山雨細匀春舉世貧為苦空門懶是真聊将雙碧眼跌坐閲時人陸文圭燒笋賦竹宇韻先生朝盤厭苜蓿笋味得全差勝肉蒼頭掃地犀角出赤燄燒空龍尾秃土膏漸渴外欲枯火灰微濕中已熟撥灰可惜衣殘錦解籜猶憐膚擢玉青青無分長兒孫草草為人供口腹李家丞相蒸葫蘆石家美人煮豆粥去毛留項有何好搗韮作虀空自速不如野人工食淡自辦行厨入脩竹句裏曾參玉版師胸中㑹着篔簹谷主人不問不須嗔昨夜西風响林屋陳魚村題接仙樓五老峯前第一山天開綠野待公閒令威白鶴重來日老子青牛又度關花木四時三月裏樓䑓一簇五雲間我來便有凌風想為問先生覔大還易炎正環秀樓倩碧穹環類九嶷危樓空翠接清漪山人夲是山中客山外㸔山山更竒張嗣良尋梅夢中寄荒遐騎驢一訪故野梅過流水香斷無尋處天寒嵗又晏偃蹇傷幽素獨行山谷深積雪迷歸路曉行夢魂短短春宵殘喈喈雞語催征鞍東方彷彿淡月曉栁露細拂征衫寒僮僕前行指予路那個長亭經某處離情莽莽又分明黯淡孤村烟半樹何大虛畈歩作隂靄通烟碎作霏春風吹入暖成泥女郎挑菜不知濕調笑相攜過