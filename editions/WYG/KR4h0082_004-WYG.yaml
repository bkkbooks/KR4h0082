front:
  text: 四愛題詠
  hash: sha256:febc55cad222c977a7b3c66096866745496f4d9b552d035de40f3736ef1381ec
body:
  text: 虞伯生江東葉凱翁至京師訪予芝亭之上適予謁告得數見焉見其雅適而端慎介不違于和易不茍于汎知其為孔老通家之佳士也又從知其能以道行交神明致風雨則其素守可知已間出書一巻袖中則故宋遺士詹府僉程國録為其先人成甫氏所著四愛堂詩文也所謂四愛者陶淵明愛菊周茂叔愛蓮又附益以林逋仙之梅黄魯直之蘭者也並植此物於庭户之間而尚友四君子言將同其愛者焉故曰四愛云爾又有所謂半隠者成甫之長子元翁隠于是而求先志焉言半者以其半待凱翁也凱翁言出山游四方非有世俗之求也願得見名士大夫如泰華黄河者得一言以詠四愛焉亦所以報父兄也欲為之序引云夫愛出於仁者也仁者天地生物之心人以天地生物之心為心則玩夫生物之理而見天地之心焉亦無所不愛也而所愛亦豈徒然哉即一物之生而知其與道為體也其樂烏可已哉是故思有以成其愛而非私也我之培煦之潤之附益其不及而防閑逺去其為害者皆其事也古之君子因物以致寓其意焉非溺情于形質之偏也姑以周子愛蓮之説論之竊意夫日用彛倫之間飲食男女之欲同行而異情者非出于淤泥而不染者乎明睿洞照安行無為而不矜詫以索隠行怪者乎非所謂濯清漣而不妖者乎不蔓不枝者純一不雜之謂也亭亭净植者中立不倚之謂也此其所以為可愛者乎推是言也餘二子之意就其所詣安有流連光景之患乎葉君隠居辟地其必有得于此若夫善頌則在能賦者云蜀人虞集敘至順癸酉二月八日吳宗師方今文采重奎章光照芝山四愛堂梅蘂春融氷雪界蓮花晚静水雲鄉湘纍往矣蘭為佩陶令悠然菊泛觴千古髙風猶一日迢迢歸夢楚江長馬伯庸幽蘭有真性佳菊有至節娟娟出水蓮露下玉洗白杲杲空谷梅嵗晏立氷雪屬愛在君子畜之以為徳至順癸酉四月十三日侍講伯生老友子邀予賦詩媿不能工姑此以塞命也祖常再拜馬公辭翰妙天下凱翁珍藏之集髙新甫愛菊隠逸情愛蓮清潔志愛梅違世俗愛蘭絶世累性愛固有殊亦各在適意偉哉四君子趣同而世異人品有定論寓物盡髙致遼遼千載下孰能遵道義葉公逹尚友所愛兼其四猗歟后來人先志慎勿墜太𤣥天師彭澤以節髙春陵以道鳴雙井詩之雄西湖隠而清因其有所愛希賢動吾情爰知君子堂貴實不貴名太乙子東籬秋色净芳沼晚華滋雪落清澗曲風生楚江湄幽景尚依然髙懐邈難追道人繼芳躅千載有餘思老屋四五椽草徑臨清池四時各代謝芬芳常在茲朂哉著令徳永與古人期夏紫清十畆烟霞曲徑深四時佳興足幽尋菊芳梅綻清詩骨蘭秀蓮香肅道心半隠肻堂嚴繼志百年喬木易成隂通家自有全書在閒倚南窓聽玉琴歐陽𤣥葉凱翁來京師受知吳宗師又為名公卿所愛禮得四愛堂詩甚富此行真不虛也為賦五絶亭亭净植自中通千古知心太極翁幾度廬山㸔明月玉簪浮出白龍宫右濂翁愛蓮粲粲中央色不偏風霜揺落義熈年男兒一種剛腸味不讓隆中老子先右淵明愛菊紛紛桃李下成溪騎馬山人聽曉雞如此暗香相慰藉徴書猶到六橋西右君復愛梅榦少花濃雨露深政縁猶有市朝心豫章太史春秋筆不遣山王預竹林右魯直愛蘭涪陵翁解識㫪陵薛映何如刺史𢎞葉氏堂中和尚友不縁花有愛和憎右葉氏四愛堂廬陵歐陽𤣥揭曼碩蓮菊梅蘭四愛堂父兄子弟愛無忘對花便擬書徴士學道唯求接素王孝友家傳人所羡横斜句好興偏長百年心賞千年意一種風流四種香王倫徒原有梅兮隰有蘭君子之愛何幽閒陟崔嵬兮履潺湲胡不歸樂山之間㟁有菊兮渚有蓮君子之愛何清妍雜佩有贈勿棄捐胡不歸兮樂嵗年瓊臺石室何威夷親之所愛子所思托根厚土深且滋春雨秋露無巳時王士㸃予所愛兮崇蘭植之兮堂間思夫君兮山谷紉翠佩兮雜青綸蘭芳歇兮日在山欲從之兮不得閒予所愛兮脩蓮植之兮堂前思夫君兮濓之水濯冠纓兮叩漁舷蓮馨富兮水泥烟欲從之兮不我賢予所愛兮秋菊植之兮堂隩思夫君兮柴桑巾漉酒兮杯生馥菊英黄兮江波縮欲從之兮不我復予所愛兮湘梅植之兮堂隈思夫君兮淛之湖吟清淺兮句容裁梅枿素兮雪飛埃欲從之兮勿予猜謝草池梅蘭蓮菊各争誇風月平章屬大家四愛堂前親手種乾坤生意四時花詹厚齋友人葉成甫世家永豐梅林而松溪元貞丙申動適彼樂郊之想慕孟氏三遷之風徙居睦樂池頭相厥幽勝結廬三間竹樹茂美一池灌園手植梅蘭蓮菊又取濂溪淵明和靖山谷諸老之説揭中堂榜曰四愛以寄四時雅興清矣哉且以永日且以盡年有以自老矣而數僅中夀二子元翁凱翁皆恂恂善與人交凱遊方之外元好脩而文於屋東偏闢小室號半隠面修竹竹外憧憧而囂塵不到清琴横床儒書堆案不矜名不眩能能世其家而大之者余每過之喜其有隠者趣為之賦小詩四愛名堂名匪誇梅蘭蓮菊當傳家誰知半隠琴書趣出色堂前四愛花程登庸元翁出詹同舍所為四愛詩正有契於予懐去年夏予訪詹山道過焉愛其顯而隠駐車縱歩者久之意元翁仙是未逺也今乃知經始于成甫而元翁復闢半隠以居琴書于是更肻堂矣蘭蓮菊梅分四時而専美合一堂而集芳受乾坤清氣者夫誰不愛然父愛之子不翦之者已無况推其所以愛之者而隠焉又充所以愛其身者以顯其父母焉吾知元翁之愛不徒在是而九原有知所以愛其子孫者又甚于愛是四者矣是則蘭在庭階尤宜若夫春秋之異其時山川之異其種湯佩之異其用説雖不同義同一隠至若實與蓮同一夏葉與菊同一秋色與梅同一冬又有無時而不春者先四愛亦宜然則上堂如有見也出户如有聞也人知元翁之愛未必知元翁之思也既以是諗來者其季吾徒也又以是勉之吳月灣梅蘭蓮菊儲天地之清氣洩山澤之幽芳春秋冬夏各專其一時之美露生之物以臭味見取于人者未能或之先也孟方王君示余以詹山老先生所為葉氏半隠四愛堂記雋永數四筆芳墨潤流溢頰舌間但覺四物之美並萃于一朝而忘其為草英木華之迭出于四時也蓋昔之鍾是愛者吾聞其人矣屈子之于蘭也淵明之于菊也茂叔和靖之于蓮也梅也匪徒愛之而已其人品實似之故以蘭配屈以菊配淵明蓮配茂叔梅配和靖人莫得而易之者世之稱是四物而是四賢也已可不言而喻矣是豈偶然者哉且四賢之愛是物也亦各取其一耳而今也以四愛名堂取四賢之所取者兼而有之不已㤗乎是殆不然詩云髙山仰止景行行止愛以四言則四時之見是物也如見四賢焉聞其風而興起所以自處者必有在矣徒愛云乎哉抑以其半隠名者得非欲沐蘭之芳翫蓮之潔而徘徊菊梅之間也歟孟方其為我質之詹山延祐􅏤申至後同郡吳存敬書彭孟老老人與成甫葉君友甚稔予亦從侍次識之今去之十二年而兩家子弟復胥于榮山慨二父之不復作且出四愛堂詩求和予為之掩巻涕零因次韻以志二士之感云免胄宗風衆共誇當時二父許通家重來四愛人何在淚濕斯堂幾度花李進齋喜怒哀懼愛惡欲人之情性之發也夫愛七者之一耳好尚于是乎觀之愛其所當愛者天理之公衆人之所同也反是則人欲之私一已之獨而巳葉君成甫植蘭蓮菊梅于庭以四愛扁其所居之堂以為四時之可愛者莫是若終其身不渝元翁之愛之視成甫益加既又築室于堂之東曰半隠其意若曰是隠者所愛也則能繼其先君子之志豈特同乎衆人而已哉然而草木外物也内而禮義之悦心有甚于愛是四者即其外以信其内則無一物不在所愛之中矣元翁心醇而氣清進之以道則由愛親以愛人愛人而愛物知所差等夫孰非性情之體用乎行矣堂且顯而隠不終于隠亦半之謂也元翁勉之葉氏世家梅林于予為同里今所居曰睦樂已一再遷予因記之亦以寓閭井之愛云爾至治辛酉孟冬李晉敬書李絅齋余曩嵗與里中葉公游君數數為予言吾先君成軒之遷居睦樂也林木薈蔚屋廬靖深環植梅蘭蓮菊取前賢題詠揭諸壁扁堂曰四愛以為游息之所地偏心逺庶幾乎古逸民之風焉子盍為我記之余適走東西未暇也越一紀返吾故而元翁已謝世矣追念舊游如夢而覺元翁恨不可作記其可以不作乎余惟天地以生物為心而人與物得之以為心是以善觀物者知物之理無以異夫天之理也故觀糓種可以識仁心觀牕草可以騐生意視葉君之愛同一機耳愛属仁仁非天地之心乎以我之心體物之心而天地之心可見矣所愛其不在茲乎或曰草木之可愛者蕃矣四者之愛抑豈有所擇歟曰非也夫人之心静躁不同者好亦異故悦紛華者必朝市奔競之流甘淡泊者必山林遺逸之士譬諸草木吾臭味也世固有愛牡丹而誇國色者矣愛海棠而羡紅粧者矣甚者碾綉轂而縱春遊燒銀燭而酣夜飲者矣彼之所愛不已淺乎吾恐物交物引之而已矣人欲肆天理安在哉必也滋之以九畹而弔湘纍之孤忠採之於東籬而慕處士之清節誦净植之説吟香影之詩又若親炙濂溪之旁而徘徊孤山之下也同前修于千載萃四愛于一堂目擊而道存心領而神悟吾之所愛不已深乎所得不已多乎若曰天之生材必有所為言其體不及其用可乎胡不即是四者而觀之蓋浴湯可以事神飲水可以延夀或分甘而念母或調鼎而相君用耶非耶是猶一念之愛擴而充反而求由親親而民物無二夲也用舍聽之于天吾無所容吾力而天之所以與我者可不知所自愛乎元翁之子可順好學而多藝是理也其知之矣今以季父凱翁命來速記且曰願無忘先君之好故樂告之亦以寓予掛劍之意云至順辛未嵗七月既望里人李粲記朱訥山成軒葉君捨梅林故家而三遷睦樂池頭結廬退隠蒔蘭種蓮栽菊挿梅以取四時生香不斷之意桂子蘭孫又能繼志述事誠可嘉尚敬歩詹山髙韻繕寫呈似幸恕其率文炳載拜相傳清白事非誇翁季同心有幾家賸喜生香香不斷蘭蓮梅菊四時花幽香净植搃堪誇老圃秋容别一家雪後暗香吟興逺故林還有幾株花梅野詩敘虞伯生近代楊補之作梅自負清痩有持入徳夀宫者内中頗不便于逸興謂曰村梅因自題曰奉勅村梅集嘗見故家有藏徐熈墨杏花者用筆圓潤有篆籀法亦恨楊不能知此也今監書博士丹丘生忽用此法寫生大快人意存渾厚之意于清真去衰陋之氣為纎弱所以為佳也譬如少陵煩花晴昊之雄壮視昏月淺水為何如耶樂平錬師葉凱翁舊號野梅予曰以野標梅未足盡梅之趣以梅名野庶乎廣莫之風請更曰梅野而以丹邱之畫冠之永作証據使錢塘臨江二君聞余此論猶當俯首歎伏也虞集詩昔結絲絇侍帝宸青鞋今許向江津憑君先付梅花説白髪相看意更親初凱翁先欲南還欲僕作詩送行而僕今先有行色故為題此為他日一笑之資也詹厚齋江路夢初回猶疑香是雪野意正微茫疎影寒窓月元風雅後集巻七欽定四庫全書元風雅後集巻八元孫存吾編真山民陳雲岫愛騎驢君不學少陵騎驢京華春一生旅食長悲辛又不學浪仙騎驢長安市凄涼落葉秋風裏却學雪中騎驢孟浩然冷濕吟􅌱敲吟鞭梅花溪上日來往身迹懶􅄆人中仙有時清霜松下露松風蕭蕭驢耳䜿㨿鞍傲兀四無人牧子騎牛相爾汝勸君勸君但騎驢行路穏姑徐徐九折畏途鞭快馬年來曽覆幾人車江學庭同知旴江人題雙紅橋雙虹鎻湖湖水長影揺洞庭吞三湘霜飛八月橘柚熟我欲打舡聞水香晴天晚照過湖曲厯厯逺樹波茫茫客中有懐不得盡無人同上三髙堂揭希韋送人上京天上吟仙笑相覔松間坐客飯青精真遊不知白日晚身世相與浮雲輕冥冥落花啼鳥静窅窅風燈寒泉鳴丈夫邂逅志萬里滄浪水清宜濯纓許伯昭縣丞荷花艶態繁粧似六郎汙泥不染豈尋常西湖十里今非昔何處笙歌有異香相者玉鑑石中求玉誰之玉鑑上無塵知幾塵除却江東雲谷子眼髙四海許何人謝南窓縣尹送人北上風雲萬里思帝鄉匣劍夜夜飛神光山林嵗月負疇昔鷄鳴裹飯挑書嚢我觀蔡君自竒士玉壺氷壑清如此終然未泄磊落胸朝朝問道川江水水暖飛舸輕河曲長淮清古人成敗生眼底莫為感慨牽閒情黄金䑓上需賢急行矣去作新豐客當今太平十二䇿他年語我須厯厯黄朴齋縣丞酬趙倅鷗渚時秋望河漢二氣相循環姹女嫁紫車千秋方生顔生顔一何好身與浮雲閒入宴東華䑓出游蓬萊山振衣徃從之杳𣺌不可攀貽我金玉章化此鐵石頑長懐學道人紫氣占函關幽居幽居無别事野興足清歡置石妨書案移花傍藥欄蔽門松老大夾徑竹平安自與兒童語從來耐嵗寒周老山和蓮渠貧女吟妾無千丈䋲雙丸任渠犇妾無一星金竹笥空長存孤燈耿寒績一春不出門母家今何在血染雙啼痕雖然貧未嫁嫁了那忍言古來惟玉奴不肻負東昏嗟來市門倚父母豈不思懐友里陌依稀故友廬一生一死竟何如烟荒樹影誰留劍秋老蘆花不寄書數㸃夕陽鴉載犢一拳秋水鷺窺魚世間何事非焦鹿天地無情可奈吁平山來盱平山先生桃源隠君子也不見數年矣少微一星忽見盱壘比争先覩之出處語嘿有道存焉小子何足以知之徳公不出城亦必有以也人住桃源意自春蓬萊弱水𣺌無塵擬隨陶令尋歸路却訝龎公肻入城水弔晉題應有句碑捫唐刻豈無情太原漁者無勞問盡識神仙真姓名贈數者吳洪範先天妙算泄河圖天後精微寄洛書獨在明夷説箕子聖人微意果何如宇宙由來厯幾秋盛寒偏在五更頭後來誰有天津耳每到斜陽怕上樓酬李鶴雲江城寒寂厯菊欲為誰秋夢裡闗河隔愁邊嵗月流翩翩雲外鶴泛泛水中鷗何限斜陽樹無題莫上樓曾徳厚水底梅虛明元不累形骸花信仍須日月催雲母帳空𤣥鶴怨珊瑚枕卧老龍猜夀陽宫女凌波襪白水真人玉鏡䑓悟得一般清意味振衣長嘯歩莓苔題耕隠堯舜吾君堯舜民一犁新雨一簑雲灞陵山上齊眉者嵗嵗春風欲獻芹周梅邊贈墨梅士我家丹霞梅一枝玉為骨似氷為肌平生不受霜雪欺世上塵土那能緇此花自是天上竒君能㸃染超補之筆挾造化梅不知相逢一笑添一痴春風滿意桃李蹊豈復顧此寒與微庭前夜雨春漏遲一聲山月聞子規周溪邊贄撫州章萬廬盱江相去無百里我聞公名諠兩耳聞名十載猶未面便似未曽來擬峴一來邂逅及五峰人言我盍一見公公之勳名宣宇宙文武全才今未有章公得象是相家異時公亦當宣麻我來見公無他事為公欲求四大字區區蓋頭一把茅一如鷦鷯深林之一巢又如窮僧貧道寕忍餓却向齋堂敷床展席施粥常滿座喜公筆墨妙更精須公大書特書大姓名為吾四溪寒塾傳千載之芳馨臨川自昔有墨池善書無過王羲之羲之但能作小楷今公字畫又更大我來一見萬户侯識公便是韓荆州軍中撫有百萬之貔貅門下豈無三千珠履之英游長歌歌已語未休問公還能一為握髪否周幕溪岳陽樓乘風來叩洞庭君送我樓心慰舊聞水憤荆湘江欲合天隣吳楚地曽分千㠶過雨紅揺日一島撑空翠擁雲嵗月悠悠閒獨倚若為憂樂話希文黄誠性讀文山集三百餘年樂育恩晚從科目得斯人﨑嶇嶺海期年國零落毡毛萬死身諸葛未亡猶有漢包胥欲泣更無秦挑燈慷慨歌梁父鬢髪蕭森動鬼神傅東郊鐵環歌傳言京使舟次漢陽次日扼泥挽不起聚賈舟起之得鉄鎻長莫可紀于是鎔作數百環懼而復投之水或曰吳王作此鎻江也楊廷秀得一環以示予異甚索歌誌之楊君手執一鐶鐵吳事驚傳向人説横江鐵鎻是何年千古沉淪共魚鱉抗津扼險尚豪勢毋乃當時謀計拙想當爐冶力錬時一國生靈走炎熱火燄連空氣吐雲此鎻得完農噐鐵益州刺史龍鑲東火冷烟消吳已滅英雄有恨在天地淚入江湖流不竭蓬萊使者都水衡夜泊溪陽江上月挽船欲去不可起倐聚千艘同撇捩馮夷震懼蛟蜃驚千丈連環中斷絶重如金石鏗有聲猶帶吳人舊精血天教尤物出人世豈誠奸邪毋僣竊方今聖化開隆平四海車馬同軌轍君從何處得有此直欲珊瑚隨手裂紫金白髪世所珍往往貪惏作妖孽願將此鐵示兒孫滄海揚塵須共閲不然化作莫耶精斬取長橋蛟百截山行松老崖空樹欲傾緩行微歩荅新晴春深雨過花如夢風暖鶯回樹有聲縹緲蓉城雲作户依稀緱嶺鶴吹笙惟應眼底皆詩句一夜推敲直到明和荅兆五姪青年那似爾白髪已尋余負郭耕無畆傳家業有書士貧天理定老病世情疎雅得陳元諒時能問索居次韻東岩琴碁書畵四美人圖宫槐葉暗午風清閒弄瑶琴寄此情祗恐闗睢風已變調哀絃促不成聲沉機黙黙對枰棋妙着緘情有所思誰信華清當局者峨眉風急馬行遲李氏夫人信手揮書名千古出中閨盈盈錦上回文字不有詩人為品題玉軸輕輕巻復舒内中名畫世間無可憐山店兒啼夜不似文姫别虜圖黄季嬴候張伯陽州判不至奉寄海風吹􅄆虜山雪洒向瑶䑓照明月因之欲訪三蓬萊望斷雙鸞翠烟滅且持寳斧窮南溟片㠶飛渡遥山青幽尋丹碧採芝草松風竹露春泠泠江邊忽遇蟾宫客江草江花盡相識春風一笑訪驂鸞三十六峰搃春色峰顛孤鶴飛且鳴徘徊似欲難為情雲深林暝杳莫辨時時照影臨溪清我時感此生幽趣笑折瑶草寄仙佀白鷗飛去猶未來門掩青山更風雨登幔亭有懐杜清碧先生浙游幔亭髙聳碧天寒杖履躋攀香靄間澗竹吟風將過雨岩花笑日伴雲閒遥憐浙水生離思獨立閩山想别顔極目㑹稽何處是孤峰落落水潺潺劉叔逺寄黄士謙放歌出東林思弄川上雪清風吹湖波驚􅄆波上月美人載美酒舉棹揺秋霜把酒勸青天青天忽盈觴揚㠶掛白雲鷗鷺同飛揚歌罷一長笑忽然江水長懐君不可見流恨滿瀟湘熊澗谷木綿歌秋陽收盡枝頭露烘綻青囊翻白絮田婦擕籃採得歸渾家指作機中布大兒來覔襦小兒來覔袴半擬償私債半擬輸官府竹籠旋着活火薫蠧虫母子走紛紛尺鐵碾出瑶空雪一弓彈破秋江雲中虛外泛槎成索晝夜踏車聲落落車聲才憐催上機知作誰人身上衣小女背面臨風泣憶曽隨母園中拾覽鏡鏡是何年製我是何年生朝朝長見面相對如弟兄昔年照我時如弟顔色好今年照我時如兄顔色老願鏡團團光皓皓兄弟百年永相保鏡中覧髪昨日一須白今日一須白次苐白欲盡白盡何須摘人頗笑衰朽我自謂竒特賴有古鏡知元不拒老色却思父母恩對此空歎息秋日江村短短竹籬三五家獨樹作橋横淺沙山頭昨夜雨初過秋水一村茨菇花元風雅後集巻八欽定四庫全書元風雅後集巻九元孫存吾編冨珠哩翀
