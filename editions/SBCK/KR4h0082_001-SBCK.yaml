front:
  text: 皇元風雅卷之一
  hash: sha256:712421d093a2b04b4230ffd783cf926acd597ab631c0553c594831202c3af34e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_001-1a}
body:
  text: 旴江梅谷傅習􅀃卿采集儒學學正孫存吾如山編􅀋奎章學士虞集伯生校選劉静脩先生名因字夢吉保定人􅁉宗皇帝在青宫聞其賢以賛善大夫召至京師未幾以親老求歸養居数􅀊朝廷尊仰德義拜集賢學士又以疾辭踰年遂不起年􅂊四十有五縉紳惜之黄金臺燕山不改色易水無新聲誰知數尺䑓中有萬古情區區後丗人猶愛黄金名黄金亦何物能爲賢重輕德輝照九仭鳯鳥􅅻一鳴伊誰腐䑕棄坐見飢鳶爭周道日東漸二老皆西行養民以致賢王業自此成黄金與山平不救兵縱横落日下荒䑓山水有餘清翟節婦兵塵浩無際烈士難自全婦人無九首志欲不二天燕山翟氏女旣嫁夫防邉一朝聞死事徤婦増􅁣然生有如此夫早寡非所憐求尸白刃中􅀒土家山前事去哀益􅀷義盡身可􅂢無兒欲何爲所依推黄泉郷鄰救引訣烈日丹􅂨懸誰辨節孝翁重賦睢陽賢我昨過其郷山水猶清妍聞風髪如竹飄䔥動踈煙千年吟詩䑓峩峩大寕巔爲招馮大師和我節婦篇有大如天地有大如天地日夜長乾乾有小如蝼蟻營營誰使然我亦形蹟中豈得獨安間萬物相爲用錯綜盈两間如身百骸具少一爲不完有形無虚生豈予獨贅偏森然氣分内旣有不可鎸蝮蛇誰宥之生生亦能延安有人道尊堙㓕獨不傳乾乾以爲師餘者一聽天燕平斈仙䑓碣石來海際西南奄全燕中有斈仙䑓燕平欲昇天燕平骨巳朽遺䑓猶相傳雖復生青松嵗乆摧爲煙極目望海波不見三山巔三山巨鰲簮山人蟣蝨然使無不足論信有亦可憐大塊如洪罏金石能乆堅天地㑹有盡何物爲神仙空山無笙鶴落日下飢鳶今古非一䑓浩歎秋風前登武陽朝逰樊子舘晚上武陽城潮接滄溟近山從碣石生断虹雲淡白返照􅀨踈明日暮悲吟發樵􅁔巳􅆭情易䑓望中孤鳥入銷沉雲帶離愁結暮隂萬國河山有燕趙百年風氣尚遼金物華暗與秋光老杯酒不隨人意深無限霜松動岩壑天教摇落􅂇秋吟山家馬蹄踏水亂明霞醉䄂迎風受落花怪見溪童出門望鵲声先我到山家伯顔丞相度梅関馬首經從􅁃嶺帰王師到處悉平夷擔頭不帶江南物只挿梅花一两枝鞭一節髙􅀆一節低幾回敲􅌱月中帰雖然三尺無鋒刃百万雄師属指揮郝天挺麻姑山路入尋幽景便嘉石田瑶草帶煙霞注經洞古亡遺檢養薬炉存失舊砂青鳥空傳王母信綵鵉應到玉皇家岩扉不掩春長在老却碧桃无数花史紫㣲江南曲風凄露冷江南岸瑟瑟寒波秋練練採蓮􅁔断紅雲空蘋葉芦花結新怨鴛鴦鸂䳵俱可怜相呼相􅀝沙觜眠白頭漁子揺蒼烟一双飛上枯樹巔荒塜謡荒岡断壠誰家墳經年无主蒿草繁土崩棺蝕漆灯㓕狐狸作巢生子孫牧童燒火山葉赤花磚迸裂松行根牯牛作群來砺角折碑尽是淚土痕夕陽未下燐火出隂風刺刺雲昏昏精靈月下相往来嚘嚶􅒂歘如人言君不言昨日城中車馬客又来尋地為真宅盧踈齋題太白墓大雅清風乆不聞一㭗聊為洗荒墳朱絃三嘆無今古􅀃与江東日暮雲婺源縣齋書事竹樹映清曉坐聞山鳥鳴瓶花香病骨簷雨挾詩声客亦非餘予春無􅀒此生明朝予問俗吟罷却湏睛書梓山堂經室問俗來山郭携春到竹溪花香破禅寂林樾受鶯啼欲和􅀚音偈聊乗酔墨題閑雲􅀂留客不肯為余西題子陵釣䑓雲山蒼蒼􅀆煙木稠石灘潺潺􅀆江水流故人􅀆冕旒先生􅀆羊裘使人皆先生􅀆誰其伊周使人不先生􅀆誰其巢由可仕止乆速􅀆舎聖人􅀅焉求清風一絲􅀆豈爲名鈎焦黃荔丹􅀆香火千秋岸下幾篙􅀆榮辱之舟先生一􅀏􅀆白雲收貫酸齋白兆山桃花岩美人一别三千年思美人􅀆在我前桃花染雨入白兆信知塵丗逃神仙空山亭亭伴朝暮老樹悲啼發紅霧爲誰化作神仙區十丈風烟隔淮浦暖翠流香春自活手撚殘霞皆細末幾回雲外落清嘨美人天上􅀐丹鶴神遊八極栖此山流水杳然心自閑觧劒長􅁔一壷外知有洞府无人間酒酣仰天呼太白眼空四海无纎物明月滿山招断魂春風何處求顔色美人篇任風彫雪玲瓏温呉􅁎剪月纎纎昏行雲􅀘髻翠光滑鳯凰呌落空山月手摘閑愁八字分青山恨重昼不伸肌膿汗膩朱粉勻背人揮淚粧无痕霜刀自製石榴裙閉門不識諸王孫緑烟薰煖藍田玉羅帶隨風換粧束飛鳥㗸怨過長門芳菲不忍韶華屋連環歩窄玉佩響霓裳䄂闊東風長釧鬆腕痩斍多情㪯􅃌搔天天亦癢枕杳帳冷蘭灯沉落花不入芙蓉衾三山路杳銀河深彩鵉髙訴愁人心天与美人傾囯色不知更与美人節夢裏梅花夢我身万古千年一明月君山行北溟魚背幾千里􅀒我大薨遊弱水蓬萊隔眼不盈拳碧落香銷吹不起茜裙女兒懐逺遊逺人不帰明月羞宝􅁫綰髻翠欲流風鬟十二照暮秋女媧錬石􅀘天手手拙石開露天醜瓊楼玉宇亦人間直指示君君見否斯須魚去夢亦还白雲与我遊君山􅀞龍􅁔老墨糊天霹􅆮死手擘明珠換䏬子一潜渊澤乆不躍泥汚風鬚色深紫虬髯老子家燕城怒吹九龍无餘灯手提百尺隂山氷連雲塗作蒼龍形槎牙􅀲角隨風升逆鱗射月于戈声人間仰視翫且听参辰散落天人驚瀟湘浮黛娥眉輕太行不譲蓬萊青烈風倒雪銀河傾􅃢瑚盞闊斟不平吸來噴出東風迎春色万国生龍庭七年旱絶堯生靈九年澇漲舜不耕尓來化作爲霖福爲吾大元山海足􅀚日行丁巳春三月余之所謂宝陀山顛有石曰盤陀可􅀚之􅀄疑其大不可量旣帰􅀫作方夜半之餘詩僧魯山同賦六龍受鞭海水热夜半金烏変顔色天河蘸電断鰲膞刀擊􅃢瑚碎流雪朔方野客隨雲閑乗風來遊海上山飛驤拖空渡香水地澼中原雜聖几壯鰲九尺觧霜鼔瘦紋巨犬自掀舞驚看月下墨花鮮欲作新詩受龍女人生行此丈夫囯天呉立濤欺地窄乾坤空際落春帆身在東南憶西北采石􅁔采石山頭日頽色采石山下江流雪行客不過水无跡難以断魂柖太白我亦不留白玉堂京華酒淺湘雲長新亭風雨夜來夢千載相思各断腸别離情吁别离之苦兮蒼梧之野春草青黄陵廟前春水生日暮湘帬動輕翠脩竹亭亭染紅淚又聞垓下虞􅁎泣斗帳􅀄驚楚歌畢佳人閣淚棄英雄劒血不銷原草碧何物謂之別离情䏏腸剥剥如銅声不如斫其竹前其草免使人生爲情老題庐山太平宫山上清風山下塵碧沙流水淺如春不知松外誰敲月驚動南華夢裏人芦花􅀍僕過梁山泊有漁父以芦花爲􅀍僕尚其清欲易之以紬者漁父曰君尚其清願以詩輸之採得芦花不涴塵緑莎聊復籍爲䄄西風刮夢秋无際夜月生香雪滿身毛骨巳隨天地老声名不譲古今貧青綾莫爲鴛鴦妬欵乃声中別有春題陳此山扇五首秋鳴无数醉秦娥却把輕風惹扇羅明月碧澄天似水此山雲氣動纎波紅旭如鉛海上來蒼蒼煙霧小蓬萊東風昨夜醇如酒吹得桃花滿樹開翠幙低垂護午隂碧瓶裏面水痕深東風截断人間热勾引清凉養道心一簾明月􅀝闌千宇宙尤宜就夜看飛上仙槎河漢近手招沆瀣海銅盤功成不用服丹砂􅀏指雲霞揔是家清曉山中三尺雪道人神氣似梅花許魯齋趙氏南莊曉起北窓涼清談戢羽觴入簾花氣重落􅁓燕泥香夢裏青山好吟迯白日長秋風載書籍相對築茅堂和先生姚公去去迷途莫問津問來还恐不知真因時用舎固有命與道卷舒还在人百尺竿頭愁據險一庵林下楽為鄰孰輕孰重何須問夢想故園桒柘春贈竇先生行二首西山山下覔幽村水竹隣居擬卜君豈意天書下白屋便收行李入青雲功名准自英雄立得失防因去就分万里風沙􅄅南北請帰消息幾時聞莫謝風沙老不禁斯民乆巳渴商霖願推往古明倫斈用沃吾君濟丗心甫治看􅀅変長治呻吟亦復化謳吟千年際㑹真難得好要先生着意深偶成万物備吾身身貧道未貧􅀚时見物理主敬得天真心爽星辰夜情新草木春自憐斵䘮後能作太平民病起花透香風入短櫺草抽新緑􅀝柴荆正􅁨多病作身累且喜幽居見物情花爲可􅀚遭夭折草因无用得欣榮丗間巧拙都相半不許區區智力争謝梁安抚惠田晚來幽㒷入幽居擬即君侯置一區令德乆思親慷􅁣佳田今許乞膏􅃾太行西對千峰玉淇水東窺万斛珠幸着此身於此老願從楽正五人俱張仲疇送許魯齋帰山諸相纍纍入省闈先生何事独西帰心隨道􅀮貧非病老得身閑古亦稀行色一杯燕市酒春風二月楚山􅅔到家巳及蚕生日布谷催耕隴麥肥李道復偶成日午山中道停骖進歩難鹻侵苔逕滑風入毳􅂁寒在囯終无􅀘全身尚未安一樽茅店酒強飲不成􅂬喜雨誰調元氣入淋漓枯槁回生只片時依舊野雲无着莫高天闊地任風吹􅀉東宫二首艱苦勤扈從俯仰尽周旋小試屠龍技翻成抱虎眠脫鈎魚從壑漏網鳥冲天万事從今始灰心未死前十年陪顧問一旦决安危自合成功去應慙識事遲長城徒自壞􅀌注莫相疑辟􅂖求仙者髙名百丗師􅀄科知貢㪯百年􅂣屋事􅀄行一夕文星聚帝京豹管敢窺天下士龍顔誰占日邊名寛容極口論時事衣􅀍終身荷聖情願得真儒佐明主白頭應不􅀒平生金陵懐古西風聒耳過黄芦万水東流草樹枯蟾窟一年秋色近鵲橋万里客心􅀌青山故囯新豐樹芳草王孫舊酒垆壯志未磨天地闊劒光夜夜照江湖虞伯生和李平章秋谷小車詩雪餘宫草􅀮晴沙相囯朝春試帝車班馬昼移温室樹鳴鵉晨度掖垣花搴帷每命賢俱載趣駕頻煩使至家此日龍門誰执御擁經正復侍金華和周待制朝回即事三十六竿吹鳯凰九重春色絢天光卿雲㣲動旌旗煖湛露􅀄琋草木香貝葉神師東渡嶺金輿馴􅁚北浮洋小臣聀在􅁔功德拜手陳詩對日長岡子原呈王斈士岡子原頭春色濃小車晨出看西風雨餘林潤人烏好日煖沙平我馬同西引峯峦來座上東􅀚楼􅀚起天中詠帰莫作匆匆晚倘觧相逢擊壌翁奎章閤讀進中卷玉堂䇿士詔儒臣御筆親題墨色新省樹坐移簷底日宫壷馳賜殿頭春虞廷制作䕫龍盛漢代文章賈董醇書閣暮年偏感遇但歌天宝播皇仁与趙子期趍閣雜賦日出風生太液波昼橋影裏彩船過橋頭栁色深如許應是偏承雨露多雨浥輕塵道未乾朝回隨処借花看墻東千􅀣垂楊柳飛絮來時近馬鞍春雲冉冉度宫城楼雪􅀄融水未生行過御溝戍乆立起頭枝上有啼鸎屏風韋坐鬢毵毿絳蠟揺光照暮酣京囯多年情尽改忽听春􅀨億江南待漏宫門听鑰開䄂中進卷揔賢才奏名殿裏千花合傳詔堦前好雨來千花拂槛柳垂絲昼刻傳呼淑景遟聖主自看新進䇿侍臣簮筆立多時文章光􅆋過長虹來者无窮往者空頭白眼昏心力尽高堂深夜燭摇紅送伯長待制扈駕之上都日色蒼凉映赭􅂁时廵无乃聖躬劳天連閣道晨留輦星散周廬夜属櫜白馬錦韀來騕􅙂紫駞銀甕出蒲萄徙宫車􅀐多如􅀨只有楊雄賦最髙􅀉池州司直同知使過池陽聞上日好懐浩蕩為君開江千維楫車馬集亭上持盃風雨來中夜魚龍听語競明年鴛鷺􅀱朝回九華山色翠可食爲問謫仙安在哉􅀉張伯雨隱居聞道无人識麋鹿来依積海深毎従雲氣得芝术莫怪丹光穿樹林茅君自􅀐一虎下木客或与群猿吟知子此时正相憶遟余躡屩度千岑送朱仁卿帰旰江羡子南帰旴水上過從為我問臨川幾家橘柚霜埀屋何処蒹葭月滿船應有交游怜逺道好從父老􅀃豊年寒機早晚成春服一一平安报日邊興聖宫朝退次韻􅀽伯長見貽尊號於是日加上礼成告謝宗廟余東出赴齋宫翠盖重重宝扇斜從官穿柳散慈鴉過宫路逺紆天歩上夀杯深閣雨花玉貫两虹通象錦衣成五綵錬雲霞奉伺東出蓬萊道春水鳬鷖踏漢槎別成都我到成都􅅻九日駟馬橋下春水生渡江相送謝主意過郷不留非我情鸕鷀輕筏下溪足鸚鵡小䆫知客名幸得郫筒酒易醉夜深衝􅀨漢州城卄五日即事呈閣老諸斈士松隂鵠立候宫車風送宫花着白鬚水影漸移廉側畔鶯声只在殿東隅近床擬進新琴操載笔難題古􅀞圗太液雨餘波浪動龍舟􅀄試散魚鳬贈星上人潭北湘南无影樹一花吹渡海門潮天香滿室定􅀄起雲氣上衣身欲飄宝月夜寒龍在鉢銀河秋近鵲來橋豈无一箇卭州竹與尓􅀌松伴寂寥送可無上人五公昔講時听者不起坐虚空悉銷殞何由見人我名字誰與安􅀃義話巳墮尚自无亦无更問可不可不見天雨華誰能拾餘朶賦凝雲石海石不盈握隤然如委雲危岑集逺思虚竇栖微薰天髙大華断日落香炉分几硯永清潤文章互氤氲潜雷起神谷震驚天上聞亟視恐無及化爲九龍文送兄德脩南還老兄五月來作客八年不見頭揔白五人兄弟四人在忽憶中郎淚沾臆我家蜀西忠孝門无田无宅惟書存兄雖筦庫实父䕃弟􅀼餘澤承君恩文章不如仲氏好叔氏最少今亦老五郎十􅀊未知斈嗟我胡爲長逺道諸兒讀書俱不多又不力耕知奈何􅁨來毎得二三友看花把酒臨風哦蜀山嵯峨帰未得盤盤仙壠臨川側碧梧翠竹手所移應與青松各千尺南風吹雪河始冰兄帰烏帽何煢煢明年乞身向天子共讀父書􅁔大平澧州謝家通濟橋澧有蘭􅀆沅有芷相望㳙㳙隔秋水蛟龍廻夜􅀮波深虹霓乗晨駕空起千年石尉何西東天下有道津梁通朝祠東皇蒼雲中行人无忘懷謝公題南野亭門外輕塵接市扄坐中春色自幽亭雲横北極知天近日轉東華斍地靈前澗魚游留客釣上林鶯囀把杯傾莫誇韋曲花无頼獨擅東南雨後青題九􅁔圖太乙神君號東皇玉質要妙含和陽生生􅉋始通微茫綿綿蒸空神中央浮英上羅文天章覆冒下滿谷与阬旁塞无間灵无方灵來乗柔往乗剛湘君夫人鎮相望清温静好非滛傷司命元老元氣昌手執藜杖色老蒼歴刼壽命不可量少君之壽同其長离无異体合有常出入万化終不望晶明發晨上摶桒海天赫赫真金芒質錬不㓕長垂光河源混混流湯湯伯也坐視无迎􅀅千古万古何堂堂彼幽為厉為強梁朝狸暮豹方鴟張精魂熠耀志意荒招之不反巫元良屈生作􅁔沉九湘丗人傳声罕尋詳祝融仙子調玄黄九神出圗百怪藏不信請視虞公章題趙子昻馬圗憶昔從公侍書殿天閑過目如飛電池邊侭有吮豪人神駿誰能誇独善今公􅀐鯨隘九州人間空復看驊騮惟應御氣何相逐黄竹雪深千万秋張野夫壽李秋谷璿階曾共近清輝一旦雲鵬九万飛􅄪入中書今亦有两封上囯古全稀霜侵吟䄂趍朝去香惹宫􅂁侍講帰同使斯文躋壽域且休回首北山􅅔元明善􅀉翰􅁐諸公蒼烟緑樹蒲汀沙􅀒手行吟日又斜江水有时穷地脉海雲何処是天涯生前幾醉樽中酒夢裏曽來海上槎惆悵懐人重回首晚風吹尽紫􅅔花送湖南李直夫憲使君去湖南我上京思君欲見又羌城滄波留月能帰海江鴈拖雲不到衡一代豪華誰逺識百年驚畏護灵名好來不作男児事有水可漁山可耕送董慎齋左丞討賊􅀒劒光驅意氣閑也勝局蹐首儒冠古來每說􅀙軍楽此去不辭行路難使節􅄪临民志定兵鋒一㪯賊心寒書生奮力效馳逐要冩功名乆逺看題天冠山仙翁昔往天冠山夜呵鬼神衛炉丹丹成飛去杳不还薬池丹井猶山間翩翩斈子風佩環華欀鉅欐青雲端思玄尋躅果安訪鶴帰月落前溪湾䟦南嶽壽寕􅀚碑後朱陵灵䑓天柱巍太虚宝洞緑煙扉上舘赤帝朱鳥飛祝融宅南參爲旗羲娥两􅋯愁蔽􅃜􅁚緯冷逼嗟位迷四􅀚燕呉与秦斉恒嵩泰華孰崇卑五氣順布百志熈流祥阜物宣后祇雨風露雷豈其私惠尓下土尸者誰中有異人餐赤芝夜眠秋霞昼天􅌼衣以青雲裳白霓風車八極􅆖两螭七十二峰足幽棲琳宫貝闕輝陸离潜光煉魄如嬰児大丹入咽无渴飢誰其思之呉宗師神変倐忽万張施冷然御風渺何之太君歳晏嘉予期千秋万歳受鴻􅁵皇圖景運永以丕手持芙容朝紫薇旋飈天闔此來帰彰灵荅貺逹尓垂磨崖䥴我瑶華辭鮮于伯機望嶧山東方巨鎮宗岱宗群仙列侍臣妾同西南崛起一萬仞却立不屈如争雄何年天星下天宫墜地化作青芙容外如刻削中空同閬風玄圃遥相通我昔東遊訪青童群仙招我遊中峰悔不絶粒巣雲松失身誤落塵網中如今可望不可到艤舟空羨冥飛鴻神仙可斈事亦脱安用屑屑悲秋蓬吾聞嶧陽有孤桐鳯皇鳴処朝陽紅安得斵為宝琴獻天子為民觧愠􅁔南風趙子昻送呉汀洲七閩南去路﨑嶇五馬承恩出帝都地氣喜聞今有雪民生寕似昔无􅃭山城酒羙傾鵎鵡旅舘春深所鷓鴣他日相思應恨恨離筵不思賦􅌐駒采石天門日湧大江來牛渚風生万壑哀青眼故人携酒共双眉今日為君開蒼崖直下蛟龍吼白浪横空鶴鵲回南眺青山懷李田沙頭官渡苦相催過岳武穆王墓鄂王墳上草離離秋色荒凉石獸危南渡君臣輕社稷中原父老望旌旗英雄巳死嗟何及天下中分遂不支莫向西湖􅁔此曲水光山色不勝悲即㒷春隂柳絮不能飛􅀨足蒲牙緑更肥政恐前呵驚白鷺独􅀐欵叚遶湖帰絶句三首庭槐風靜緑隂多睡起茶餘日影過自􅀏老來无復夢閑看行蟻上南柯橘子花開香四隣緑隂如染凈无塵幽齋独坐鳥声楽万累不于心地春自有天地有此溪泓澄百折凈无泥我家溪上无人到只疑身在青玻瓈漫興四首竹色雨餘碧蝉声風際清方池貪緑水中有纎鱗行浮沉各異態亦足恱吾情坐乆不成起待得月華明露生夜將半澹然无所為草根虫鳴歇松梢螢度遟城市多塵雜令人心不怡兹丘亦可老巳与白雲期春晴浩元端野望忺有瞩山花眩桃李澗影㵼松竹鳴鶴聞九臯白駒在空谷好鳥何処来啼破林煙緑楊舲清河流開蓬素秋暁斕班􅀍岩花委蛇順流藻天晴去鴈髙野闊行人小故園帰有期客愁凈如掃和子俊感秋秋至忽十日天宇豁然清凉颷旦夕至林木發商声良夜不我与􅁣然心自驚古人乆巳逝念之動中情苦心嬰丗患只博身後名今我將无同聊復得此生東郊晨㒷理􅀌榜薄言東郊遊清風吹我衣入袂凉颼二幽花媚时莭弱藻依塞流山髙碧雲歛日出白煙收曠野得我懷欣然消我􅁨中流望城郭怱怱佳氣浮人生亦巳繁惠養要湏周約身不願餘尚恐乏所求且當置勿念変化終帰休奉􅂭福召命赴都過德清别業驟暄氣侯変幽園卉物凄山雲石上起春鳥雨中啼牽衣憐穉子㪯愧山妻苦􅀍虚名累未得遂高栖雪石同子俊遊何山次韻同是清閑客俱為放浪遊晴山依雪壮野水帶氷流風急松杉乱年登萕麥収生涯湏未老吾欲覔莵裘送耶律伯強得請帰東平侍父麟鳯出瑞丗不受虞衡拘郊薮亦可遊豈必在軒除明时靡遺才治丗容􅀮居振衣斉魯間脫屣風露衢衆進我独退卓然君子儒西漢有芳躅東門祖两踈路人亦嗟􅉃哀哉二大夫伊余独何幸乃得尾送車恨不生羽翰与子東南俱臨分无以贈善保千金躯贈别夾谷公二首驅馬原隰間經时不遑休昔来日在斗今去麥巳秋王事有禆益宴安非所求翩翩晨風翼一㪯逝莫留誰令麭􅀲繫自懷离别􅁨青青蕙蘭花含英在中林春風一披拂胡能見幽心相去千餘里㑹合大江潯促席談今古知我亦何􅀷此别雖非逺离思渺難任公其爱体素尚无金玉音春隂日出晨景淡散髮歩中庭仰見濯濯柳春風暢人情兹晨豈不佳誰能念隂晴人生亦良晚疲勞竟何營万事可撥置舎道焉求成出都都邑何雄䴡車馬日夕喧雞鳴趍蘭省日夕不遑眠兹晨奉明詔馳驛東西奔雪積原野白路脩􅃄塵昏馬鳴朔風起吏士慘无声还顧望帝郷更斍勞心䰟我今无家客断蓬离本根願為双飛鶴奮飛入青雲張詹事遂􅀄亭青山遶神京佳氣溢芳間林亭去天尺万狀争自献年多嘉谷合春脕花自殿雕闌􅇔戯蝶昼梁語嬌燕退食鳴玉珂友于此終宴鍾鼔楽清时衣冠集群彦朝市塵易侵啚書味方逺紛華雖在眼道勝安用􅀾􅀄心良巳遂雅志由此見何事江湖人山林未成願送夾谷分省陜西憶昔長楊獵于時始識公堂堂九尺幹落落萬夫雄􅀘衮弥縫宻能書􅀧畫工劳謙延士􅀋豈弟到兒童黄閤帰人望青雲有父風驅馳常扈從奏對每留中暫輟尚書履荣分陜右弓秦山依畫錦燕雪感飛蓬粉署趍承旧瀛洲沗竊同因公動鄉思飛夢到江東題商徳府所畫桃源春曉啚􅀫雲􅀄散青山濕落紅􅌭紛溪水急桃花原裏得春多洞口輕烟摇緑蘿蘿蘿摇烟掛絶壁飛流直下三千尺瑶草离离蒲澗阿長松落落凌空碧雞鳴犬吠自成村居人至老不相識瀛洲仙客知仙路􅀧染丹青􅀉輕素何処有山如此圖移家欲向山中住題二喬啚長江東去水滔滔誰謂河廣不容刀中有喬家女児淚何意師昏隨二豪龍虎相争欲相啖鵉鳯鎩翮􅀅安逃不見當时老諸􅁑独聘醜婦何其髙書事四首贈孫思順溪上東風吹柳花溪頭春色浄无沙白鷗有信忘機事玄鳥猶知有嵗華錦䌫牙檣非昨夢鳯笙龍􅃹是誰家令人長憶東陵子擬問田園斈種􅀲天涯相遇兩相知對榻清談玉屑霏芳草謾隨愁共長青春不与客同帰薰風池舘蛙声老落日簾櫳燕子飛南浦它年重到日胡山應識謝玄暉露下碧捂秋滿天砧声不断思綿綿北来風俗猶存古南渡衣冠不及前首蓿緫肥宛騕䮍枇杷曽泣漢婵姢人間俛仰成今古何待他年始惘然層顛官閣幾時脩槛外長江空自流白露巳零秋草緑斜陽雖好莫雲稠平􅀯籌䇿張華得治内又才􅁑亮優景物未窮登覧㒷角声􅀌起甕城秋感㒷三月江南鶯乱啼百花爛熳柳依依殘紅無数迷􅁔扇嫩緑多情妬舞衣宝鴨焚香川上􅉂昼舡檛鼓月中帰只今零落秋風裏把酒无言對落腪題山堂手種青松一万栽山堂留得翠屏隈推䆫緑樹排檐入臨水紅桃對鏡開山雉雊迎朝日去􅉂禽啼傍夕陽來山妻亦有幽棲志数日遟留不肯回過故廢􅁐一片中原地紛紛幾􅀾争至今􅀅不去留与後人耕題秋胡戯妻圖相逢桒下􅀃黄金料得秋胡用計深不是別来渾未識黄金聊試別來心丙吉問牛博陽隂德澤堂廊民物周流鬢髪蒼尚爲呉犍駐車問諸公伹飽大官羊題陶母待賔手卷范逵誠孝廉陶􅋲固英特英特未可知門有孝廉客傷哉陶母貧剪髪易酒食此意固自佳此髪足可惜此髮足可惜兒心將奈何丈夫淡相與豈以酒食多平生郭林宗何如茅季偉程雪楼􅀉牧庵參政黄雀山頭楚􅀚鍾喚醒塵夢欠從容帰來坐听春林雨还憶簾前翠万重閻静軒梅杖㨂遍西湖万玉珂春風入手重摩娑闘青竜竹能香不較品鳩藤奈俗何声破夢寒霜滿戸影隨詩瘦月横波只知功到調羮尽不道扶持力更多皇元風雅卷之一皇元風雅卷之一儒學斈正孫存吾如山編􅀋奎章斈士虞集伯生校選鄧善之贈墨士呉雪堂永寕賜筆丗安有易水良工今不傳了知膠漆用相得亦悟膏火明自煎昔從􅂪荘􅀚副墨老帰芸閣窮太玄與子欲擬毛頴傳待我暇矣磨硯磗盧彦威送鄧善之提斈江浙北門古深􅃊論思􅀉籌度自非鴻才丗訓誥何猶作夫君出巴蜀文采動京洛十年掌絲綸摛藻􅀭景鑠荆璞抱瑾瑜龍渊淬鋒鍔肯獻上林賦寕居天禄閣即今􅀚浙江眷恋晞金雀黄圖欎紫氛絳莭生碧落依然難為情清霜養飛藿春秋􅃊筆削凛􅀂執玄􅃏君獨抱遺經結髪飽􅙑劂明剖是非心㣲􅊥義理窟下視群児愚争端王正月朅来奮直筆浩然心思竭王功与帝徳昭昭日月掲胡爲厭詞林擬欲􅀚􅈚渤榮華􅀂浮煙汗簡青不㓕詞林冨声華幾人得精悍悠悠三百年篇翰孰氶纉夫君清廟器祼薦盛圭瓉五就惜繁緩九游載雲罕依依風向翔忽忽月新滿冷然时􅀨情短章不可断風雨妬芳華稂莠深嘉谷天地豈不仁盛德禀命独明廷萃群英四門延穆穆既卜渭水釣又起􅀓岩築声華何岌嶪衆輻輳一轂銮坡􅌂清韻碩人􅁔在軸願言往從之星駕命宜夙豈知彼玄鳥戢翼辭雲屋幸无素絲悲庶免窮途􅂘離離天星高皓皓雲月光􅀱鴈過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意逺沉爱結􅂨腸憶昔􅀄奉􅂬露白春蘭芳清樽罷新製妙􅃐􅀷濠梁飛景急西匿川流浩蕩蕩玄髪凄􅀊晩木脫天􅀨霜蔓草豈容惜松栢在高岡翰林子元子武庫森戈矛英声迈千古逸韻撗九州与君契金蘭投分何綢繆清和謝夷惠典刑追韓歐坐令人文煥允塞昭王猷念君獨逺邁寥落行人愁木痩楚山曉風净寒江流何當駕飛車都宴崑崙丘塵埃滿腥腐朝莫同蝣蜉􅊙谷上寒日影射扶桒枝瞬息及中天流光迅難持人生百年内昻昂何所施􅀌鴻東南征浮雲西北驰可怜万感身㑹合須臾期安得弄明月皎皎逺愛疑折花芙蓉浦蕩槳江漢涯優游以卒歲身名良不􅈥游雲蒼鱗穹閶闔不可呌徒令虎豹閑日月近輝耀濛濛八表塵隱隱万彚竅泯然一帰途伊誰執其要栖栖聖者徒礼楽懷􅆼眇閉門忍朝飢風􅀨􅀷蓬蓼今年江海去光景短萤爝禾黍滿故墟閭巷餘返照揮絃送飛鴻今古入長嘨昔我適呉㑹日夕承􅂬顔髙堂楽起舞綵服何斒斕東潮洶波濤西湖翆煙鬟北帰餘十年謬跡通朝班家禍一朝集音容何可攀悲號蒼穹逈往亊思日艱命窮时亦迫志弱体自孱安得騰化術從君超人寰執手不忍訣臨風涕空潸我􅇔君勿思君帰我當憶十年膠在漆一且各異城呉江激㣲波震澤起瞑色鵾鵬隔天地鴈鶩雜南北念我平生友愴恨摧胸臆獨看燕山雲歳暮日􅀄昃永言長風翔情􅀉􅀯風翼九月十日接駕回因遊香山寺飲于西厓之上酒酣呈主人迎鵉北去迷風沙看山西來足煙霞蒼山朝含太古色長松百尺凌雲斜傑􅀚重楼炫金碧􅀏拍闌干􅀝天立出門却得望東山紅樹青杯乱秋色痛飲崩厓吸鯨川徑欲醉倒秋風前伹恨浮雲閉白日使我不得瞻青天忽忽今年􅀒重九樹老山空復何有莫􅀅身丗愧渊明縱有黄花無此酒奉和李秋谷平章􅀫西郊春生􅀐吏飛塵外便斍髙情逺丗紛酒泛泉香清易列夢侵仙骨冷難曛珠生滄海还驚月鶴舞層霄不見雲无象太平今有象共欣良相遇明君王継斈叅政東平人送華山隱帰西湖方士求仙入滄海十二城楼定何在金銅移盤露滿天琪樹離離人不采軒轅髙拱聖明居群仙真人左右趍青牛谷口迎紫氣白鶴洞中傳素書􅃢􅃢鳴珮星辰逺寂寂珠庭雲霧虚脩髯如漆古仙子玉林芙蓉染衣水九関高塞不可留帰去江湖種蘭芷山頭宫殿風玲瓏玄猱飛来千尺松間房誦經鍾磬響石壁題詩苔蘚封欲向君王乞祠禄安排杖屦来相從和馬伯庸見􅀉待臣催講玉階西雲净觚稜曉色低天闢神州卑两漢地連竭石轉三齊含香晝永閑靑􅃈視草堂􅀷􅊜紫􅅺㝡憶東山老松樹秋風應有鶴来棲長堤芳草遍滦河誰買扁舟繫樹槎金悵薰風生殿角昼楼晴霧􅀫詹阿万年枝上烏啼早九奏階前鳯舞多供奉老来文采尽詩壇昨夜又投戈送朱本􅀄住五隆官河新栁雪􅀄融仙客帰舟背楚鴻鉄杖昼間山似玉石搂人静水如空煑茶榻畔延徐孺燒薬炉邊覔葛洪天上雲多白鶴去子規何亊怨東風王儀伯和馬伯庸韻金馬門東畫省西千官花覆􅍼光低九莖芝盖雲衣合百石銅盤露顆齊鹿柵巳營脩竹塢燕巢還􅀘落花泥上林伏日金桃熟鸚鵡來時不敢棲馬昻夫逹魯花赤送僧逰遍囯廬紫翆峰片雲吹影浙江東曇華貝葉春三月布襪青鞋山萬重禅性􅀂灰終有味機鋒掣電本來空問師此别知何處􅀏􅃌天邊月正中曹子貞礼部尚書東平人和趙子昻韻滦水橋􅁁御道西酒旗閒掛夕陽低春從緑樹隂中老雲􅀘蒼山缺處斉􅀞㦸遥臨青􅃈闥紫騮觧惜錦障泥鵉皇自爲明時出冝傍上林髙處栖柳簇金溝蘸碧波雲深貝聞瞰重坡鳯凰曲奏鈞天樂烏鵲橋通織女河萬井閭閻春浩蕩六街車馬曉坡陀山人素有林泉興奈此看明侍從何叚惟德㕘政河東人登岳陽楼群江西來与天乎天壤巨浸開洞庭雄吞三湘隘七澤中蟠萬古君山青我行持節按廣海驛􅀐暫駐巴陵城巴陵城楼冠天下風軒月户雲霧屏平生夢想今始到危欄乍􅀝心魂驚􅀄疑太極渾未判日月往復凌空明又疑此丗墮物外弱水萬里環蓬瀛湖山得意有如此况乃佳客聮簮纓金盃浮動玉色酒滿懷清思春雲生魚龍掀舞怒濤起眼花落日揺青􅁳軒皇廣楽渺遺響芳洲宝瑟愁湘靈丹丘謫仙竟何許幾欲八表追遐齡􅀌心未了忠孝願敗念緑髪潜凋零聖神一視無逺迩恩風化雨浹四溟尋常嘨聚大豕尓瘴烟一洗霜天清歸鞭咫尺覲慈母細語八千山水程孰能閑置􅀂新婦正要磊落肝膽傾飲酣拂䄂下楼去忽听過鴈雲􅁁声李齊賢青州人鳯不來韶州九成䑓作鳯不來遼東海髙䑓巳荒天未改當時别舜返崐丘如何一去三千載人間豈無青琅玕􅀌栖未必天霜寒致君堯舜我有術來儀好向宫庭間鳯􅀆鳯􅀆今當還張氷溪揔􅃹贈醫士秘方肘後愈沉痾診脉端能継叔和更效叔㣲積隂徳不湏種否滿林多錢雪界萬戸􅀉隱空兼東詹景仁山間􅀄别記詩清笑我何癡老客情杜宇声中思去就蝸牛角上計輸嬴乆知丗慮非常道毎愧丹經未贖盟容我岩前助薪水也將琴劒掛神京叚天祐沐人餞祝直清慷􅁣豪談髮指冠讀書不作腐儒酸􅀋宫文斈多髙第祖道詞章盡逹官者述正宜登玉署敷陳長擬對金銮朔雲燕樹三千里淸夜思君嶺月􅇛李兩山礼部侍郎番昜人鬻孫謡白頣老翁髪垂領牽孫與客摩孫頂翁年八十死無恤怜汝孩童困飢饉去年雖旱猶未􅀬今年飛霜先殺菽去年飢饉猶一粥今年飢饉無餘粟客謝老翁將孫去淚下如絲不能語零丁老病惟一身獨卧茅簷夜深雨夢回猶自誤呼孫縣吏催租正打門元日笋班玉立五雲階曾醉天家舞馬盃坐困庾楼分月乆明從堯殿帶春來洪鈞暖入官橋柳金鼎香傳驛使梅爆竹一声春夢曉沉香亭畔牡丹開上雷御史䑓上棲烏鸇曉寒朱簾雲静楚天寛星芒揺動龍阿劒霜氣横陳豸角冠苦透柏心風力勁清臨梅影雪痕乾渾源聞有傳家譜夜露心香借易看妙髙亭危亭新構客持觴雨浥䦨千面面凉煙外好山供水墨風前老樹奏笙簧接天净緑秋江白着地􅊮雲晚稻黄騕􅙂絲鞭歸興逸水晶宫殿桂花香次韻單徒提夆百蛮冠帶悉來庭九虎臨関萬雉城漢殿風馳十行詔唐藩雷動衆軍声海涵春育民膏澤雨施雲行天性情听得老癃扶杖語紫㣲垣畔泰階平呉養浩儒斈提㪯饒州人象山山長岳仲逺美任象山天下秀中有陸公祠聖道開千載皇天粲二儀垣墻空草樹礼貌見尊彞雅有岳山長三年今在兹祝直清儒斈教授上饒人和貫斈士月氐王頭飲器歌單于宝力寒映雪月氐髑髅飲􅁈血泥丸真人辝絳宫􅎘生時能醉其骨閼氐夜悵浦萄香拍拍春霞灔秋月賢王起舞谷蠡􅁔傳動􅂬呼两耳􅀬燈前人影半闌殘燈後有燐巳明㓕持盃本爲澆嶙峋胡爲對此傷精魂弓蛇猶能致惑疾智瑶豈是無心人頭顱如許當速朽生擒誤入􅄷家手忍將鳴鏑射頭曼吁嗟降王尓何有後來漢使諾水東猶待留犁撓盟酒漢時冐頓造響箭弑父頭曼又伐月氐王以頭骨爲飲器漢宣帝遣使以留犂撓酒与胡王盟於諾水之東谷鹿蠡平二畫断岸蒼煙喬木小橋野店村春一曲晚風樵唱翛然林下相逢曡嶂半空懸瀑平林隔岸層䑓風雨一川煙浪扁舟何処帰來上官伯圭安仁人上秦王伯顔太師右丞相今代麒麟苐一功勲王師相錫秦封作為霖􅀨三農望旋轉乾坤万囯宗龍虎䑓前春盎盎鳯皇池上日溶溶曵􅅂舊是王門客又侍金銮入九重祝元美上饒人贄王從義御史志士身未逹端居􅀂无為一朝立清要掃决浮雲披王君北方彦絢練丹鳯姿經綸有術業大莭能素持青騘入南䑓白東晨霜飛惟時揔六聀百聀不敢堕鷹鸇擊霄漢鴞獍安得窺苦心在庠序勉励廉有遺春秋􅃊大祀礼数摧毫厘温然載言􅀏匪怒伊教之青青􅁔子衿荒穢乆不洽明公欲振廢恩乂當兼施吾儒貴􅀘报豈直分寸禆胡爲往庶役猥吏令得欺以兹失生遂衣冠困􅂗泥何當復其徭庶使廻澆漓神駒一超越駑馬思驅馳芻蕘倘可問風俗期當移我生万山中耕鑿甘自恰奈何苦􅈥突雞犬不得栖遂令布衣士何由食山􅅔弹冠出岩壑逝拯斯民疲浩􅁔視行雲白日廻精輝明公一􅄃轡慷􅁣投兹詩周鈞山訪劉須溪西山一簾􅀨相對在雲􅁁取履今何代回頭恐是仙半生空四海一句可千年歸去龍須下桃花屋角煙李仲公安仁人送洪教授忠宣盛澤餘孫子分教如今住柳州此心仞不異孔孟何俗莫可回商周玉堂金馬自兹始九疑三湘因得遊蛮客舟車過如織安書時遣到蠙洲題呉間二齊老堂斉老斉老人斉老多少丗人斉不老史家父母昔斉老呉家父母今斉老當年落筆山岳光三百餘年帰此堂秋塵如煙隔精彩白髪眼明猶􅄪拜梁彦中儒斈提夆公餘山郭䔥踈似野居公餘經史足相娯雨声喧寂雲來往嵐色淺深煙有无畏酒乆閑頭上帽苦吟頻鑷鏡中鬚茅亭閑掩無人到卧听風簷鳥雀呼春晝溪水揺光動粉墻雲山倒影蘸吟觴一庭芳樹清隂薄千尺遊絲白日長風細柳塘鶯語滑泥融花逕燕飛忙乾坤俯仰窺難盡花柳無情種種香龍門天險難非禹鑿功坤靈闢此一何雄翠鋒傍矗双棖峻白浪中穿一國通方馬奔崩路南北两鰲緾繞日西東神扄求壯三都􅀔逈壓崤亟百二重旅懷䢶孟昌道韻幽䔵凝露泫如啼獨爱寒香滿竹扉信口詩成寕見悮怏心事過漸知非故山路逺音書少小院荅深好客稀誰慰荒寒一尊酒滿城風雨送春歸夏誠中安仁人元日天門啓曙翠煙寒遥想新年聖体安蛮貊來朝修貢職臣僚入覲集衣冠香浮蓂砌風􅀄静仗對􅅔垣露欲乾獻賦何年趍近宻金閨通藉未應難王秋江上饒人次韻周君和贔􅀒終風拂老懷陽春那得一枝來睢鳩不見周南化豺虎徒興王粲哀背冷極思簷外日耳聋難听地中雷翻思飛雪清冷處二十年前共㪯盃秃筆􅀍􅄄深居未出林摧殘豈信有如今抜毛本欲利天下秃鬢方知􅀒此心老死不歸刀吏守平生當得近臣簮斯文功在終難泯月裏東君有好吟王虚白上饒人贈人邵武玉佩傳光甫之未有子也病疫將死妻何嚙􅃌􅄋血請身代夫死以延其嗣翌日何卒而光甫活今六十年其子好舌遵治命迁何柩合葬淋漓血指疾呼天一􅂐才通涙徹泉厲􅀑有靈當兩活史書無愧可千年龍津沈水劒重合頭破秦庭璧自全勿謂彼蒼无老眼書香一脉一氶傳贈地理人知君􅄪丗挾囊青我亦能知造化倩好在主人方寸地渠家代代有公卿蔡九思上饒人訪太玄天師飛車擁盖下三神曠視斉州九點塵黄石谷城千載意翠壷蓬岳四時春嵩髙海阔丹書逺地闢天開紫氣新見􅀃桃花紅万樹扁舟來问武陵津雜興欎欎桒与柘環圃俱凄凄采之楽蚕飢復見靑滿枝廣疇稻苗多種之恐遟遟蚕婦与老農何甞一觧眉芳春各載酒競覩羣葩竒錦衣与稻􅆝辛苦元不知鵉鵬与騏􅂹迹逺識者稀􅔏鶴与鷦鷯或亦摩天飛和鳴相上下惜无養由基閉門思古人玩物真何爲聖賢不我欺千載還相期張伯逺餞祝直清朝餐狙林橡夕飲虎窟泉幽棲豈不逸於道為未全是以少㣲星含輝麗中天雲蘿謝招􅀮冠帶趍興䝨魯生賛制作啇老安疑然董子述徴験賈誼明經􅁠盛徳有遭逢志士元棄􅂢長貧􅀂忘丗一岀垂千年折枚楚山阿賦詩江水􅁁寂寞思古人中懷為君宣象山山長岳仲逺羙任帰浙石泉笙磬静微聞百尺蒼松立在門道斈宗風陸夫子故家遺澤岳王孫忠臣有後天心定治丗无爲聖教尊官序改迁従此上記曽師友渉渊源龔楚清送孟和卿平陽尋母杜羔念母心最苦豈意一朝逢澤潞母驚兒貌似乃翁兒抱母啼淚如雨五十孺慕朱夀昌刺血冩經毛髪蒼間関同州晚相見迎侍親興帰故郷人生百年一弹指母恩未報情曷已團栾樽前舞綵衣大勝丗間朱与紫子行万里渉風沙誓不見母不還家兒今髪葉母應老道傍􅀚者還咨嗟臨川孟氏號雍睦家丗來此澶渊族婆娑老暮紫荆花料想春風依舊緑黄伯玉上饒人贈相字倉頡紛紜巧思傳多君巧外更玄玄萬形一理推无尽試究庖義未畫前白仁壽上饒人書亊大羮元无味大章夲希音音繁入人耳味美適人心是以保身難揣揣如臨深百􅀾苟一失勇氣未足欽今􅀂不斈古後何法于今王子東上饒人採桒􅁔翻雲烏鴉影鬖髿颭風白燕双傞傞横波凝流歛螓蛾呉蚕飼餧飢則那十纎挽柔剪緑柯六幅暗露侵􅃭䋪饔飱驀誤晷􅂩過蚕飢葉稀寕不瘥千頭万緒豈敢吪終以暖亊期絲紽錦帷繍幌相婆娑人情好耕不厭多􅀝門刺紋來听􅁔載青載黄胡側頗樹間耳語慎勿哦万一出口他人訶纂纂桒葚如鳩何新春新月㪯頭見新月低頭過新年新年幾回新新月幾度貟錬石屑宝功難全娥能􅀼薬終孤眠夢中蝴蝶飛翩翩花草何意争春妍􅁨杞之􅁨逐夸顛无情有情怜不怜長星不飲酒􅈗牛不服田東風觧織千機錦要我來看在雨前張洪崖神遊圗洪崖即果老唐玄宗以玉真妃故洪崖去之往來長安􅀐白騾名白雲携五童以酒瓢詩卷書囊随之開元天子舊相知一􅀏曽縁降玉妃囊括無言玄自得瓢虚有酒醉同歸曉山殘夢清塵逺春圃靈苗白雪肥回首長安西日外神遊何處片雲飛和胡梅復白鷴􅀂爲見月倍思家偶意名禽起句華拂羽增明聮縞袂綴冠合粲蹙嬌花朝尋暖草雲連谷夜擁寒坡雪載沙尺与鶴琴清作伴可能无夢繞􅃄霞中秋青天化作白玉盤棒出七宝玻瓈觴姮娥起舞太白醉如此風流何可忘北斗酌取瓊河漿秋風製就芙蓉裳龍吟泓下虎嘨壑誰能着耳听嗁螿呉遜齋文譲龍溪縣尹戊寅雪後和謝提斈韻鏞城正月雪􅀄霽賸得官閑吟嘨中萬國山河開夀域九霄風月播春融竹依柏樹増新翠梅與桃花间小紅王化盡无偏黨處故教冷暖揔相同新創暖閣謝小山韻未斈渊明去惟賢康節多人生貴眞正物育在中和待阙聽常選隨流創小窩静心无箇亊得􅃐付賡􅁔蔡舜謨呈鄧善之廵遊江東道白日千年天有定青􅁳萬里月无声相期逺大崇明徳力賛雍熈荅聖明荅方漢杰雲舒黄道日光輝遺逸山林固未冝毎嘆劉蕡文字美獨怜徐楽䀻書遟艱難適足成吾亊叢挫何能䘮自期北極去天无咫尺滄溟到海有枝岐康秋山留别撥灰好共話冬闌莫歎无魚鋏便弹更爲梅花留半日勝如别後􅀉來看呉宜甫文誼内齋一所顔曰養正翰林斈士虞邵庵先生作記賦詩一首且夕自警養正深期徳日新詩書万卷友前人自脩巳是工程定熟讀方知意味真豹尚隠時文欲澤蠖於屈處義求伸􅀛山屼屼千年在道脉綿綿一氣春外齋一所顔曰斈思思斈進士張在中州判依記賦詩一首旦夕自警五典三綱與四維鳶飛魚躍貴真知霜前㰖实甘回味雪裏梅花不受緇家在先儒文獻里生逢天子聖明時􅅥然起立晴䆫下題作斈思思斈詩方寒巖别館别館数􅀌路無聊謾坐窮長年人亊外求夕客懷中无酒睡難着有書貧不同衾寒起附火挑撥幾星紅楊原巖九日過大勝関􅀫黄陂小飲瘦藤髙樹欎荒寒细路懸崖重險艱征􅀾幾何餘白骨郷関如此隔青山驛亭帶暝人争聚澤囯經秋鴈自还滿月黄花一盃洒人生何地不開顔姚江村大愚寺即亊雷公逐龍度松丫急雨横穿日脚斜開戸不知渠水滿一時浸倒玉簮花方景山雜詠十首反哺烏曰慈食母桒名惡如烏莫如桒人心當自斍馬舞睨禄山猴朝識朱温人豈不若獸変故􅂺􅀒恩鵾鵬奮雲霄尺鷃棲野草物各適其夭夫豈論大小蜂房開户牖蟻穴有官守究竟物皆然夢幻君知否小哉蛮觸􅀾鄙甚蛙龜怒逹人能大􅀚夲以和平故瑞丗鳯鳴陽司晨雞鳴丑呶呶取人憎亂蝉合緘口蚕蠒毎利人蛛網偏害物利害夐不同其間僅絲忽猿啼不窺䆫牛馴常露地伏虎与降尨此理元无二觧牛中肯綮相馬外􅌐黄従知得三昧意到形自忘蟻封罅􅂩地蛙井咫尺天那能致廣大此道誰為傳皇元風雅卷之一
