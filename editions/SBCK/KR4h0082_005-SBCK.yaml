front:
  text: 皇元風雅卷之五
  hash: sha256:9de6ce21f8b5118c8c33fdc2ebe4f7a07e8ef375edb83a2567893f7d3ac9d9fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_005-1a}
body:
  text: 髙若鳯題朱進士御賜詩憶昔霓裳清夢遊廣寒宫殿欎㠝屼神龍乆矣乗雲去猶有􅌐珠落丗間遊白鹿洞書院碧瓦参差儼否壇白雲深鎻洞門閑不宗朱氏元非斈看到匡庐方是山十里松風潮洶洶一溪泉雨珮􅃢􅃢便當卜築書䑓近五老峯前任往還送謝有源閩中醫官出山只爲有源長散作人間六月凉從此不憂丹荔渇宝塘一􅂀冷於霜斑資髙下不須論一歩青雲亦上恩小試参差醫國手有人􅁛是野航孫贈相士張月梅清光萬里飛銀闕歳晏天寒桂香歇舎章殿是廣寒宮月似梅花梅似月丗間有梅有開落天上有月有圎缺乾坤清氣鍾於人千古不摩方寸鉄月耶梅耶杳莫辨浄色寒香两竒絶西山有雨南浦雲反覆紛紛異凉􅀬槎仙老眼閱人多獨獨來尋㶚橋雪月梅巳寒雪更寒窮年三友長相看論詩論相神自完出門一􅀏天地寛張叔􅊙送􅅬玉霄我恨江上水不能洗離愁又恨江上水不能爲我留日黯黯雲悠悠胡不推出黄金毬照我一􅀏送沙鷗爼豆萬古相賡酬風流此老黑貂裘飲乾海水蛟龍􅁨人間奴鬢秋筆厎巫峽流傲睨幾何同一漚識我不識吾何求安得從此長嬉遊昔日閬風今瀛洲江水洗得離愁不爲我留住江上頭三百尺酒楼五百斛酒舟許献臣次韻蒲平章致仕君恩許老重增秩相印封囬不􅄪関石以􅀘天還䄂手雲能成雨便歸山力將冨貴推身外倒卷乾坤入酒間緑野堂前看絲竹古今誰得似君閑題賔月堂人生自是人間客月亦天邊􅀉此身彼此虚空無着處誰欤是主復誰賔趙蒙齋題釣䑓君因卿相􅀮我爲利名來羞見先生面黄昏過釣䑓倪中豈贈張原性金華尉天風吹鴈秋影寒客子晨出燕城関青龍斯煙雜錫銮腰蝺割玉羅翠乾金花出匣双蚪蟠盪射婺女光䦨干春萱花煖荆􅀣合酒光入鬢顔渥丹風雲落筆神鬼泣眼見老鉄生詰盤朝栖崑崙圃夕飲砥柱湍但恨雲路無停翰東海百尺青琅玕倪若水過揚州雉堞平來塹擁沙緑蕪􅀷処見人家山河舊影藏秋月関塞新声起暮笳王蕋巳為庭下草蒺梨不是眼中花當年鳯舸經行処枯栁無枝􅀉􅀫鴉范德機過西芹路􅀮岩崖逈橋通屋舎重鳥啼黄葉寺泉注白雲峰市販賖柑柿畬耕間竹松行人報山郡失喜問萍踀延平江閣山势包重險津流合衆源詎知従事劒不􅀋大夫魂光彩潜猶見精忠死尚存幽靈如可問吾意豈忘言奉同廉訪使君洎寮友遊愛同寺閩粤古城東千岩半􅆊宫冐寒尋水石尽日􅀝虚空鍾鼓何須急壷觴亦有終翩翩北海寺碑版翠無窮􅀉武夷杜徴君洞居清隠士时接武夷君斾影岩前見山香石上聞不爲珪組累焉有市朝分暫得同麋鹿終朝試與群謝張伯雨題東坊藁次勻騷靈逝矣不堪呼幾欲南遊信楚巫城郭煙濤乗白帝星河風露浥黄姑幽人昔恨九関豹佳士今猶千里駒冬客資君相慰藉可能無意謝飛鳬送王中庸歸唫法楽洞前曾一遊君家聞処洞西頭石潭正照猿猱月山薬曾經虎豹秋豈意呉城祠下路共尋揚子岸頭舟􅅐中富有天官斈莫為周南乆滯留蓮房憶得花神一􅀏􅌚六郎家住小江千佳人怨等秋風近稚子眠听浦雨寒強為折耒開户牗誰將鎔出擬盃盤少年太守思兄弟戢戢青頭莫謾看桂子盡輸金粟三千斛換得瓊枝数􅀧秋定是月中嘉種失却従丗上異香浮石岩夜見呼猿摘薬臼晴􅃻伴兎収十日天台誰得見西風吹夢落山頭送夏蘭同知㑹昌承聞吉日上江船佐命分符落鴈邊野舘溪頭三晋雪山城留下七閩煙庭春花氣迷銅墨市瞑溪声斈管絃何日周廬尋夜直倍知报政九重天㵼露亭􅀄秋白露降爽氣逼虚愇薄林方泥泥洒漠復霏霏暗襲玉堂悄斜飄金掌微鶴眠寒屡警螢火􅊜猶飛葉垂知月朗花艶怯朝晞蘭飲畏朝墜草霑傷夕帰為霜當夙戒去日漫增欷俜停呉宫女三月採薔􅅔挹彼枝上香散入舞裳衣千歳亦不㓕但恐願相違君子保丗澤在乆愈光輝題廣居家藏東坡竹古藤尺五霜烟交不見長身見墨梢千載髙風猶一日莫妨儋耳住無茅贈廣居查尊師逺遊查君斈道恋名山庐結東南紫翠間更憶皇州春色好却辝仙舘􅍼光閑千年城郭逐人去八月星河奉使还莫爲崑崙無覔処早􅀅詩賦動江関奉􅀉翰林鄧侍講􅇮承持節江之東􅀐鯨􅄪上蓬萊宮蓬莱仙人􅁔白鶴声落五湖烟雨中丗間爵禄不易致何獨去就如飄風朝廷礼楽須制作六經隠義資發􅂪論思廟堂集耆碩啓口寕譲前諸公閉門讀書古都市四軰冠盖方􅂭隆我生生長在窮谷那有文字争人雄謬􅂪引喻百僚上􅀒禄府署慚無功一别十年还又五昔者少壯今成翁誰知復客七閩下隔二千里来詩筒嬴躯頓醒瘴疠􅁖頼以慰此心忡忡粤王城南浪自日粤王城西花正紅經石門旗摇落石門秋水清殘僧楼字映沙明買船欲上旴江去路轉峰南聞鴈声泰定二年秋􅂪恩供奉翰林未行改閩幕自豊城便道取疾繇撫過旴与那守薩侯會約尋麻源不果翌日到旴暫逺雲霞􅀚却希山水音珠星聮社下璧月動江潯始集宝氣亭復趣金精岑輟棹更垂釣推書時弄琴石門生夕景麻源籠曉陰是􅀖遇賢守佳致契幽尋樽爼迫清好絃􅁔彰古心郡中宜鳯集泓下或龍吟頗愧塵務通还為旅􅀫侵一行混吏執千載􅀒啚琛即往亊莫究于兹念方深姑山如有意遂許一登臨順昌道中冉冉秋序髙勞勞客程促如何霜霰文不見原野粛顛崖絢夕紅古澗􅃞寒緑非惟藤蔓敷亦復芳氣馥物生固有常氣候殊過續以兹羸集身動往居瘴毒念彼閩村人田稀口如粟耕種上青雲妻孥力凉燠吁嗟公私弊群需待其熟安得廉恥吏俾之食常足上以承恩光下以厚風俗丹心映皓首我何自拘束玉䑓曉出玉䑓道山川稍夷曠只愁灘石際磊落更万狀市楼􅀝崖岸山頂列石障是中更有人􅀮約葱倩上我願從之遊長風渉玄閬还帰保精路髙視神目王空濛飛鳥過􅆭淡囘波放由來心力疲㑹意乃益壯十月十八日至懷安縣是夕入福州山城列障駐餘霞水与長空逺映沙芍薬省中人望華荔枝林外客思家遥遥徐市三神櫂渺渺張騫八月槎蚤歳斈逰今白髮不應猶恋棗如􅀲望潮曲潮來直上青崖住潮住却尋滄海去烏石山頭望故郷故郷更在雲深處我生不如橋下水消息春秋任流止又不如如水上船去去來來年復年􅀒禄覊􅀌二千里上念慈親下妻子子生未觧别爺啼睡恋阿婆懷抱裏烏鴉日日傍人飛喜鵲時時噪郡西更有平安書字到金壷約伴玉人携平䑓晚懐落日微風生晚凉平䑓西上万山蒼佳人獨不生同丗楽土那知是異方海岳雲霞千古意郷関道路九回腸丹青不寫帰田賦猶以虚名累霍光􅀉李秘書洞秘書出是蓬萊􅁐流落東呉又一春見月定還􅀐鶴侣開秋宜讓鱠鱸人吾曹事業徒温飽子等居諸異􅀮淪海表何時携手載相怜同是老詞臣送别周儀之推官赴錢塘井簡李四秘書武帝龍飛第一春京華相送各沾巾詎知邂逅文身地緫是棲遟皓首人山驛蛟眠星滿洞水郷鴈起月迷津若逢李洞南天竺謂是前書感謝頻懷京中親友海上經年思殺人絶憐京囯旧交親過江唯有傳柑使􅀉得書回是暮雲絶句日浄芙蓉逺春明芍薬長誰怜玉蝴蝶正似錦鴜鴦東署習静天常見居深路近通隂階垂葉露空院長春風春日西郊春風千里福州城緑水青山老送迎惟有垂楊偏待客数株殘雨帶流鶯佳人不譲海棠嬌喜見天睛挹露饒􅀂使有詩寕費日便今無酒亦終朝江上登䑓望眼迷西禅更在石岩西尋常楚嶠看花日此処新苗緑巳齊南澗清晨不易得有無更似此時春朱桃皓李都隨丗紫蝶玄蜂故趂人題先天􅀚圖斈仙之人与仙爲徒住在匡庐之奥湖江之區張公煉丹作龍虎丹城御氣遊六虚後來出者絶代無何不斈仙住玄都玄都之壇角井􅀌上摩萬里之黄鵠下伏千尺之飢鼯隂森檜筠自太古斬種力與開闢俱扶桒朝日掛絶壁坐見楼􅀚青糢糊擘崖控石㵼哀湍春秋雲露芝田􅃾我亦人間山澤灌偶陪䕫龍賔唐虞有時一醉黄公壚振風三日撼不􅂫折花不得度弱水渾手始識仙凡殊玉堂斈士范与呉遺我兹山之􅀞圖尋䆫数户乆嘆息無因置我双樗蒲独行幽人不受呼掃葉青澗听啼鳥日暮羅徑相縈紆相縈紆向何處明朝爲借麻姑鵬我亦􅀐之上天去鄧文原貢奎元明善同􅀚此詩於玉堂爲之嘆賞故書孫存吾餞虞伯生帰隠天地毓精英文章䊮徳星虞廷春色滿翰􅁐月華明帰􅀮琴青楽朝回軒冕輕凡才倩俱蓄薬龍備參苓春日遊黄鶴楼挿天棟宇接雲霞八面玲瓏望眼賖寒谷春回江夏柳晴川日映漢陽花珠簾半捲琉璃滑宮扇􅀄開翡翠斜日近天人聆􅀏語廣寒宫殿􅀮仙家秋思鴈落西風字字沉嫩凉偷入藕花心眼前多少関心事付与寒蛩徹夜吟張息堂題衡陽刋匠曾子謙字􅀃手卷陽氷謙卦妙入神當時鐫刻知何人至今宝玩逾琬琰字体清勁無失真謙謙于謙能辨此手揮鉄豪出文字功成何止地中山鑿破乾坤六十四甘東溪夜坐林風自䔥蕭山雨時洒洒丈夫七尺軀地炉使吾矮早睡病來貪睡早推月出山前月色不相捨小窓还自妍酒醒酒醒桂花發彺􅁔對花前林家大罵我夜半驚人眠書生踉蹡趣講席讀誦闘髙声我亦曽如此而今白髪生歸舟片帆懸空秋滿腹凉月淡淡天無波平生湖海元龍意早入西風漁棹歌天壌豈無􅂫季子恨我不識韓荆州遥山蒼蒼暮雲碧何許一􅅇芦花秋下豫州壯懷忍共白雲閑􅀌􅀒僧房屋半間賣却牢愁三萬斛載將明月入西山託意舊時灯火不知年託意篇草未丗傳胸次只今無此事听風听􅀨過殘年新春花紅柳緑也逢時潤色青春有小詩人丗若無吾軰在東風寥落亦堪悲看梅独坐匆匆不自適出門偶見梅花開自從開闢到今日此是東風第幾回暫憇平生湖海遊南北東西路幾度夢殘時雲深不知處過南湖小酌忽有一事碍胸次擺脫不得呼酒來􅈚溟濛濛混沌在坥坦蕩蕩虚空開精神半生留筆墨形骸昨夜爲樽罍年年看梅今白髪晴日江路行莓苔薩天錫采石驛客路青山外郷心落照邉潤清浮野樹凉雨過淮天水調誰家􅅇江帆何處舡蛾眉亭上月今夜照􅀌眠采石懐李白夢断金雞萬里天醉揮秃筆掃蛮牋錦􅂁日進酒一斗采石江空月滿船金馬重門天似海青山荒塜夜如年秪應風骨蛾眉雪不作天仙作地仙過石子岡霞光日落紅穿樹山色雨餘青近人便好拂衣入山去觧鞍辝却馬頭塵次王叔能侍御史龍蛇偃蹇出墻隂五色春雲態度深䑓閤文章散清氣月明山舘夜䔥森次繁昌邑宰梅双溪韻矍鑠繁昌宰曾充􅀚囯賔儒冠猶破帽礼服尚垂紳澹泊心无愧清癯自有神老膺朱紱貴驚見白頭新撫字三年政􅁔謡百里民林彦􅙫元㑹習儀和鄭子完西山晴雪照堦墀法曲天香㑹合時在野只知堯帝力進朝方識漢官儀日明黄道瞻丹扆春滿青都擁翠旗冠佩又承新􅀨露太平報效有深期李源道次韻送虞伯生使蜀降香城南尺五去天低廻首彤楼十二梯六月岷山猶有雪三春雲栈逈無􅅺浣花溪上看秧馬芳草渡頭聞竹雞見􅀃草堂遺􅌟在公餘須到錦城西喬木千年劫火催峩眉峰頂自崔嵬岷江東去人西上驛馬南嘶鴈北来蜀囯山川明似􅀞文公風化冷於灰太常直筆今詞伯旣倒狂瀾頼挽回皇華驛使氣凌秋風槩沉雄隘九州金莭暫辝金殿去錦衣还作錦城逰文高方朔三千牘刀善庖丁十二牛好向名山瞻勝境瓣香遥捧祝宸旒夏果齋和山間秋日見􅀉門前絶愛竹成坡室迩其如人逺何亦曉不如帰去楽真成無可奈何􅁔詩翁自此工難少俗子於人一揖多何日同君秋月下桂花影裏舞婆娑過洞庭萬里玻瓈一掌平􅀝蓬人去似􅀐鯨掃隂雲霧天無影弹壓波濤夜不声一劒秋横神􅀑泣片帆風勁死生輕詩成不用漢人語怕有蛟龍听得驚上囯簽亊時作教諭巳四年早年化筆妙衡銓棫樸書莪意藹然名莭綉衣雷漢上精神玉樹晚風前古人針芥􅅻三語今得虀塩巳四年昨夜書幃光彩動使星烱烱斗牛􅄤過岳縣水紋如席浪花収謝遣湘中鹿角舟白露巳過秋日淡青山未了曙光浮諸賢豹変雲生足老子龍鍾雪上頭可惜隔江灯数􅀧匆匆過却岳陽楼送王副使美觧􅀲戌無情逼歳年帰期行色占春先􅀯啇北賈多遺爱剰水殘山有􅀫縁青柳一枝江上酒碧波千里月明舡衣冠文物傳江左好在家声續晋賢胡斗南悼文山烈指西風感别離乾坤人物太竒竒生為孝子忠臣􅂆死有皇天后土知万折江流魚腹石千年人立首陽碑一門史氏春秋筆愁把湖光入昼時陳中山餞理伯容調江西憲􅁺五阨春官第重登憲府新人皆形跡避君獨肺肝真日飲瓢惟水風行篲掃迎明朝江右客秋色滿湖濵奉題丁氏竹堂并􅀉庭玉嚮仰之意慈州二判經年别黄鶴山前見阿咸聞築新堂臨水勝剰栽脩竹与雲􅂙午風窓戸清含雪晴日琴書翠滴嵐欲拉王猷時共造幅巾揮塵縱清談餞郭端友赴椽巴陵并􅀉希仁兄問訊之敬送客巴陵目逺鴻英年嘉樹玉青葱門趍昼戟諸侯貴地閱輿圗七澤雄極浦揚舲清漲濶亭獨迂轡碧霄通别来安穩懷鄉否煩問同年鞠賛公題甘文卿杏隠卷祢子洲前万杏花一壷仙􅀮客成家抄書詹下分香露洗薬溪邉踏錦沙布素屡煩卿相揖劒芒終拂斗牛斜曲江又廢明年㑹㘽樹何由見􅀝霞餞姜華甫調武陵􅁺府史才猷俊沿書調武陵秦袍懷舊澤肱􅀍割秋綾茗椀茱茰苦艚舡杜若馨滄浪濯緩処搔首憶吾曽宋梅洞挽胡軍慰搏虎鬼猶泣屠龙地亦沉无兄寕有昔有弟必无今鍾鼎他人手舟車過客心不堪回首処殘月堕花陰哭岳王天意只如此􅀅軍重可傷忠无身報主􅁈有骨封王苔雨楼檣暗花風庿路香沉思百年事揮淚對斜陽龔子敬送楊志行纓冠楚楚濯滄浪彼美人􅀆淇水陽大府乆須唐令録中州正用漢文章只今滿眼真能幾遟莫相看耿不忘至治朝廷天咫尺載哥丞相㪯䝨良送秦􅁉之􅀘􅀯䑓􅁺􅀯䑓礼意特相招送客溪亭自寂寥夜􅀨灯前春幾許清風扇底暑全消中司執法分曹􅁺掌政名臣佐使軺捧檄還應為親喜宦途䓁是上雲霄題張氏所藏石經洛溢河清丗之季鈎黨諸䝨死无避橋門冠帶此何时詔与群經正文字議郎郎􅀅􅀅頴書􅀚者繽紛門外車似􅁨方􅁽重灰烬且可䥴摹辨魯魚南䑓四部存幾磧誰見丗間完六藉漠傳區區掇拾方到今不是糊塗墨述懷柬張仲实教授霜清起病骨卧乆忘蘧蒢殘息不煖衣短髪漸入梳渉丗何用早意適事不如旣知非所能裁足不願餘薬苦尚可飲家貧難可居秋来窘繁隂百畒沉嘉􅂼滯穗尚采掇吾生愧耕鋤南䆫美朝陽昔賢遺古書風竹如應門一室自掃除西庠張公子為我日回車言􅀏適相娯綢繆焉得䟽掘山薬哥緑薜紫藤緗色子種玉綿延香透髄晴虹歳晚香不起托命長鑱山谷裏小隠墻来塹薬㯗􅷣玉政得才槃槃服食相傳養生訣茂陵刘郎和露啜病起試筆十韻積雨迷空闊翩翩多去舟􅀅家值卑􅊜无事淂清幽安石非高卧義圓巳倦遊壯心適如意短髪􅀉搔頭病約山容瘦閑窺鴈影浮双扉寒自語一榻淡相留香􅂐縈紆晚􅀞屏潇洒秋黄花荒古道白日起滄洲不死千金薬平生百尺楼暫分仙枕夢遥訪羽人丘謝陳壷天惠􅈉寒蒲縳來腸巳無枯骨褁肉肉自􅃾爲君喚醒江湖夢􅀌蓬细雨声相濡貧家不辨滿眼酤槽頭酒滴红真珠起來獨坐秋風裏一徑晴寒菊数株梁隆吉題葉東叔賔月堂人生自是人間客月亦天邊􅀉此身彼此虚空無着處誰欤是主復誰賔李古淡題子卿牧羊圖自是天工肯放回二頭羞殺望郷䑓漢風㰝散羝羊隊却入麒麟隊裏來李誠泉寓洪中秋翫月金水鎔成一様秋三千丗界雪光浮城中見月能多少擬借仙人十二楼彭容庵贈彭鉄面相士只戴黄冠不象冠双眸􅆼碧兒蒼寒江南多少秋風客蘚若山人一􅀏難仇仁近潮一痕􅀄見海門生頃刻長驅作怒声萬馬突圍天皷碎六鰲翷背雪山傾逺潮魏闕心猶在直上嚴灘􅀔始平􅀉語呉兒休踏浪天呉象罔正縱横呉漢儀贈楚山樂路教之金陵謁御史官滿豐城車載膏逺從建鄴覔同􅂁雨香芹泮春風轉霜重柏室秋氣髙青眼故人加顧盻丹心即日表英豪金陵山水多佳麗伴客登臨莫惮勞吹簫歌贈金精山人陳天佑金精之山何岧嶤夜深明月凉蕭簫中有可人好絲竹抱明月􅀆吹洞簫簫声鳴鳴響空碧潜蛟起舞山魈泣含宫嚼羽妙入神月落參横朔風急曲中却憶秦樓女秦樓縹緲知何許鳴鳯双飛竟不還至今遺事傳千古君留呉中猶未發我亦知君調殊絶明朝却賦帰去來吹簫還弄金精月皇元風雅卷之五前集皇元風雅卷之五孛术魯翀翰林斈士色目人題周益公墨跡今􅀚益公帖老氣粛鋒鋩孫氏青氊永宜開宝墨堂題周益公荅孫履斎帖丞相裁書荅布衣慇懃辝翰緫珠璣秋風吹落蒼松樹二百年來此道非孫義方壽慶堂誰似孫家鶴髪親昇平重見至元春生兒不必公侯貴日聚詩書福縉紳理伯容江西憲椽餞陳中山沙羡一樽酒别我同年兄同清更同苦春曉都門行南楼又相識即别難爲情浩浩長江流忍听陽関声甘恪餞理伯容赴江西憲椽朝辝江漢水暮􅀫匡庐山番易匡庐下中有蛟龍関龍君閱丗乆風飄司往還理子賢良資神􅀑敢有奸逍遥十二仙遟去声子湖之顔髙髙粛政䑓去去登清班坐􅀚黄鵠起邈焉不可抜端逢縻處士攵酒楽餘間陳是􅀂餞伯容南浦秋髙蒲葉黄騘馬行行之豫章渥洼神骨特竒俊龍沙勁氣故蒼茫貂蝉八直月未曉獬豸當途劒倍光人材巳是科名得送君猶自望文昌劉孟曅餞伯容沿撽東行玉節光匡庐双劒照寒芒文星移次傍南斗楚水餘波及豫章白簡明分千里月清標氣粛九秋霜斯文幸託蘇天庇伴水春融芹藻香劉夢羲餞伯容白髪重遊漢水濵㸑桐幸遇按絃人詩書潜翫簞瓢楽山水清幽戯筆新天霽蟾宮髙獨歩霜寒栢府寂無塵一樽好共南楼月别掉西江浩蕩春張小山四明人次韻酸斎君山行蜀江湘流合千里中有蒼崖壓秋水仙人金冠坐鉄船反披紫裘􅀄醉起小龍二女相從遊眉山低壓青黛羞􅀉書不通双淚流三十六宮明月秋花边間䄂玉堂手老來頓斍嫦娥醜岳陽楼下喚開門神仙幾年曾醉否抉雲老鶴去不還青青一􅀧天涯山天劒􅁔將軍躍馬來南荒腰間古劒白練光鸊鵜􅂗香魑魅泣寒芒熠熠勾陳蒼龍髯髙釘珠堂月玉華曾拂楼䔵雪爲君尽斬奸臣頭天狗三更下䑛血章伯亮雲南人次韻唐佐自京庠㱕覲天􅁁清湛如璜水筆底生春多秀士摩空三百六十字凖擬明年献天子西江千樹梅正花家人祝鵲催还家愧我汗青頭欲白夢到雲南与天北行路難奉君七宝鳯凰之綉柱五色騏麟之錦裳王母九霞觴中之酒秦女万􅈁炉中之香去年紅花今年開昨日紅顔今日老一生三万六千日􅂬日願多愁日少對呉􅁔看楚舞􅁔舞匆匆変今古歸去来莫行路拜帖穆􅈛唐兀氏溪山春晚㒷来無事上幽亭雨過郊園一片春路失前山雲氣重帆􅀵逺浦客舟停笛笙野舘二三曲灯烛林坰四五星坐乆不堪聞杜宇東風吹我酒􅀄醒趙由儕述祖詩悠悠我祖始于軒丘旣歴髙陽秩秩大猷爰自伯益舜錫旱斿中􅄛亊商造父御周征彼徐方熊熊有功邑于趙城大河之東建氏晋囯耿先其封成宣喻日長夏爱冬岸賈作難嬰臼立􅀌㐮子始大常山得符於赫烈矦懋建丕圖粛矣武靈兆配有虞西漢子都生長河間曁于唐末今族居燕小迁大梁丗系緜緜厚徳豊功宜永其傳中罹多難南歴江沱眷焉吾宗豊水居多百川有源衆條有柯庸修家牒克俾無訛顧予伯仲一爱患多更瞻嘆古烈自怜其生其生豈偶三辰垂精徳業未進敢不􅀾兢我心伊何常念厥􅀄感彼霜露愴然躊躇奉先如在宗戚相於亦有諼草髙堂可娯惟忠惟孝立身有本嗟尓後進朂哉自勉万有能銷斯道無泯温恭朝夕云胡不謹顯親􅀭名俾昌俾熾善保家声期于勿替尚念前人留心譜系受天之慶逺及苗裔臨川呉先生讀之而嘆曰純粹忠厚自德性流出油然冲和之意真古人之詩也盖其有本是以􅀂此又曰中山年少於吾吾不敢以友命之也泰定甲子十月十九日囯子司業蜀郡虞集書思親詩予讀魯斎許文正公七月望日思親詩因見其天理沛然自胸􅁭流出永感者聞之必増其悲具慶偏侍者繇此寕不加敬自思兄弟往年當䘮乱之餘不幸失怙藉慈母教養成人真昊天罔拯之恩也􅂺推廣其意而􅄒五言古詩一篇五十二句以紀平居之懷納之書藏􅀅示後人俾知所自云尓庚戌􅀊二月望日中山居士趙由儕識一自先君逝行􅀅四十春音容尋舊夢感􅁣試詳陳巳歎生縁淺還思故囯屯吴江悲血􅀾粤嶠困車轔共吒艱危甚􅀹驚賦㰸頻朔風吹廣野赤日照流塵旣洒呼天淚方為辟地民抚时非往昔感憤竟湮淪翕霍傳梅外倉皇問水濵諸􅀌隨弱母大慟向秋旻越歳寕戈甲帰郷辨穸窀酹觴號雪夜扶柩復霜晨家緒中微甚人間亊一新孩提慙不肖操守頼慈親絡緯灯前敎䄡䄖膝下馴田庐勤保任門户幾􅁨辛文献由先徳扶持荷化鈞萱華明晚景荆樹際芳辰眉壽斟瓊蚁春暉奉綉茵雖非登執要自不厭清貧弩力尊天爵勤心報大倫帰全期不忝化俗異還淳信􅇘存家乘傳芳待後人年年思雨露嵗嵗省松筠至念通天地長􅁔感􅀑神珍藏帰韞匵大孝慕終身南豊趙母立夫人曠志云歲下丑佇禹公殁子㑪六􅀊份四􅀊耳夫人出万死一生親葬公而敎養其子以成其家㑪旣尊徳楽道价又勤生致養能如㑪之志其女適危氏者孝敬亦不移夫人身安心和享孝養者三十餘年而後終君子曰此非宜報其勤苦也盖其積徳之盛所以感畜冲和者有非偶然矣集与㑪有千載丗外之交信其内行淳備故知其所以亊親者非止甘㫖之奉温清之宜宴閑之楽而巳夫人讀書習礼亦未易以丗人之斈恱之也臨川呉先生讀其述祖思親之詩而嘆曰真哉所發哀而不傷此古之作者非常人所及也集􅀼感呉先生之知言故書而識之俾示其子孫泰定元年嵗在甲子十一月巳酉囯子司業蜀郡虞集書郭君彦真定人海東青海東俊鳥異鵰鶚金晴玉爪不凡材八月風髙度海来剱翮怒斫雲陣開虞人設網心独苦􅀗之不敢觸毛羽爲言此鳥献天子年年進入明光裏驛使長懷万里􅁨傷者還同殺人罪君不見唐太宗魏公入奏乆未去不知鉄鷂死䄂中小臣伹願聖皇脩徳放此鳥自有鳯凰逺㗸瑞圖飛下五雲表入京五首虎踞龍蟠十二門王侯第宅􅀂雲屯百蛮入貢天威逺四海朝元囯势尊曉日旌旗明禁路春風䔥鼓沸名園唐堯虞舜今皇是未必江潭老屈原蓬萊御氣挹晨嘏萬囯河山擁帝家金殿势吞滄海日王楼光映赤城霞巨鰲偃蹇乗丹闕舞鳯飄颻翼翠華遥望至尊遊幸處六龍髙駕五雲車鳯凰城闕壓金湯龍虎旌旗護未央方囯衣冠朝五座百蛮􅁔舞進瑶觴花迎宫扇紅雲曉日照天􅂁翠霧光江海小臣無以報空將詩句美成康大明宫闕势岧嶤方歳声髙山動摇金殿九重明日月玉楼十二挿雲霄青絲馬上玉孫貴舟轂車中趙女嬌自是鳯城春色好肯將心事許漁樵翠輦氊車往復廻風暗九陌障黄埃鎌􅂁公子呼鷹出茜帽僧宫躍馬來雲外笙􅁔声宛轉水邊楼閣势崔嵬少年自有看花興欲賦􅀚光愧不才野寺晚景寺對清溪水遶関泠然鍾鼓翠㣲間楼䑓無影日沉海松檜有声風滿山猿嘨石亭遊客散龍歸雲洞老僧閑詩成一􅀏歸來晚獨棹扁舟泛月還送泗洲同知偰丗南赴仕夢喜三刀驗之官正少年龍􅆞􅀝天劒虹繞載春船淮泗名先振湘潭政可傳門閑多喜氣屡見出英賢錦衣臨泗水仙境足吟哦煙樹連淮逺雲山入楚多済川功不小經丗意如何㑹見沙堤上春風響玉珂西山道院幽居絶瀟洒深院鹿成群山色開䆫得泉声隔竹聞猿啼臨水樹風送渡溪雲客至渾無亊談詩到夜分宫詞宮娃辮髪綰垂鬟嬌面團如白玉盤出入紅門能走馬綉衣縹緲似乗鵉年少宫官着綉衣麒麟宝帶束腰圍日斜醉出金門裏􅀐得龍閑白馬歸閑居春晚深巷絶行人一鳥鳴髙樹不知春色深花落夜來雨早春湖上柳芽黄淺不勝春沙煖泥香草色新鸂鶒双飛湖水濶相思愁殺􅀝闌人秋郊路穿黄葉林馬嘶秋色裏白鳥何処來飛下野塘水張鳴善平陽人李陵䑓晚眺次呉真人韻雲黄沙白繞平原獨立崇䑓思黯然地僻尚知秦逺塞草青不是漢新年非慚歩武賢王後反欲􅂢生太史前誰謂茂陵明似日重光惟照漠南天秋興亭欠韻巫峽秋濤万里長荻花楓葉乱蒼茫青山礙目無閑地白鴈牽愁有夕陽神禹栢殘扶大氣長庚星堕静南荒巳將今古同行客何必登臨憶侍郎題史橘斎山水手卷神仙中人丞相子五色玉立瑶池芝謝傳風流􅁔舞處羊公慷慨登臨時㒷來醉泗雪煙繞身後名隨日月遟安得飊車從上下蓬萊􅃌􅀧青参差見釣者宇宙俱為客江湖独釣翁笛声吹海月竿影􅀝秋風天定行藏拙時清礼法通古今惟范䗍落落幾人同送人游庐山曾到囯庐境巉峰際碧空方松無路入一水与天通白鹿眠晴晝清猿肅晚風洪厓如可約吾亦訪雲中次庐参書御溝水韻二首華清波色漢楊溝不似􅉿􅉿煖緑柔飄尽上林紅萬􅀧又從天上送春愁堤頭春漲碧琉璃堤外春隂海子時同是玉泉山下水可怜波浪大参差貟怡然関中人送陳文理還京師十年不見老元龍髯鬢䔥蕭帶朔風万里関河秋月白九重宮闕曉雲紅功名有分皆身外聚散無慿似夢中問我能來定何日移家今在五門東訪原頭范君才長憶原頭范􅀮君我來踪跡不相聞林鳩屋角啼淸晝山犬籬邊卧白雲薬右猶能資疾疾丹青元不􅀞功勲藻陂家主應逢念一路秋陽草樹熏修琴桐梓年深半裂開嶧陽道士独憐材細磨蛇腹秋風起輕鑿龍池夜雨來此日銘邊重注字當年焚下欲成灰何時試鼓陽春曲預坲空山小石䑓月中桂雪風吹老樹婆娑輪滿旁枝長漸多方古秋香懸宇宙一株晴影照山河雲間㗸子無黄鵠天上看花有素娥折向人間應不識九重清露􅊜鳴珂宝應寺塔五色雲中現七層不知何代法門㒷帰來逺客長迎望老去閑僧已倦登金鐸無声風不起宝瓶有影日􅀄升時聞􅆊唄盤空下知是檀那夜施燈楊信可臨江人和掲曼碩兼懷武昌名勝親友日以䟽江漢日以深􅀌雲懷海嶠倦翮思長林終然念所知沿流動悲吟豈無後日期邈􅀂隔千岑安得好風來冷然入中襟日与親友㑹㣲言自規箴和盧子儀􅀉懷盧粛政上巴陵王侯人生有知遇永懷不可忘俯視萬丈渊仰睇千仞岡青山何其髙江水空自長忽憶石潨􅅱别我半載強昨者從湘中􅀊曼歸朔方􅀌舟渡淮水遺􅁔滿滄浪迢迢天際雲青青陌上桒次韻酬吕文斈後㑹未可必前路轉多山鷄鳴發􅀌舘蒼凉雲樹間俯視清溪流仰睇髙鳥還念此别離情南山正孱頑鹿角站阻風風送洞庭沙維舟隱荻花水枯魚上罶秋老燕移家日㫷長河急天寒去路賖故郷三十驛歸夢遶天涯奉别存􅀄郎中臨湘月下汎舟西風吹老白蘋洲天上郎星月下遊過鴈影沉湘水碧断猿声入楚山秋􅁔翻白紵猗䔵泣夢落黄陵帝子愁夜半鍾声天曉角猶疑身在鳯池頭望池州作黄芦瑟瑟草油油楼閣参差瞰碧流萬里長江秋色逺一帆斜日過池州鄧德良南昌人渉圃林塘草樹接江干一日三回渉圃看白鴈不來縁地煖黄花㣲痩斍秋乾隔溪烟火人家静傍水樵蘇野氣寒柴户反関生亊了晚菘種罷雨漫漫晚眺晚歩從容出薜蘿吟詩聊當竹枝􅁔寒流漸縮溪船少臘雪不成山霧多官賦人歸荒嶺路野燒烟起夕陽坡江郷盡處閩郷近老盡塘蒲無鴈過送陳杏林赴潮州醫斈教授三千驛路上灘船九品醫官半百年薬市得錢添月俸杏林収谷當公田北書漸斍江鴻少南食􅀄嘗海鱷鮮不用越巫驅瘴疠家家傳取衛生篇寓舎春晚柘隂􅀄合豆􅀄畦門掩春寒落絮遲薄暮一樽還獨酌坐看㣲雨􅊜荼䕷中秋憶家千里星河一鏡圎杜陵兒女隔秋烟遥怜此夕柴門裏相對清樽􅀃去年早冬過聶氏西岡别墅紅葉青山載酒行山人新結野菴成西􅉉一樹梧桐好他日重來听雨声清景亭􅁁秀作堆竹声松影共徘徊野藤繞屋多秋实時見山禽引子來李宗冽旴江人題嶽谿禅林精舎朝逰適嘉霽遂暢尋山願厓日破曾隂晨經罷幽殿年深樹益繁像古閣重建夜來天地霜松色了无変宛然巉崪間庐岳復兹見山僧四五人屡訪期識面和傳作永月夜泛舟夕霏巳掃林緑波際遥天浮雲蕩倒影相与渡清川爱此山水􅃐聞􅁔心益便􅆓洄隨意逺落月照帰􅂳古隴頭吟天寒壠水鳴嗚咽夜領銳兵從此發海風吹人眼欲枯上壠猶看嶺西月悲笳萧蕭霜滿天十里一堠烽火連去年􅀄度弹筝鋏今年復引月支泉從軍辛苦事征討將軍功大殘兵老秋夕江上水舘螢飛入沉沉夜未眠衆星揺雨後􅀌月轉河邊章木寕悲􅀱江山不記年忽聞吹急管况有估人船代項氏怨并序燕山項氏其夫江南人行賈燕􅂫間聘項与居未幾夫死項时年二十奉柩回江南誓以夫餘貲養姑以自終比至姑改適項励志子居以守夫祀余憫其事而賦之少无依􅀝老何堪白髮婆娑乱不簮夢裏尚思江北好悔捋夫骨葬江南䁬深上人處處隨縁到經年此託蹤不言卿囯逺惟􅃌對門􅈐王尚志臨川人暹囯􅅆使􅁔并序暹赤眉遺種天暦􅀄甞遣使入貢今天子嗣位継進金字表章九尾􅀛一象孔雀鸚鵡各二朝廷以馬十疋賜其囯主授使者武略􅀅軍順昌州知州使者錢塘人江東羅儆作􅁔僕遂和之江東先生逺扣門口誦暹囯廻使􅁔髙秋夜静客不寐􅁔辝激烈声滂沱東南島夷三百六大者只数暹与倭暹人云是赤眉種自昔奔竄來海阿先皇在位歴五載風清􅀌屿无􅀭波方今聖人霑德化継逞壤貢朝鵉和紫金爲泥冩鳯表灵􅀛馴象懸鳴珂􅊮庭懷逺何所賜黄驪白駱兼青驒卉裳玊者錢塘客能以朔譯通南訛遥授􅀅軍領州牧拜舞两頰生㣲渦楼船帰指西洋路向囯夜夜瞻星河金雞啁哳火龍出三山宮闕光嵯峩鄱陽驛吏親為􅀃今年廻使重經過先生作􅁔旣有以却念􅀺䝤頻驚吪田横乗傳嗟已矣徐福永仙胡尓詑豈如暹囯效忠義勲名万丗同不磨音渦音訓欺同鎮陽李先軰登臨川擬峴䑓楚塞䔥條客復耒已无秋渚藕花開西風曠野􅀌城出落日西江白浪廻山似襄陽非故囯地連呉㑹有高䑓南歸万里頻回首㴎倒徒傷賈傳才季冬􅀄三夜見月向晚西簷月令人生夜思山川徂杪􅀊雲漢􅀒秋期素魄窺恒滿良宵惜屡移清輝可􅄃結脉脉寸心知送孔椽之鰲谿古縣青山裏溪橋春水流沙明殘雪在市散夕嵐収􅇬宇鄰仙洞更声雜戍楼怜君趍幙舎㣲禄暫淹留登冷仙岩仙岩酌酒杏花紅滿地金濤日上東洞底香風散靈氣逰人都在紫雲中舒州張萬户征西賊馬􅀍箭数十猶載其王以馳毎寒氣襲之則􅂺朴而能終惠飬之舒州營裏將軍馬曾向西征破賊來伏攊金創秋氣重断腸當日􅀾􅀄廻南園蒼苔翠竹轉林暉野菊花開過客稀樹厎秋虫作寒繭􅀨晴黄蝶滿園飛徐天逸臨川人擬古皎皎機上絲織爲逰子衣遊子蕩風塵素衣化成緇風塵不可避四顧􅀅何之豈不念潔白徒重翟子悲朂哉加澣濯河水清且漪娉婷閨中女天質知自爱空懷蘋藻心日月苦行邁家脩意良勤遟遟如有待未嫁庸何傷失身將重悔婉娩自結髮伉􅓻情義深夫征日易乆魚鴈成銷沈自怜鏡中貌衰白將駸駸有衣爲誰熏有花爲誰簮顧影雖無儔秉心猶断金青天懸明月照影不照心君馬黄君馬黄我馬白青絲聮絡黄金勒長安紫陌争馳驅一日秋風各南北酌君酒君莫辝与君更作汗漫期神龍不可豢天駿不可覊乾坤浩蕩信所之人生行志當及時雨情繾綣將何爲丈夫不作兒女悲田家詞犁田無牛秧易老飬蚕未蠒桒巳空二月新絲五月榖如何觧折今年窮秋風詞秋風一舸帰晚泊芙蓉渚折房遺所思的的中心苦清明有感菽水􅂬娯淺松楸感慨長西家白頭嫗門外􅀝斜陽山中􅀄霽乆雨客不來燕坐了晨夕今日出東郊門外草三尺施性􅀄臨川人古井地脉深三丈寒甘潄石甖最宜探月色獨坐聽泉声旱許隣人汲廢餘秋草生元非投轄處水不近交情秋日田家髙髙青櫟樹忽有鵓鴣鳴雨後晚田熟門前秋水生鄰家賽社去野犬吠人行泥潦相淹乆眀朝帰討成郊園宴集得荷字脫㡌長松下探幽到薜蘿翠禽翻岸篠紫芡刺池荷人影追凉散蝉声入暮多當携謝公妓載酒重經過萬年平坐雨復此留三日秋隂未肯睛雨懸沙樹白坡落石泉清未可言覊寓聊堪遣性情草蛩籬落下時作不平鳴喜涂宗道自金陵帰雲樹相思乆年年賦式徴淮南芳草歇江上故人帰日夕開新酒天凉換裌衣從容亦自好墨綬與心違李道傳留九江以詩見􅀉水郷城郭晚煙稠遥想思歸上􅁃楼潮落湓城魚作浪雨餘淮甸麥先秋一樽濁酒懷親友数首新詩歎客愁我正山中招隱者秋風應棹木蘭舟雨中同從弟􅀫田舎鶺鴒相逐暮天隂破㡌長江覔短吟十頃水田春布􅂖一天風雨夜同衾草腥􅀫鴈投湖水煙􅊕歸牛入桕林明日東隣赴雞黍汝還不飲我􅀌斟􅀓謙則斈正東山有鴟梟金衣菊裳海頭鶻胡不啄此鴟梟目劒翎鈎􅀲韝上鷹胡不食此䲭桒肉東飛西飛正頡頏開口呀呀無飽足天何生此不祥鳥白日妖呼鬼夜哭羽毛似可美外飾腸膽豈知懷内酷月明風淡霜氣寒三繞髙枝鵲驚􅀫綢繆牖户固根本一斗一鳴千百毒將軍只逐天􅁁鹿誰敢挾弹滄江曲僞鈔爲弊善良破家故賦此皇元風雅卷之五
