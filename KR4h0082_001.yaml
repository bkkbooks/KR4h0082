front:
  text: 皇元風雅卷之一
  hash: sha256:712421d093a2b04b4230ffd783cf926acd597ab631c0553c594831202c3af34e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_001-1a}
body:
  text: 旴江梅谷傅習説卿采集儒學學正孫存吾如山編類奎章學士虞集伯生校選劉靜修先生名因字夢吉保定人𥙿宗皇帝在青宫聞其賢以贊善大夫召至京師未幾以親老求歸養居數歲朝廷尊仰德義拜集賢學士又以疾辭踰年遂不起年才四十有五縉紳惜之黃金臺燕山不改色易水無新聲誰知數尺臺中有萬古情區區後丗人猶愛黃金名黃金亦何物能為賢重輕德輝照九仭鳯鳥才一鳴伊誰腐鼠棄坐見飢鳶爭周道日東漸二老皆西行養民以致賢王業自此成黃金與山平不救兵縱橫落日下荒臺山水有餘清翟節婦兵塵浩無際烈士難自全婦人無九首志欲不二天燕山翟氏女既嫁夫防邉一朝聞死事健婦增慨然生有如此夫早寡非所憐求尸白刃中負土家山前事去哀益深義盡身可捐無兒欲何為所依推黃泉鄉鄰救引訣烈日丹衷懸誰辨節孝翁重賦睢陽賢我昨過其鄉山水猶清妍聞風髮如竹飄蕭動踈煙千年吟詩臺峩峩大寧巔為招馮大師和我節婦篇有大如天地有大如天地日夜長乾乾有小如螻蟻營營誰使然我亦形迹中豈得獨安間萬物相為用錯綜盈兩間如身百骸具少一為不完有形無虛生豈豫獨贅偏森然氣分內既有不可鎸蝮蛇誰宥之生生亦能延安有人道尊堙滅獨不傳乾乾以為師餘者一聽天燕平學仙臺碣石來海際西南奄全燕中有學仙臺燕平欲升天燕平骨巳朽遺臺猶相傳雖復生青松嵗久摧為煙極目望海波不見三山巔三山巨鰲簮山人蟣蝨然使無不足論信有亦可憐大塊如洪罏金石能久堅天地會有盡何物為神仙空山無笙鶴落日下飢鳶今古非一臺浩歎秋風前登武陽朝逰樊子館晚上武陽城潮接滄溟近山從碣石生斷虹雲淡白返照雨踈明日暮悲吟發樵歌巳慘情易臺望中孤鳥入銷沉雲帶離愁結暮隂萬國河山有燕趙百年風氣尚遼金物華暗與秋光老杯酒不隨人意深無限霜松動岩壑天教搖落助秋吟山家馬蹄踏水亂明霞醉袖迎風受落花怪見溪童出門望鵲聲先我到山家伯顔丞相度梅關馬首經從庾嶺歸王師到處悉平夷擔頭不帶江南物只插梅花一兩枝鞭一節髙兮一節低幾回敲鐙月中歸雖然三尺無鋒刃百万雄師屬指揮郝天挺麻姑山路入尋幽景便嘉石田瑶草帶煙霞注經洞古亡遺檢養藥爐存失舊砂青鳥空傳王母信綵鵉應到玉皇家岩扉不掩春長在老却碧桃無數花史紫微江南曲風凄露冷江南岸瑟瑟寒波秋練練採蓮歌斷紅雲空蘋葉蘆花結新怨鴛鴦鸂鷘俱可憐相呼相倚沙觜眠白頭漁子搖蒼煙一雙飛上枯樹巔荒塜謡荒岡斷壠誰家墳經年無主蒿草繁土崩棺蝕漆燈滅狐狸作巢生子孫牧童燒火山葉赤花磚迸裂松行根牯牛作群來礪角折碑盡是淚土痕夕陽未下磷火出隂風刺刺雲昏昏精靈月下相往來嚘嚶􅒂歘如人言君不言昨日城中車馬客又來尋地為真宅盧踈齋題太白墓大雅清風久不聞一㭗聊為洗荒墳朱絃三嘆無今古説與江東日暮雲婺源縣齋書事竹樹映清曉坐聞山鳥鳴瓶花香病骨簷雨挾詩聲客亦非餘豫春無負此生明朝豫問俗吟罷却須睛書梓山堂經室問俗來山郭携春到竹溪花香破禪寂林樾受鶯啼欲和觀音偈聊乘醉墨題間雲若留客不肯為余西題子陵釣臺雲山蒼蒼兮煙木稠石灘潺潺兮江水流故人兮冕旒先生兮羊裘使人皆先生兮誰其伊周使人不先生兮誰其巢由可仕止久速兮舍聖人將焉求清風一絲兮豈為名鈎焦黃荔丹兮香火千秋岸下幾篙兮榮辱之舟先生一笑兮白雲收貫酸齋白兆山桃花岩美人一别三千年思美人兮在我前桃花染雨入白兆信知塵丗逃神仙空山亭亭伴朝暮老樹悲啼發紅霧為誰化作神仙區十丈風煙隔淮浦暖翠流香春自活手撚殘霞皆細末幾回雲外落清嘨美人天上騎丹鶴神遊八極栖此山流水杳然心自間解劒長歌一壷外知有洞府無人間酒酣仰天呼太白眼空四海無纎物明月滿山招斷魂春風何處求顔色美人篇任風雕雪玲瓏溫吳姬剪月纎纎昏行雲輔髻翠光滑鳯凰呌落空山月手摘間愁八字分青山恨重晝不伸肌膿汗膩朱粉勻背人揮淚粧無痕霜刀自製石榴裙閉門不識諸王孫緑煙薰暖藍田玉羅帶隨風換粧束飛鳥㗸怨過長門芳菲不忍韶華屋連環步窄玉佩響霓裳袖闊東風長釧鬆腕瘦覺多情舉指搔天天亦癢枕杳帳冷蘭燈沉落花不入芙蓉衾三山路杳銀河深彩鵉髙訴愁人心天與美人傾國色不知更與美人節夢裏梅花夢我身万古千年一明月君山行北溟魚背幾千里負我大薨遊弱水蓬萊隔眼不盈拳碧落香銷吹不起茜裙女兒懷逺遊逺人不歸明月羞寶叉綰髻翠欲流風鬟十二照暮秋女媧錬石輔天手手拙石開露天醜瓊樓玉宇亦人間直指示君君見否斯須魚去夢亦還白雲與我遊君山畫龍歌老墨糊天霹靂死手擘明珠換䏬子一潛淵澤久不躍泥汚風鬚色深紫虬髯老子家燕城怒吹九龍無餘燈手提百尺隂山氷連雲塗作蒼龍形槎牙瓜角隨風升逆鱗射月于戈聲人間仰視玩且聽參辰散落天人驚瀟湘浮黛娥眉輕太行不讓蓬萊青烈風倒雪銀河傾珊瑚盞闊斟不平吸來噴出東風迎春色万國生龍庭七年旱絶堯生靈九年潦漲舜不耕尓來化作為霖福為吾大元山海足觀日行丁巳春三月余之所謂寶陀山顛有石曰盤陀可觀之𥘉疑其大不可量既歸宿作方夜半之餘詩僧魯山同賦六龍受鞭海水熱夜半金烏變顔色天河蘸電斷鰲膞刀擊珊瑚碎流雪朔方野客隨雲間乘風來遊海上山飛驤拖空渡香水地澼中原雜聖几壯鰲九尺解霜鼓瘦紋巨犬自掀舞驚看月下墨花鮮欲作新詩受龍女人生行此丈夫國天吳立濤欺地窄乾坤空際落春帆身在東南憶西北采石歌采石山頭日頽色采石山下江流雪行客不過水無迹難以斷魂柖太白我亦不留白玉堂京華酒淺湘雲長新亭風雨夜來夢千載相思各斷腸别離情吁别離之苦兮蒼梧之野春草青黃陵廟前春水生日暮湘裙動輕翠修竹亭亭染紅淚又聞垓下虞姬泣斗帳𥘉驚楚歌畢佳人閣淚棄英雄劒血不銷原草碧何物謂之別離情䏏腸剝剝如銅聲不如斫其竹前其草免使人生為情老題廬山太平宫山上清風山下塵碧沙流水淺如春不知松外誰敲月驚動南華夢裏人蘆花𬒳僕過梁山泊有漁父以蘆花為𬒳僕尚其清欲易之以紬者漁父曰君尚其清願以詩輸之採得蘆花不涴塵緑莎聊復籍為禋西風刮夢秋無際夜月生香雪滿身毛骨巳隨天地老聲名不讓古今貧青綾莫為鴛鴦妬欵乃聲中別有春題陳此山扇五首秋鳴無數醉秦娥却把輕風惹扇羅明月碧澄天似水此山雲氣動纎波紅旭如鉛海上來蒼蒼煙霧小蓬萊東風昨夜醇如酒吹得桃花滿樹開翠幕低垂護午隂碧瓶裏面水痕深東風截斷人間熱勾引清涼養道心一簾明月倚闌千宇宙尤宜就夜看飛上仙槎河漢近手招沆瀣海銅盤功成不用服丹砂笑指雲霞揔是家清曉山中三尺雪道人神氣似梅花許魯齋趙氏南莊曉起北窗涼清談戢羽觴入簾花氣重落𥿄燕泥香夢裏青山好吟逃白日長秋風載書籍相對築茅堂和先生姚公去去迷途莫問津問來還恐不知真因時用舍固有命與道卷舒還在人百尺竿頭愁據險一庵林下樂為鄰孰輕孰重何須問夢想故園桑柘春贈竇先生行二首西山山下覔幽村水竹鄰居擬卜君豈意天書下白屋便收行李入青雲功名準自英雄立得失防因去就分万里風沙渺南北請歸消息幾時聞莫謝風沙老不禁斯民久巳渴商霖願推往古明倫學用沃吾君濟丗心甫治看將變長治呻吟亦復化謳吟千年際會真難得好要先生著意深偶成万物備吾身身貧道未貧觀時見物理主敬得天真心爽星辰夜情新草木春自憐斫喪後能作太平民病起花透香風入短櫺草抽新緑倚柴荆正憂多病作身纍且喜幽居見物情花為可觀遭夭折草因無用得欣榮丗間巧拙都相半不許區區智力爭謝梁安撫惠田晚來幽興入幽居擬即君侯置一區令德久思親慷慨佳田今許乞膏腴太行西對千峰玉淇水東窺万斛珠幸著此身於此老願從樂正五人俱張仲疇送許魯齋歸山諸相纍纍入省闈先生何事獨西歸心隨道隱貧非病老得身間古亦稀行色一杯燕市酒春風二月楚山薇到家巳及蠶生日布谷催耕隴麥肥李道復偶成日午山中道停驂進步難鹻侵苔徑滑風入毳𫀆寒在國終無輔全身尚未安一樽茅店酒強飲不成歡喜雨誰調元氣入淋漓枯稿回生只片時依舊野雲無著莫高天闊地任風吹寄東宫二首艱苦勤扈從俯仰盡周旋小試屠龍技翻成抱虎眠脫鈎魚從壑漏網鳥沖天万事從今始灰心未死前十年陪顧問一旦決安危自合成功去應慙識事遲長城徒自壞孤注莫相疑辟穀求仙者髙名百丗師𥘉科知貢舉百年埸屋事𥘉行一夕文星聚帝京豹管敢窺天下士龍顔誰占日邊名寬容極口論時事衣𬒳終身荷聖情願得真儒佐明主白頭應不負平生金陵懷古西風聒耳過黃蘆万水東流草樹枯蟾窟一年秋色近鵲橋万里客心孤青山故國新豐樹芳草王孫舊酒壚壯志未磨天地闊劒光夜夜照江湖虞伯生和李平章秋谷小車詩雪餘宫草隱晴沙相國朝春試帝車班馬晝移溫室樹鳴鵉晨度掖垣花搴帷每命賢俱載趣駕頻煩使至家此日龍門誰執御擁經正復侍金華和周待制朝回即事三十六竿吹鳯凰九重春色絢天光卿雲微動旌旗暖湛露𥘉琋草木香貝葉神師東渡嶺金輿馴象北浮洋小臣聀在歌功德拜手陳詩對日長岡子原呈王學士岡子原頭春色濃小車晨出看西風雨餘林潤人烏好日暖沙平我馬同西引峯巒來座上東觀樓觀起天中詠歸莫作匆匆晚倘解相逢擊壤翁奎章閣讀進中卷玉堂䇿士詔儒臣御筆親題墨色新省樹坐移簷底日宫壷馳賜殿頭春虞廷制作夔龍盛漢代文章賈董醇書閣暮年偏感遇但歌天寶播皇仁與趙子期趍閣雜賦日出風生太液波晝橋影裏彩船過橋頭栁色深如許應是偏承雨露多雨浥輕塵道未乾朝回隨處借花看墻東千樹垂楊柳飛絮來時近馬鞍春雲冉冉度宫城樓雪𥘉融水未生行過御溝戍久立起頭枝上有啼鶯屏風韋坐鬢毿毿絳蠟搖光照暮酣京國多年情盡改忽聽春雨億江南待漏宫門聽鑰開袖中進卷揔賢才奏名殿裏千花合傳詔階前好雨來千花拂檻柳垂絲晝刻傳呼淑景遲聖主自看新進䇿侍臣簮筆立多時文章光𦦨過長虹來者無窮往者空頭白眼昏心力盡高堂深夜燭搖紅送伯長待制扈駕之上都日色蒼涼映赭𫀆時巡無乃聖躬勞天連閣道晨留輦星散周廬夜屬櫜白馬錦韀來騕裊紫駝銀甕出蒲萄徙宫車騎多如雨只有楊雄賦最髙寄池州司直同知使過池陽聞上日好懷浩蕩為君開江千維楫車馬集亭上持杯風雨來中夜魚龍聽語競明年鴛鷺候朝回九華山色翠可食為問謫仙安在哉寄張伯雨隱居聞道無人識麋鹿來依積海深每從雲氣得芝术莫怪丹光穿樹林茅君自騎一虎下木客或與群猿吟知子此時正相憶遲余躡屩度千岑送朱仁卿歸旰江羡子南歸旴水上過從為我問臨川幾家橘柚霜埀屋何處蒹葭月滿船應有交遊憐逺道好從父老説豐年寒機早晚成春服一一平安報日邊興聖宫朝退次韻袁伯長見貽尊號於是日加上禮成告謝宗廟余東出赴齋宫翠蓋重重寶扇斜從官穿柳散慈鴉過宫路逺紆天步上夀杯深閣雨花玉貫兩虹通象錦衣成五綵錬雲霞奉伺東出蓬萊道春水鳬鷖踏漢槎別成都我到成都才九日駟馬橋下春水生渡江相送謝主意過鄉不留非我情鸕鷀輕筏下溪足鸚鵡小窗知客名幸得郫筒酒易醉夜深衝雨漢州城草五日即事呈閣老諸學士松隂鵠立候宫車風送宫花著白鬚水影漸移廉側畔鶯聲只在殿東隅近床擬進新琴操載筆難題古畫圗太液雨餘波浪動龍舟𥘉試散魚鳬贈星上人潭北湘南無影樹一花吹渡海門潮天香滿室定𥘉起雲氣上衣身欲飄寶月夜寒龍在鉢銀河秋近鵲來橋豈無一箇卭州竹與尓孤松伴寂寥送可無上人五公昔講時聽者不起坐虛空悉銷殞何由見人我名字誰與安説義話巳墮尚自無亦無更問可不可不見天雨華誰能拾餘朵賦凝雲石海石不盈握隤然如委雲危岑集逺思虛竇栖微薰天髙大華斷日落香爐分几硯永清潤文章互氤氲潛雷起神谷震驚天上聞亟視恐無及化為九龍文送兄德修南還老兄五月來作客八年不見頭揔白五人兄弟四人在忽憶中郎淚沾臆我家蜀西忠孝門無田無宅惟書存兄雖管庫實父蔭弟竊餘澤承君恩文章不如仲氏好叔氏最少今亦老五郎十歲未知學嗟我胡為長逺道諸兒讀書俱不多又不力耕知奈何憂來每得二三友看花把酒臨風哦蜀山嵯峨歸未得盤盤仙壠臨川側碧梧翠竹手所移應與青松各千尺南風吹雪河始冰兄歸烏帽何煢煢明年乞身向天子共讀父書歌大平澧州謝家通濟橋澧有蘭兮沅有芷相望涓涓隔秋水蛟龍回夜隱波深虹霓乘晨駕空起千年石尉何西東天下有道津梁通朝祠東皇蒼雲中行人無忘懷謝公題南野亭門外輕塵接市扄坐中春色自幽亭雲橫北極知天近日轉東華覺地靈前澗魚遊留客釣上林鶯囀把杯傾莫誇韋曲花無賴獨擅東南雨後青題九歌圖太乙神君號東皇玉質要妙含和陽生生􅉋始通微茫綿綿蒸空神中央浮英上羅文天章覆冒下滿谷與坑旁塞無間靈無方靈來乘柔往乘剛湘君夫人鎮相望清溫靜好非淫傷司命元老元氣昌手執藜杖色老蒼歷劫壽命不可量少君之壽同其長離無異體合有常出入万化終不望晶明發晨上摶桑海天赫赫真金芒質錬不滅長垂光河源混混流湯湯伯也坐視無迎將千古万古何堂堂彼幽為厲為強梁朝狸暮豹方鴟張精魂熠耀志意荒招之不反巫元良屈生作歌沉九湘丗人傳聲罕尋詳祝融仙子調玄黃九神出圗百怪藏不信請視虞公章題趙子昻馬圗憶昔從公侍書殿天間過目如飛電池邊侭有吮豪人神駿誰能誇獨善今公騎鯨隘九州人間空復看驊騮惟應御氣何相逐黃竹雪深千万秋張野夫壽李秋谷璿階曾共近清輝一旦雲鵬九万飛再入中書今亦有兩封上國古全稀霜侵吟袖趍朝去香惹宫𫀆侍講歸同使斯文躋壽域且休回首北山薇元明善寄翰苑諸公蒼煙緑樹蒲汀沙負手行吟日又斜江水有時窮地脈海雲何處是天涯生前幾醉樽中酒夢裏曽來海上槎惆悵懷人重回首晚風吹盡紫薇花送湖南李直夫憲使君去湖南我上京思君欲見又羌城滄波留月能歸海江鴈拖雲不到衡一代豪華誰逺識百年驚畏護靈名好來不作男兒事有水可漁山可耕送董慎齋左丞討賊負劒光驅意氣間也勝局蹐首儒冠古來每説從軍樂此去不辭行路難使節再臨民志定兵鋒一舉賊心寒書生奮力效馳逐要寫功名久逺看題天冠山仙翁昔往天冠山夜呵鬼神衛爐丹丹成飛去杳不還藥池丹井猶山間翩翩學子風佩環華欀巨欐青雲端思玄尋躅果安訪鶴歸月落前溪灣跋南嶽壽寧觀碑後朱陵靈臺天柱巍太虛寶洞緑煙扉上館赤帝朱鳥飛祝融宅南參為旗羲娥兩􅋯愁蔽虧象緯冷逼嗟位迷四觀燕吳與秦齊恆嵩泰華孰崇卑五氣順布百志熙流祥阜物宣后祇雨風露雷豈其私惠尓下土尸者誰中有異人餐赤芝夜眠秋霞晝天倪衣以青雲裳白霓風車八極驂兩螭七十二峰足幽棲琳宫貝闕輝陸離潛光煉魄如嬰兒大丹入咽無渴飢誰其思之吳宗師神變倐忽万張施冷然御風渺何之太君歲晏嘉豫期千秋万歲受鴻釐皇圖景運永以丕手持芙容朝紫薇旋飈天闔此來歸彰靈答貺逹尓垂磨崖鐫我瑶華辭鮮于伯機望嶧山東方巨鎮宗岱宗群仙列侍臣妾同西南崛起一萬仞却立不屈如爭雄何年天星下天宫墜地化作青芙容外如刻削中空同閬風玄圃遙相通我昔東遊訪青童群仙招我遊中峰悔不絶粒巢雲松失身誤落塵網中如今可望不可到艤舟空羡冥飛鴻神仙可學事亦脫安用屑屑悲秋蓬吾聞嶧陽有孤桐鳯皇鳴處朝陽紅安得斫為寶琴獻天子為民解愠歌南風趙子昻送吳汀洲七閩南去路﨑嶇五馬承恩出帝都地氣喜聞今有雪民生寧似昔無𥜗山城酒美傾鵎鵡旅館春深所鷓鴣他日相思應恨恨離筵不思賦􅌐駒采石天門日湧大江來牛渚風生万壑哀青眼故人携酒共雙眉今日為君開蒼崖直下蛟龍吼白浪橫空鶴鵲回南眺青山懷李田沙頭官渡苦相催過嶽武穆王墓鄂王墳上草離離秋色荒涼石獸危南渡君臣輕社稷中原父老望旌旗英雄巳死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲即興春隂柳絮不能飛雨足蒲牙緑更肥政恐前呵驚白鷺獨騎欵假繞湖歸絶句三首庭槐風靜緑隂多睡起茶餘日影過自笑老來無復夢間看行蟻上南柯橘子花開香四鄰緑隂如染淨無塵幽齋獨坐鳥聲樂万纍不于心地春自有天地有此溪泓澄百折淨無泥我家溪上無人到只疑身在青玻璃漫興四首竹色雨餘碧蟬聲風際清方池貪緑水中有纎鱗行浮沉各異態亦足恱吾情坐久不成起待得月華明露生夜將半淡然無所為草根蟲鳴歇松梢螢度遲城市多塵雜令人心不怡兹丘亦可老巳與白雲期春晴浩元端野望忺有矚山花眩桃李澗影㵼松竹鳴鶴聞九臯白駒在空谷好鳥何處來啼破林煙緑楊舲清河流開蓬素秋曉斕班𬒳岩花委蛇順流藻天晴去鴈髙野闊行人小故園歸有期客愁淨如掃和子俊感秋秋至忽十日天宇豁然清涼颷旦夕至林木發商聲良夜不我與慨然心自驚古人久巳逝念之動中情苦心嬰丗患只博身後名今我將無同聊復得此生東郊晨興理孤榜薄言東郊遊清風吹我衣入袂涼颼二幽花媚時莭弱藻依塞流山髙碧雲斂日出白煙收曠野得我懷欣然消我憂中流望城郭匆匆佳氣浮人生亦巳繁惠養要須周約身不願餘尚恐乏所求且當置勿念變化終歸休奉隆福召命赴都過德清别業驟暄氣侯變幽園卉物凄山雲石上起春鳥雨中啼牽衣憐稚子舉愧山妻苦𬒳虛名纍未得遂高栖雪石同子俊遊何山次韻同是清間客俱為放浪遊晴山依雪壯野水帶氷流風急松杉亂年登萕麥收生涯須未老吾欲覔莵裘送耶律伯強得請歸東平侍父麟鳯出瑞丗不受虞衡拘郊藪亦可遊豈必在軒除明時靡遺才治丗容隱居振衣齊魯間脫屣風露衢衆進我獨退卓然君子儒西漢有芳躅東門祖兩踈路人亦嗟􅉃哀哉二大夫伊余獨何幸乃得尾送車恨不生羽翰與子東南俱臨分無以贈善保千金軀贈别夾谷公二首驅馬原隰間經時不遑休昔來日在斗今去麥巳秋王事有禆益宴安非所求翩翩晨風翼一舉逝莫留誰令麭瓜繫自懷離别憂青青蕙蘭花含英在中林春風一披拂胡能見幽心相去千餘里會合大江潯促席談今古知我亦何深此别雖非逺離思渺難任公其愛體素尚無金玉音春隂日出晨景淡散髮步中庭仰見濯濯柳春風暢人情兹晨豈不佳誰能念隂晴人生亦良晚疲勞竟何營万事可撥置舍道焉求成出都都邑何雄麗車馬日夕喧雞鳴趍蘭省日夕不遑眠兹晨奉明詔馳驛東西奔雪積原野白路修煙塵昏馬鳴朔風起吏士慘無聲還顧望帝鄉更覺勞心魂我今無家客斷蓬離本根願為雙飛鶴奮飛入青雲張詹事遂𥘉亭青山繞神京佳氣溢芳間林亭去天尺万狀爭自獻年多嘉谷合春脕花自殿雕闌晉戲蝶晝梁語嬌燕退食鳴玉珂友于此終宴鍾鼓樂清時衣冠集群彥朝市塵易侵啚書味方逺紛華雖在眼道勝安用戰𥘉心良巳遂雅志由此見何事江湖人山林未成願送夾谷分省陜西憶昔長楊獵于時始識公堂堂九尺幹落落萬夫雄輔衮彌縫密能書點畫工勞謙延士類豈弟到兒童黃閣歸人望青雲有父風驅馳常扈從奏對每留中暫輟尚書履榮分陜右弓秦山依畫錦燕雪感飛蓬粉署趍承舊瀛洲沗竊同因公動鄉思飛夢到江東題商德府所畫桃源春曉啚宿雲𥘉散青山濕落紅􅌭紛溪水急桃花原裏得春多洞口輕煙搖緑蘿蘿蘿搖煙挂絶壁飛流直下三千尺瑶草離離蒲澗阿長松落落凌空碧雞鳴犬吠自成村居人至老不相識瀛洲仙客知仙路點染丹青寄輕素何處有山如此圖移家欲向山中住題二喬啚長江東去水滔滔誰謂河廣不容刀中有喬家女兒淚何意師昏隨二豪龍虎相爭欲相啖鵉鳯鎩翮將安逃不見當時老諸葛獨聘醜婦何其髙書事四首贈孫思順溪上東風吹柳花溪頭春色淨無沙白鷗有信忘機事玄鳥猶知有嵗華錦纜牙檣非昨夢鳯笙龍𬋩是誰家令人長憶東陵子擬問田園學種瓜天涯相遇兩相知對榻清談玉屑霏芳草謾隨愁共長青春不與客同歸薰風池館蛙聲老落日簾櫳燕子飛南浦它年重到日胡山應識謝玄暉露下碧捂秋滿天砧聲不斷思綿綿北來風俗猶存古南渡衣冠不及前首蓿總肥宛騕裊枇杷曽泣漢嬋姢人間俯仰成今古何待他年始惘然層顛官閣幾時修檻外長江空自流白露巳零秋草緑斜陽雖好莫雲稠平南籌䇿張華得治內又才葛亮優景物未窮登覽興角聲孤起甕城秋感興三月江南鶯亂啼百花爛熳柳依依殘紅無數迷歌扇嫩緑多情妬舞衣寶鴨焚香川上瞑晝船檛鼓月中歸只今零落秋風裏把酒無言對落腪題山堂手種青松一万栽山堂留得翠屏隈推窗緑樹排簷入臨水紅桃對鏡開山雉雊迎朝日去瞑禽啼傍夕陽來山妻亦有幽棲志數日遲留不肯回過故廢苑一片中原地紛紛幾戰爭至今將不去留與後人耕題秋胡戲妻圖相逢桑下説黃金料得秋胡用計深不是別來渾未識黃金聊試別來心丙吉問牛博陽隂德澤堂廊民物周流鬢髮蒼尚為吳犍駐車問諸公伹飽大官羊題陶母待賔手卷范逵誠孝廉陶侃固英特英特未可知門有孝廉客傷哉陶母貧剪髮易酒食此意固自佳此髮足可惜此髮足可惜兒心將奈何丈夫淡相與豈以酒食多平生郭林宗何如茅季偉程雪樓寄牧庵參政黃雀山頭楚觀鍾喚醒塵夢欠從容歸來坐聽春林雨還憶簾前翠万重閻靜軒梅杖㨂遍西湖万玉珂春風入手重摩娑鬪青龍竹能香不較品鳩藤奈俗何聲破夢寒霜滿戶影隨詩瘦月橫波只知功到調羮盡不道扶持力更多皇元風雅卷之一皇元風雅卷之一儒學學正孫存吾如山編類奎章學士虞集伯生校選鄧善之贈墨士吳雪堂永寧賜筆丗安有易水良工今不傳了知膠漆用相得亦悟膏火明自煎昔從蒙莊觀副墨老歸藝閣窮太玄與子欲擬毛頴傳待我暇矣磨硯磗盧彥威送鄧善之提學江浙北門古深嚴論思寄籌度自非鴻才丗訓誥何猶作夫君出巴蜀文采動京洛十年掌絲綸摛藻揚景鑠荆璞抱瑾瑜龍淵淬鋒鍔肯獻上林賦寧居天祿閣即今觀浙江眷戀晞金雀黃圖欎紫氛絳莭生碧落依然難為情清霜養飛藿春秋嚴筆削凛若執玄鉞君獨抱遺經結髮飽剞劂明剖是非心微探義理窟下視群兒愚爭端王正月朅來奮直筆浩然心思竭王功與帝德昭昭日月揭胡為厭詞林擬欲觀𬈑渤榮華若浮煙汗簡青不滅詞林冨聲華幾人得精悍悠悠三百年篇翰孰氶纘夫君清廟器祼薦盛圭瓉五就惜繁緩九遊載雲罕依依風向翔忽忽月新滿冷然時雨情短章不可斷風雨妬芳華稂莠深嘉谷天地豈不仁盛德稟命獨明廷萃群英四門延穆穆既卜渭水釣又起傳岩築聲華何岌嶪衆輻輳一轂鑾坡􅌂清韻碩人歌在軸願言往從之星駕命宜夙豈知彼玄鳥戢翼辭雲屋幸無素絲悲庶免窮途哭離離天星高皓皓雲月光候鴈過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意逺沉愛結衷腸憶昔𥘉奉歡露白春蘭芳清樽罷新製妙趣深濠梁飛景急西匿川流浩蕩蕩玄髮凄歲晚木脫天雨霜蔓草豈容惜松柏在高岡翰林子元子武庫森戈矛英聲邁千古逸韻撗九州與君契金蘭投分何綢繆清和謝夷惠典刑追韓歐坐令人文煥允塞昭王猷念君獨逺邁寥落行人愁木瘦楚山曉風淨寒江流何當駕飛車都宴崑崙丘塵埃滿腥腐朝莫同蝣蜉暘谷上寒日影射扶桑枝瞬息及中天流光迅難持人生百年內昻昂何所施孤鴻東南征浮雲西北馳可憐万感身會合須臾期安得弄明月皎皎逺愛疑折花芙蓉浦蕩槳江漢涯優遊以卒歲身名良不墮遊雲蒼鱗穹閶闔不可呌徒令虎豹間日月近輝耀濛濛八表塵隱隱万彚竅泯然一歸途伊誰執其要栖栖聖者徒禮樂懷窈眇閉門忍朝飢風雨深蓬蓼今年江海去光景短螢爝禾黍滿故墟閭巷餘返照揮絃送飛鴻今古入長嘨昔我適吳會日夕承歡顔髙堂樂起舞綵服何斒斕東潮洶波濤西湖翆煙鬟北歸餘十年謬迹通朝班家禍一朝集音容何可攀悲號蒼穹逈往事思日艱命窮時亦迫志弱體自孱安得騰化術從君超人寰執手不忍訣臨風涕空潸我晉君勿思君歸我當憶十年膠在漆一且各異城吳江激微波震澤起瞑色鵾鵬隔天地鴈鶩雜南北念我平生友愴恨摧胸臆獨看燕山雲歲暮日𥘉昃永言長風翔情寄南風翼九月十日接駕回因遊香山寺飲于西崖之上酒酣呈主人迎鵉北去迷風沙看山西來足煙霞蒼山朝含太古色長松百尺凌雲斜傑觀重樓炫金碧笑拍闌干倚天立出門却得望東山紅樹青杯亂秋色痛飲崩崖吸鯨川徑欲醉倒秋風前伹恨浮雲閉白日使我不得瞻青天忽忽今年負重九樹老山空復何有莫將身丗愧淵明縱有黃花無此酒奉和李秋谷平章宿西郊春生騎吏飛塵外便覺髙情逺丗紛酒泛泉香清易列夢侵仙骨冷難曛珠生滄海還驚月鶴舞層霄不見雲無象太平今有象共欣良相遇明君王繼學參政東平人送華山隱歸西湖方士求仙入滄海十二城樓定何在金銅移盤露滿天琪樹離離人不采軒轅髙拱聖明居群仙真人左右趍青牛谷口迎紫氣白鶴洞中傳素書珊珊鳴珮星辰逺寂寂珠庭雲霧虛修髯如漆古仙子玉林芙蓉染衣水九關高塞不可留歸去江湖種蘭芷山頭宫殿風玲瓏玄猱飛來千尺松間房誦經鍾磬響石壁題詩苔蘚封欲向君王乞祠祿安排杖屨來相從和馬伯庸見寄待臣催講玉階西雲淨觚稜曉色低天闢神州卑兩漢地連竭石轉三齊含香晝永間靑瑣視草堂深􅊜紫泥最憶東山老松樹秋風應有鶴來棲長堤芳草遍灤河誰買扁舟繫樹槎金悵薰風生殿角晝樓晴霧宿詹阿万年枝上烏啼早九奏階前鳯舞多供奉老來文采盡詩壇昨夜又投戈送朱本𥘉住五隆官河新栁雪𥘉融仙客歸舟背楚鴻鐵杖晝間山似玉石摟人靜水如空煮茶榻畔延徐孺燒藥爐邊覔葛洪天上雲多白鶴去子規何事怨東風王儀伯和馬伯庸韻金馬門東畫省西千官花覆曙光低九莖芝蓋雲衣合百石銅盤露顆齊鹿柵巳營修竹塢燕巢還輔落花泥上林伏日金桃熟鸚鵡來時不敢棲馬昻夫逹魯花赤送僧逰遍國廬紫翆峰片雲吹影浙江東曇華貝葉春三月布襪青鞋山萬重禪性若灰終有味機鋒掣電本來空問師此别知何處笑指天邊月正中曹子貞禮部尚書東平人和趙子昻韻灤水橋邊御道西酒旗間挂夕陽低春從緑樹隂中老雲輔蒼山缺處齊畫戟遙臨青瑣闥紫騮解惜錦障泥鵉皇自為明時出冝傍上林髙處栖柳簇金溝蘸碧波雲深貝聞瞰重坡鳯凰曲奏鈞天樂烏鵲橋通織女河萬井閭閻春浩蕩六街車馬曉坡陀山人素有林泉興奈此看明侍從何假惟德參政河東人登嶽陽樓群江西來與天乎天壤巨浸開洞庭雄吞三湘隘七澤中蟠萬古君山青我行持節按廣海驛騎暫駐巴陵城巴陵城樓冠天下風軒月户雲霧屏平生夢想今始到危欄乍倚心魂驚𥘉疑太極渾未判日月往復凌空明又疑此丗墮物外弱水萬里環蓬瀛湖山得意有如此况乃佳客聮簮纓金杯浮動玉色酒滿懷清思春雲生魚龍掀舞怒濤起眼花落日搖青冥軒皇廣樂渺遺響芳洲寶瑟愁湘靈丹丘謫仙竟何許幾欲八表追遐齡孤心未了忠孝願敗念緑髮潛凋零聖神一視無逺邇恩風化雨浹四溟尋常嘨聚大豕尓瘴煙一洗霜天清歸鞭咫尺覲慈母細語八千山水程孰能間置若新婦正要磊落肝膽傾飲酣拂袖下樓去忽聽過鴈雲邊聲李齊賢青州人鳯不來韶州九成臺作鳯不來遼東海髙臺巳荒天未改當時别舜返昆丘如何一去三千載人間豈無青琅玕孤栖未必天霜寒致君堯舜我有術來儀好向宫庭間鳯兮鳯兮今當還張氷溪揔𬋩贈醫士祕方肘後愈沉痾診脈端能繼叔和更效叔微積隂德不須種否滿林多錢雪界萬戶寄隱空兼東詹景仁山間𥘉别記詩清笑我何癡老客情杜宇聲中思去就蝸牛角上計輸嬴久知丗慮非常道每愧丹經未贖盟容我岩前助薪水也將琴劒挂神京假天祐沐人餞祝直清慷慨豪談髮指冠讀書不作腐儒酸類宫文學多髙第祖道詞章盡逹官者述正宜登玉署敷陳長擬對金鑾朔雲燕樹三千里淸夜思君嶺月團李兩山禮部侍郎番昜人鬻孫謡白頤老翁髮垂領牽孫與客摩孫頂翁年八十死無恤憐汝孩童困飢饉去年雖旱猶未熱今年飛霜先殺菽去年飢饉猶一粥今年飢饉無餘粟客謝老翁將孫去淚下如絲不能語零丁老病惟一身獨卧茅簷夜深雨夢回猶自誤呼孫縣吏催租正打門元日笋班玉立五雲階曾醉天家舞馬杯坐困庾樓分月久明從堯殿帶春來洪鈞暖入官橋柳金鼎香傳驛使梅爆竹一聲春夢曉沉香亭畔牡丹開上雷御史臺上棲烏鸇曉寒朱簾雲靜楚天寬星芒搖動龍阿劒霜氣橫陳豸角冠苦透柏心風力徑清臨梅影雪痕乾渾源聞有傳家譜夜露心香借易看妙髙亭危亭新構客持觴雨浥闌千面面涼煙外好山供水墨風前老樹奏笙簧接天淨緑秋江白著地􅊮雲晚稻黃騕裊絲鞭歸興逸水晶宫殿桂花香次韻單徒提夆百蠻冠帶悉來庭九虎臨關萬雉城漢殿風馳十行詔唐藩雷動衆軍聲海涵春育民膏澤雨施雲行天性情聽得老癃扶杖語紫微垣畔泰階平吳養浩儒學提舉饒州人象山山長嶽仲逺美任象山天下秀中有陸公祠聖道開千載皇天粲二儀垣墻空草樹禮貌見尊彞雅有嶽山長三年今在兹祝直清儒學教授上饒人和貫學士月氐王頭飲器歌單于寶力寒映雪月氐髑髏飲冤血泥丸真人辝絳宫麯生時能醉其骨閼氐夜悵浦萄香拍拍春霞灔秋月賢王起舞谷蠡歌傳動歡呼兩耳熱燈前人影半闌殘燈後有磷巳明滅持杯本為澆嶙峋胡為對此傷精魂弓蛇猶能致惑疾智瑶豈是無心人頭顱如許當速朽生擒誤入仇家手忍將鳴鏑射頭曼吁嗟降王尓何有後來漢使諾水東猶待留犁撓盟酒漢時冒頓造響箭弒父頭曼又伐月氐王以頭骨為飲器漢宣帝遣使以留犂撓酒與胡王盟於諾水之東谷鹿蠡平二畫斷岸蒼煙喬木小橋野店村春一曲晚風樵唱翛然林下相逢疊嶂半空懸瀑平林隔岸層臺風雨一川煙浪扁舟何處歸來上官伯圭安仁人上秦王伯顔太師右丞相今代麒麟苐一功勳王師相錫秦封作為霖雨三農望旋轉乾坤万國宗龍虎臺前春盎盎鳯皇池上日溶溶曵𥚑舊是王門客又侍金鑾入九重祝元美上饒人贄王從義御史志士身未逹端居若無為一朝立清要掃決浮雲披王君北方彥絢練丹鳯姿經綸有術業大莭能素持青驄入南臺白東晨霜飛惟時揔六聀百聀不敢墮鷹鸇擊霄漢梟獍安得窺苦心在庠序勉勵廉有遺春秋嚴大祀禮數摧毫釐溫然載言笑匪怒伊教之青青歌子襟荒穢久不洽明公欲振廢恩乂當兼施吾儒貴輔報豈直分寸禆胡為往庶役猥吏令得欺以兹失生遂衣冠困塗泥何當復其徭庶使回澆漓神駒一超越駑馬思驅馳芻蕘倘可問風俗期當移我生万山中耕鑿甘自恰奈何苦墮突雞犬不得栖遂令布衣士何由食山薇彈冠出岩壑逝拯斯民疲浩歌視行雲白日回精輝明公一攬轡慷慨投兹詩周鈞山訪劉須溪西山一簾雨相對在雲邊取履今何代回頭恐是仙半生空四海一句可千年歸去龍須下桃花屋角煙李仲公安仁人送洪教授忠宣盛澤餘孫子分教如今住柳州此心仞不異孔孟何俗莫可回商周玉堂金馬自兹始九疑三湘因得遊蠻客舟車過如織安書時遣到蠙洲題吳間二齊老堂齊老齊老人齊老多少丗人齊不老史家父母昔齊老吳家父母今齊老當年落筆山嶽光三百餘年歸此堂秋塵如煙隔精彩白髮眼明猶再拜梁彥中儒學提夆公餘山郭蕭踈似野居公餘經史足相娛雨聲喧寂雲來往嵐色淺深煙有無畏酒久間頭上帽苦吟頻鑷鏡中鬚茅亭間掩無人到卧聽風簷鳥雀呼春晝溪水搖光動粉墻雲山倒影蘸吟觴一庭芳樹清隂薄千尺遊絲白日長風細柳塘鶯語滑泥融花徑燕飛忙乾坤俯仰窺難盡花柳無情種種香龍門天險難非禹鑿功坤靈闢此一何雄翠鋒傍矗雙棖峻白浪中穿一國通方馬奔崩路南北兩鰲緾繞日西東神扄求壯三都勢逈壓崤亟百二重旅懷邦孟昌道韻幽葌凝露泫如啼獨愛寒香滿竹扉信口詩成寧見悮怏心事過漸知非故山路逺音書少小院答深好客稀誰慰荒寒一尊酒滿城風雨送春歸夏誠中安仁人元日天門啓曙翠煙寒遙想新年聖體安蠻貊來朝修貢職臣僚入覲集衣冠香浮蓂砌風𥘉靜仗對薇垣露欲乾獻賦何年趍近密金閨通藉未應難王秋江上饒人次韻周君和贔負終風拂老懷陽春那得一枝來睢鳩不見周南化豺虎徒興王粲哀背冷極思簷外日耳聾難聽地中雷翻思飛雪清冷處二十年前共舉杯秃筆𬒳褐深居未出林摧殘豈信有如今拔毛本欲利天下秃鬢方知負此心老死不歸刀吏守平生當得近臣簮斯文功在終難泯月裏東君有好吟王虛白上饒人贈人邵武玉佩傳光甫之未有子也病疫將死妻何嚙指瀝血請身代夫死以延其嗣翌日何卒而光甫活今六十年其子好舌遵治命遷何柩合葬淋漓血指疾呼天一篆才通淚徹泉厲鬼有靈當兩活史書無愧可千年龍津沈水劒重合頭破秦庭璧自全勿謂彼蒼無老眼書香一脈一氶傳贈地理人知君再丗挾囊青我亦能知造化倩好在主人方寸地渠家代代有公卿蔡九思上饒人訪太玄天師飛車擁蓋下三神曠視齊州九點塵黃石谷城千載意翠壷蓬嶽四時春嵩髙海闊丹書逺地闢天開紫氣新見説桃花紅万樹扁舟來問武陵津雜興欎欎桑與柘環圃俱凄凄采之樂蠶飢復見靑滿枝廣疇稻苗多種之恐遲遲蠶婦與老農何嘗一解眉芳春各載酒競覩羣葩竒錦衣與稻粱辛苦元不知鵉鵬與騏驥迹逺識者稀􅔏鶴與鷦鷯或亦摩天飛和鳴相上下惜無養由基閉門思古人玩物真何為聖賢不我欺千載還相期張伯逺餞祝直清朝餐狙林橡夕飲虎窟泉幽棲豈不逸於道為未全是以少微星含輝麗中天雲蘿謝招隱冠帶趍興賢魯生贊制作啇老安疑然董子述徴驗賈誼明經權盛德有遭逢志士元棄捐長貧若忘丗一出垂千年折枚楚山阿賦詩江水邊寂寞思古人中懷為君宣象山山長嶽仲逺美任歸浙石泉笙磬靜微聞百尺蒼松立在門道學宗風陸夫子故家遺澤嶽王孫忠臣有後天心定治丗無為聖教尊官序改遷從此上記曽師友涉淵源龔楚清送孟和卿平陽尋母杜羔念母心最苦豈意一朝逢澤潞母驚兒貌似乃翁兒抱母啼淚如雨五十孺慕朱夀昌刺血寫經毛髮蒼間關同州晚相見迎侍親興歸故鄉人生百年一彈指母恩未報情曷已團欒樽前舞綵衣大勝丗間朱與紫子行万里涉風沙誓不見母不還家兒今髮葉母應老道傍觀者還咨嗟臨川孟氏號雍睦家丗來此澶淵族婆娑老暮紫荆花料想春風依舊緑黃伯玉上饒人贈相字倉頡紛紜巧思傳多君巧外更玄玄萬形一理推無盡試究庖義未畫前白仁壽上饒人書事大羮元無味大章夲希音音繁入人耳味美適人心是以保身難揣揣如臨深百戰苟一失勇氣未足欽今若不學古後何法于今王子東上饒人採桑歌翻雲烏鴉影鬖髿颭風白燕雙傞傞橫波凝流斂螓蛾吳蠶飼餧飢則那十纎挽柔剪緑柯六幅暗露侵𥜗䋪饔飱驀誤晷隙過蠶飢葉稀寧不瘥千頭万緒豈敢吪終以暖事期絲紽錦帷繍幌相婆娑人情好耕不厭多倚門刺紋來聽歌載青載黃胡側頗樹間耳語慎勿哦万一出口他人訶纂纂桑椹如鳩何新春新月舉頭見新月低頭過新年新年幾回新新月幾度貟錬石屑寶功難全娥能竊藥終孤眠夢中蝴蝶飛翩翩花草何意爭春妍憂杞之憂逐夸顛無情有情憐不憐長星不飲酒宰牛不服田東風解織千機錦要我來看在雨前張洪崖神遊圗洪崖即果老唐玄宗以玉真妃故洪崖去之往來長安騎白騾名白雲携五童以酒瓢詩卷書囊隨之開元天子舊相知一笑曽緣降玉妃囊括無言玄自得瓢虛有酒醉同歸曉山殘夢清塵逺春圃靈苗白雪肥回首長安西日外神遊何處片雲飛和胡梅復白鷴若為見月倍思家偶意名禽起句華拂羽增明聮縞袂綴冠合粲蹙嬌花朝尋暖草雲連谷夜擁寒坡雪載沙尺與鶴琴清作伴可能無夢繞煙霞中秋青天化作白玉盤棒出七寶玻璃觴姮娥起舞太白醉如此風流何可忘北斗酌取瓊河漿秋風製就芙蓉裳龍吟泓下虎嘨壑誰能著耳聽啼螿吳遜齋文讓龍溪縣尹戊寅雪後和謝提學韻鏞城正月雪𥘉霽賸得官間吟嘨中萬國山河開夀域九霄風月播春融竹依柏樹增新翠梅與桃花間小紅王化盡無偏黨處故教冷暖揔相同新創暖閣謝小山韻未學淵明去惟賢康節多人生貴真正物育在中和待闕聽常選隨流創小窩靜心無箇事得趣付賡歌蔡舜謨呈鄧善之巡遊江東道白日千年天有定青冥萬里月無聲相期逺大崇明德力贊雍熙答聖明答方漢杰雲舒黃道日光輝遺逸山林固未冝每嘆劉蕡文字美獨憐徐樂䀻書遲艱難適足成吾事叢挫何能喪自期北極去天無咫尺滄溟到海有枝岐康秋山留别撥灰好共話冬闌莫歎無魚鋏便彈更為梅花留半日勝如别後寄來看吳宜甫文誼內齋一所顔曰養正翰林學士虞邵庵先生作記賦詩一首且夕自警養正深期德日新詩書万卷友前人自修巳是工程定熟讀方知意味真豹尚隱時文欲澤蠖於屈處義求伸龜山屼屼千年在道脈綿綿一氣春外齋一所顔曰學思思學進士張在中州判依記賦詩一首旦夕自警五典三綱與四維鳶飛魚躍貴真知霜前欖實甘回味雪裏梅花不受緇家在先儒文獻里生逢天子聖明時惕然起立晴窗下題作學思思學詩方寒巖别館别館數孤路無聊謾坐窮長年人事外求夕客懷中無酒睡難著有書貧不同衾寒起附火挑撥幾星紅楊原巖九日過大勝關宿黃陂小飲瘦藤髙樹欎荒寒細路懸崖重險艱征戰幾何餘白骨鄉關如此隔青山驛亭帶暝人爭聚澤國經秋鴈自還滿月黃花一杯灑人生何地不開顔姚江村大愚寺即事雷公逐龍度松丫急雨橫穿日腳斜開戶不知渠水滿一時浸倒玉簮花方景山雜詠十首反哺烏曰慈食母桑名惡如烏莫如桑人心當自覺馬舞睨祿山猴朝識朱溫人豈不若獸變故輒負恩鵾鵬奮雲霄尺鷃棲野草物各適其夭夫豈論大小蜂房開户牖蟻穴有官守究竟物皆然夢幻君知否小哉蠻觸戰鄙甚蛙龜怒逹人能大觀夲以和平故瑞丗鳯鳴陽司晨雞鳴丑呶呶取人憎亂蟬合緘口蠶繭每利人蛛網偏害物利害敻不同其間僅絲忽猿啼不窺窗牛馴常露地伏虎與降尨此理元無二解牛中肯綮相馬外􅌐黃從知得三昧意到形自忘蟻封罅隙地蛙井咫尺天那能致廣大此道誰為傳皇元風雅卷之一
