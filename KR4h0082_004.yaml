front:
  text: 皇元風雅卷之四
  hash: sha256:c1b6528af7c2a1c09ead1a1094618c364b71268ea3e9e4781d8b12e4ce9af821
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_004-1a}
body:
  text: 劉須溪探梅四絶江天欲雪未雪時絶江探梅驢倒騎空中著我方成晝亂後逢花且賦詩鈞天逺逺月斜斜歸路迢遙未到家一色白雲天似雪和衣和雪宿梅花後五百年無放翁往歌醉舞與誰同漁人入得桃花洞猶有梅花路未通冷落何心識老逋芳名從此落西湖風霜未改幽堅操弟立花前諱玉奴清明日偶成海日髙髙天路斜斷橋無復聽嘔啞墓中酩酊巳千載陌上清明有幾家巳老愈踈唯酒盞更睛相覔是梅花年年春怨深如昨莫把無涯恨有涯劉立雪梅休説逋仙兩句工氷甌滌筆别形容清標騷客風前立素面仙姝月下逢山店霜寒香撲馬溪橋水淺影如龍一寒盡是寒凝結金鼎無鹽味更濃破荒五雪粲煙村倚竹無言獨斷魂三弄直須琴對越一寒安用酒溫存家風巢許堪同社心事夷齊可共論應出􅌭紛幾紅紫一枝開處自乾坤除香除影賦梅花方許詩中擅作家怕俗似嫌羔作酒髙人頗稱雪煎茶參橫屋角霜𥘉下人倚闌于月欲斜夜冷玉肌愁入骨金壷移入伴窗紗天花夜半落溪傍傍有獰然為取將擎瓜仰空呈潔白掀髯倒地覔昏黃修鱗月下霜同色敗甲風前雪有香欲起輔之圖影看生愁飛入水中藏月巖丗事從來滿則虧十分何似八分時青山作計常千古只露岩前月半規書燈一點蘭膏數寸心小窗伴我夜沉沉暖分青熖藜煙細喜動紅光花意深洞見苦心歸典䇿照殘幽夢入寒衾他時冨貴不相棄移上長檠伴醉吟玉樓夜費燭熒熒秪得眼前歌舞明照破三千年外事書生元不用長檠題靜軒徑深寂寂鎖苔禋此地不生車馬塵夢斷瑶臺惟有竹棋聲花院似無人蛛因門閉牢穿網鵲悟枝乾自採薪秪道乾坤大如許不知天地又新春寄朱約山嵗晚江空煙水寒風林葉落楚天寬若無鴈足書難寄作盡鳶聲吟未安晉帖臨成思入石離騷讀罷擬栽蘭老來絶𬒳梅花惱後會君應笑我孱登黃鶴樓西風吹我登黃鶴白雲半在闌于角題詩不見舊時人惟見青山俯城郭萋萋芳草鶢鵡洲江水衮衮來無休嵗月俯仰成春秋古人今人無限愁題醉月亭采石江頭李太白狂不奈煩宫錦窄赤壁磯下蘇東坡一葉泛泛凌風波當時有月井有酒和酒和月吞入口酒腸得月冷於氷化作瑰辝喧宇宙兩首賦百篇詩千秋萬古稱絶竒兩翁不作歸來鶴玉宇瓊樓寒漠漠若得長江變潑酷少住人間亦差樂望貟晦缺秋復春古來明月今來人我時舉酒問明月月亦團團譍不得鐵如意玉唾壷我歌君和聲嗚嗚爛醉起舞嗔人抶問影莫是李與蘇月中仙子知得無劉養吾别蕭髙鳯惜與可人别又貪歸路長人生有離别吾事屬間忙沽酒澆芳草垂鞭看夕陽眼前聽鶴語丗路劇茫茫送錢才立遊荆二首峴山西上楚天頭書劒區區事逺遊歲月如流方作客江山信美莫登樓百年耆舊誰家傳一代衣冠又古丘亂後題詩詩即史未應輕付水東流不辝跋涉恨﨑嶇如此飄飄一丈夫新雨鳴秋驚草樹行人隨鴈落江湖歲年寧向長途老天地何堪一窒拘幾丗中原今復今更陪九万作鵬圖揭曼碩送馬雍古祖常御史使江西我皇屬愛顧君子得安居孟春風且寒遺子以修途四牡何翩翩回首睇神都我懷正紆欎殽函忽已踰積雪𬒳長巒萎者何時蘇巋彼蓮花峰上出浮雲衢白日皎以懸下視若玄墟煙塵起西北原野無定株行者中顧懷居者念其廬黃河洶東流西自崑崙渠四海豈不曠切若肌與膚親賢逺讒人古以致康娛君子試多林乃用在馳驅秦隴阻關塞歲月浩巳徂鞠躬盡明義足為丗所模宿寶應此縣經過數中年慨感憎繫舟喧夕浪聞笛暗寒燈時俗隨同異文章任愛憎平生江海意一一賴良朋入秦淮和曾編修秦淮江上送飛鴻秦淮水流西復東六朝人物巳寂寞万古雲山空疊重明日還沽采石酒昨朝猶聽廣陵鍾人生不似寒潮水去去來來有定蹤治安慶時再北遊夜泊淮西郡寒生客子衣酒家臨岸間野火隔江飛雲盡月𥘉出潮平風漸微昔年城下路此際正南歸待潮扁舟夜閣寒沙際欹枕待潮紅日髙無數征帆背人去海門何處水滔滔夏五月武昌舟中獨自兩髯背立鳴雙櫓短簔開合蒼煙雨青山如龍入雲去白髮何人並沙語船頭放歌船尾和蓬上雨鳴蓬下坐推蓬不省是何鄉但見雙飛白鷗過宿梁安峽夢故有感時還旴江梁安峽裏杜鵑啼絶壁蒼蒼北斗低雲氣倒連山影合石稜斜鬪浪聲齊南風盡日迎歸客落月空江夢故妻一室數人分十郡百年幾處候晨雞題花鳥圗吳中女兒顔色好洗面看花花為悄調朱弄粉不自施寫作窗間雪衣鳥緑窗沉沉春書遲半生心事花鳥知花殘鳥去人不歸細雨梅酸愁畫眉題饒家橋上有墨龍饒家橋下秋水深饒家橋頭黃竹林誰其濟之饒氏媪績麻作橋橋幾尋青山叢叢似吾髮白石鑿鑿如吾心歸去秋衾續殘夢風雨滿橋龍夜吟海棠嫣然無不在凝脂絶丗東風綵筆竒却問大真曾睡否還應長睡馬嵬時送趙履道虞叔常還江右趙子我同里虞郎我同年手折武昌柳送上西江船買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去幾時來東風花開春水漲待君黃鶴磯頭望君庾公樓上贈淳真子蕩蕩白玉京超超淳真子十二求神仙服事丘與李嵩洛二十載結茅白雲裏餐是暘谷霞飲是玉池水鬼神莫能識百念吹不起一朝忽騰化徑去不可遮飛駟服五龍角巾搖三花朝發梁宋國暮宿河漢槎朝食千嵗桃暮食五色瓜長揖青牛君髙歌度流沙還憩金張館調笑許史家日食五侯鯖安能飯胡麻春風長安陌落日邯鄲道迎人上青天送人入秋草竦身八極表天地忽亦老寄謝區中人全真以為寶黃尊師髙軒觀鵝因留宿開軒南嶽下丗事未曾聞落葉常疑雨方池半是雲偶尋騎鶴侣來此看鵝群一夜潺湲裏秋光得細分夢武昌黃鶴樓前鶢鵡洲夢中渾似昔時遊蒼山斜入三湘路落日平鋪七澤秋鼓角沉雄遙動地帆檣髙下亂歸舟故人雖在多分散獨向南池看白鷗大明殿退朝和周待制巍巍道德拱羲皇濟濟威儀陋漢光日射龍文宫女扇風傳雞舌侍臣香中霄景氣浮雙闕下界歡謡動八荒詞館小臣何以報皇圖聖壽共天長送唐尊師祀武當龍變分香下絳霄羽衣承詔出清朝星臨翼軫南垂闊神降虛危北極遙金殿壓雲開紫氣玉臺和月合笙簘蕃釐更為吾皇祝下國時豐雨露饒送詹尊師歸廬山香爐峰色紫生煙一入京華路杳然雲碓秋間舂藥水雨犂春卧種藝田書慿海鶴耒時寄劒自潭蛟去後懸忽報歸期驚倦客獨淹微祿負中年寄題胡氏園趣亭日與丗情逺學人聊治生畦𬞞多品類樹果合生成野老還偏數山禽近不驚詩書吾所好農圃也須明小孤山曉發和蔡思敬韻日落霞明錦浪翻崖傾石峭白雲間乾坤上下雄孤柱吳蜀東南壯此關神物夜移風動地仙舟曉渡日漫山回瞻絶頂登臨處空翠溟濛杳靄間長眷宫古樹縈紆入深宮結構牢鑿城通水繞纍土築雲髙輦路行巡鶴神曆戴巨鰲應逢王母使持此獻蟠桃祖生詩浦城孝子身姓祖自憐姓命如糞土生才五嵗遭亂離有母更𬒳官軍虜零丁二十八春秋母縱得生何處求天地茫茫明月恨江山漠漠白雲愁忽得母書驚母在看書未盡淚先流書云流落河南縣河南踏遍無由見唐州境上忽相逢白髮蕭蕭霜滿面誰知喜極情轉悲旁人更問𥘉别時千生万死到今日始為母子東南歸東南迢遞關山路入門猶記庭前樹居人傳説盡相看雞黍提携竟朝暮祖生子母真可憐少壯離别老大還同時鄉井𬒳兵者幾人骨肉能生全願生母子長壽者四海升乎永相保漁夫夫前撒網如飛輪婦後搖櫓青衣裙全家托命煙波髮扁舟為屋鷗為鄰生男已解安貧賤生女已得供炊爨天生網罟作田園不教衣食看人面男大還娶漁家女女大還作漁家婦朝朝骨肉在眼前年年生計大江邊更願宫中減征賦有錢沽酒供醉眠雖無餘羡無不足何用丗上千鍾祿髙郵城高郵城城何長城上種麥城下桑昔日鐵不如今為耕種埸伹願千万年盡四海外為封疆桑隂隂麥茫茫終古不用城與湟長風沙夜泊長風沙風沙不斷行人嗟行人嗟奈君何南風正髙北風起大船𥘉灣小船喜移船更傍大船頭不獨風沙夜可憂更祝行人好心事長江何處是安流茅舍參差數株柳時平尚置官軍守青裙老嫗詫鮮魚白髮殘兵賣私酒魚賤可買酒可沽他人心事知何如羅澗谷幼輿折齒歌秋衫未成錦機語棠梨半花鳯一羽象牀雪綜小龍梭細穴銀光吐氷縷西鄰郎君東海歸芙蓉半白杏雨肥十二闌邊説幽怨勸織南浦鴛鴦飛匿蘭含蕙無消息春酲彤霞漾玉色水龍呵出風雨聲奔騰觸裂雙白石白石國城三十六女子軍來兩城覆鵉歌猿嘯強激昻百户風來如箭鏃章臺公子真豪縱復以微言相感動郎君切莫更癡心忍作甘心可人痛孫伯善去妾詞妾昔重顔鮮抱禱十五年阿母云亡主中饋安排翁續鵉膠絃新歸主婦情未密陡然兩意生荆棘推將怨隙在妾身教妾倣徨留不得翁今愛妾空有心妾亦知君愛妾深自古亡家為顔色妾身不當千黃金回頭向翁語遺子留自乳浮雲有散時人生豈長聚妾去婦肯留妾在婦應去但願主翁琴瑟調妾身不恨無歸處黃南卿梅子禁用調羮止等字水邊籬落舊精神煙雨園林急薦新對酒摘嘗金彈客繞林簮戲玉叉人一根清苦千丸雪四月紅黃隔嵗春待得餘花都結子東風流轉便生仁金陵采菱風急棹歌聲白鷺洲前一帶巾緑水不收中洛淚青山空掩六朝人城頭寂寞依龍阜江左興亡寄虎臣孫楚酒樓何處在月明猶寫謫江神湯子文白海青皂雕赤鶻丗紛紛羽翮何如白錦紋東海飛來一片雪西風透入万重雲老拳獨擊頑鵝腦俊目寧看狡兔群玉食所需誰可得夜來丹詔賜元勳繡毬花誰擲流蘇滿小園無心花蕚密相聮唐宫玉蝶團風軟后土瓊花簇月園妖態欲來禋上舞異香冝在帳中懸試看有物渾成處如在東風太素天劉雲山題雪後溪橋老翁著腳欲度小橋後有奚奴搖手似言橋險緩度之狀昔錦奚奴指顧間雪橋如險意如間不知此興政不淺將謂先生跬步艱申屠致逺無絃琴靜中有物即縈心物象相忘趣轉深為報柴桑陶處士無絃爭似更無琴趙半間秋夜曲寒禽認故枝澆枝猶依依涼螢亦知秋飛來傍牀帷幽閨刀尺冷遊子何當歸修途苦不易庶無寒與飢及此清夜長為君製裳衣憶友人李雲南送客出荆扉忽見青青草故人别經時恍隔千里道千里故不遙咫尺夢難到孤鳥安朽株行雲在晴昊敢嘆會無期坐念春風老示兒閉門避秋風開門落葉滿稚子晨發篋却嫌故衣短衣短何足嫌掩脛尚可挽尓父故多憂爾母復不懶力作常苦飢力織未及暖窮厄丗固多榮華亦滿眼但將爾日長勉旃事編簡去婦詞里有孀婦子不檢而無室既疾病乃亟為娶且命之曰為汝娶為宗祀計也未幾死而子竟違母言尋出其婦婦以衰麻在身義不得去𬒳迫逐不可留因為詩以寫懷落葉不返柯去婦無歸年斂𬒮出故幃獨影心悽然君心𥿄鳶飛万里難拘牽妾如鬢邊花未衰先棄捐憶昔𥘉嫁君姑病在床前嵗月能幾何衰麻奉姑延妾今辝門去撫棺淚如泉九原會有知當為去婦憐歲晚歐陽徑存相遇老眼厭紛埃柴門晚暫開凄風行客苦今雨故人耒詩外無窮意燈前欲盡樽相逢還又别珍重嵗寒梅構㯗曲街頭群兒晝聚嬉吹簘撾鼓懸錦旗粉面少年金縷衣青鬟擁出雙蛾眉騃翁前趍嚚母誚醜姬妬嗔狂客笑虬髯奮戟武略雄蜂腰束翠歌唇小眼前勾作名利埸東馳西騖何蒼惶栖栖猶是蓬蒿客須臾喚作薇垣郎新歡未成愁巳作危塗墮馬千尋壑關山万里客心寒妻子衰燈雙淚落紛然四座莫浪悲是醒是夢俱堪疑紅鉛洗盡歌管歇認渠元是街頭兒正言蘇張舌如戟危人亦危身期期周御史千載稱直