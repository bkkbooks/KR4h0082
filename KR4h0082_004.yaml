爲而不矜詫以索隠行恠者乎非所謂濯清漣而不妖者乎不蔓不枝者純一不襍之謂也亭亭淨植者中立不倚之謂也此其所以爲可爱者乎推是言也餘三子之意就其所詣安有流連光景之患乎葉君隠居辟地其必有得於此若夫善頌則在能賦者云蜀人虞集叙至順癸酉二月八日吳宗師方今文采重奎章光照芝山四爱堂梅蘂春融冰雪界蓮花晩靜水雲鄕湘累往矣蘭爲佩陶令悠然菊泛觴千古髙風猶一日迢迢歸夢楚江長馬伯庸幽蘭有貞性佳菊有至節娟娟出水蓮露下玉洗白杲杲空谷梅歳晏立冰雪屬愛在君子畜之以爲德至順癸酉四月十三日侍講伯生老友遣子邀予賦詩媿不能工姑此以塞命也祖常再拜馬公辝翰妙天下凱翁珍藏之集高新甫爱菊隱逸情爱蓮清潔志愛梅違丗俗愛蘭絕丗累性爱固有殊亦各在適意偉哉四君子趣同而丗異人品有定論寓物盡高致遼遼千載下孰能遵道義葉公逹尚友所爱兼其四猗與後來人先志愼勿墜太玄天師彭澤以節髙春陵以道鳴雙井詩之雄西湖隠而清因其有所爱希賢動吾情廼知君子堂貴實不貴名太乙子東籬秋色淨芳沼曉華滋雪落清澗曲風生楚江湄幽景尚依然髙懷邈難追道人継芳躅千載有餘思老屋四五掾草徑臨清池四時各代謝芬芳常在兹朂哉著令德永與舌人期夏紫清十畒煙霞曲徑深四時佳興足幽尋菊芳梅綻清詩骨蘭秀蓮香肅道心半隠肯堂嚴継志百年喬木易成隂通家自有全書在閑倚南牎听玉琴歐陽葉凱翁來京師受知吴宗師又爲名公卿所爱禮得四爱堂詩甚富此行真不虗也爲賦五絶亭亭淨植自中通千古知心太極翁幾度廬山看明月玉簮浮出白龍宫右濂翁爱蓮粲粲中央色不偏風霜揺落義熈年男兒一種剛腸味不譲隆中老子先右淵明爱菊紛紛桃李下成蹊騎馬山人听曉雞如此暗香相慰藉徴書猶到六橋西右君復爱梅幹少花濃雨露深政縁猶有市朝心豫章太史春秋筆不遣山王預竹林右魯直爱蘭涪陵翁解識春陵薛映何如刺史弘葉氏堂中知尚友不縁花有愛和憎右葉氏四愛堂盧陵歐湯玄揭曼碩蓮菊梅蘭共一堂父兄子弟爱無忘對花便擬書徴士學道唯求接素王孝友家傳人所羨横斜句好㒷偏長百年心賞千年意一種風流四種香玉倫徒原有梅兮隰有蘭君子之爱何幽閑陟崔嵬兮履潺湲胡不歸樂山之間岸有菊兮渚有蓮君子之爱何清妍雜佩有贈勿弃捐胡不歸兮樂歳年瓊臺石室何威夷親之所爱子所思托根后土深且滋春雨秋露無巳時王士點予所爱兮崇蘭植之兮堂間思夫君兮山谷紉翠佩兮雜青綸蘭芳歇兮日在山欲從之兮不得閑予所爱兮脩蓮植之兮堂前思夫君兮濂之水濯冠纓兮叩漁舷蓮馨富兮水泥烟欲從之兮不我賢予所爱兮秋菊植之兮堂隩思夫君兮柴桑巾漉酒兮柸生馥菊英黄兮江波縮欲從之兮不我復予所愛兮湘梅植之兮堂隈思夫君兮淛之湖吟清淺兮句容裁梅枿素兮雪飛埃欲從之兮勿予猜謝草池梅蘭蓮菊各爭誇風月平章屬大家四爱堂前親手種乾坤生意四時花詹厚齋友人葉成甫世家永豐梅林而松溪元貞丙申動適彼楽郊之想慕孟氏三遷之凨徙居睦楽池頭相攸幽勝結廬三間竹樹茂美鑿池灌園手植梅蘭蓮菊又取濂溪渊明和靖山谷諸老之說掲中堂榜曰四爱以寄四時雅興清矣哉且以永日且以尽年有以自老矣而数僅中壽二子无翁凱翁皆恂恂善与人交凱遊方之外元好脩而文於屋東偏闢小室號半隠靣脩竹竹外車馬憧憧而囂塵不到清琴橫床儒書堆案不矜名不眩能能其丗家而大之者余毎過之喜其有隠者趣爲之賦小詩四愛名堂名匪誇梅蘭蓮菊當傳家誰知半隠琴書趣出色堂前四愛花程登庸元翁出詹同舎所爲四爱堂詩正有契於予懐去年夏予訪詹山道過焉爱其顯而隠駐車縱歩者久之意元翁遷是未逺也今乃知經始於成甫而元翁復闢半隠以居琴書於是更肯堂矣蘭蓮菊梅分四時而專美合一堂而集芳受乾坤清氣者夫誰不愛然父愛之子不翦之者巳鮮况推其所以愛者而隠焉又充所以愛其身者以顯其父母焉吾知元翁之愛不徒在是而九原有知所以愛其子孫者又甚於愛是四者矣是則蘭在庭階尤宜若夫春秋之異其時山川之異其種湯佩之異其用說雖不同義同一隠至若實与蓮同一夏葉与菊同一秋色与梅同一冬又有无時而不春者先四愛亦宜然則上堂如有見也出户如有聞也人知元翁之爱未必知元翁之思也旣以是諗來者其季吾徒也又以是勉之吴月湾梅蘭蓮菊儲天地之清氣洩山澤之幽芳春秋冬夏各專其一時之美露生之物以臭味見取於人者未能或之先也孟方王君示余以詹山老先生所爲葉氏半隠四爱堂記雋永数四茟芳墨潤㳅溢頰舌間伹斍四物之美並萃於一朝而忘其爲草英木華之迭出於四時也蓋昔之鍾是愛者吾聞其人矣屈子之於蘭也渊明之於菊也茂叔和靖之於蓮也梅也匪徒爱之而巳其人品實似之故以蘭配屈以菊配渊明蓮配茂叔梅配和靖人莫得而易之者世之稱是四物而是四賢也巳可不言而喻矣是豈偶然者哉且四賢之爱是物也亦各取其一耳而今也以四爱名堂取四賢之所取者兼而有之不巳泰乎是殆不然詩云高山仰止景行行止爱以四言則四時之間見是物也如見四賢焉聞其風而㒷起所以自處者必有在矣徒爱云乎哉抑其以半隱名者得非欲沐蘭之芳翫蓮之潔而徘徊菊梅之間也歟孟方其爲我質之詹山延祐庚申至後同郡呉存敬書彭孟圭先人與成甫葉君友甚稔予亦從侍次識之今去之十二年而兩家子弟復胥㑹於榮山慨二父之不復作且出四愛堂詩求和予爲之掩卷涕零因次韻以志二氏之感云免胄宗風衆共誇當特特乆許通家重來四爱人何在淚温斯堂幾度花李進齋喜怒哀懼爱惡欲人之情性之發也夫爱七者之一耳而好尚於是乎觀之爱其所當爱者天理之公衆人之所同也反是則人欲之私一巳所獨而已葉君成甫植蘭蓮菊梅於庭以四爱扁其所居之堂以爲四時之可爱者莫是若終其身不渝元翁之爱之視成甫益加旣又築室於堂之東曰半隠其意若曰是隠者所爱也則能継其先君子之志豈特同乎衆人而巳哉然而草木外物也内而礼義之恱心有甚於爱是四者即其外以信其内則無一物不在所爱之中矣元翁心醇而氣清進之於道則由爱親以爱人爱人而爱物知所差等夫孰非性情之体用乎行矣堂且顯而隠不終於隱亦半之謂也元翁勉之葉氏丗家梅林於予爲同里今所居曰睦楽巳一再遷予因記之亦以寓閭井之爱云尓至治辛酉孟冬李晉敬書李絅齋余曩歳與里中元翁葉公游君数数爲予言吾先人成軒之迁居睦楽也林木薈蔚屋庐靖深環植梅䔵蓮菊取前賢題詠掲諸壁扁堂曰四爱以爲游息之所地偏心逺庶幾乎古逸民之風焉子盍爲我記之余適走東西未暇也越一紀返吾故而元翁巳謝丗矣追念舊游如夢而斍元翁恨不可作記其可以不作乎余惟天地以生物爲心而人与物得之以爲心是以善觀物者知物之理无以異夫天之理也故觀榖種可以識仁心觀牎草可以驗生意視葉君之爱同一機耳爱屬仁仁非天地之心乎以吾之心体物之心而天地之心可見矣所爱其不在兹乎或曰草木之可爱者蕃矣四者之爱抑豈有所擇欤曰非也夫人之心静躁不同嗜好亦異故恱紛葉者必朝市奔競之䟽甘澹泊者必山林遺逸之士譬諸草木吾臭味也丗固有爱牡丹而誇囯色者矣爱海棠而羡紅粧者矣甚者碾綉轂而縱春游燒銀烛而酣夜飲者矣彼之所爱不已淺乎吾恐物交物引之而已矣人欲肆天理安在哉必也滋之以九畹而吊湘纍之孤忠採之於東篱而慕處士之清節誦淨植之說吟香影之詩又若親炙濂溪之旁而徘徊孤山之下也同前脩於千載萃四爱於一堂目擊而道存心領而神悟吾之所爱不已深乎所得不已多乎若曰天之生林必有所為言其体不及其用可乎胡不即是四者而觀之盖浴湯可以事神飮水可以延夀或分甘而念母或調鼎而相君用耶非耶是猶一念之爱擴而充反而求由親親而民物无二本也用舎听之於天吾无所容吾力而天之所以与我者可不知所自爱乎元翁之子可順好斈而多藝是理也其知之矣今以季父凱翁命来速記且曰願无忘先君之好故楽告之亦以寓余掛劒之意云至順辛未歲七月旣望里人李粲記朱訥山成軒葉君捨梅林故家而三迁塍楽池頭結庐退隱蒔蘭種蓮栽菊挿梅以取四時生香不断之意桂子蘭孫又能継志述亊誠可嘉尚敬歩詹山髙韻繕寫呈似幸恕其率文炳載拜相傳清白亊非誇翁季同心有幾家賸喜生香香不断蘭蓮梅菊四時花幽香凈植緫堪誇老圃秋容别一家雪後清香今㒷逺故林还有幾株花梅野詩序虞伯生近代楊𥙷之作梅自負清痩有持入德夀宫者内中頗不便於逸㒷謂曰村梅𥙷因自題日奉勑村梅集甞見故家有藏徐熈墨杏花者用筆貟潤有篆籀法亦恨楊不能知此也今鍳書博士丹丘生忽用此法冩生大快人意存渾厚之意於清真去衰陋之氣爲纎弱所以爲佳也譬如少陵繁花晴昊之雄壯視昏月淺水爲如何耶楽平錬師葉凱翁舊號野梅予曰以野標梅未足盡梅之趣以梅名野庶乎廣莫之風請更曰梅野而以丹丘之畫冠之水作證據使錢塘臨江二君聞余此論猶當浼首歎伏也虞集書昔結絲絇侍帝宸青鞋今許向江津慿君先對梅花說白髪相看意更親𥘉凱翁先欲南还欲僕作詩送行而僕今先有行色故為題此爲它日一咲之資也詹厚斉江路夢𥘉回猶疑香是雪野意正微茫踈影寒牎月眞山民陳雲岫愛騎馿君不斈少陵騎馿京華春一生旅食長悲辛又不斈浪仙騎馿長安市凄凉落葉秋風裏却斈雪中騎馿孟浩然冷濕吟鐙𫾣呤鞭梅花溪上日来往身迹懶散人中仙有時清霜松下路松風䔥蕭馿耳竪據鞍傲兀四无人牧子騎牛相尓汝勸君勸君但騎馿行路穩姑徐徐九折畏途鞭快馬年來曽覆幾人車江斈庭同知旴江人送人上京天上吟仙笑相覔松間坐客飯青精真遊不知白日晚身丗相與浮雲輕冥冥落花啼鳥静窅窅凬撜寒泉鳴丈夫邂逅志万里滄浪水清宜濯纓掲希韋經歴題双虹橋双虹鎻湖湖水長影揺洞庭吞三湘霜飛八月橘柚熟我欲圢船聞水香晴天晩照過湖曲歴歴遠樹波茫茫客中有懷不得尽无人同上三髙堂許伯昭縣丞荷花艷態繁粧似六郎汙泥不染豈尋常西湖十里今非昔畫舫笙歌有異香相者玉鑑石中求玉誰之玉鑑上无塵知幾塵除却江東雲谷子眼髙四海許何人謝南䆫縣尹送人北上風雲万里思帝郷匣剱夜夜飛神光山林歳月負疇昔鷄鳴裹飯挑書囊我觀蔡君自竒士玉壷水壑清如此終然未泄磊落胸朝朝問道川江水川江水暖飛舸輕黄河九曲長淮清古人成敗生眼底莫爲感慨牽間情黄金䑓上需賢急行矣去作新豊客當令太平十二䇿他年語我須歴歴黄朴齋縣丞酬趙倅鴎渚时秋望河漢漢氣相循環姹女嫁紫車千秋方生顔生顔一何好身与浮雲間入宴東華䑓出遊蓬莱山振衣往從之杳渺不可攀貽我金玉章化此鉄石頑長懷斈道人紫氣占凾関幽居幽居无别亊野㒷足清歡置石妨書案移花傍薬欄蔽門松老大夾徑竹平安自与児童語從来耐歲寒周老山和蓮渠貧女吟妾无千丈繩双丸任渠犇妾无一星金竹笥空長存孤灯耿寒績一春不出門母家今何在血染双啼痕雖然貧不嫁嫁了那忍言古来惟玉奴不肯負東昏嗟哉市門倚父母豈不恩懷友里陌依稀故友庐一生一死竟何如煙荒樹影誰留劒秋老芦花不寄書数點斜陽鴉載犢一拳秋水鷺窺魚丗間何亊非蕉鹿天地無情可奈吁平山永旴平山先生桃源隱君子也不見数年矣少㣲一星忽見旴壘比争先覩之出処語嘿有道存焉小子何足以知之徳公不出城亦必有以也人住桃源意自春蓬莱弱水渺無塵擬隨陶令尋帰路却訝龐公肯入城水弔晉題應有句碑捫唐刻豈无情太原漁者无勞問尽識神仙真姓名贈数者呉洪範先天妙筭泄河圖天後精㣲寄洛書独在明夷說箕子聖人㣲意果何如宇宙由来歷幾秋盛寒偏在五更頭後来誰有天津耳毎到斜陽怕上楼酬李鶴雲江城寒寂歴菊欲為誰秋夢裏関河隔愁边歲月流翩翩雲外鶴泛泛水中鴎何限斜陽樹無題莫上楼曾德厚瑴水底梅虚明元不累形骸花信仍須日月催雲母帳空玄鶴怨珊瑚枕卧老尨猜壽陽宫女凌波襪白水真人玉鏡䑓悮得一般清意味振衣長嘨歩莓苔題耕隱堯舜吾君堯舜民一犁新雨半簑雲㶚陵山下斉眉者歳歳春風欲献芹周梅邊贈墨梅士我家丹霞梅一枝玉爲骨兮氷爲肌平生不受霜雪欺丗上塵土那能緇此花自是天上竒君能點染超𥙷之筆挾造化梅不知相逢一笑添一癡春風滿意桃李蹊豈復顧此寒與㣲灯前夜雨春漏遟一声山外聞子規周溪邊贄撫州章万户旴江相去無百里我聞公名詣两耳聞名十載猶未面便似未曾来擬峴一来邂逅及五峰人言我盍一見公公之勲名塞宇宙文武全才今未有章公得象是相家異時公亦當宣麻我来見公无他亊為公欲求四大字區區盖頭一把茅正如鷦鷯深林之一巢又如窮僧貧道寕忍餓却向斎堂敷床展席施粥常滿座喜公筆墨妙更精須公大書特書大姓名為吾四溪家塾傳千載之芳馨臨川自昔有墨池善書无過王羲之羲之伹能作小楷今公字畫又更大我来一見万户侯識公便是韓荆州軍中旣有百万之貔貅門下豈无三千珠履之英游長歌歌巳語未休問公还能一為握髮周幕溪岳陽楼乗風来叩洞庭君送我楼心慰舊聞水憤荆湘江欲合天怜呉楚地曾分千帆過雨紅揺日一島撑空翠擁雲歳月悠悠閒独倚若爲憂楽話希文黄誠性讀文山集三百餘年楽育恩晚從科目得斯人﨑岖嶺海期年囯零落氊毛万死身諸葛未亡猶有漢包胥欲泣更无秦挑燈慷慨歌梁甫鬢髪䔥森𢥠鬼神傳東郊鉄環歌傳言京使舟次漢陽次日扼泥挽不起聚賈舟起之得鉄鎻長莫可紀於是鎔作数百鐶懼而復投之水或曰呉王作此鎻江也楊廷秀得一鐶以示予異甚索歌誌之楊君手執一鐶鉄異亊驚傳向人說横江鉄鎻是何年千古沉淪共魚鱉抗津扼險尚豪勢无乃當时謀計拙想當炉冶力鋉时一囯王靈走炎熱火燄連空氣吐雲此鎻得完農器缺益州刺史尨驤東火冷煙銷呉巳㓕英雄有恨在天地淚入江河流不竭達秉使者都水衡夜泊漢陽江上月挽船欲去不可起倐聚千艘同撇捩馮夷震懼蛟蜃驚千丈連鐶中断絕重如金石鏗有声猶帶呉人舊精血天教尤物出人丗豈誡奸邪母僣竊方今垩化開隆平四海車馬同軌轍君從何処得有此直欲珊瑚隨手裂紫金白璧丗所珍往往貪惏作妖孽願將此鈇示児孫滄海揚塵須共閱不然化作莫耶精斬取長橋蛟百截山行松老崖空樹欲傾緩吟㣲陟荅新晴春深雨過花如夢風暖鶯回樹有声縹緲蓉城雲作户依稀緱領鶴吹笙惟應眼厎皆詩句一夜推敲直到明和荅兆五姪青年那似尓白髪巳尋余負郭耕无畒傳家業有書士貧天理定老病丗情踈雅得陳无諒时能問索居次韻果岩琴棊書畫四羙人啚宮槐葉暗午風清閒弄瑶琴寄此情秪恐関雎風巳変調哀絃促不成声沉機黙黙對枰棋妙着緘情有所思誰信華清當局者峨眉風急馬行遟李氏夫人信筆揮書名千古出中閨盈盈錦上回文字不有詩人為品題玉軸輕輕卷復舒内中名畫丗間无可怜山店鬼啼夜不似文姬别虜圖黄季嬴候張伯陽州判不至奉寄海風吹散樵山雪洒向瑶䑓照明月因之欲訪三蓬莱望断双鵉翠煙㓕且持宝劒窮南溟片帆飛度遥山青幽尋丹碧採芝草松風竹露春泠泠江边忽遇蟾宮客江草江花尽相識東風一笑訪驂鵉三十六峰緫春色峰顛孤鶴飛且鳴徘徊似欲難為情雲深林暝杳莫辨时时照影臨溪清我时感此生幽趣笑折瑶華寄仙侣白鴎飛去猶未来門掩青山正風雨登幔亭有懷杜清碧先生浙遊幔亭髙聳碧天寒杖屦躋攀杳靄間澗竹吟風將雨過岩花笑日伴雲間遥怜浙水生离思独立閩山想别顔極目㑹稽何処是孤峰落日水潺潺劉叔逺寄黄士謙放歌出東林思弄川上雪清風吹湖波驚散波上月美人載美酒㪯植揺秋霜把酒勸青天青天忽盈觴揚帆掛白雲鷗鷺同飛揚歌罷一長笑忽然江水長懷若不可見流恨滿瀟湘熊澗谷木綿歌秋陽收尽枝頭露烘綻青囊翻白絮田婦携籃採得㱕渾家指作機中布大児来覔孺小児来覔袴半擬償私債半擬輸官府竹龍旋着活火薰蠧虫母子走紛紛尺鉄碾出瑶空雪一弓弹破秋江雲中虚外泛搓成索晝夜踏車声落落車声木冷催上機知作誰人身上衣小女背面臨風泣憶曾隨母園中拾覽鏡鏡是何年鑄我是何年生朝朝長見面相對如弟兄昔年照我时如弟顔色好今年照我时如兄顔色老願鏡團團光皓皓兄弟百年永相保昨日一須白今日一須白次第白欲尽白尽何須摘人頗笑衰朽我自謂竒特頼有古鏡知元不拒老色却思父母恩對此空歎息秋日江村短短竹籬三五家独樹作橋横淺沙山頭昨夜雨𥘉過秋水一寸茨茹花詩後四卷終
