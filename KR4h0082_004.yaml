為而不矜詫以索隱行怪者乎非所謂濯清漣而不妖者乎不蔓不枝者純一不雜之謂也亭亭淨植者中立不倚之謂也此其所以為可愛者乎推是言也餘三子之意就其所詣安有流連光景之患乎葉君隱居辟地其必有得於此若夫善頌則在能賦者云蜀人虞集敘至順癸酉二月八日吳宗師方今文采重奎章光照芝山四愛堂梅蘂春融冰雪界蓮花晚靜水雲鄉湘纍往矣蘭為佩陶令悠然菊泛觴千古髙風猶一日迢迢歸夢楚江長馬伯庸幽蘭有貞性佳菊有至節娟娟出水蓮露下玉洗白杲杲空谷梅歲晏立冰雪屬愛在君子畜之以為德至順癸酉四月十三日侍講伯生老友遣子邀豫賦詩愧不能工姑此以塞命也祖常再拜馬公辝翰妙天下凱翁珍藏之集高新甫愛菊隱逸情愛蓮清潔志愛梅違丗俗愛蘭絶丗纍性愛固有殊亦各在適意偉哉四君子趣同而丗異人品有定論寓物盡高致遼遼千載下孰能遵道義葉公逹尚友所愛兼其四猗與後來人先志愼勿墜太玄天師彭澤以節髙春陵以道鳴雙井詩之雄西湖隱而清因其有所愛希賢動吾情乃知君子堂貴實不貴名太乙子東籬秋色淨芳沼曉華滋雪落清澗曲風生楚江湄幽景尚依然髙懷邈難追道人繼芳躅千載有餘思老屋四五掾草徑臨清池四時各代謝芬芳常在兹朂哉著令德永與舌人期夏紫清十畒煙霞曲徑深四時佳興足幽尋菊芳梅綻清詩骨蘭秀蓮香肅道心半隱肯堂嚴繼志百年喬木易成隂通家自有全書在間倚南窗聽玉琴歐陽葉凱翁來京師受知吳宗師又為名公卿所愛禮得四愛堂詩甚富此行真不虗也為賦五絶亭亭淨植自中通千古知心太極翁幾度廬山看明月玉簮浮出白龍宫右濂翁愛蓮粲粲中央色不偏風霜搖落義熙年男兒一種剛腸味不讓隆中老子先右淵明愛菊紛紛桃李下成蹊騎馬山人聽曉雞如此暗香相慰藉徴書猶到六橋西右君復愛梅幹少花濃雨露深政緣猶有市朝心豫章太史春秋筆不遣山王預竹林右魯直愛蘭涪陵翁解識春陵薛映何如刺史弘葉氏堂中知尚友不緣花有愛和憎右葉氏四愛堂盧陵歐湯玄揭曼碩蓮菊梅蘭共一堂父兄子弟愛無忘對花便擬書徴士學道唯求接素王孝友家傳人所羡橫斜句好興偏長百年心賞千年意一種風流四種香玉倫徒原有梅兮隰有蘭君子之愛何幽間陟崔嵬兮履潺湲胡不歸樂山之間岸有菊兮渚有蓮君子之愛何清妍雜佩有贈勿棄捐胡不歸兮樂歲年瓊臺石室何威夷親之所愛子所思托根后土深且滋春雨秋露無巳時王士點豫所愛兮崇蘭植之兮堂間思夫君兮山谷紉翠佩兮雜青綸蘭芳歇兮日在山欲從之兮不得間豫所愛兮修蓮植之兮堂前思夫君兮濂之水濯冠纓兮叩漁舷蓮馨富兮水泥煙欲從之兮不我賢豫所愛兮秋菊植之兮堂隩思夫君兮柴桑巾漉酒兮柸生馥菊英黃兮江波縮欲從之兮不我復豫所愛兮湘梅植之兮堂隈思夫君兮浙之湖吟清淺兮句容裁梅枿素兮雪飛埃欲從之兮勿豫猜謝草池梅蘭蓮菊各爭誇風月平章屬大家四愛堂前親手種乾坤生意四時花詹厚齋友人葉成甫世家永豐梅林而松溪元貞丙申動適彼樂郊之想慕孟氏三遷之凨徙居睦樂池頭相攸幽勝結廬三間竹樹茂美鑿池灌園手植梅蘭蓮菊又取濂溪淵明和靖山谷諸老之説揭中堂榜曰四愛以寄四時雅興清矣哉且以永日且以盡年有以自老矣而數僅中壽二子無翁凱翁皆恂恂善與人交凱遊方之外元好修而文於屋東偏闢小室號半隱靣修竹竹外車馬憧憧而囂塵不到清琴橫床儒書堆案不矜名不眩能能其丗家而大之者余每過之喜其有隱者趣為之賦小詩四愛名堂名匪誇梅蘭蓮菊當傳家誰知半隱琴書趣出色堂前四愛花程登庸元翁出詹同舍所為四愛堂詩正有契於豫懷去年夏豫訪詹山道過焉愛其顯而隱駐車縱步者久之意元翁遷是未逺也今乃知經始於成甫而元翁復闢半隱以居琴書於是更肯堂矣蘭蓮菊梅分四時而專美合一堂而集芳受乾坤清氣者夫誰不愛然父愛之子不翦之者巳鮮况推其所以愛者而隱焉又充所以愛其身者以顯其父母焉吾知元翁之愛不徒在是而九原有知所以愛其子孫者又甚於愛是四者矣是則蘭在庭階尤宜若夫春秋之異其時山川之異其種湯佩之異其用説雖不同義同一隱至若實與蓮同一夏葉與菊同一秋色與梅同一冬又有無時而不春者先四愛亦宜然則上堂如有見也出户如有聞也人知元翁之愛未必知元翁之思也既以是諗來者其季吾徒也又以是勉之吳月灣梅蘭蓮菊儲天地之清氣泄山澤之幽芳春秋冬夏各專其一時之美露生之物以臭味見取於人者未能或之先也孟方王君示余以詹山老先生所為葉氏半隱四愛堂記雋永數四茟芳墨潤㳅溢頰舌間伹覺四物之美並萃於一朝而忘其為草英木華之迭出於四時也蓋昔之鍾是愛者吾聞其人矣屈子之於蘭也淵明之於菊也茂叔和靖之於蓮也梅也匪徒愛之而巳其人品實似之故以蘭配屈以菊配淵明蓮配茂叔梅配和靖人莫得而易之者世之稱是四物而是四賢也巳可不言而喻矣是豈偶然者哉且四賢之愛是物也亦各取其一耳而今也以四愛名堂取四賢之所取者兼而有之不巳泰乎是殆不然詩云高山仰止景行行止愛以四言則四時之間見是物也如見四賢焉聞其風而興起所以自處者必有在矣徒愛云乎哉抑其以半隱名者得非欲沐蘭之芳玩蓮之潔而徘徊菊梅之間也歟孟方其為我質之詹山延祐庚申至後同郡吳存敬書彭孟圭先人與成甫葉君友甚稔豫亦從侍次識之今去之十二年而兩家子弟復胥會於榮山慨二父之不復作且出四愛堂詩求和豫為之掩卷涕零因次韻以志二氏之感云免胄宗風衆共誇當特特久許通家重來四愛人何在淚溫斯堂幾度花李進齋喜怒哀懼愛惡欲人之情性之發也夫愛七者之一耳而好尚於是乎觀之愛其所當愛者天理之公衆人之所同也反是則人欲之私一巳所獨而已葉君成甫植蘭蓮菊梅於庭以四愛扁其所居之堂以為四時之可愛者莫是若終其身不渝元翁之愛之視成甫益加既又築室於堂之東曰半隱其意若曰是隱者所愛也則能繼其先君子之志豈特同乎衆人而巳哉然而草木外物也內而禮義之恱心有甚於愛是四者即其外以信其內則無一物不在所愛之中矣元翁心醇而氣清進之於道則由愛親以愛人愛人而愛物知所差等夫孰非性情之體用乎行矣堂且顯而隱不終於隱亦半之謂也元翁勉之葉氏丗家梅林於豫為同里今所居曰睦樂巳一再遷豫因記之亦以寓閭井之愛云尓至治辛酉孟冬李晉敬書李絅齋余曩歲與里中元翁葉公遊君數數為豫言吾先人成軒之遷居睦樂也林木薈蔚屋廬靖深環植梅葌蓮菊取前賢題詠揭諸壁扁堂曰四愛以為遊息之所地偏心逺庶幾乎古逸民之風焉子盍為我記之余適走東西未暇也越一紀返吾故而元翁巳謝丗矣追念舊遊如夢而覺元翁恨不可作記其可以不作乎余惟天地以生物為心而人與物得之以為心是以善觀物者知物之理無以異夫天之理也故觀榖種可以識仁心觀窗草可以驗生意視葉君之愛同一機耳愛屬仁仁非天地之心乎以吾之心體物之心而天地之心可見矣所愛其不在兹乎或曰草木之可愛者蕃矣四者之愛抑豈有所擇歟曰非也夫人之心靜躁不同嗜好亦異故恱紛葉者必朝市奔競之疏甘淡泊者必山林遺逸之士譬諸草木吾臭味也丗固有愛牡丹而誇國色者矣愛海棠而羡紅粧者矣甚者碾繡轂而縱春遊燒銀燭而酣夜飲者矣彼之所愛不已淺乎吾恐物交物引之而已矣人欲肆天理安在哉必也滋之以九畹而吊湘纍之孤忠採之於東籬而慕處士之清節誦淨植之説吟香影之詩又若親炙濂溪之旁而徘徊孤山之下也同前修於千載萃四愛於一堂目擊而道存心領而神悟吾之所愛不已深乎所得不已多乎若曰天之生林必有所為言其體不及其用可乎胡不即是四者而觀之蓋浴湯可以事神飮水可以延夀或分甘而念母或調鼎而相君用耶非耶是猶一念之愛擴而充反而求由親親而民物無二本也用舍聽之於天吾無所容吾力而天之所以與我者可不知所自愛乎元翁之子可順好學而多藝是理也其知之矣今以季父凱翁命來速記且曰願無忘先君之好故樂告之亦以寓余挂劒之意云至順辛未歲七月既望里人李粲記朱訥山成軒葉君捨梅林故家而三遷塍樂池頭結廬退隱蒔蘭種蓮栽菊插梅以取四時生香不斷之意桂子蘭孫又能繼志述事誠可嘉尚敬步詹山髙韻繕寫呈似幸恕其率文炳載拜相傳清白事非誇翁季同心有幾家賸喜生香香不斷蘭蓮梅菊四時花幽香淨植總堪誇老圃秋容别一家雪後清香今興逺故林還有幾株花梅野詩序虞伯生近代楊輔之作梅自負清瘦有持入德夀宫者內中頗不便於逸興謂曰村梅輔因自題日奉勑村梅集嘗見故家有藏徐熙墨杏花者用筆貟潤有篆籀法亦恨楊不能知此也今鑒書博士丹丘生忽用此法寫生大快人意存渾厚之意於清真去衰陋之氣為纎弱所以為佳也譬如少陵繁花晴昊之雄壯視昏月淺水為如何耶樂平錬師葉凱翁舊號野梅豫曰以野標梅未足盡梅之趣以梅名野庶乎廣莫之風請更曰梅野而以丹丘之畫冠之水作證據使錢塘臨江二君聞余此論猶當浼首歎伏也虞集書昔結絲絇侍帝宸青鞋今許向江津慿君先對梅花説白髮相看意更親𥘉凱翁先欲南還欲僕作詩送行而僕今先有行色故為題此為它日一笑之資也詹厚齊江路夢𥘉回猶疑香是雪野意正微茫踈影寒窗月真山民陳雲岫愛騎驢君不學少陵騎驢京華春一生旅食長悲辛又不學浪仙騎驢長安市凄涼落葉秋風裏却學雪中騎驢孟浩然冷濕吟鐙𫾣呤鞭梅花溪上日來往身迹懶散人中仙有時清霜松下路松風蕭蕭驢耳竪據鞍傲兀四無人牧子騎牛相尓汝勸君勸君但騎驢行路穩姑徐徐九折畏途鞭快馬年來曽覆幾人車江學庭同知旴江人送人上京天上吟仙笑相覔松間坐客飯青精真遊不知白日晚身丗相與浮雲輕冥冥落花啼鳥靜窅窅凬撜寒泉鳴丈夫邂逅志万里滄浪水清宜濯纓揭希韋經歷題雙虹橋雙虹鎖湖湖水長影搖洞庭吞三湘霜飛八月橘柚熟我欲町船聞水香晴天晚照過湖曲歷歷遠樹波茫茫客中有懷不得盡無人同上三髙堂許伯昭縣丞荷花艷態繁粧似六郎汙泥不染豈尋常西湖十里今非昔畫舫笙歌有異香相者玉鑑石中求玉誰之玉鑑上無塵知幾塵除却江東雲谷子眼髙四海許何人謝南窗縣尹送人北上風雲万里思帝鄉匣剱夜夜飛神光山林歲月負疇昔雞鳴裹飯挑書囊我觀蔡君自竒士玉壷水壑清如此終然未泄磊落胸朝朝問道川江水川江水暖飛舸輕黃河九曲長淮清古人成敗生眼底莫為感慨牽間情黃金臺上需賢急行矣去作新豐客當令太平十二䇿他年語我須歷歷黃朴齋縣丞酬趙倅鷗渚時秋望河漢漢氣相循環姹女嫁紫車千秋方生顔生顔一何好身與浮雲間入宴東華臺出遊蓬萊山振衣往從之杳渺不可攀貽我金玉章化此鐵石頑長懷學道人紫氣占函關幽居幽居無别事野興足清歡置石妨書案移花傍藥欄蔽門松老大夾徑竹平安自與兒童語從來耐歲寒周老山和蓮渠貧女吟妾無千丈繩雙丸任渠奔妾無一星金竹笥空長存孤燈耿寒績一春不出門母家今何在血染雙啼痕雖然貧不嫁嫁了那忍言古來惟玉奴不肯負東昏嗟哉市門倚父母豈不恩懷友里陌依稀故友廬一生一死竟何如煙荒樹影誰留劒秋老蘆花不寄書數點斜陽鴉載犢一拳秋水鷺窺魚丗間何事非蕉鹿天地無情可奈吁平山永旴平山先生桃源隱君子也不見數年矣少微一星忽見旴壘比爭先覩之出處語默有道存焉小子何足以知之德公不出城亦必有以也人住桃源意自春蓬萊弱水渺無塵擬隨陶令尋歸路却訝龐公肯入城水弔晉題應有句碑捫唐刻豈無情太原漁者無勞問盡識神仙真姓名贈數者吳洪範先天妙算泄河圖天後精微寄洛書獨在明夷説箕子聖人微意果何如宇宙由來歷幾秋盛寒偏在五更頭後來誰有天津耳每到斜陽怕上樓酬李鶴雲江城寒寂歷菊欲為誰秋夢裏關河隔愁邊歲月流翩翩雲外鶴泛泛水中鷗何限斜陽樹無題莫上樓曾德厚瑴水底梅虛明元不纍形骸花信仍須日月催雲母帳空玄鶴怨珊瑚枕卧老尨猜壽陽宫女凌波襪白水真人玉鏡臺悮得一般清意味振衣長嘨步莓苔題耕隱堯舜吾君堯舜民一犁新雨半簑雲灞陵山下齊眉者歲歲春風欲獻芹周梅邊贈墨梅士我家丹霞梅一枝玉為骨兮氷為肌平生不受霜雪欺丗上塵土那能緇此花自是天上竒君能點染超輔之筆挾造化梅不知相逢一笑添一癡春風滿意桃李蹊豈復顧此寒與微燈前夜雨春漏遲一聲山外聞子規周溪邊贄撫州章万户旴江相去無百里我聞公名詣兩耳聞名十載猶未面便似未曾來擬峴一來邂逅及五峰人言我盍一見公公之勳名塞宇宙文武全才今未有章公得象是相家異時公亦當宣麻我來見公無他事為公欲求四大字區區蓋頭一把茅正如鷦鷯深林之一巢又如窮僧貧道寧忍餓却向齊堂敷床展席施粥常滿座喜公筆墨妙更精須公大書特書大姓名為吾四溪家孰傳千載之芳馨臨川自昔有墨池善書無過王羲之羲之伹能作小楷今公字畫又更大我來一見万户侯識公便是韓荆州軍中既有百万之貔貅門下豈無三千珠履之英遊長歌歌巳語未休問公還能一為握髮周幕溪嶽陽樓乘風來叩洞庭君送我樓心慰舊聞水憤荆湘江欲合天憐吳楚地曾分千帆過雨紅搖日一島撑空翠擁雲歲月悠悠間獨倚若為憂樂話希文黃誠性讀文山集三百餘年樂育恩晚從科目得斯人﨑嶇嶺海期年國零落氊毛万死身諸葛未亡猶有漢包胥欲泣更無秦挑燈慷慨歌梁甫鬢髮蕭森悚鬼神傳東郊鐵環歌傳言京使舟次漢陽次日扼泥挽不起聚賈舟起之得鐵鎖長莫可紀於是鎔作數百鐶懼而復投之水或曰吳王作此鎖江也楊廷秀得一鐶以示豫異甚索歌志之楊君手執一鐶鐵異事驚傳向人説橫江鐵鎖是何年千古沉淪共魚鱉抗津扼險尚豪勢無乃當時謀計拙想當爐冶力鋉時一國王靈走炎熱火焰連空氣吐雲此鎖得完農器缺益州刺史尨驤東火冷煙銷吳巳滅英雄有恨在天地淚入江河流不竭達秉使者都水衡夜泊漢陽江上月挽船欲去不可起倐聚千艘同撇捩馮夷震懼蛟蜃驚千丈連鐶中斷絶重如金石鏗有聲猶帶吳人舊精血天教尤物出人丗豈誡姦邪母僣竊方今堊化開隆平四海車馬同軌轍君從何處得有此直欲珊瑚隨手裂紫金白璧丗所珍往往貪婪作妖孽願將此鈇示兒孫滄海揚塵須共閲不然化作莫耶精斬取長橋蛟百截山行松老崖空樹欲傾緩吟微陟答新晴春深雨過花如夢風暖鶯回樹有聲縹眇蓉城雲作户依稀緱領鶴吹笙惟應眼砥皆詩句一夜推敲直到明和答兆五姪青年那似尓白髮巳尋余負郭耕無畒傳家業有書士貧天理定老病丗情踈雅得陳無諒時能問索居次韻果岩琴棊書畫四美人啚宮槐葉暗午風清間弄瑶琴寄此情秪恐關雎風巳變調哀絃促不成聲沉機默默對枰棋妙著緘情有所思誰信華清當局者峨眉風急馬行遲李氏夫人信筆揮書名千古出中閨盈盈錦上回文字不有詩人為品題玉軸輕輕卷復舒內中名畫丗間無可憐山店鬼啼夜不似文姬别虜圖黃季嬴候張伯陽州判不至奉寄海風吹散樵山雪灑向瑶臺照明月因之欲訪三蓬萊望斷雙鵉翠煙滅且持寶劒窮南溟片帆飛度遙山青幽尋丹碧採芝草松風竹露春泠泠江邊忽遇蟾宮客江草江花盡相識東風一笑訪驂鵉三十六峰總春色峰顛孤鶴飛且鳴徘徊似欲難為情雲深林暝杳莫辨時時照影臨溪清我時感此生幽趣笑折瑶華寄仙侣白鷗飛去猶未來門掩青山正風雨登幔亭有懷杜清碧先生浙遊幔亭髙聳碧天寒杖屨躋攀杳靄間澗竹吟風將雨過岩花笑日伴雲間遙憐浙水生離思獨立閩山想别顔極目會稽何處是孤峰落日水潺潺劉叔逺寄黃士謙放歌出東林思弄川上雪清風吹湖波驚散波上月美人載美酒舉植搖秋霜把酒勸青天青天忽盈觴揚帆挂白雲鷗鷺同飛揚歌罷一長笑忽然江水長懷若不可見流恨滿瀟湘熊澗谷木綿歌秋陽收盡枝頭露烘綻青囊翻白絮田婦携籃採得歸渾家指作機中布大兒來覔孺小兒來覔袴半擬償私債半擬輸官府竹龍旋著活火薰蠧蟲母子走紛紛尺鐵碾出瑶空雪一弓彈破秋江雲中虛外泛搓成索晝夜踏車聲落落車聲木冷催上機知作誰人身上衣小女背面臨風泣憶曾隨母園中拾覽鏡鏡是何年鑄我是何年生朝朝長見面相對如弟兄昔年照我時如弟顔色好今年照我時如兄顔色老願鏡團團光皓皓兄弟百年永相保昨日一須白今日一須白次第白欲盡白盡何須摘人頗笑衰朽我自謂竒特賴有古鏡知元不拒老色却思父母恩對此空歎息秋日江村短短竹籬三五家獨樹作橋橫淺沙山頭昨夜雨𥘉過秋水一寸茨茹花詩後四卷終
