  - {type: variant, offset: 0, length: 5569, content: 皇元風雅卷之四劉須溪探梅四絶江天欲雪未雪時絶江探梅馿倒騎空中着我方成昼亂後逢花且賦詩鈞天逺逺月斜斜帰路迢遥未到家一色白雲天似雪和衣和雪宿梅花後五百年无放翁往歌醉舞与誰同漁人入得桃花洞猶有梅花路未通冷落何心識老逋芳名従此落西湖風霜未改幽堅操弟立花前諱玉奴清明日偶成海日髙髙天路斜断橋无復聴呕唖墓中酩酊巳千載陌上清明有幾家巳老愈踈唯酒盞更睛相覔是梅花年年春怨深如昨莫把无涯恨有涯劉立雪梅休說逋仙两句工氷瓯滌筆别形容清標騷客風前立素面仙姝月下逢山店霜寒香撲馬溪橋水淺影如龍一寒尽是寒凝結金鼎无塩味更濃破荒五雪粲煙村倚竹无言独断魂三弄直湏琴對越一寒安用酒温存家風巢許堪同社心亊夷齊可共論應出􅌭紛幾紅紫一枝開処自乾坤除香除影賦梅花方許詩中擅作家怕俗似嫌羔作酒髙人頗称雪煎茶参横屋角霜𥘉下人倚䦨于月欲斜夜冷玉肌愁入骨金壷移入伴窓紗天花夜半落溪傍傍有獰然為取将擎瓜仰空呈㓗白掀髯倒地覔昏黄脩鱗月下霜同色敗甲風前雪有香欲起𥙷之圖影看生愁飛入水中藏月巖丗事従来滿則虧十分何似八分時青山作計常千古只露岩前月半規書灯一點蘭膏数寸心小窓伴我夜沉沉煖分青熖藜煙細喜動紅光花意深洞見苦心帰典䇿照殘幽夢入寒衾他時冨貴不相棄移上長檠伴醉吟玉楼夜費烛熒熒秪得眼前歌舞明照破三千年外事書生元不用長檠題静軒徑深寂寂鎻苔䄄此地不生車馬塵夢断瑶䑓惟有竹棋声花院似无人蛛因門閉牢穿網鵲悟枝乾自採薪秪道乾坤大如許不知天地又新春寄朱約山嵗晚江空煙水寒風林葉落楚天寛若無鴈足書難寄作盡鳶声吟未安晋帖臨成思入石離騷讀罷擬栽蘭老来絶𬒳梅花惱後㑹君應笑我孱登黄鶴楼西風吹我登黄鶴白雲半在闌于角題詩不見舊時人惟見青山俯城郭萋萋芳草鶢鵡洲江水衮衮來無休嵗月俯仰成春秋古人今人無限愁題醉月亭采石江頭李太白狂不柰煩宫錦窄赤壁磯下蘇東坡一葉泛泛凌風波當時有月井有酒和酒和月吞入口酒腸得月冷於氷化作瑰辝喧宇宙两首賦百篇詩千秋萬古称絶竒两翁不作帰来鶴玉宇瓊楼寒漠漠若得長江変潑酷少住人間亦差楽望貟晦缺秋復春古来明月今来人我時㪯酒問明月月亦團團譍不得鉄如意玉唾壷我歌君和声嗚嗚爛醉起舞嗔人抶問影莫是李與蘇月中仙子知得無劉養吾别䔥髙鳯惜與可人别又貪帰路長人生有離别吾事属閑忙沽酒澆芳草垂鞭看夕陽眼前听鶴語丗路劇茫茫送錢才立遊荆二首峴山西上楚天頭書劒區區事逺遊歲月如流方作客江山信美莫登楼百年耆舊誰家傳一代衣冠又古丘乱後題詩詩即史未應輕付水東流不辝跋渉恨﨑嶇如此飄飄一丈夫新雨鳴秋驚草樹行人隨鴈落江湖歲年寕向長途老天地何堪一窒拘幾丗中原今復今更陪九万作鵬圖掲曼碩送馬雍古祖常御史使江西我皇属爱顧君子得安居孟春風且寒遺子以脩途四牡何翩翩廻首睇神都我懷正紆欎殽凾忽已踰積雪𬒳長峦萎者何時蘇巋彼蓮花峰上出浮雲衢白日皦以懸下視若玄墟煙塵起西北原野無定株行者中顧懷居者念其庐黄河洶東流西自崑崙渠四海豈不曠切若肌與膚親䝨逺讒人古以致康娯君子試多林乃用在馳駆秦隴阻関塞歳月浩巳徂鞠躬尽明義足為丗所模宿宝應此縣經過数中年慨感憎繫舟喧夕浪聞笛暗寒灯時俗隨同異文章任愛憎平生江海意一一頼良朋入秦淮和曾編修秦淮江上送飛鴻秦淮水流西復東六朝人物巳寂寞万古雲山空曡重明日還沽采石酒昨朝猶聴廣陵鍾人生不似寒潮水去去来来有定蹤治安慶時再北遊夜泊淮西郡寒生客子衣酒家臨岸閑野火隔江飛雲盡月𥘉出潮平風漸㣲昔年城下路此際正南帰待潮扁舟夜閣寒沙際欹枕待潮紅日髙无数征帆背人去海門何処水滔滔夏五月武昌舟中獨自两髯背立鳴双櫓短簔開合蒼煙雨青山如龍入雲去白髪何人並沙語船頭放歌船尾和蓬上雨鳴蓬下坐推蓬不省是何郷但見双飛白鴎過宿梁安峽夢故有感時还旴江梁安峽裏杜䳌啼絶壁蒼蒼北斗低雲氣倒連山影合石稜斜闘浪声齊南風盡日迎帰客落月空江夢故妻一室数人分十郡百年幾処候晨雞題花鳥圗呉中女児顔色好洗面看花花為悄調朱弄粉不自施冩作窓間雪衣鳥緑窓沉沉春書遟半生心事花鳥知花殘鳥去人不帰細雨梅酸愁畫眉題饒家橋上有墨龍饒家橋下秋水深饒家橋頭黄竹林誰其濟之饒氏媪績麻作橋橋幾尋青山叢叢似吾髮白石鑿鑿如吾心帰去秋衾續殘夢風雨滿橋龍夜吟海棠嫣然无不在凝脂絶丗東風綵筆竒却問大真曾睡否還應長睡馬嵬時送趙履道虞叔常還江右趙子我同里虞郎我同年手折武昌柳送上西江船買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去幾時来東風花開春水漲待君黄鶴磯頭望君庾公楼上贈淳真子蕩蕩白玉京超超淳真子十二求神仙服事丘與李嵩洛二十載结茅白雲裏飡是暘谷霞飲是玉池水鬼神莫能識百念吹不起一朝忽腾化徑去不可遮飛駟服五龍角巾摇三花朝發梁宋囯暮宿河漢槎朝食千嵗桃暮食五色瓜長揖青牛君髙歌度流沙还憇金張舘調笑許史家日食五侯鯖安能飯胡麻春風長安陌落日邯郸道迎人上青天送人入秋草竦身八極表天地忽亦老寄謝區中人全真以為宝黄尊師髙軒觀鵝因留宿開軒南岳下丗事未曾聞落葉常疑雨方池半是雲偶㝷騎鶴侣来此看鵝群一夜潺湲裏秋光得細分夢武昌黄鶴楼前鶢鵡洲夢中渾似昔時遊蒼山斜入三湘路落日平鋪七澤秋鼓角沉雄遥動地帆檣髙下乱帰舟故人雖在多分散獨向南池看白鴎大明殿退朝和周待制巍巍道德拱羲皇済済威儀陋漢光日射龍文宫女扇風傳雞舌侍臣香中霄景氣浮双闕下界歡謡動八荒詞舘小臣何以報皇圖聖壽共天長送唐尊師祀武當龍変分香下絳霄羽衣承詔出清朝星临翼軫南垂闊神降虚危北極遥金殿壓雲開紫氣玉䑓和月合笙簘蕃釐更爲吾皇祝下國時豊雨露饒送詹尊師歸庐山香炉峰色紫生煙一入京華路杳然雲碓秋閑舂薬水雨犂春卧種芸田書慿海鶴耒時寄劒自潭蛟去後懸忽報歸期驚倦客獨淹㣲禄負中年寄題胡氏園趣亭日與丗情逺斈人聊治生畦𬞞多品類樹果合生成野老還偏数山禽近不驚詩書吾所好農圃也須明小孤山曉發和蔡思敬韻日落霞明錦浪翻厓傾石峭白雲間乾坤上下雄孤柱呉蜀東南壯此関神物夜移風動地仙舟曉渡日漫山回瞻絶頂登臨処空翠溟濛杳靄間長眷宫古樹縈紆入深宮結構牢鑿城通水繞累土築雲髙輦路行廵鶴神暦戴巨鰲應逢王母使持此獻蟠桃祖生詩浦城孝子身姓祖自憐姓命如糞土生纔五嵗遭乱離有母更𬒳官軍虜零丁二十八春秋母縦得生何処求天地茫茫明月恨江山漠漠白雲愁忽得母書驚母在看書未盡淚先流書云流落河南縣河南踏遍無由見唐州境上忽相逢白髪䔥蕭霜滿面誰知喜極情轉悲旁人更問𥘉别時千生万死到今日始為母子東南帰東南迢逓関山路入門猶記庭前樹居人傳說盡相看雞黍提携竟朝暮祖生子母真可怜少壯離别老大還同時郷井𬒳兵者幾人骨肉能生全願生母子長壽者四海升乎永相保漁夫夫前撒網如飛輪婦後摇艣青衣裙全家托命煙波髮扁舟為屋鴎為隣生男已解安貧賤生女已得供炊爨天生網罟作田園不教衣食看人面男大還娶䱷家女女大還作䱷家婦朝朝骨肉在眼前年年生計大江边更願宫中减征賦有錢沽酒供醉眠雖無餘羡無不足何用丗上千鍾禄髙郵城高郵城城何長城上種麥城下桒昔日鉄不如今為耕種埸伹願千万年尽四海外爲封疆桒隂隂麥茫茫終古不用城與湟長風沙夜泊長風沙風沙不断行人嗟行人嗟奈君何南風正髙北風起大船𥘉湾小船喜移船更傍大船頭不独風沙夜可憂更祝行人好心事長江何処是安流茅舎参差数株柳時平尚置官軍守青裙老妪詫鮮魚白髪残兵賣私酒魚賤可買酒可沽他人心事知何如羅磵谷㓜輿折齒歌秋衫未成錦機語棠梨半花鳯一羽象牀雪綜小龍梭細穴銀光吐氷缕西隣郎君東海帰芙蓉半白杏雨肥十二䦨边說幽怨勸織南浦鴛鴦飛匿蘭含蕙無消息春酲彤霞漾玉色水龍呵出風雨声奔騰觸裂双白石白石囯城三十六女子軍来两城覆鵉歌猿嘯強激昻百户風来如箭鏃章䑓公子真豪縦復以㣲言相感動郎君切莫更癡心忍作甘心可人痛孫伯善去妾詞妾昔重顔鮮抱禂十五年阿母云亡主中饋安排翁續鵉膠絃新帰主婦情未宻陡然兩意生荆棘推將怨隙在妾身教妾彷徨留不得翁今愛妾空有心妾亦知君愛妾深自古亡家爲顔色妾身不當千黄金回頭向翁語遺子留自乳浮雲有散時人生豈長聚妾去婦肯留妾在婦應去但願主翁琴瑟調妾身不恨无帰処黄南卿梅子禁用調羮止䓁字水边籬落舊精神煙雨園林急薦新對酒摘甞金弹客繞林簮戯玉釵人一根清苦千丸雪四月紅黄隔嵗春待得餘花都結子東風流轉便生仁金陵采菱風急棹歌声白鷺洲前一帶巾緑水不収中洛淚青山空掩六朝人城頭寂寞依龍阜江左興亡寄虎臣孫楚酒楼何処在月明猶冩謫江神湯子文白海青皂鵰赤鶻丗紛紛羽翮何如白錦紋東海飛来一片雪西風透入万重雲老拳独擊頑鵝腦俊目寕看狡兎群玉食所需誰可得夜來丹詔賜元勲綉毬花誰擲流蘇滿小園无心花蕚宻相聮唐宫玉蝶團風軟后土瓊花簇月园妖態欲来䄄上舞異香冝在帳中懸試看有物渾成処如在東風太素天劉雲山題雪後溪橋老翁着脚欲度小橋後有奚奴摇手似言橋險緩度之狀昔錦奚奴指顧間雪橋如險意如閑不知此興政不淺將謂先生跬歩艱申屠致逺無絃琴静中有物即縈心物象相忘趣轉深為報柴桒陶処士無絃争似更無琴趙半間秋夜曲寒禽認故枝澆枝猶依依凉螢亦知秋飛来傍牀帷幽閨刀尺冷遊子何當帰脩途苦不易庶無寒與飢及此清夜長為君製裳衣憶友人李雲南送客出荆扉忽見青青草故人别經時恍隔千里道千里故不遥咫尺夢難到孤鳥安朽株行雲在晴昊敢嘆㑹无期坐念春風老示兒閉門避秋風開門落葉滿稺子晨發篋却嫌故衣短衣短何足嫌掩脛尚可挽尓父故多憂尔母復不懶力作常苦飢力織未及煖窮厄丗固多榮華亦滿眼但將尔日長勉旃事編簡去婦詞里有孀婦子不檢而無室旣疾病乃亟爲娶且命之曰爲汝娶爲宗祀計也未幾死而子竟違母言尋出其婦婦以衰麻在身義不得去𬒳迫逐不可留因爲詩以冩懷落葉不返柯去婦無帰年歛𬒮出故幃独影心悽然君心𥿄鳶飛万里難拘牽妾如鬢边花未衰先棄捐憶昔𥘉嫁君姑病在床前嵗月能幾何衰麻奉姑延妾今辝門去撫棺淚如泉九原㑹有知當爲去婦憐歳晚欧陽徑存相遇老眼厭紛埃柴門晚暫開凄風行客苦今雨故人耒詩外無窮意灯前欲尽樽相逢还又别珍重嵗寒梅构㯗曲街頭群児晝聚嬉吹簘撾鼓懸錦旗粉面少年金縷衣青鬟擁出双蛾眉騃翁前趍嚚母誚醜姬妬嗔狂客笑虬髯奮㦸武略雄蜂腰束翠歌唇小眼前勾作名利埸東馳西騖何蒼惶栖栖猶是蓬蒿客須臾喚作薇垣郎新歡未成愁巳作危塗墮馬千尋壑関山万里客心寒妻子衰灯双淚落紛然四座莫浪悲是醒是夢俱堪疑紅鉛洗尽歌管歇認渠元是街頭児正言蘇張舌如㦸危人亦危身期期周御史千載称直臣清談毎敗事諧謔良損神田翁有斗酒招手聚北隣所言唯桒麻語語不失真戯題十日霜勝雪開門風更緊幽齋坐寥閴寒炉火如燐驱児旋拾薪匍匐良可憫支頥背弓鰕吹燎唇噴蜃温烟滃雲霧生枝呌蚯蚓非瞽目常翳不慼涕自隕居貧正如此念之时一西宿村庄凉吹揺青灯稚子供濁醪寒影忽在壁短髪何䔥騷且持竹根枕卧聴蒼松號𥿄衾穏蒙首昔癢不得搔須臾作竒夢小艇飛洪濤驚斍白滿榻晴月䆫前髙題十六羅漢看手卷圖本不立文字聚看看厎事一隻眼猶多何用三十二羅滄洲郊行桂花无主亦清秋蕎麥為誰先白頭螢不照身常隱見鴎无求丗自沉浮張周卿鏡中灯孤影徘徊入照臨西風不動影沉沉一池鉛水鎔真火半夜金星犯太隂雞翅舞时红熖歇蛾頭撲処碧光深縱渠百煉千燒後依舊剛明一片心周石原緑隂万紫千紅夢巳休眼中驚見翠光浮数声啼鳥无㝷処幾度斜陽不入楼潤透琴書渾欲雨凉生衣𬒮已先秋此时蒲柳还多感莫遣西風一夜愁王性存書懷九秋夜氣粛明时見休徴泰階列六曜湛湛平且平蚁臣再拜祝乾坤永清寕不斈兒女態抱拙祠双星有地莫種花有堤莫種栁花柳豈不佳而恐易衰朽吾情匪好異只種竹与葵竹存勁直操葵存本根思趙心逺秋晚一曲菱哥断西風吹鬢鬟秋随荷葉老人對菊花閑鳥没踈烟外楓明落照間南山有秋色相對自怡顔趙季文舟中夜作身同南鴈去回首意茫然酒醒家千里詩成月满船河渾非為雨岸轉欲移天夜静晶河漢凉風自斗邉連伯正釣絲風短髪冷颼颼倚闌𥘉下鈎閑来片水外輕弄一㾗秋淺拂蘋花乱低分柳影浮煙波清夢逺吹不到王侯胡尊生送君進周公憶君𥘉耒湖水滿金鱗春波煖江南皁晚雪花飛蒲帆下水送君帰霜風浙瀝湖光晚白魚粳米中流飯回頭咫尺庐山雲一寸心長帆力短臨分乍斍過重闈金螺移在双翠眉唖唖灵鳥啼樹枝家人夜夜卜蛛絲雪醅新醸都昌酒欲来不來待君乆人言逺帰勝前婚稚子牽衣婦携手窓前紅烛宵弹棊新歡满眼寕相思江南今歳梅開遟贈君无花折空枝明年花開来不来瓊花上天无双亭前浮冷月羌城暗鎖腥煙黒仙魂夜吟天欲泣巫陽下招飛玉敕神風鬼雨鞭車急一株玉雪雪中立金瓶歳嵗朝衮尨異香蕩漾天水濃蓬業峩峩髙北斗玉佩深沉舞衰柳瑶京三月銀雪飛瓊仙瓊仙招不帰鈞天夜奏紫皇醉二十四橋寒浸水壽梅辝丗武陵老月愁黄昏玉宮水山无返魂寒羌吹風鉄心裂春顔怕見煙綃真雪身匝地大如屋縞衣夜酔香雲宿孤山春去羅浮平肯立腥埃吐瓊王銀河倒㵼春恩澤幾度漢天峥老骨便令更似八千椿癡頑万古終成塵芳蟾冥茫駕蟾去煙昏雲霾夜无曙為慿青鳥别君王後百千年帰閱丗野鷹来野鷹来霜風髙山寒鳥死狐兔迯我有鮮肉肥尓膏軟皮為鞲絲為條山中忍飢良独勞野鷹耒髙髙䑓歛翅猴立何為哉當途猛虎闞我室赤精細骨皆凡才野鷹来沔之水昔年種柳今如此巣危雛弱将奈何野鷹帰来吾望尓陌上花陌上花臨春暉臨安女児呉王妃呉王沉酔香風圍金泥為冩緩緩帰陌頭夜雨花成泥年年長花開時呉王宫妃招不来陌上花嬌欲語呉王妃臨安女封書寄与緩緩帰陌頭花好能幾時錢塘之門幾易主嬌紅猶似呉妃舞呉妃一去招不耒花開花落无窮期金莖承露蓬莱仙人騎黄鶴耒遺刘郎不死薬銀漏无声秋夜深時見星河頭上落精金紏錯蛟尨蟠未央闕角觚稜寒莫教仰見杯中物直是他年双淚痕桂房椒壁蕙蘭老留得新愁向雲表猶逐官軍出漢閧茂陵䔥蕭􅊜青草因官伐松大夫去作棟梁材无復清隂護緑苔只恐江頭明月夜誤他千里鶴帰来宋夲送欧陽炳四首暖翠空濛故囯山夢中慈母美連環文明門外春才好百尺呉船漾緑湾楽垩㗸盃李適之十年春夢疾如飛蒼頭零落郎君小祖帳无知上客帰曽侍先皇法従臣故教給札紀華勲名山乆已藏名姓莫作區區丗上文去年清問下青雲曽把文章付与君眼見皇恩絆漁隱江湖煩報白鴎群孫用復中秋前一夜賞月以明夜隂晴未可知分韻得未字口占年年今夜月今年今夜酔月色旣巳佳淪貟還斍未黄河清題徐孺子亭宇宙貞魂喚得醒一尊和月酹江声看空東海有此士髙出南州只一亭檜色半天猶傲丗湖光落日欲吞城䔥然四壁殘灯火閱尽東風万劫青胡古愚寄題杜隱君思斈齋先生髙尚製荷衣結屋蔵書入武夷泉石洗心無别事皇王經丗有遺思據梧朗詠秋清夜隱几㝠觀晝永时立志独脩天爵貴故應荷蕢接與知皇元風雅卷之四皇元風雅卷之四, WYG: ''}
