餐狙林橡夕飲虎窟泉幽棲豈不逸於道為未全是以少㣲星含輝麗中天雲蘿謝招隱冠帶趍興䝨魯生賛制作啇老安疑然董子述徴験賈誼明經權盛徳有遭逢志士元棄捐長貧若忘丗一岀垂千年折枚楚山阿賦詩江水邊寂寞思古人中懷為君宣象山山長岳仲逺羙任帰浙石泉笙磬静微聞百尺蒼松立在門道斈宗風陸夫子故家遺澤岳王孫忠臣有後天心定治丗无爲聖教尊官序改迁従此上記曽師友渉渊源龔楚清送孟和卿平陽尋母杜羔念母心最苦豈意一朝逢澤潞母驚兒貌似乃翁兒抱母啼淚如雨五十孺慕朱夀昌刺血冩經毛髪蒼間関同州晚相見迎侍親興帰故郷人生百年一弹指母恩未報情曷已團栾樽前舞綵衣大勝丗間朱与紫子行万里渉風沙誓不見母不還家兒今髪葉母應老道傍觀者還咨嗟臨川孟氏號雍睦家丗來此澶渊族婆娑老暮紫荆花料想春風依舊緑黄伯玉上饒人贈相字倉頡紛紜巧思傳多君巧外更玄玄萬形一理推无尽試究庖義未畫前白仁壽上饒人書亊大羮元无味大章夲希音音繁入人耳味美適人心是以保身難揣揣如臨深百戦苟一失勇氣未足欽今若不斈古後何法于今王子東上饒人採桒歌翻雲烏鴉影鬖髿颭風白燕双傞傞横波凝流歛螓蛾呉蚕飼餧飢則那十纎挽柔剪緑柯六幅暗露侵𥜗䋪饔飱驀誤晷隙過蚕飢葉稀寕不瘥千頭万緒豈敢吪終以暖亊期絲紽錦帷繍幌相婆娑人情好耕不厭多倚門刺紋來听歌載青載黄胡側頗樹間耳語慎勿哦万一出口他人訶纂纂桒葚如鳩何新春新月㪯頭見新月低頭過新年新年幾回新新月幾度貟錬石屑宝功難全娥能竊薬終孤眠夢中蝴蝶飛翩翩花草何意争春妍憂杞之憂逐夸顛无情有情怜不怜長星不飲酒宰牛不服田東風觧織千機錦要我來看在雨前張洪崖神遊圗洪崖即果老唐玄宗以玉真妃故洪崖去之往來長安騎白騾名白雲携五童以酒瓢詩卷書囊随之開元天子舊相知一笑曽縁降玉妃囊括無言玄自得瓢虚有酒醉同歸曉山殘夢清塵逺春圃靈苗白雪肥回首長安西日外神遊何處片雲飛和胡梅復白鷴若爲見月倍思家偶意名禽起句華拂羽增明聮縞袂綴冠合粲蹙嬌花朝尋暖草雲連谷夜擁寒坡雪載沙尺与鶴琴清作伴可能无夢繞烟霞中秋青天化作白玉盤棒出七宝玻瓈觴姮娥起舞太白醉如此風流何可忘北斗酌取瓊河漿秋風製就芙蓉裳龍吟泓下虎嘨壑誰能着耳听嗁螿呉遜齋文譲龍溪縣尹戊寅雪後和謝提斈韻鏞城正月雪𥘉霽賸得官閑吟嘨中萬國山河開夀域九霄風月播春融竹依柏樹増新翠梅與桃花间小紅王化盡无偏黨處故教冷暖揔相同新創暖閣謝小山韻未斈渊明去惟賢康節多人生貴眞正物育在中和待阙聽常選隨流創小窩静心无箇亊得趣付賡歌蔡舜謨呈鄧善之廵遊江東道白日千年天有定青冥萬里月无声相期逺大崇明徳力賛雍熈荅聖明荅方漢杰雲舒黄道日光輝遺逸山林固未冝毎嘆劉蕡文字美獨怜徐楽䀻書遟艱難適足成吾亊叢挫何能䘮自期北極去天无咫尺滄溟到海有枝岐康秋山留别撥灰好共話冬闌莫歎无魚鋏便弹更爲梅花留半日勝如别後寄來看呉宜甫文誼内齋一所顔曰養正翰林斈士虞邵庵先生作記賦詩一首且夕自警養正深期徳日新詩書万卷友前人自脩巳是工程定熟讀方知意味真豹尚隠時文欲澤蠖於屈處義求伸龜山屼屼千年在道脉綿綿一氣春外齋一所顔曰斈思思斈進士張在中州判依記賦詩一首旦夕自警五典三綱與四維鳶飛魚躍貴真知霜前㰖实甘回味雪裏梅花不受緇家在先儒文獻里生逢天子聖明時惕然起立晴䆫下題作斈思思斈詩方寒巖别館别館数孤路無聊謾坐窮長年人亊外求夕客懷中无酒睡難着有書貧不同衾寒起附火挑撥幾星紅楊原巖九日過大勝関宿黄陂小飲瘦藤髙樹欎荒寒细路懸崖重險艱征戦幾何餘白骨郷関如此隔青山驛亭帶暝人争聚澤囯經秋鴈自还滿月黄花一盃洒人生何地不開顔姚江村大愚寺即亊雷公逐龍度松丫急雨横穿日脚斜開戸不知渠水滿一時浸倒玉簮花方景山雜詠十首反哺烏曰慈食母桒名惡如烏莫如桒人心當自斍馬舞睨禄山猴朝識朱温人豈不若獸変故輒負恩鵾鵬奮雲霄尺鷃棲野草物各適其夭夫豈論大小蜂房開户牖蟻穴有官守究竟物皆然夢幻君知否小哉蛮觸戦鄙甚蛙龜怒逹人能大觀夲以和平故瑞丗鳯鳴陽司晨雞鳴丑呶呶取人憎亂蝉合緘口蚕蠒毎利人蛛網偏害物利害夐不同其間僅絲忽猿啼不窺䆫牛馴常露地伏虎与降尨此理元无二觧牛中肯綮相馬外􅌐黄従知得三昧意到形自忘蟻封罅隙地蛙井咫尺天那能致廣大此道誰為傳皇元風雅卷之一, WYG: ''}
