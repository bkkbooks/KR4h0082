  - {type: variant, offset: 7819, length: 5585, content: 正月朅来奮直筆浩然心思竭王功与帝徳昭昭日月掲胡爲厭詞林擬欲觀𬈑渤榮華若浮煙汗簡青不㓕詞林冨声華幾人得精悍悠悠三百年篇翰孰氶纉夫君清廟器祼薦盛圭瓉五就惜繁緩九游載雲罕依依風向翔忽忽月新滿冷然时雨情短章不可断風雨妬芳華稂莠深嘉谷天地豈不仁盛德禀命独明廷萃群英四門延穆穆既卜渭水釣又起傳岩築声華何岌嶪衆輻輳一轂銮坡􅌂清韻碩人歌在軸願言往從之星駕命宜夙豈知彼玄鳥戢翼辭雲屋幸无素絲悲庶免窮途哭離離天星高皓皓雲月光候鴈過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意逺沉爱結衷腸憶昔𥘉奉歡露白春蘭芳清樽罷新製妙趣深濠梁飛景急西匿川流浩蕩蕩玄髪凄歲晩木脫天雨霜蔓草豈容惜松栢在高岡翰林子元子武庫森戈矛英声迈千古逸韻撗九州与君契金蘭投分何綢繆清和謝夷惠典刑追韓歐坐令人文煥允塞昭王猷念君獨逺邁寥落行人愁木痩楚山曉風净寒江流何當駕飛車都宴崑崙丘塵埃滿腥腐朝莫同蝣蜉暘谷上寒日影射扶桒枝瞬息及中天流光迅難持人生百年内昻昂何所施孤鴻東南征浮雲西北驰可怜万感身㑹合須臾期安得弄明月皎皎逺愛疑折花芙蓉浦蕩槳江漢涯優游以卒歲身名良不墮游雲蒼鱗穹閶闔不可呌徒令虎豹閑日月近輝耀濛濛八表塵隱隱万彚竅泯然一帰途伊誰執其要栖栖聖者徒礼楽懷窈眇閉門忍朝飢風雨深蓬蓼今年江海去光景短萤爝禾黍滿故墟閭巷餘返照揮絃送飛鴻今古入長嘨昔我適呉㑹日夕承歡顔髙堂楽起舞綵服何斒斕東潮洶波濤西湖翆煙鬟北帰餘十年謬跡通朝班家禍一朝集音容何可攀悲號蒼穹逈往亊思日艱命窮时亦迫志弱体自孱安得騰化術從君超人寰執手不忍訣臨風涕空潸我晋君勿思君帰我當憶十年膠在漆一且各異城呉江激㣲波震澤起瞑色鵾鵬隔天地鴈鶩雜南北念我平生友愴恨摧胸臆獨看燕山雲歳暮日𥘉昃永言長風翔情寄南風翼九月十日接駕回因遊香山寺飲于西厓之上酒酣呈主人迎鵉北去迷風沙看山西來足煙霞蒼山朝含太古色長松百尺凌雲斜傑觀重楼炫金碧笑拍闌干倚天立出門却得望東山紅樹青杯乱秋色痛飲崩厓吸鯨川徑欲醉倒秋風前伹恨浮雲閉白日使我不得瞻青天忽忽今年負重九樹老山空復何有莫将身丗愧渊明縱有黄花無此酒奉和李秋谷平章宿西郊春生騎吏飛塵外便斍髙情逺丗紛酒泛泉香清易列夢侵仙骨冷難曛珠生滄海还驚月鶴舞層霄不見雲无象太平今有象共欣良相遇明君王継斈叅政東平人送華山隱帰西湖方士求仙入滄海十二城楼定何在金銅移盤露滿天琪樹離離人不采軒轅髙拱聖明居群仙真人左右趍青牛谷口迎紫氣白鶴洞中傳素書珊珊鳴珮星辰逺寂寂珠庭雲霧虚脩髯如漆古仙子玉林芙蓉染衣水九関高塞不可留帰去江湖種蘭芷山頭宫殿風玲瓏玄猱飛来千尺松間房誦經鍾磬響石壁題詩苔蘚封欲向君王乞祠禄安排杖屦来相從和馬伯庸見寄待臣催講玉階西雲净觚稜曉色低天闢神州卑两漢地連竭石轉三齊含香晝永閑靑瑣視草堂深􅊜紫泥㝡憶東山老松樹秋風應有鶴来棲長堤芳草遍滦河誰買扁舟繫樹槎金悵薰風生殿角昼楼晴霧宿詹阿万年枝上烏啼早九奏階前鳯舞多供奉老来文采尽詩壇昨夜又投戈送朱本𥘉住五隆官河新栁雪𥘉融仙客帰舟背楚鴻鉄杖昼間山似玉石搂人静水如空煑茶榻畔延徐孺燒薬炉邊覔葛洪天上雲多白鶴去子規何亊怨東風王儀伯和馬伯庸韻金馬門東畫省西千官花覆曙光低九莖芝盖雲衣合百石銅盤露顆齊鹿柵巳營脩竹塢燕巢還𥙷落花泥上林伏日金桃熟鸚鵡來時不敢棲馬昻夫逹魯花赤送僧逰遍囯廬紫翆峰片雲吹影浙江東曇華貝葉春三月布襪青鞋山萬重禅性若灰終有味機鋒掣電本來空問師此别知何處笑指天邊月正中曹子貞礼部尚書東平人和趙子昻韻滦水橋邊御道西酒旗閒掛夕陽低春從緑樹隂中老雲𥙷蒼山缺處斉畫㦸遥臨青瑣闥紫騮觧惜錦障泥鵉皇自爲明時出冝傍上林髙處栖柳簇金溝蘸碧波雲深貝聞瞰重坡鳯凰曲奏鈞天樂烏鵲橋通織女河萬井閭閻春浩蕩六街車馬曉坡陀山人素有林泉興奈此看明侍從何叚惟德㕘政河東人登岳陽楼群江西來与天乎天壤巨浸開洞庭雄吞三湘隘七澤中蟠萬古君山青我行持節按廣海驛騎暫駐巴陵城巴陵城楼冠天下風軒月户雲霧屏平生夢想今始到危欄乍倚心魂驚𥘉疑太極渾未判日月往復凌空明又疑此丗墮物外弱水萬里環蓬瀛湖山得意有如此况乃佳客聮簮纓金盃浮動玉色酒滿懷清思春雲生魚龍掀舞怒濤起眼花落日揺青冥軒皇廣楽渺遺響芳洲宝瑟愁湘靈丹丘謫仙竟何許幾欲八表追遐齡孤心未了忠孝願敗念緑髪潜凋零聖神一視無逺迩恩風化雨浹四溟尋常嘨聚大豕尓瘴烟一洗霜天清歸鞭咫尺覲慈母細語八千山水程孰能閑置若新婦正要磊落肝膽傾飲酣拂䄂下楼去忽听過鴈雲邊声李齊賢青州人鳯不來韶州九成䑓作鳯不來遼東海髙䑓巳荒天未改當時别舜返崐丘如何一去三千載人間豈無青琅玕孤栖未必天霜寒致君堯舜我有術來儀好向宫庭間鳯兮鳯兮今當還張氷溪揔𬋩贈醫士秘方肘後愈沉痾診脉端能継叔和更效叔㣲積隂徳不湏種否滿林多錢雪界萬戸寄隱空兼東詹景仁山間𥘉别記詩清笑我何癡老客情杜宇声中思去就蝸牛角上計輸嬴乆知丗慮非常道毎愧丹經未贖盟容我岩前助薪水也將琴劒掛神京叚天