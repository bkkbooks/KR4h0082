  - {type: page-break, offset: 5773, content: '', id: KR4h0082_WYG_013-1a}
  - {type: variant, offset: 5775, length: 0, content: '', WYG: 文原盧彦威亘王繼學士熈王儀伯結馬昂夫曹子貞元用叚惟徳輔李齊賢張氷溪錢雪界叚天祐吉甫李兩山思衍吳養浩善祝直清蕃上官伯圭巻二祝元美周鈞山李仲公存梁彦中宜夏誠中王秋江王虛白蔡九思張伯逺立仁龔楚清黄伯玉白仁夀王子東吳遜齋文讓蔡聖謨康秋山吳宜甫文誼方寒岩楊原岩姚江村雲方景山鳳巻三薛宗海漢黄晉卿溍李坦之道坦范葯莊晞文胡石塘長孺戴祖禹天錫巻四鄧牧心倪元鎮瓉陳剛中孚李鶴田珏趙青山文歐陽伯恭劉起潛壎吳正傳師道于介翁石巻五王蘭思朱夲初查廣居居廣田師孟衍黄君瑞復圭康里巙子山張天師薛𤣥卿𤣥曦張一無黄松瀑石翁于仲元巻}
