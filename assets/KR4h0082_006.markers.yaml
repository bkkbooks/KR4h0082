  - {type: variant, offset: 5776, length: 0, content: '', WYG: 危太朴素楊季子鑄包淝川淮周徳可陳敬齋舒元易偰世南王𤣥翰漸髙况梅張南􅆏危琴樂韓中村况肩吾逵吕元卿陳小庭章養吾許存我劉恭叔葉千林葉天趣巻七虞伯生集吳宗師全節馬伯庸祖常髙新甫太𤣥天師太乙子夏紫清歐陽𤣥原功揭曼碩傒斯王倫徒王士㸃謝草池詹厚齋程登庸吳月灣存彭孟老李進齋晉李絅齋粲朱納山虞伯生集詹厚齋巻八真山民桂芳江學庭揭希韋祐民許伯昭晉孫謝南窓升孫黄朴齋周老山曾徳厚周梅邊周溪邊周幕溪黄誠性𫝊東郊黄季嬴劉叔逺熊澗谷巻九冨珠哩翀子翬理伯容甘恪陳是若劉孟曅劉夢羲張小山可久章伯亮拜特穆爾趙由儕郭君彦張明善貟怡然巻十楊信可鄧徳良李宗冽王尚志東徐天逸施性初巻十一熊勿軒鉌羅太痩雷機子樞毛静可直方陳以仁陳野雲潘心月林徳暘景熈趙芝室羅梅我劉草窓張奎翁李孟陽徐雪坡凃竹逸巻十二危希尹李草窓嚴春山葉水村袁安道陳應江王劍川李䝉齋簡陳天霽鄭溥孫斗齋劉南金吳師道正傳欽定四庫全書元風雅後集巻一元孫存吾編鄧善之贈墨士吳雪堂永寕賜筆世安有易水良工今不傳了知膠漆用相得亦悟膏火明自煎昔從䝉莊觀副墨老歸芸閣窮太𤣥與子欲擬毛頴傳待我暇矣磨墨磚盧彦威送鄧善之提舉江浙十首北門古深嚴論思寄籌度自非鴻才世訓誥何猶作夫君出巴蜀文采動京洛十年掌絲綸摛藻楊景爍荆璞抱瑾瑜龍淵淬鋒鍔肻獻上林賦寕居天禄閣即今觀浙江眷戀晞金雀黄圖鬱紫氣絳節生碧落依然難為情清霜養飛藿其二春秋秉筆削凜若執𤣥鉞君獨抱遺經結髪飽剞劂明剖是非心微探義理窟下視羣兒愚争端王正月朅來奮直筆浩然心思絶王功與帝徳照臨日月揭胡為厭詞林擬欲觀溟渤榮華若浮烟汗簡青不滅其三詞林富聲華幾人得精悍悠悠三百年篇翰孰承纉夫君清廟噐祼薦盛圭瓉五就惜繁纓九游載雲罕依依風向翔忽忽月新滿泠然時雨晴篇章不可斷其四風雨妬芳華稂莠深嘉谷天地豈不仁盛徳禀命獨明庭萃羣英四門延穆穆既卜渭水釣乂起傅岩築聲蓽何岌嶪衆輻輳一轂鸞坡儼清韻碩人歌在軸願言往從之星駕命宜宿豈知彼𤣥鳥戢翼辭雲屋幸無素絲悲庻免窮途哭其五離離天星髙皓皓雲月光候雁過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意逺沉􅁨結𠂻腸憶昔初奉歡露白春蘭芳清樽罷新製妙趣深濠梁飛景急西匿川流浩湯湯𤣥髪凄嵗晚木脱天雨霜蔓草豈容惜松栢在髙岡其六翰林與元子武庫森戈矛英聲邁千古逸韻横九州與君契金蘭投分何綢繆清和謝夷恵典刑追韓歐坐令人文煥允塞昭王猷念君獨逺遊寥落行人愁木痩楚山曉風浄寒江流何當駕飛車都宴崑崙丘塵埃滿腥腐朝暮同蜉蝣其七暘谷上寒日影射扶桑枝􅕿息及中天流光􅌺難持人生百年内昂昂何所施孤鴻東南征浮雲西北馳可憐萬感身㑹合須㬰期安得弄明月皎皎逺憂疑折花芙蓉浦蕩漿江漢涯􅄖游以卒嵗身名良不隳其八游雲蒼鱗穹閶闔不可呌徒令虎豹闗日月近輝耀濛濛八表塵隠隠萬彚竅冺然一歸途伊誰執其要栖栖聖者徒禮樂懐􅆼緲閉門忍朝饑風雨深蓬蓼今年江海去光景短螢爝禾黍滿故墟閭巷餘返照揮絃送飛鴻古今一長嘯其九昔我適吳㑹日夕承歡顔髙堂樂起舞綵服何斒斕東潮洶波濤西湖翠烟鬟北歸餘十年謬跡通朝班家禍一朝集音容何可攀悲號蒼穹逈往事思日艱命窮時亦迫志弱體自孱安得騰化術從君超人寰執手不忍訣臨風涕空潸其十我留君勿思君歸我當憶十年膠在漆一旦各異域吳江激微波震澤起暝色鵾鵬隔天地雁鶩雜南北念我平生友愴恨摧胸臆獨㸔燕山雲嵗暮日初昃永言長風翔情寄南飛翼九月十日接駕回因遊香山寺飲于西崖之上酒酣呈主人迎鑾北去迷風沙㸔山西來走烟霞蒼山朝含太古色長松百尺凌雲斜傑觀重樓炫金碧笑拍䦨干倚天立出門却得望東山紅樹青林亂秋色痛飲崩崖吸鯨川徑欲醉倒秋風前但恨浮雲閉白日使我不得瞻青天忽忽今年負重九樹老山空復何有莫將身世愧淵明縱有黄花無此酒奉賀李秋谷平章宿西郊春生騎吏飛塵外便覺髙情逺世紛酒泛香泉清易冽夢侵仙骨冷難曛珠生滄海還驚月鶴舞層霄不見雲無象太平今有象共欣良相遇明君王繼學参政東平人送華山歸隠西湖方士求仙入滄海十二城樓定何在金銅移盤露滿天琪樹離離人不采軒轅髙拱聖明居羣仙真人左右趨青牛谷口迎紫氣白鶴洞中傳素書珊珊鳴珮星辰逺寂寂珠庭雲霧虛脩髯如漆古仙子玉林芙蓉染衣水九關髙塞不可留歸去江湖種蘭芷山頭宫殿風玲瓏𤣥猱飛來千尺松閒房誦經鐘磬响石壁題詩苔蘚封欲向君王乞祠禄安排杖履來相從和馬伯庸見寄二首侍臣催講玉階西雲净觚稜曉色低天闢神州卑兩漢地連碣石轉三齊含香晝永閒青𤨏視草堂深濕紫泥最憶東山老松樹秋風應有鶴來棲長堤芳草遍灤河誰買扁舟繫樹槎金帳薫風生殿角畫樓晴霧宿簷阿萬年枝上烏啼早九奏階前鳳舞多供奉老來文采盡詩壇昨夜又投戈送朱夲初住玉隆官河新栁雪初融仙客歸舟背楚鴻鐵杖晝閒山似玉石樓人静水如空煮茶榻畔延徐孺燒藥爐邉覔葛洪天上雲多白鶴去子規何事怨東風王儀伯和馬伯庸韻金馬門東畫省西千官花覆曙光低九莖芝蓋雲衣合百石銅盤露顆齊鹿栅已營脩竹塢燕巢還補落花泥上林伏日金桃熟鸚鵡來時不敢棲馬昂夫達嚕噶齊送僧遊遍匡廬紫翠峰片雲吹影浙江東