  - {type: variant, offset: 8731, length: 720, content: 籬𥙷敗墻幽禽對語尽相忘雨揺牎竹圗書潤風落瓶花筆硯香逺听泉声嗚却断近栽松竹看来長惟應夜讀成何亊用得樵夫到草堂張奎翁和刘草牎待月夜色沉沉冷似秋凝眸江逈為誰晋鈎簾㪯酒延飛鏡倚席栽詩看滿楼彦怕少需牛渚㑹坡翁昱伴羽仙逰素娥笑指婆娑試問西河􅓯得不晚眺携觴領客共徜徉歷覧溪山尽日長帰鴈数行雲漠漠落霞一叚水茫茫帆収蓬席㗸山影簾捲荷花隔浦香極目乾坤斜照処桒田為海海為桒李孟陽建安呈髙琨璞治書玉輝韞匵晋丹山名懸万里星斗寒忠肝耿耿皦如日眸波吟動生微澖驊騮勤震紫雲曉京華表筞聞金銮一且筆露沾芸香栢䑓劒氣横秋霜說尨圖治風雨落凉吹瑶珮鳴鏘鏘帰欤種菊荅逕空書曡明月軒當松阿衡未許老耕隱三騁挾道飄崆峒天環文運開九重良弼夢久孚宸衷蒼生拭目望經済八紘鼓舞融春風屈竹琅玕君子蟠虬龍岩㞹独処懷春風鳯凰飛断片雲曉怪石曲質成天工斜煙露出枹危石巋然一見还睥睨苔緘滑破移土深依稀露帶殘陽温蠧篆録体横玉枯細葉曲雨枝相扶青青礙月折寒影卧浴槐暑􅉼清癯淡如孤山弄霜白横斜光霽黄昏色古如処士冐雪閑䐘根盤伏留堅莭固知屈巳難以舒堎霄勁直心自如晴薫拂拂吹菰蒲醉歌淇奥春滿壷凉飃錦籜落新韻欲賦未就仍躊蹰倚牎問竹竹不語伹斍細香習習生詩書寄西澗上人獵獵鴈秋䦨寒輕點鬢班書声一楼竹詩思两橋山白鶴延翁老青猿迓客閑雪睛楼有信携月度雲開徐雪坡樵川齒薬短歌姮娥夜墮玉杵臼白兎摇碎瓊瑶霜瓊瑶霜凝異香丁字橋边授仙方孫家老人不識此口嚼白石情何狂驪山君王惜顔色三十六宮瓠犀白漁陽鼙鼓動秋風一旦唇亡齒何益君不見殷湯銘九字刻此薬至今傳不得題福善王廟乾山曡曡水湝湝舟迓温陵太守回躍馬不朝金殿去騎鯨飛上碧天来宇文篡位終亡囯髙祖承休亦廢䑓惟有王心明日月寒塘蘋藻正花開凃竹逸樵川御茶園唐殿老臣誇荔子建溪從此亦留名山中昨夜東風煖百十兒翁唱太平, WYG: ''}
