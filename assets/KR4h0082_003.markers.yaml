  - {type: variant, offset: 6436, length: 0, content: '', WYG: 峰浪齧沙沿嵗時久豈知竟落漁人手漁人好飲君好竒䭾入君家博升斗君不見嗜石相國李與牛不惜千金購羅搜豈知山人奄有一丘壑只費平原五督郵盤車圖車亨亨石徑犖确輪欲摧疲牛分寸挽莫前前車後車相逐來大府城門倚天開羣山雪深白皚皚卒夫鞭牛凍墮指轉輸號令如風雷官中委積等塵土黔黎膏血無復回君不見明時屢散粟與帛桃林之牛亦悠哉不知何代畫此景我自一見令心哀和鄭應奉雜詩六首茫茫穹壤間環溪大州九壮遊不及辰坐待迫蒲栁窮通付分定逹識當順受但願薰風詩在在民物阜一瓢安菽水吾計亦良厚當年東山翁笑傲聊永日弓旌一朝下萬里赴星驛回頭故山友十見秋栢實峩峩東觀中大書黒如漆想見日暮歸沙輕馬蹄疾淳風散已久青黄陋窪樽婉孌争媚好役智空自昏豈知葛天民無言道彌敦我有白雲操泠泠寄桐孫調古識者寡幽探萬化源驅車渉逺道日晏不知疲一見嵩華髙始覺培塿卑吾道麗天壤昭昭匪難知千金買刀圭但為方士欺贏粮往問道去結汗漫期志士方盛時危冠怒冲髪猛心石為開壮氣山可㧞安知横江鯨中路螻蟻狎所以巢居子商歌竟不輟歌竟寂無言坐聽天籟發宦遊夢入槐宴坐肘生栁出處亦何常臨岐一分手光隂不可玩嵗月坂丸走軒裳百年間竹帛千載後永願堅素心舊學安敢負夜歸有客有客胡未歸長安三見秋葉飛警霜老鶴夜不寐弔月孤雁寒無依紛紛北里厭梁肉落落西山甘蕨薇人生窮逹各有命何須終夜泣牛衣畫馬世上駑駘眩凡目祗今誰識馬中龍昂頭振鬛長鳴處似向秋風訴未逢九月晦日九月晦日終夜雨酒醒無處着閒愁起聞更張有明詔實與萬國同戚休今年年豊糓差賤白米應饑翳桑夫飛蝗是處有遺孽未審臘前能雪無黄晉卿同知晉卞將軍墓江左失其御强臣布中區歡娛一以乖狂猘無趦趄黄屋播草野彤庭交劍殳事樞始誰秉捧首如奔狐偉兹百世士死與二子俱孤忠耿未昧足以孚豚魚義旗果東指白日開天衢孰最撥亂功之人或其徒伊昔大雅廢語言鄙文儒禾黍已横委衣冠尚舒徐屹然見砥柱獨障狂瀾趨大節固如此捐金乃其餘青簡煥遺烈蒼棒閉幽墟日夕悲吹多天髙年運徂世方用骫骳猶將塊𤣥虛江濤𣺌在望雪涕空漣洳送俞美之判官暨陽苧蘿山前碧溪水花顔玉貌今誰是祗見操觚道上兒骨束枮柴髪垂耳周家忠厚及草木忍令赤地連千里夜飛尺一遣緹屏想見春風下車始憶昔君侯年少初力全季母甘捐軀麻鞋上殿衣見肘歸來束帶懸銀魚頗聞爾曹久待哺㷀㷀萬目同㫿盱晨飱秣馬赴所主擊鮮上冡無躊躇念君自是醫國手看活羣兒如活母平生夲草閲已熟野葛山榆尚何取若為箋天乞借材盡蹢東土歸仁夀鄙夫不用􅅵畝憂但為作歌貽不朽金陵懐古五雲零落渺天涯陳迹蒼茫日自斜畫角已吹邊塞曲紅藍新長内園花可憐遺老埋黄壤曾倚春風望翠華好在北山猿與鶴依然同住舊烟霞偶成厯厯謀營度眼明獨榰髙枕數殘更薄遊已倦新彈鋏舊業猶餘未棄檠一雨近晴初月色兩虫専夜故秋聲情知三十非年少已覺人間有後生陪仇先生登石頭城談笑逢諸葛登臨失故亭薄遊成汗漫髙歩覺竛􅀈江近通淮碧山遥入楚青平生一盃酒及此慰飄零有感橘柚青黄照眼垂秋風籬落自紛披頗聞玉食登蠻果不獨涪州有荔枝劉蕡祠堂劉君古遺直祠堂在邱園嵯此豪傑窟文雄歘孤騫平生二三䇿匪傲明主恩𤨏𤨏談失得無乃市井言憑髙一長望苦厭車馬喧微風過踈雨青山滿前軒隂晴歘異態浮雲實無根悠悠千載心去去無復論居庸關連山東北趨中斷忽如鑿萬古争一門天險不可薄聖人大無外善閉非楗鑰車行已方軌關吏迭擊柝居民動成市廬井互聨絡幽龕白雲聚石磑清泉落地雖臨要衝俗乃近淳朴政須記桃源不必銘劍閣僕夫跽謂我無為久淹泊山川豈不好但恐風雨惡榆林崇崇道旁土云是古長城却尋長城窟飲馬水不腥斯人亦何幸生時属休明向來邊陲地今見風塵清禾黍被行路牛羊散郊坰儒臣沗載筆帝力猗難名槍竿嶺憶昔賜第歸吾母適初度蹉蛇嵗年晚今辰在中路居人誇具慶游子慙叱馭茲山稱最髙揚鞭入烟霧矗矗多峭峰䝉䝉饒雜樹﨑嶇共攀援躑躅頻返顧陳情未成表登髙詎能賦獨憐桑乾水逺向盧溝去李老谷緑厓一徑微入谷雙崦窄宻林日易曛况乃雲雨積行人望烟火客舍依山色家僮為張燈野老煩避席未覺風俗殊祗驚關河隔嚴程不可緩子規勿勸客赤城雞鳴秣吾馬晚飯山中行何以慰旅懐赤城有嘉名灘長石齒齒細樹風泠泠時見岩壁間粲若丹沙明温泉發其陽撝訶勤百靈前峰指金閣真境摽珠庭白道人跡稀青厓雲氣生信美無少留緬焉起予情龍門竦身望龍門緩轡何兀兀溪迴愁屢度雨横驚暴溢兩厓儼相向百水怒争出人言馬上郎快意每多失自非渥洼種不得矜健疾飄飄蟣蝨臣凛凛黿鼉窟皇靈重覆冒利渉用終吉迴睨向所經千障隠朝日青林外盤紆黄流中蕩潏後來未渠央君子宜戰栗獨石解鞍及亭午稍欣烟霧收蒼然衆山出歴歴如雕􅦒前瞻一石獨靈宫居上頭頗聞去年夏水激龍騰湫走避登屋山半夜齊呀咻幸茲溪澗中今作清淺流晏安不可懐變化誠難求翠華𣺌在望行矣無淹留李陵䑓日暮官道邊土室容小憇漢將安在哉荒䑓猶彷彿低徊為之久懐古増欷歔長風吹曠野飛雨千里至蕭條蒼山根草木餘爽氣嘗憐司馬公予集多深意奏對實至情論録存大義史臣司述作遺則敢失墜上都分院晨興過桓州旭日生蒼涼舉頭見觚稜金碧何巍煌洪河貫其前青山環四旁莫從玉堂署鰲峰屹中央井階對閣老官燭分餘光琴册森在側談笑來清觴在列無所為陳詩詠黄唐帝鄉豈不樂父母不得將起視雲漢低垂星爛寒芒南飛有㝠鴻邈哉天際翔檐子窪自從始出關數日走崖谷迢迢度偏嶺險盡平水陸坡陀皆土山髙下紛起伏連天暗豐草不復見林木行人烟際來牛羊雨中牧颯然衣裳單咫尺異寒燠竚立方有懐相逢乃問俗畏途宜疾驅更傍灤河宿金陵送人歸豫章已覺栖遲懶曵裾可能為我强踟躇一㠶秋色紅塵外千里江關白雁初建業水清誰共飲潯陽潮斷定無書黄金未盡龍顔在莫種桃花學隠居李坦之紈扇行誰家玉貌䝉清霏手揮紈扇臨東池瀟湘揺波月弄影碧波疑見湘江妃淚痕竹上猶未滅一尺氷紈萬愁結風吹翠袖巻寒烟汗入紅肌凝素雪深閨無人凉氣早輕薄恩情易衰老昔隨蝴蝶上春衣今逐流螢向秋草不見班姫染翰時空遺漢宫題扇詩千年怨墨已流落一天霜露沾人衣髙將軍白鷂歌淮西猛士髙將軍新獲驍禽被凉素調之弗顧情未狎跨馬臂出城東去征鴻作字雲邊斜聳身直上誰能遮天寒日暮望不見北風萬里吹瑶花雲飛忽斷鴻飛却短草長烟際沙漠但餘孤色揺清秋未許纎毫來碧落歸來珍衛不解鞲親手餧肉供饑喉英雄遇合固有分可惜驚塵俱白頭姑蘇䑓吳王宴罷歌䑓晚斜日晴江映䦨檻䑓上西施醉捧心江邊東越愁嘗膽鴟夷裹尸去不還麋鹿散迹遊其間秋深明月照髙樹驚烏夜落丹楓寒功名獨羡陶朱子一葉扁舟弄雲水范葯莊杭州人燕山聞鵑燕山三月初三夜聽得啼鵑苐一聲同是小樓孤燭下主人熟睡客心驚胡石塘永康人題崔録事女真驄馬圖天恩洽騎十二閑短䇿不知行路難漠漠空川望不盡電光掣過須㬰間蹄髙髙屈汙溝出駿骨隠隠隆于山窟泉沙草不得足勞力食薄心知慚十年甕牖間書瑟展巻見圖真太息女真年少面如盤華屋平生隔風日青驄肉破擁尻睢黄金校具褒綏拂三品芻豆空自多行見火花繞銅歴題秋江喚渡道傍木葉如渥丹歸急不知行路難青嶂碧溪自喚渡蹇驢破帽秋風寒裹頭長須甚徳色肩輕不借有餘力人間塵上深復深謹勿重賦招隠吟贈相士黄電目憶昔待詔金馬門方伎雜遝車蓋繁黄生蔡子最絶出髙堂不奈笙歌諠廬陵老翁才五尺旴毋江頭眼空碧相人豈不二子如秋風夜雨歸無宅長身博士老一簟臯比那􅀈儒生酸人生榮華無足夢桃笙竹枕長䦨干黄翁勿歎無家苦華屋連雲更何補蜀莊一日不百錢炳炳幽光二千年題風雨漁舟圖細栁新蒲春已滿飄風急雨亂如顛漁人若解忘魚意繫却扁舟卧碧烟戴祖禹越人天馬圖歌月支天馬難再得誰向君家貌真蹟駿毛皎潔骨肉勻緑駬驊騮敢同色當得超逸真絶倫皎如玉龍下天門朝馳駿坂飛匹練莫浴深淵浮赤雲四蹄飽踏咸陽月滿身猶帶燕山雪只愁𤣥霧閟神姿未許清塵汙汗血飄然却立精神聚想見落筆驚風雨他年開匣君勿驚照室神光夜飛去元風雅後集巻三欽定四庫全書元風雅後集巻四元孫存吾編鄧牧心杭州人贈友人我在越君在吳擕書邀我游西湖我還吳君適越遥隔三江共明月明月可望佳人參差與君擕手西湖上相思空誦停雲詩知君去掃嚴陵墓祗把清樽酹黄土浮雲茫茫江水深感慨空勞弔今古孤山山下見陳實連騎東來踏春色湖邊千樹花正繁莫待春風吹雪白有酒如澠有肉如陵鼔趙琴彈秦筝與君長醉不用醒何必千秋萬嵗名倪元鎮蘇州人聽袁子方彈琴蕙帳凝夕清髙堂流月明芳琴發綺席列坐散煩聲迴翔别鵠意縹緲孤鸞鳴一寫氷霜操掩抑寄餘情與張貞居雲林舘燕集分韻得春字青苔網庭除曠然無俗情依微樵路接曲宻農圃隣鳴禽已變夏踈花尚駐春坐對盈樽酒欣從心所親春日雲林齋居臨池春流駚掃地夕隂滿正襟味道言迢遥坐溪館嵐嶺當書榻煩襟一舒散靡靡松華黄逐逐雲氣暖石梁青苔合于焉合跡斷故非與世疏㝠揵逐志返寄懐鄭徴士谷口子真今最賢久别鬱鬱夢相牽好營秫田多釀酒欲買茅屋尚無錢兄病每書餘藥劵客來惟候煮茶烟闔閭城東有艇子憶爾青燈相對眠送别甘允從一首來尋墨沼雲林下共愛女蘿縁石床喚人鸚鵡語猶澁當户枇杷子半黄奉橘定應題百顆籠鵝即可寫千行蘭亭書法人間少好去山隂汎野舡奉懐張外史隂壑慘惨緑苔生碧雲亭亭多逺情松杉鶴去轉蕭瑟洲渚花落自縱横從君下榻住十日着我鼔枻出層城洞口菌巢無恙否定應閉閣著書成次韻薩天錫寄張外史谷口路微山木合温衣空翠不曽晴饑猿攀檻為人立寒犬號林如豹聲小閣秋深聽雨卧長空日出采芝行道心得失已無夢沐髪朝真候五更陳剛中天台人中書太丞相安公延説四書因以書呈之帶礪家聲耀八寰中書獨壓紫薇班捧持日月祥雲上洗滌山河湛露間緑竹正歌淇澳美赤松聊伴糓城閒聖門别有經綸事更對青燈話孔顔交趾使還少年偶此請長纓命落南州一羽輕萬里上林無雁到三更凾谷有雞鳴金戈影裏丹心苦銅鼔聲中白髪生已喜歸來身徤在夢回猶覺瘴魂驚出承天門又騎官馬過中原袖有芝泥詔墨痕嶺海孤臣天咫尺五雲回首是都門開平即事天開地闢帝王州河朔風雲拱上游雕影逺盤青海月雁聲斜度黒山秋龍岡上繞三千陌月殿香飄十二樓莫笑青衫窮太史御爐曾見衮龍浮金陵六代帝王州寒烟滿石頭星河天北轉江漢水東流歩絶金蓮雨歌殘玉樹秋白頭有漁者猶説景陽樓鄂渚晚眺黄鶴樓前木葉黄白雲飛盡雁茫茫櫓聲揺月歸巫峽燈影隨潮過漢陽庾令有塵汙簡册禰生無土蓋文章闌干只有當年栁留與行人記武昌鳳凰䑓鳳凰䑓上野烏啼笳鼔連雲日又西天地無情潮寂寞英雄有恨黍髙低殘桁夜雨迷朱雀荒塚秋風怨白雞空有斷碑蒼蘚裏千年留得謫仙題銅雀䑓古䑓百尺生野蒿昔誰築此當塗高上有三千金歩揺滿陵松栢圍鳳綃西飛燕子東伯勞塵間泉下路迢迢龍帳銀筝紫檀槽怨入漳河翻夜濤人生過眼草上露白骨何由見歌舞獨不念漢家長陵一抔土玉匣珠襦鎻秋雨吳宫子夜歌紫貝樓闕鬰金香暖雲七十紅鴛鴦玉蟬笑擁霞綃裳星河不隨宫漏長緑樽灔灧麟髓泣霜重花寒秋不濕歈歌一聲起雪濤海龍夾陛如人立誰知淺嚬蛾半掃中有殘螢滿愁沼越兵曉踏西風來碧波一夜芙蓉老居庸闗車稜稜石确确車聲彭彭鬬石角馬蹄蹴石石欲落不知何年鬼斧鑿僅與青天通一握上有藤束萬仞之厓下有泉噴千仞之壑太行羊腸蜀劍閣身熱頭痛懸度索一夫當闗萬夫却未必有此竒巘崿吾皇神聖混地絡烽火不紅停夜柝但有地險今猶昨我扶痩笻息倦脚欲叩往事雲漠漠平沙風起鳴凍雀神州八景太液秋風一鏡拭開秋萬頃碧天倒浸琉璃影寒飈夜捲雪波去貝闕珠宫黛光冷三千歌棹揺緑烟濕鬟吹墮黄金蟬琪樹颼颼紅鯉躍衮龍正宴瑶池仙瓊島春隂一峰亭亭湧寒玉露花不墜瑶草緑珠樓千尺星漢間天風吹下笙韶曲萬年枝上槲葉滿小鸞倀倀遶龍管金根曉御翠華來三十六宫碧雲暖居庸叠翠斷崖萬仞如削鐵鳥飛不度蒼石裂嵯岈枯木無碧柯六月太隂花急雪寒沙茫茫出闗道駱駞夜吼黄雲老征雁一聲起長空風吹草低山月小金䑓夕照危坡十二青雲梯老樹偃伏猶躬圭長裾已曵星辰去殘陽猶掛盧溝西召南六百年宗社一日黄金重天下精纒寳氣夜不收又見斷霞眀朔野盧溝曉月長橋彎彎飲海鯨河水不濺氷崢嶸逺雞數聲燈火杳殘蟾猶映長庚横道上征車鐸聲急霜花如錢馬鬛濕忽驚沙際金影揺白鷗飛下黄蘆立西山晴雪凍雀無聲庭檜響氷花洒簷大如掌平明起視岩壑間挿天瓊瑶一千丈夕陽微漏光嵯峨倚䦨更覺爽氣多雲間落葉有徑否想見樵叟猶青簑玉泉垂虹靈波碧擁千崕髙落花㸃㸃浮寒瑶日斜忽有五彩氣飛上太空横作橋古寺殘鐘塔鈴語回首前村猶急雨輕綃欲剪一幅秋又逐西風過南浦薊門急雨黒雲如鴉漲川谷雷踴電躍風折木半天萬㸃捲海來森森映地如銀竹鳳城無數笙歌樓珠簾半捲西山秋誰知羈客家萬里一燈正擁寒衾愁李鶴田廬陵人雪中寄友石角雲層道路難墨風三日晝漫漫吟笻直指西湖栁合與梅花共此寒趙青山廬陵人銅雀䑓朝望西陵墓夕望西陵墓望望不復歸月朝人十五月朝十五可奈何更對空幃作歌舞銅雀昂然飛不去當時美人髪垂素我生不如陵上樹年年樹根穿入土歐陽伯恭廬陵人題蘇李泣别圖祈連山前箭如雨渤海海邊羝不乳同是肝腸十九年白髪君歸朝故主臣心有血一斗許亦欲隨君歸釁鼔五千健兒五千母臣若獨歸魂魄苦空將老淚寄君處歸拜茂陵坟上土劉起潛送黄脩永之武夷杜清碧學眼中塵中政昬昬華蓋風髙翠入雲一代風流超晉宋百年禮樂寄河汾波寛好㸔魚龍化天逺空憐雁鶩群亦有平生觀海意出門萬里獨慚君鶴延頸池邊照影池花明栁凈思依依年深色重丹砂頂日暖光浮白雪衣晴月夢回三島去看雲思上九霄飛玉簫聲斷秋宵冷應有仙人憶未歸燕萬里來從海外村定巢時聽語頻頻簾風半捲重門曉社雨初晴二月春尾上繫詩成往事掌中學舞是前身華堂茅屋依然坐幾處相逢舊主人吳正傳秋懐江南木葉飛江北百草黄風烟淡莽蒼悵望川途長寒魚聚其群鴻雁忽成行俯仰念時物索居耿凄凉昔我二三友敦好攻文章漂零轉相失尺素不得將人生四方志企爾揚聲光登山豈無車渉河亦有航真誠諒不隔離别庸何傷赤壁圖草荒殘壘怒濤秋遥想英雄淚自流風火千年消伯氣江山一幅掛清愁丈夫不學曹孟徳生子當如孫仲謀機㑹不來形勝在狂歌弔古漫悠悠送陳生北上萬里長風入馬蹄江干舊隠掩閒扉乾坤清氣隨詩巻官塞征塵上客衣日落太行孤鳥沒天髙燕闕五雲飛提擕喜有王維在回首南山莫便歸于介翁感古引孔明梁父吟深不滿于齊相嗚呼天若祚漢孔明不死天下事未可知吾于此重不滿焉建安天下如潰𤓰一榻之外非吾家黄屋飄颻定何許龍為魚兮䑕為虎老瞞詐力敢欺天朶頥羊鼎方垂涎紫髯將軍一攘臂控荆引越三千里慷慨山東大耳兒南飛烏鵲棲無枝草廬一語君臣契目中久矣無吳魏堂堂大義澟不磨靈闗劍閣争嵯峨昨夜西南一星落六尺之孤竟誰托渭水旌旗歸故都江上空存八陣圖抱膝長歌出師表古栢蒼蒼為誰老元風雅後集巻四欽定四庫全書元風雅後集巻五元孫存吾編}
