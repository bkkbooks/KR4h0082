雪痕乾渾源聞有傳家譜夜露心香借易㸔妙髙䑓危亭新構客持觴雨浥欄杆面面凉烟外好山供水墨風前老樹奏笙簧接天净緑秋江白着地彤雲晚稲黄騕􅒁絲鞭歸興逸水晶宫殿桂花香次韻單徒提舉百蠻冠帶悉來庭九虎臨關萬雉城漢殿風馳十行詔唐藩雷動衆軍聲海涵春育民膏澤雨施雲行天性情聽得老癃扶杖語紫微垣畔泰堦平吳養浩儒學教授上饒人象山山長岳仲逺美仕象山天下秀中有陸公祠聖道開千載皇天粲一儀垣墻空草樹禮貎見尊􅃔惟有岳山長三年今在茲祝直清儒學教授上饒人和貫學士月氐王頭飲噐歌單于寳刀寒映雪月氐髑髏飲寃血泥丸真人辭絳宫麯生時能醉其骨閼氏夜帳蒲萄香拍闕春霞灔秋月賢王起舞谷蠡歌傳勸歡呼兩耳熱燈前人影半䦨殘燈後有燐已明滅持杯夲為澆嶙峋胡為對此傷精魂弓蛇猶能致惑疾智瑶豈是無心人頭顱如許當速朽生擒誤入仇家手忍將鳴鏑射頭曼吁嗟降王爾胡有後來漢使渃水東猶待留犁澆盟酒二畫斷岸蒼烟喬木小橋野店村舂一曲晚風樵唱翛然林下相逢叠嶂半空懸瀑平林隔岸層䑓風雨一川烟浪扁舟何處歸來上官伯圭安仁人上秦王巴延太師右丞相今代麒麟苐一功勳王師相錫秦封作為霖雨三農望旋轉乾坤萬國宗龍虎䑓前春盎盎鳯凰池上日溶溶曵裾舊是王門客又侍金鑾八九重元風雅後集巻一欽定四庫全書元風雅後集巻二元孫存吾編祝元美上饒人贄王從又御史志士身未達端居若無為一朝立清要掃决浮雲披王君北方彦絢練丹鳳姿經綸有術業大節能素持青驄入南臺白柬晨霜飛惟時摠六職百職不敢墮鷹鸇擊霄漢鴞獍安得窺苦心在庠序勉勵兼有遺春秋嚴大祀禮數推毫釐温然載言笑匪怒伊教之青青歌子衿荒穢久不治明公欲振廢恩乂當兼施吾儒貴𥙷報豈直分寸禆胡為往庻役猥吏令得欺以茲失生遂衣冠困塗泥何當復其徭庻使迴澆漓神駒一超越駑馬思驅馳芻蕘倘可問風俗期當移我生萬山中耕鑿甘自怡奈何苦隳突雞犬不得栖遂令布衣士何猶食山薇彈冠出岩壑逝拯斯民疲浩歌視行雲白日迴清輝明公一攬轡慷慨投茲時周鈞山訪劉須溪西山一簾雨相對在溪邊取履今何代回頭恐是仙半生空四海一句可千年歸去龍須下桃花屋角烟李仲公安仁人送洪教授忠宣盛澤餘孫子分教如今在栁州此心初不異孔孟何俗莫可回商周玉堂金馬自兹始九嶷三湘因得遊蠻客舟車過如織安書時遣到蠙州題吳閑閑齊草堂齊老齊老人齊老多少世人齊不老史家父母昔齊老吳家父母今齊老當年落筆山岳光三百餘年歸此堂秋塵如烟隔精彩白髪眼明猶再拜梁彦中儒學提舉公餘山郭蕭踈似野居公餘經史足相娛雨聲喧寂雲來往嵐色沙深烟有無畏酒久閒頭上帽苦吟頻鑷鏡中鬚茅亭閒掩無人到卧聽風簷鳥雀呼春晝溪水揺光動粉牆雲山倒影蘸吟觴一庭芳樹清隂薄千尺遊絲白日長風細栁塘鶯語滑泥融花徑燕飛忙乾坤俯仰窺難盡花栁無情種種香龍門天險誰非禹鑿功神靈闢此一何雄翠峰傍矗雙棖峻白浪中穿一閾通萬馬奔崩路南北六鰲纒繞日西東神扃永壮三都勢迥壓崤凾百二重旅懷和孟昌道韻幽蘭凝露泫如啼獨愛含香滿竹扉信口詩成寕見悞快心事過漸知非故山路逺音書少小院苔深好客稀誰慰荒寒一尊酒滿城風雨送春歸夏城中安仁人元日天門啟曙翠烟寒遥想新年聖體安蠻貊來朝脩貢職臣僚入覲集衣冠香浮蘭砌風初静仗對薇垣露欲乾獻賦何年趨近宻金閨通籍未應難王秋江上饒人次韻周君和贔負終風拂老懐陽春那得一枝來睢䧱不見周南化豹虎徒興王粲哀背冷極思簷外日耳聾難聽地中雷翻思飛雪清泠處二十年前共舉杯秃筆被褐深居未出林摧殘豈信有如今㧞毛夲欲利天下秃鬢方知負此心老死不歸刀吏守平生常得近臣簮斯文功在終難冺月裡東君有好吟王虛白上饒人贈人郡武王佩傅光甫之未有子也病疫將死妻何囓指􅅹血請身代夫死以延其嗣翌日何卒而光甫活今六十年其子好古遵治命遷何柩合𦵏淋漓血指疾呼天一篆才通淚徹泉厲鬼有靈當兩活史書無愧可千年龍沉津水劍重合頭破秦庭璧自全勿謂彼蒼無老眼書香一脉一氶傳贈地理人知君再世挾囊青我亦能知造化情好在主人方寸地渠家代代有公卿蔡九思上饒人訪太𤣥天師飛車擁蓋下三神曠視齊州九㸃塵黄石􅂖城千載意翠壺蓬島四時春嵩髙海濶丹書逺地闢天開紫氣新見説桃花紅萬樹扁舟來問武陵津雜興二首鬱鬱桑與柘環圃俱凄凄采之樂蠶饑復見青滿枝廣疇稲田多種之恐遲遲蠶婦與老農何嘗一解眉芳春各載酒競覩羣葩竒錦衣與稲粱辛苦元不知鸞鵬與騏驥迹逺識者稀鸛鶴與鷦鷯或亦摩上飛和鳴相上下惜無養由基閉門思古人玩物真何為聖賢不我欺千載還相期張伯逺餞祝直清朝餐徂林橡夕飲虎窟泉幽棲豈不逸于道為未全是以少微星含輝麗中天雲蘿謝招隠冠帶趨興賢魯生贊制作商老安疑然董子述徴驗賈誼明經權盛徳有遭逢志士無棄捐長貧若忘世一出垂千年析枚楚山阿賦詩江水邊寂寞思古人中懐為君宣象山山長岳仲逺美任歸浙石泉笙磬静微聞百尺蒼松立在門道學宗風陸夫子故家遺澤岳王孫忠臣有後天心定治世無為聖教尊官序改遷從此上記曽師友渉淵源龔楚清送孟和卿平陽尋母杜羔念母心最苦豈意一朝逢澤潞母驚兒貌似乃翁兒抱母啼淚如雨五十孺慕朱夀昌刺血寫經毛髪蒼間關同州晚相見迎侍親輿歸故鄉人生百年一彈指母恩未報情曷已團欒樽前舞綵衣大勝世間朱與紫子行萬里渉風沙誓不見母不還家兒今髪落母應老道傍觀者還咨嗟臨川孟氏號雍睦家世來此澶淵族婆娑老暮紫荆花料想春風依舊緑黄伯玉上饒人相字倉頡紛紜巧思傳多君巧外更𤣥𤣥萬形一理推無盡試究庖犧未畫前白仁夀上饒人書事太羮元無味大章夲希音音繁入人耳味美適人心是以保身難惴惴如臨深百戰茍一失勇氣未足欽今若不學古後何法于今王子東上饒人採桑歌翻雲鳥鴉影鬖髿颭風白燕雙傞傞横波凝流歛螓蛾吳蚕飼餧饑則那十纎挽柔剪緑柯六幅暗露侵襦䋪饔飱驀誤晷刻過蚕饑葉稀寕不瘥千頭萬緒豈敢吪終以暖事期絲紽錦帷綉幌相婆娑人情好耕不厭多倚門刺紋來聽歌載青載黄胡側頗樹間耳語慎勿哦萬一出口他人呵纂纂桑葚如鳩何新春新月舉頭見新月低頭過新年新年幾回新新月幾度圓鍊石屑寳功難全娥能竊藥終孤眠夢中蝴蝶飛翩翩花草何意争春妍􅁨杞之􅁨逐夸顛無情有情憐不憐長星不飲酒牽牛不服田東風解織千機錦要我來往在雨前張洪崖神遊圖洪崖即果老唐𤣥宗以玉真妃故洪崖去之往來長安騎白騾名白雲㩦五童以酒瓢詩巻書囊隨之開元天子舊相知一笑曾縁降玉妃囊括無言𤣥自得瓢虛有酒醉同歸晚山殘夢清塵逺春圃靈苗白雪肥回首長安西日外神遊何處片雲飛和胡梅復白鷴若為見月倍思家偶意名禽起句華拂羽増明聨縞袂綴冠合粲蹙嬌花朝尋暖草雲連谷夜擁寒坡雪載沙只與鶴琴清作伴可能無夢繞烟霞中秋青天化作白玉盤捧出七寳玻瓈觴姮娥起舞太白醉如此風流胡可忘北斗酌取瓊河漿秋風製就芙蓉裳龍吟泓下虎嘯壑誰能着耳聽啼螀吳遜齋龍溪縣尹戊寅雪後和謝提舉韻鏞城正月雪初霽賸得官閒吟嘯中萬國山河開夀域九霄風日播春融竹依栢樹増新翠梅與桃花間小紅王化盡無偏黨處故教冷暖搃相同新創暖閣謝小山韻未學淵明去惟賢康節多人生貴真正物育在中和待闕聽常選隨流創小窩静心無個事得趣付賡歌蔡聖謨呈鄧善之廵遊江東道白日千年天有定青㝠萬里月無聲相期逺大崇明徳力賛雍熈答聖明答方漢杰雲舒黄道日光輝遺逸山林固未宜每歎劉蕡文字美獨憐徐樂聘書遲艱難適足成吾事叢脞何能䘮自期北極去天無咫尺滄溟到海有枝岐康秋山留别撥灰好共話冬蘭莫歎無魚鋏便彈更為梅花留半日勝如别後寄來㸔吳宜甫文誼内齋一所顔曰養正翰林學士虞邵菴先生作記賦詩一首旦夕自警養正深期徳日新詩書萬巻友前人自脩已是工程定熟讀方知意味真豹尚隠時文欲澤蠖于屈處義求伸龜山岏岏千年在道脉綿綿一氣春外齋一所顔曰學思思學進士張在中州判作記賦詩一首五典三綱與四維鳶飛魚躍貴真知霜前攬實甘回味雪裡梅花不受緇家在先儒文獻里生逢天子聖明時惕然起立晴窓下題作學思思學詩方寒岩别舘别舘數孤蹟無聊謾坐窮長年人事外永夕客懐中無酒睡難着有詩貧不同衾寒起附火挑撥幾星紅楊原岩九日過大勝關宿黄陂小飲痩藤髙樹鬱荒寒細路懸崖重險艱征戰幾何飲白骨鄉關如此隔青山驛亭帶暝人争聚澤國經秋雁自還滿目黄花一盃酒人生何地不開顔姚江村大愚寺即事雷公逐龍度松了急雨横穿日脚斜開户不知渠水滿一時浸到玉簮花方景山雜詠十首反哺烏曰慈食母梟名惡如烏莫如梟人心當自覺馬舞睨禄山猴朝識朱温人豈不若獸變故轍負恩鵾鵬奮雲霄尺鷃棲野草物各適其天夫豈論大小蜂房開户牖蟻穴有官守究竟物皆然梦幻君知否小哉蠻觸戰鄙甚蛙蠅怒逹人能大觀夲以和平故瑞世鳳鳴陽司晨鷄鳴丑呶呶取人憎亂蟬合緘口蠶繭每利人蛛網偏害物利害夐不同其間僅絲忽猿啼不窺窓牛馴常露地伏虎與降龍此理元無二解牛中肻綮相馬外驪黄從知得三昧意到形自忘蟻封罅隙地蛙井咫尺天那能致廣大此道誰為傳元風雅後集巻二欽定四庫全書元風雅後集巻三元孫存吾編薛宗海國子助教閒閒真人生朝天正子月一陽回春入環樞已放梅夀酒淋漓傾九醖仙階縹緲接三台凾關昔日青牛渡華表他年白鶴來更向何方覔鰲島帝垣東畔是蓬萊送馬伯庸南祀崧恒淮瀆總章盛金徳齊明赫當宁皇皇遣天使肅肅承聖語三薰禮岳瀆萬里渉梁楚祝釐歸堯舜降神出申甫南斗迎文星西風起儀羽樂張洞庭月斾濕湘岸雨壮吟鄙騷怨髙馳洗塵腐過家猿鶴喜攬轡鴻雁聚青闈閔賢勞黄屋深記注歸騎慎勿徐席虚玉堂署都城曉起和張漢杰韻扶桑日射蓬萊頂下視瑶都森萬井金門未啟曙光寒月落觚稜微有影枕上遊士夢未回喔喔鄰雞為呼醒知君曉約糓城翁再擬銘功漢鐘鼎杏村天近易為春莫厭西齋官獨冷題劉理之木石木石山人枕溪曲盡日㸔山如不足一朝木石真到眼昔者寓言今實録何年老楠生長空山中枯根入地蟠蛟龍嵌竇玲瓏削蒼壁宛如當年蘇老}
