門巷小立久忽聞琴海鶴天風急山猿秋雨深一時甚得趣千載有知音雖是無絃逹何由㑹此心落葉二首秋庭晝無人夜葉自滿地端居觀物化人生亦如寄朝聞鳴蟬悲夕已見其蛻嵗晏共蕭條臨風發遥喟落葉日已深庭樹日已瘁樹猶不枝梧葉亦甘委棄寕隨風髙飛毋隨流水逝飛者或遶樹逝者𣺌無際陳敬翁晚過玉林西齋二首佳客因乘興能來慰寂寥空山多宿約好語在今宵白苧秋風急青帘市酒遥半升無處問清抱可能消庭雨俱錘盡燈花待客詩三生今夜宿此道幾人知分契情何厚林髙語自竒直為知已用非敢傲當時月下琵琶不似潯陽縣哀絃帶客愁素蛾窺夜曲明鏡入南洲指滑鶯初語腔新栁共柔向前兒女恨腸斷漢宫秋栁邉漁笛莫是章䑓路青絲舞未收楚江歸去釣湘竹語孤舟一葉秋生樹何人夜倚樓舊時明月裏吹過白蘋洲初夜獨坐興悠悠苔堦日脚收客衣凉悞葛池月夜私秋物遣身猶累心閒逕未幽故人情分好渾不記淹留晚坐緑隂深處寺日暮坐幽人水影光初刼苔痕塔半身荒江無過客髙竹是比鄰未信清談少因㸔麈尾塵過胡震亨幽居欲復問何處行遲稍認門路隨幽草入巷與綠隂分市盡人初逺言忘意獨存所經得才俊猶足慰斯文清曉過鶴上仙人仙人睡方起松日髙數尺入户聞琴聲停歩立苔石閒情契絶幽每坐忽終夕長揖道香清歡言正蒲席贄分宜縣丞吳子彥道合無論見神交早為詩十年諸老盡一淡平生知池草今無夢山隂復有期絶疑汚具眼猶意得吾痴蕭南軒寄吳子彦歸江東鳴鸞誰倚洞簫歌黄鶴樓前舊脱靴天上佳期今夕共江東歸思白雲多清風明月故人識有酒無魚良夜何莫學鄉音唱蘆葉桂花滿載待西河寄黄尚雅莫惜隔年期行當與子違門深紅葉字秋入菊花詩酒熟蟹將到鱸肥鱠可思西堂風露重早下讀書帷元風稚前集巻十一欽定四庫全書元風雅前集巻十二元傅習編先一初丁丑新正試筆屈指蘧年逝今朝厯又新野烟痴作晚山雨細匀春舉世貧為苦空門懶是真聊将雙碧眼跌坐閲時人陸文圭燒笋賦竹宇韻先生朝盤厭苜蓿笋味得全差勝肉蒼頭掃地犀角出赤燄燒空龍尾秃土膏漸渴外欲枯火灰微濕中已熟撥灰可惜衣殘錦解籜猶憐膚擢玉青青無分長兒孫草草為人供口腹李家丞相蒸葫蘆石家美人煮豆粥去毛留項有何好搗韮作虀空自速不如野人工食淡自辦行厨入脩竹句裏曾參玉版師胸中㑹着篔簹谷主人不問不須嗔昨夜西風响林屋陳魚村題接仙樓五老峯前第一山天開綠野待公閒令威白鶴重來日老子青牛又度關花木四時三月裏樓䑓一簇五雲間我來便有凌風想為問先生覔大還易炎正環秀樓倩碧穹環類九嶷危樓空翠接清漪山人夲是山中客山外㸔山山更竒張嗣良尋梅夢中寄荒遐騎驢一訪故野梅過流水香斷無尋處天寒嵗又晏偃蹇傷幽素獨行山谷深積雪迷歸路曉行夢魂短短春宵殘喈喈雞語催征鞍東方彷彿淡月曉栁露細拂征衫寒僮僕前行指予路那個長亭經某處離情莽莽又分明黯淡孤村烟半樹何大虛畈歩作隂靄通烟碎作霏春風吹入暖成泥女郎挑菜不知濕調笑相攜過水西除夜風縈縈雨霏霏寒輕新栁潤春到落梅稀筠籃入市買紅燭烟火松林人醉歸元日聖主龍飛肇紀元野人相賀板扉前不知顔色老昨日共説時光强舊年井口杏花春值雨墻筐栁葉暖肥烟長溝緩繞風漪綠林下烏犍漸受鞭寄程承㫖元凱同嚴召留班錫異恩聖神思治切宗社有公存地立鼇峰峻天依鳳闕尊皋夔謀道合旦奭共心論妙幹時雍化丕揚祖烈敦堯文嚴大典虞采倚昌言卦氣丹凝鼎星符紫照垣竒齡歸碩徳寳厯肇皇元花竹蕃三谷雲霞煥九門相望清晝永朝下酒楹樽訪貢待制舟行阻風今旦始自信余生非數竒懐人發清興欲雪成良時波响雙櫓澁灘寛衆帆馳危查立小渡淺竹懸斷旗指浦見鴉合轉蓬惜蜂移深烟曲江罄微雨三洲炊寂閴有餘適濛洪無定姿余寕不可柰久與西山期送吳主簿之官石塘簿領池州去開帆帶雨微當今公事簡見説縣人稀雲入九華碧雁驚秋浦飛丁寕橋下水官滿載書歸次韻寗志道表氏偕庵夜興空庭山色重積此松桂隂微風從何來一鳥驚前林清心有宻契幽聽得逺音寒燈照孤舘嵗晏夜偏深送人歸臨川金河疎樹外去棹响流凘為客有歸日送人愁别時寒雲隨雁逺南雪到山遲舊隠書無恙行藏莫豫期酬揭曼碩重贈嵗晏君獨留路長我將發林居難共語帝里易成别煮水逐人飯依樹因車歇今夜抱琴眠街頭响鐘絶遇曼碩有贈十年相勸忽相贈猶記書題狎故人京闕詩傳多應制里門禄逮獨榮親梅花滿映林霏雪栁眼初迎輦路春知是髙情難去任此身誰是自由身程學士山房宴集芳郊暖微煦衆岫分餘烟迤􅆔望逺壑趣歸心轉延洞門石扉灰澗阨衆流喧居人隠古俗香氣通幽襌艶綠度畫梁語笑相後先飄飄縱飛屐松聲正鏘然窈窕山曲咈麗搆朝霞鮮勳庸在廊廟傑客儲芸編緬懐康樂公寄蹤此周旋詎知有今夕聨集玉堂仙羣鵠亦與喜共舞芳樽前無情尚方感矧當後諸賢暢飲抱真適逺以寄微言茲遊即千載湛輩期相傳贈元復初暖雲流青堤光風轉芳甸逺在天一涯幽沉限聞見㸃㸃秋歸鴻翩翩春來燕天路萬里通胡寕絶遐睠竒姿奪南國悵望愧踈賤良㑹慰夙心願君畢歡宴梅竒植遺山澤英姿照古今醲熏滿三極貞色照平林年運神孤王隂凝力獨任太清㴠妙影元氣托芳心薄雪村村淡輕烟澗澗隂蒼茫何見晚邂逅却愁深南紀開春事幽情寄碧岑自憐餘短䇿相對發清斟元真寺橋小憇古刹傳清梵横橋雨歇時年華流水去春事落花知宇宙遺陳迹江山夲後期向來多薄命今日信枯黎栁下是誰安宅子占得綠楊隂山色春來長溪流雨後深樹遥飛鳥疾人近戱魚沉舟子舡