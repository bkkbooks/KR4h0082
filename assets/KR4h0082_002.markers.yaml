  - {type: line-break, offset: 5963, content: '', id: KR4h0082_SBCK_002-1a01}
  - {type: variant, offset: 5967, length: 385, content: 卷之二薛宗海囯子助教間間真人生朝天正子月一陽回春入環樞已放梅壽酒淋漓傾九醖仙階縹緲接三台凾関昔日青牛渡華表他年白鶴来更向何方覔鰲島帝垣東畔是蓬莱送馬伯庸南祀崧恒淮瀆緫章盛金德斉明赫當宁皇皇遣天使粛肅承聖語三熏礼岳瀆万里渉梁楚祝厘帰堯舜降神出申甫南斗迎文星西風起儀羽楽張洞庭月柿􅊜湘岸雨壯吟鄙騷怨髙馳洗塵腐過家猿鶴喜攬轡鴻鴈聚青闈閔賢勞黄屋深記注歸騎慎勿徐席虛玉堂署都城曉起和張漢杰韻扶桒日射蓬莱頂下視瑶都森万井金門未啓曙光寒月落觚稜㣲有影枕上逰仕夢未回喔喔鄰雞爲呼醒知君曉約榖城翁再擬銘功漢鍾鼎杏村天近易爲春莫厭西齋官独冷題刘理之木石木石山人枕溪曲尽日看山如不足一朝木石真到眼昔者寓言今实録何年老捕生長空山中枯根入地蟠蛟龍嵌竇玲瓏削蒼壁宛如當年蘇老之三峰浪齧沙沿歳時乆豈知竟落漁人手漁人好飲君好竒䭾入君家博升斗君不見嗜石相囯李与牛不惜千金購羅搜豈知山人奄有一丘壑只費平原, WYG: 前集巻}
