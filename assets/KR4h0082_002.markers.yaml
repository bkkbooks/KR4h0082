  - {type: variant, offset: 6353, length: 3042, content: 督郵塩車圖車焞焞石徑犖确輪欲摧疲牛分寸挽莫前前車後車相逐来大府城門倚天開群山雪深白皚皚卒夫鞭牛凍堕指轉輸号令如風雷官中委積䓁塵土黔黎膏血無復回君不見明時屡散粟与帛桃林之牛亦悠哉不知何代昼此景我自一見令心哀和鄭應奉雜詩茫茫穹壤間環溪大州九壯游不及展坐待迫蒲栁窮通付分定逹識當順受伹願薫風詩在在民物阜一瓢安菽水吾計亦良厚當年東山翁笑傲聊永日弓旌一朝下万里赴星馹回頭故山友十見秋柏實峩峩東觀中大書黒如漆想見日暮帰沙輕馬蹄疾淳風散巳乆青黄陋窪樽婉娈争媚好役智空自昏豈知葛天民無言道弥敦我有白雲操冷冷寄桐孫調古識者寡幽探万化源驅車渉逺道日晏不知疲一見嵩華髙始斍培塿卑吾道䴡天壤昭昭匪難知千金買刀圭但爲方士欺贏粮往問道去結汗漫期志士方盛時危冠怒衝髪猛心石爲開壯氣山可抜安知横江鯨中路蝼蟻狎所以巢居子商歌竟不輟歌竟寂無言坐聽天籟發宦逰夢入槐宴坐时生桺出處亦何常臨𡵨一分手光隂不可翫歲月坂丸走軒裳百年間竹帛千載後永願堅素心舊斈安敢負夜歸有客有客胡未歸長安三見秋葉飛警霜老鶴夜不寐弔月孤鴈寒無依紛紛北里厭粱肉落落西山甘蕨薇人生窮達各有命何須中夜泣牛衣畫馬丗上駑駘眩凡目秪今誰識馬中龍昻頭振髯長鳴處似向秋風訴未逢九月晦日九月晦日終夜雨酒醒無處着閑愁起聞更張有明詔實與萬民同戚休今年年豊谷差賤白米應飽翳桒夫飛蝗是處有遺孽未省臘前能雪無黄晉卿同知晉卞將軍墓江左失其御強臣布中區歡娯一以乖狂猘無趦趄黃屋播草野彤廷交劒殊事樞始誰秉捧首如奔孤偉兹百丗士死與二子俱孤忠耿未昧足以孚豚魚義旗果東指白日開天衢孰最撥乱功之人或其徒伊昔大雅廢語言鄙文儒禾黍已横委衣冠尚舒徐屹然見砥柱獨障狂瀾趍大節固如此捐金乃其餘青簡煥遺烈蒼榛閟幽墟日夕悲吹多天髙年運徂丗方用骫骳猶將愧玄虚江濤渺在望雪涕空漣洳送俞美之判宫曁陽苧羅山前碧溪水花顔玉貌今誰是秪見操觚道上兒骨束枯柴髪垂耳周家忠厚及草木忍令赤地連千里夜飛尺一遣緹屏想見春風下車始憶昔君侯年少𥘉力金季母甘捐軀麻鞋上殿衣見肘歸來束帶懸銀魚頗聞尓曹久待哺㷀煢萬目同睢盱晨飡秣馬赴所主擊觧上冡無躊躇念君自是醫國手看活群兒如活母平生本草閱巳熟野葛山榆尚何取若爲箋天乞借林盡蹢東土歸仁壽鄙夫不用畎畒憂伹爲作歌貽不朽金陵懷古五雲零落渺天涯陳迹蒼茫日自斜昼角巳吹邊塞曲紅藍新長内園花可怜遺老埋黄壤曽倚春風望翠華好在北山猿與鶴依然同住舊烟霞偶成歴歴謀營度眼明獨榰髙枕数殘更薄逰巳倦新弹鋏舊業猶餘未棄檠一雨近晴𥘉月色两虫專夜故秋声情知三十非年少巳斍人間有後生陪仇先生登石頭城談笑逢諸老登臨失故亭薄遊成汙漫髙歩斍竛􅿓江近通淮碧山遥入楚青平生一盃酒及此慰飄零有感橘柚青黄照眼垂秋風籬落自紛披頗聞玉食登蛮果不獨涪州有荔枝劉蕡祠堂劉君古遺直祠堂在丘園嗟此豪俠窟文雄歘孤騫平生二三䇿匪儌明主恩瑣瑣談失得無乃市井言慿髙一長望苦壓車馬喧微風過踈雨青山滿前軒隂晴欻異態浮雲實無根悠悠千載心去去無復論居庸関連山東北趍中断忽如鑿万古争一門天險不可薄聖人大無外善閉非梃鑰車行巳方軌関吏迭擊柝居民動成市庐井互聮絡幽翕白雲聚石磑清泉落地雖臨要衝俗乃近淳朴政湏記桃源不必銘劒閣僕夫跽謂我无為乆淹泊山川豈不好伹恐風雨惡榆林崇崇道旁主云是古長城却尋長城窟飲馬水不腥斯人亦何幸生時属休明向來邊陲地今見風塵清禾黍𬒳行路牛羊散郊坰儒臣沗載筆帝力猗難名槍竿嶺憶昔賜第帰吾母適𥘉度蹉跎歲年晚今辰在中路居人誇具慶游子慙叱馭兹山稱最髙揚鞭入烟霧矗矗多峭峰蒙蒙饒雜樹﨑嶇共攀援躑躅頻返顧陳情未成表登髙詎能賦独怜桒乾水逺向盧溝去李老谷縁厓一逕微入谷双崦窄宻林日易曛况乃雲雨積行人望烟火客舎依山色家僮為張灯野老煩避席未斍風俗殊秪驚関河隔嚴程不可緩子規勿勸客赤城鷄鳴秝吾馬晚飯山中行何以慰旅懷赤城有嘉名灘長石齒齒樹細風泠泠時見岩壁間粲若丹沙明温泉發其陽撝訶勤百灵前峰指金閣真境摽珠庭白道人跡稀青厓雲氣生信羙无少留𬗟焉起予情龍門竦身望龍門緩轡何兀兀溪廻愁屡度雨横驚暴溢两厓儼相向百水怒争出人言馬上郎怏意每多失自非渥洼種不得矜捷疾飄飄蟣蝨臣凛􅏮黿鼉窟皇灵重覆冐利渉用終吉廻睨向所經千障隱朝日青林外盤紆黄流中蕩潏後來未渠央君子冝戦栗独石觧鞍及亭午稍欣烟霧収蒼然衆山出歴歴如雕􅦒前瞻一石独灵官居上頭頗聞去年夏水激龍騰湫走避登屋山半夜斉呀咻幸兹溪澗中今作清淺流宴安不可懷変化成難求翠華渺在望行矣无淹留李陵䑓日暮宫道边土室容小憇漢將安在哉荒䑓猶彷彿低廽爲之乆懷古増歔欷長風吹曠野飛雨千里至䔥條蒼山根草木餘爽氣甞憐司馬公予集多深意奏對实至情論録存大義史臣司述作遺則敢失墜上都分院晨㒷過桓州旭日生蒼凉㪯頭見觚稜金碧何魏煌洪河貫其前青山環四傍莫從玉堂署鼇峰虼中央升階對閣老官烛分餘光琴冊森在側談笑來清觴在列无所為陳詩詠黄唐帝鄉豈不楽父母不得將起視雲漢低垂星爛寒芒南飛有冥鴻邈哉天際翔檐子窪自從始出関数日走厓谷迢迢度偏嶺險尽平水陸坡陀皆土山髙下紛起伏連天暗豊草不復見林木行人烟際來牛羊雨中牧颯然衣裳单咫尺異寒燠竚立方有懷相逢乃問俗畏途冝疾驅更傍滦河宿金陵送人帰豫章巳斍栖遟懶曵𥚑可能為我強躊躇一帆秋色紅塵外千里江関白鴈𥘉建鄴水清誰共飲潯陽潮断定无書黄金未尽朱顔在莫種桃花斈隠居李坥之紈扇行誰家玉貌蒙清霏手揮紈扇臨東池潇湘揺波月弄影碧波疑見湘江妃淚痕竹上猶未㓕一尺氷紈萬愁結風吹翠䄂卷寒煙汗入紅肌凝素雪深閨無人凉氣早輕薄恩情易衰老昔随胡蝶上春衣今逐流螢向秋草不見班姬染翰時空遺漢宮題扇詩千年怨墨巳流落一天霜露沾人衣髙將軍白鷂歌淮西猛士髙將軍新護驍禽𬒳凉素調之弗顧情未狎跨馬臂出城東去征鴻作字雲邊斜聳身直上誰能遮天寒日暮望不見北風萬里吹瑶花雲飛忽断鴻飛却短草長煙際沙漠但餘孤色揺清秋未許纎毫生碧落帰來珎衛不觧鞲親手餧肉供飢㗋英雄遇合固有分可惜驚塵俱白頭姑蘇䑓呉王宴罷歌䑓晚斜日清江映䦨檻䑓上西施醉捧心江邊東越愁甞膽鴟夷裏尸去不還麋鹿散迹遊其間秋深明月照高樹驚烏啼落丹楓寒功名獨羡陶朱子一葉扁舟弄雲水范葯莊杭州人燕山聞䳌燕山三月𥘉三夜聴得啼䳌第一声同是小楼孤燭下主人睡熟客心驚胡石塘永康人題崔録事女真騘馬圖天恩洽騎十二閑短䇿不知行路難漠漠空州望不盡電光掣過須臾間蹄髙髙屈汗溝出駿骨隱隱隆於山窟泉沙草不得足勞多食薄心知慚十年甕牖間書瑟展卷見圖真太息女真年少面如盤華屋平生隔風日青騘肉破擁尻睢黄金校具褒綏拂三品芻豆空自多行見火花繞銅歴題秋江喚渡道旁木葉如渥丹帰急不知行路難青嶂碧溪自喚渡蹇馿破㡌西風寒裹頭長須甚德色肩輕不借有餘力人間塵土深復深謹勿重賦招隱吟贈相士黄電目憶昔待詔金馬門方伎雜遝車盖繁黄生蔡子㝡絶出髙堂不奈笙歌諠庐陵老翁才五尺旴母江頭眼空碧相人豈不二子如秋風夜雨帰無宅長身博士老一簞皐比那博儒生酸人生榮華無足夢桃笙竹枕長䦨干黄翁勿嘆無家苦華屋連雲更何𥙷蜀莊一日不百錢炳炳幽光二千年題風雨漁舟圖細柳新蒲春巳滿飄風急雨浪如顛漁人若觧忘魚意繫却扁舟卧碧煙戴祖禹越人天馬圖歌月支天馬難再得誰向君家貌真蹟駿毛皎㓗骨肉勻騄駬驊騮敢同色當得超逸真絶倫皎如玉龍下天門朝馳駿坂飛匹練莫浴深渊浮赤雲四蹄飽踏咸陽月滿身猶帶燕山雪只愁玄霧閟神姿未許清塵汙汙血飄然却立精神聚想見落筆驚風雨他年開匣君勿驚照室神光夜飛去鄧牧心杭州人贈友人我在越君在呉携書邀我遊西湖我还呉君適越遥隔三江共明月明月可望佳人參差與君携手西湖上相思空誦停雲詩知君去掃嚴陵墓秪把清樽酹黄土浮雲茫茫江水深感慨空勞弔今古孤山山下見陳实連騎東來踏春色湖邊千樹花正繁莫待春風吹雪白有酒如澠有肉如陵鼓趙瑟弹秦筝与君長醉不用醒何必千秋万歳名倪, WYG: ''}
