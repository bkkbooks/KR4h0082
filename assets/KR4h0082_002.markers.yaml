  - {type: variant, offset: 9396, length: 2374, content: 鎮蘇州人听袁子方弹琴蕙帳凝夕清髙堂流月明芳琴發綺席列坐散煩緩廻翔别鵠意縹緲孤鵉鳴一冩氷霜操掩抑寄餘情與張貞居雲林舘燕集分韻得春字青苔網庭除曠然無俗塵依㣲樵路接曲宻農圃隣鳴禽巳変夏踈花尚駐春坐對盈樽酒欣從心所親春日雲林齋居臨池春流駃掃地夕隂滿正襟味道言超遥坐溪舘嵐嶺當書榻煩襟一舒散靡靡松華黄逐逐雲氣煖石梁青苔合於焉人跡断故非與丗䟽㝠棲遂忘返寄懷鄭徴士谷口子真今最賢父别欎欎夢相牽好營秫田多釀酒欲買茅屋尚無錢兄病毎書賖薬劵客来唯候煑茶煙闔閭城東有艇子憶尓青灯相對眠送别甘允從一首来尋墨沼雲林下共爱女蘿縁石牀喚人鸚鵡語猶澁當户枇杷子半黄奉橘定應題百顆籠鵝即可冩千行䔵亭書法人間少好去山隂汎野航奉懷張外史隂壑慘慘緑苔生碧雲亭亭多逺情松杉鶴去轉簘瑟洲渚花落自縱横從君下榻住十日看我鼔枻出層城洞口􅌲巢无恙不定應閑閤著書成次韵薩未錫寄張外史谷口路㣲山木合温衣空翠不曽晴飢猿攀檻為人立寒犬號林如豹声小閣秋深听雨卧長空日出采芝行道心得失巳无夢沐髪朝真候五更陳剛中天台人中書大丞相安公延說四書因以詩呈帶礪家声耀八寰中書独壓紫薇班捧持日月祥雲上洗滌山河湛露間絲竹正歌淇奥美赤松聊伴穀城間聖門别有經綸亊更對青灯話孔顔交趾使还少年偶此請長纓命落南州一羽輕万里上林无鴈到三更凾谷有雞鳴金戈影裏丹心苦銅鼓声中白髪生巳喜帰来身健在夢回猶斍瘴魂驚出承天門又騎官馬過中原䄂有芝泥詔墨狠嶺海孤臣天咫尺五雲回首是都門開平即亊天開地闢帝王州河朔風雲拱上游雕影逺盤青海月鴈声斜度黒山秋龍岡上遶三千陌月殿香飄十二搂莫笑青衫窮太史御妒曽見衮龍浮金陵六代帝王州寒煙滿石頭星河天北轉江漢水東流歩絡金蓮雨歌殘玉樹秋白頭有漁者猶說景陽楼鄂渚晚晀黄鶴楼前木葉黄白雲飛盡鴈茫茫櫓声揺月帰巫峽燈影隨潮過漢陽庾令有塵汙簡冊祢生无土盖文章闌千只有當年柳留與行人記武昌鳯凰䑓鳯皇䑓上野烏啼笳鼓連雲日又西天地无情潮寂寞英雄有恨黍髙低殘桁夜雨迷朱雀荒塜秋風怨白鷄空有断碑蒼蘚裏千年留得謫仙題銅雀䑓古䑓百尺生野蒿昔誰築此當塗高上有三千金歩揺滿陵松柏圍鳯綃西飛燕子東伯勞塵問泉下路迢迢龍帳銀箏紫檀槽怨入漳河翻夜濤人生過眼草上露白骨何由見歌舞獨不念漢家長陵一抔土玉匣珠𥜗鎻秋雨呉宫子夜歌紫貝楼闕欎金香暖雲七十紅鴛鴦玉蝉笑擁霞銷裳星河不墮宫漏長緑樽灔灔麟髓泣露重花寒秋不濕歈歌一声起雪濤海龍夾陛如人立誰知淺嚬娥半掃中有殘螢滿愁沼越兵曉踏西風來碧波一夜芙蓉老居庸関卑稜稜石确确車声彭彭闘石角馬蹄蹴石石欲落不知何年鬼斧鑿僅與青天通一握上有藤束萬仞之厓下有泉噴千仞之壑大行羊腸蜀剱閣身熱頭痛縣度索一夫當関萬夫却未必有此竒巘崿吾皇神聖混地絡烽火不紅停夜柝但有地險今猶昨我扶痩笻且倦脚欲叩往事雲漠漠平沙風起鳴凍雀神州八景太液秋風一鏡拭開秋萬頃碧天倒浸琉璃影寒飈夜捲雪波去且闕珠宫黛光冷三千歌棹揺緑煙濕鬟吹墮黄金蝉琪樹颼颼紅鯉躍衮龍正宴瑶池仙瓊華春隂一峰亭亭湧寒玉露花不墜瑶草緑珠楼千尺漢星間天風吹下笙韶曲萬年枝上槲葉滿小鵉倀倀遶龍𬋩金棍曉御翠華來三十六宫碧雲暖居庸曡翠断崕萬仞如削鉄烏飛不度蒼石裂嵯岈枯木無碧柯六月大隂飛急雪寒沙茫茫幽関道駱駞夜吼黄雲老征鴈一声起長空風吹草低山月小金䑓夕照危坡十二青雲梯老樹偃伏猶躬圭長𥚑巳曵星辰去殘陽猶掛盧溝西召南六百年宗社一日黄金重天下精躔宝氣夜不收又見断霞明朔野盧溝曉月長橋弯弯卧海鯨河水不濺水崢嵘逺鷄数声燈火杳殘蟾猶映長庚横道上征車鐸声急霜花如錢馬鬛濕忽驚沙際金影揺白鷗飛下黄蘆立四山晴雪凍雀無声庭檜響水花酒簷大如掌平明起視岩壑間挿天瓊瑶一千丈夕陽㣲漏光嵯峨倚欄更斍爽氣多雲間落葉有徑否想見樵叟猶青簑玉泉垂虹雪波碧擁千崕髙落花點點浮寒瑶日斜忽有五彩氣飛止太空横作橋古寺殘鍾荅鈴語回首前村猶急雨輕綃欲翦一幅秋又逐西風過南浦薊門飛雨黒雲如鴉漲川谷雷湧電躍風折木半天萬點捲海來森森胦也如銀竹鳯城無数笙歌楼珠簾半捲西山秋誰知覊客家萬里一燈正擁寒衾愁李鶴田庐雪中寄友石角雲層道路難黒風三日書漫漫吟笻直指西湖柳合與梅花共此寒趙青山庐陵人銅雀䑓朝望西陵墓夕望西陵墓望望不復歸月朝人十五月朝十五可奈何更對空幃作歌舞銅雀昻然飛不去當時美人髪垂素我生不如陵上樹年年樹根穿入土歐陽伯㳟庐陵人題蘇武李陵泣别圖祈連山前箭如雨渤海海邊羝不乳同是肝腸十九年白髪君歸朝故主臣心有血一斗許亦欲隨君歸釁鼓五千健兒五千母臣若獨帰魂魄苦空將老淚寄君帰帰拜茂陵墳上土劉起潜送黄脩永之武夷杜淸碧斈眼中塵土政昏昏華盖風髙翠入雲一代風流超晋宋百年礼楽寄河汾波寛好看魚龍化天逺空怜鴈鶩群亦有平生觀海意出門萬里獨慚君鶴延頸他邊照影遟花明柳净思依依年深色重丹砂頂日暖光浮白雪衣晴月夢回三島去看雲思上九霄飛玉簘声断秋宵冷應有仙人憶未帰燕萬里来從海外村定巢時听語頻頻簾風半捲重門曉社雨𥘉晴二月春尾上係詩成往事堂中斈舞是前身華堂茅屋依然坐幾処相逢舊主人呉正傳秋懷江南木葉飛江北百草黄風煙澹莾蒼悵望川途長寒鱼聚其群鴻鴈忽成行俛仰念时物索居耿凄凉昔我二三友敦好攻文章漂零轉相失尺素不得將人生四方志企尓揚声光登山豈无車渉河亦有航真誠諒不隔离别庸何傷赤壁圖草荒殘壘怒濤秋遥想英雄淚自流風火千年消伯气江山一幅掛清愁丈夫不斈曹孟徳生子當如孫仲謀機㑹不来形勝在狂歌弔古漫悠悠送陳生北上万里長風入馬蹄江干舊隱掩間扉乾坤清氣随詩卷官塞征塵上客衣日落太行孤鳥没天髙燕闕五雲飛提携喜有王維在回首南山莫便帰于介翁感古引孔明梁父吟深不滿於斉相烏乎天若祚漢孔明不死天下亊未可知吾於此重不滿焉建安天下如潰瓜一榻之外非吾家黄屋飄颻定何許龍爲魚兮䑕為虎老瞞詐力敢欺天朶頥羊鼎方垂涎紫髯將軍一攘臂控荆引越三千里慷慨山東大耳兒南飛烏鵲栖无枝草庐一語君臣契目中乆矣无呉魏堂堂大義凛不磨灵関剱閣争嵯峨昨夜西南一星落六尺之孤竟誰托渭水旌旗帰故都江上空存八陣圖抱膝長歌出師表古柏蒼蒼爲誰老皇元風雅卷之二, WYG: 傅習編}
