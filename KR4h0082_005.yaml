front:
  text: 皇元風雅卷之五
  hash: sha256:9de6ce21f8b5118c8c33fdc2ebe4f7a07e8ef375edb83a2567893f7d3ac9d9fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0082_SBCK_005-1a}
body:
  text: 髙若鳯題朱進士御賜詩憶昔霓裳清夢遊廣寒宫殿欎巑屼神龍久矣乘雲去猶有􅌐珠落丗間遊白鹿洞書院碧瓦參差儼否壇白雲深鎖洞門間不宗朱氏元非學看到匡廬方是山十里松風潮洶洶一溪泉雨珮珊珊便當卜築書臺近五老峯前任往還送謝有源閩中醫官出山只為有源長散作人間六月涼從此不憂丹荔渴寶塘一派冷於霜斑資髙下不須論一步青雲亦上恩小試參差醫國手有人稱是野航孫贈相士張月梅清光萬里飛銀闕歲晏天寒桂香歇舍章殿是廣寒宮月似梅花梅似月丗間有梅有開落天上有月有圎缺乾坤清氣鍾於人千古不摩方寸鐵月耶梅耶杳莫辨淨色寒香兩竒絶西山有雨南浦雲反覆紛紛異涼熱槎仙老眼閲人多獨獨來尋灞橋雪月梅巳寒雪更寒窮年三友長相看論詩論相神自完出門一笑天地寬張叔暘送滕玉霄我恨江上水不能洗離愁又恨江上水不能為我留日黯黯雲悠悠胡不推出黃金毬照我一笑送沙鷗爼豆萬古相賡酬風流此老黑貂裘飲乾海水蛟龍憂人間奴鬢秋筆砥巫峽流傲睨幾何同一漚識我不識吾何求安得從此長嬉遊昔日閬風今瀛洲江水洗得離愁不為我留住江上頭三百尺酒樓五百斛酒舟許獻臣次韻蒲平章致仕君恩許老重增秩相印封回不再關石以輔天還袖手雲能成雨便歸山力將冨貴推身外倒卷乾坤入酒間緑野堂前看絲竹古今誰得似君間題賔月堂人生自是人間客月亦天邊寄此身彼此虛空無著處誰歟是主復誰賔趙蒙齋題釣臺君因卿相隱我為利名來羞見先生面黃昏過釣臺倪中豈贈張原性金華尉天風吹鴈秋影寒客子晨出燕城關青龍斯煙雜錫鑾腰蝺割玉羅翠乾金花出匣雙蚪蟠蕩射婺女光闌干春萱花暖荆樹合酒光入鬢顔渥丹風雲落筆神鬼泣眼見老鐵生詰盤朝栖崑崙圃夕飲砥柱湍但恨雲路無停翰東海百尺青琅玕倪若水過揚州雉堞平來塹擁沙緑蕪深處見人家山河舊影藏秋月關塞新聲起暮笳王蕊巳為庭下草蒺梨不是眼中花當年鳯舸經行處枯栁無枝寄宿鴉范德機過西芹路隱岩崖逈橋通屋舍重鳥啼黃葉寺泉注白雲峰市販賖柑柿畬耕間竹松行人報山郡失喜問萍踀延平江閣山勢包重險津流合衆源詎知從事劒不類大夫魂光彩潛猶見精忠死尚存幽靈如可問吾意豈忘言奉同廉訪使君洎寮友遊愛同寺閩粵古城東千岩半𣑽宫冒寒尋水石盡日倚虛空鍾鼓何須急壷觴亦有終翩翩北海寺碑版翠無窮寄武夷杜徴君洞居清隱士時接武夷君斾影岩前見山香石上聞不為圭組纍焉有市朝分暫得同麋鹿終朝試與群謝張伯雨題東坊藁次勻騷靈逝矣不堪呼幾欲南遊信楚巫城郭煙濤乘白帝星河風露浥黃姑幽人昔恨九關豹佳士今猶千里駒冬客資君相慰藉可能無意謝飛鳬送王中庸歸吟法樂洞前曾一遊君家聞處洞西頭石潭正照猿猱月山藥曾經虎豹秋豈意吳城祠下路共尋揚子岸頭舟胸中富有天官學莫為周南久滯留蓮房憶得花神一笑􅌚六郎家住小江千佳人怨等秋風近稚子眠聽浦雨寒強為折耒開户牗誰將鎔出擬杯盤少年太守思兄弟戢戢青頭莫謾看桂子盡輸金粟三千斛換得瓊枝數點秋定是月中嘉種失却從丗上異香浮石岩夜見呼猿摘藥臼晴𫾣伴兔收十日天台誰得見西風吹夢落山頭送夏蘭同知會昌承聞吉日上江船佐命分符落鴈邊野館溪頭三晉雪山城留下七閩煙庭春花氣迷銅墨市瞑溪聲學管絃何日周廬尋夜直倍知報政九重天㵼露亭𥘉秋白露降爽氣逼虛愇薄林方泥泥灑漠復霏霏暗襲玉堂悄斜飄金掌微鶴眠寒屢警螢火􅊜猶飛葉垂知月朗花艷怯朝晞蘭飲畏朝墜草霑傷夕歸為霜當夙戒去日漫增欷俜停吳宫女三月採薔薇挹彼枝上香散入舞裳衣千歲亦不滅但恐願相違君子保丗澤在久愈光輝題廣居家藏東坡竹古藤尺五霜煙交不見長身見墨梢千載髙風猶一日莫妨儋耳住無茅贈廣居查尊師逺遊查君學道戀名山廬結東南紫翠間更憶皇州春色好却辝仙館曙光間千年城郭逐人去八月星河奉使還莫為崑崙無覔處早將詩賦動江關奉寄翰林鄧侍講曩承持節江之東騎鯨再上蓬萊宮蓬萊仙人歌白鶴聲落五湖煙雨中丗間爵祿不易致何獨去就如飄風朝廷禮樂須制作六經隱義資發蒙論思廟堂集耆碩啓口寧讓前諸公閉門讀書古都市四輩冠蓋方隆隆我生生長在窮谷那有文字爭人雄謬蒙引喻百僚上負祿府署慚無功一别十年還又五昔者少壯今成翁誰知復客七閩下隔二千里來詩筒嬴軀頓醒瘴癘惡賴以慰此心忡忡粵王城南浪自日粵王城西花正紅經石門旗搖落石門秋水清殘僧樓字映沙明買船欲上旴江去路轉峰南聞鴈聲泰定二年秋蒙恩供奉翰林未行改閩幕自豐城便道取疾繇撫過旴與那守薩侯會約尋麻源不果翌日到旴暫逺雲霞觀却希山水音珠星聮社下璧月動江潯始集寶氣亭復趣金精岑輟棹更垂釣推書時弄琴石門生夕景麻源籠曉陰是邦遇賢守佳致契幽尋樽爼迫清好絃歌彰古心郡中宜鳯集泓下或龍吟頗愧塵務通還為旅宿侵一行混吏執千載負啚琛即往事莫究于兹念方深姑山如有意遂許一登臨順昌道中冉冉秋序髙勞勞客程促如何霜霰文不見原野肅顛崖絢夕紅古澗漾寒緑非惟藤蔓敷亦復芳氣馥物生固有常氣候殊過續以兹羸集身動往居瘴毒念彼閩村人田稀口如粟耕種上青雲妻孥力涼燠吁嗟公私弊群需待其熟安得廉恥吏俾之食常足上以承恩光下以厚風俗丹心映皓首我何自拘束玉臺曉出玉臺道山川稍夷曠只愁灘石際磊落更万狀市樓倚崖岸山頂列石障是中更有人隱約蔥倩上我願從之遊長風涉玄閬還歸保精路髙視神目王空濛飛鳥過慘淡回波放由來心力疲會意乃益壯十月十八日至懷安縣是夕入福州山城列障駐餘霞水與長空逺映沙芍藥省中人望華荔枝林外客思家遙遙徐市三神棹渺渺張騫八月槎蚤歲學逰今白髮不應猶戀棗如瓜望潮曲潮來直上青崖住潮住却尋滄海去烏石山頭望故鄉故鄉更在雲深處我生不如橋下水消息春秋任流止又不如如水上船去去來來年復年負祿羈孤二千里上念慈親下妻子子生未解别爺啼睡戀阿婆懷抱裏烏鴉日日傍人飛喜鵲時時噪郡西更有平安書字到金壷約伴玉人携平臺晚懷落日微風生晚涼平臺西上万山蒼佳人獨不生同丗樂土那知是異方海嶽雲霞千古意鄉關道路九回腸丹青不寫歸田賦猶以虛名纍霍光寄李祕書洞祕書出是蓬萊苑流落東吳又一春見月定還騎鶴侣開秋宜讓鱠鱸人吾曹事業徒溫飽子等居諸異隱淪海表何時携手載相憐同是老詞臣送别周儀之推官赴錢塘井簡李四祕書武帝龍飛第一春京華相送各沾巾詎知邂逅文身地總是棲遲皓首人山驛蛟眠星滿洞水鄉鴈起月迷津若逢李洞南天竺謂是前書感謝頻懷京中親友海上經年思殺人絶憐京國舊交親過江唯有傳柑使寄得書回是暮雲絶句日淨芙蓉逺春明芍藥長誰憐玉蝴蝶正似錦鴜鴦東署習靜天常見居深路近通隂階垂葉露空院長春風春日西郊春風千里福州城緑水青山老送迎惟有垂楊偏待客數株殘雨帶流鶯佳人不讓海棠嬌喜見天睛挹露饒若使有詩寧費日便今無酒亦終朝江上登臺望眼迷西禪更在石岩西尋常楚嶠看花日此處新苗緑巳齊南澗清晨不易得有無更似此時春朱桃皓李都隨丗紫蝶玄蜂故趂人題先天觀圖學仙之人與仙為徒住在匡廬之奧湖江之區張公煉丹作龍虎丹城御氣遊六虛後來出者絶代無何不學仙住玄都玄都之壇角井孤上摩萬里之黃鵠下伏千尺之飢鼯隂森檜筠自太古斬種力與開闢俱扶桑朝日挂絶壁坐見樓觀青糢糊擘崖控石㵼哀湍春秋雲露芝田腴我亦人間山澤灌偶陪夔龍賔唐虞有時一醉黃公壚振風三日撼不蘇折花不得度弱水渾手始識仙凡殊玉堂學士范與吳遺我兹山之畫圖尋窗數户久嘆息無因置我雙樗蒲獨行幽人不受呼掃葉青澗聽啼鳥日暮羅徑相縈紆相縈紆向何處明朝為借麻姑鵬我亦騎之上天去鄧文原貢奎元明善同觀此詩於玉堂為之嘆賞故書孫存吾餞虞伯生歸隱天地育精英文章䊮德星虞廷春色滿翰苑月華明歸隱琴青樂朝回軒冕輕凡才倩俱蓄藥龍備參苓春日遊黃鶴樓插天棟宇接雲霞八面玲瓏望眼賖寒谷春回江夏柳晴川日映漢陽花珠簾半捲琉璃滑宮扇𥘉開翡翠斜日近天人聆笑語廣寒宫殿隱仙家秋思鴈落西風字字沉嫩涼偷入藕花心眼前多少關心事付與寒蛩徹夜吟張息堂題衡陽刋匠曾子謙字説手卷陽氷謙卦妙入神當時鐫刻知何人至今寶玩逾琬琰字體清徑無失真謙謙于謙能辨此手揮鐵豪出文字功成何止地中山鑿破乾坤六十四甘東溪夜坐林風自蕭蕭山雨時灑灑丈夫七尺軀地爐使吾矮早睡病來貪睡早推月出山前月色不相捨小窗還自妍酒醒酒醒桂花發彺歌對花前林家大罵我夜半驚人眠書生踉蹡趣講席讀誦鬪髙聲我亦曽如此而今白髮生歸舟片帆懸空秋滿腹涼月淡淡天無波平生湖海元龍意早入西風漁棹歌天壤豈無蘇季子恨我不識韓荆州遙山蒼蒼暮雲碧何許一笛蘆花秋下豫州壯懷忍共白雲間孤負僧房屋半間賣却牢愁三萬斛載將明月入西山託意舊時燈火不知年託意篇草未丗傳胸次只今無此事聽風聽雨過殘年新春花紅柳緑也逢時潤色青春有小詩人丗若無吾輩在東風寥落亦堪悲看梅獨坐匆匆不自適出門偶見梅花開自從開闢到今日此是東風第幾回暫憩平生湖海遊南北東西路幾度夢殘時雲深不知處過南湖小酌忽有一事礙胸次擺脫不得呼酒來𬈑溟濛濛混沌在坥坦蕩蕩虛空開精神半生留筆墨形骸昨夜為樽罍年年看梅今白髮晴日江路行莓苔薩天錫采石驛客路青山外鄉心落照邉潤清浮野樹涼雨過淮天水調誰家笛江帆何處船蛾眉亭上月今夜照孤眠采石懷李白夢斷金雞萬里天醉揮秃筆掃蠻箋錦𫀆日進酒一斗采石江空月滿船金馬重門天似海青山荒塜夜如年秪應風骨蛾眉雪不作天仙作地仙過石子岡霞光日落紅穿樹山色雨餘青近人便好拂衣入山去解鞍辝却馬頭塵次王叔能侍御史龍蛇偃蹇出墻隂五色春雲態度深臺閣文章散清氣月明山館夜蕭森次繁昌邑宰梅雙溪韻矍鑠繁昌宰曾充觀國賔儒冠猶破帽禮服尚垂紳淡泊心無愧清癯自有神老膺朱紱貴驚見白頭新撫字三年政歌謡百里民林彥􅙫元會習儀和鄭子完西山晴雪照階墀法曲天香會合時在野只知堯帝力進朝方識漢官儀日明黃道瞻丹扆春滿青都擁翠旗冠佩又承新雨露太平報效有深期李源道次韻送虞伯生使蜀降香城南尺五去天低回首彤樓十二梯六月岷山猶有雪三春雲棧逈無泥浣花溪上看秧馬芳草渡頭聞竹雞見説草堂遺􅌟在公餘須到錦城西喬木千年劫火催峩眉峰頂自崔嵬岷江東去人西上驛馬南嘶鴈北來蜀國山川明似畫文公風化冷於灰太常直筆今詞伯既倒狂瀾賴挽回皇華驛使氣凌秋風槩沉雄隘九州金莭暫辝金殿去錦衣還作錦城逰文高方朔三千牘刀善庖丁十二牛好向名山瞻勝境瓣香遙捧祝宸旒夏果齋和山間秋日見寄門前絶愛竹成坡室邇其如人逺何亦曉不如歸去樂真成無可奈何歌詩翁自此工難少俗子於人一揖多何日同君秋月下桂花影裏舞婆娑過洞庭萬里玻璃一掌平倚蓬人去似騎鯨掃隂雲霧天無影彈壓波濤夜不聲一劒秋橫神鬼泣片帆風徑死生輕詩成不用漢人語怕有蛟龍聽得驚上國簽