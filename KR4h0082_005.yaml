藻香劉夢羲餞伯容白髮重遊漢水濵㸑桐幸遇按絃人詩書潛玩簞瓢樂山水清幽戲筆新天霽蟾宮髙獨步霜寒柏府寂無塵一樽好共南樓月别掉西江浩蕩春張小山四明人次韻酸齊君山行蜀江湘流合千里中有蒼崖壓秋水仙人金冠坐鐵船反披紫裘𥘉醉起小龍二女相從遊眉山低壓青黛羞寄書不通雙淚流三十六宮明月秋花邊間袖玉堂手老來頓覺嫦娥醜嶽陽樓下喚開門神仙幾年曾醉否抉雲老鶴去不還青青一點天涯山天劒歌將軍躍馬來南荒腰間古劒白練光鸊鵜塗香魑魅泣寒芒熠熠勾陳蒼龍髯髙釘珠堂月玉華曾拂樓葌雪為君盡斬姦臣頭天狗三更下舐血章伯亮雲南人次韻唐佐自京庠歸覲天邊清湛如璜水筆底生春多秀士摩空三百六十字凖擬明年獻天子西江千樹梅正花家人祝鵲催還家愧我汗青頭欲白夢到雲南與天北行路難奉君七寶鳯凰之繡柱五色騏麟之錦裳王母九霞觴中之酒秦女万縷爐中之香去年紅花今年開昨日紅顔今日老一生三万六千日歡日願多愁日少對吳歌看楚舞歌舞匆匆變今古歸去來莫行路拜帖穆爾唐兀氏溪山春晚興來無事上幽亭雨過郊園一片春路失前山雲氣重帆收逺浦客舟停笛笙野館二三曲燈燭林坰四五星坐久不堪聞杜宇東風吹我酒𥘉醒趙由儕述祖詩悠悠我祖始于軒丘既歷髙陽秩秩大猷爰自伯益舜錫旱斿中衍事商造父御周征彼徐方熊熊有功邑于趙城大河之東建氏晉國耿先其封成宣喻日長夏愛冬岸賈作難嬰臼立孤襄子始大常山得符於赫烈矦懋建丕圖肅矣武靈兆配有虞西漢子都生長河間暨于唐末今族居燕小遷大梁丗系綿綿厚德豐功宜永其傳中罹多難南歷江沱眷焉吾宗豐水居多百川有源衆條有柯庸修家牒克俾無訛顧豫伯仲一愛患多更瞻嘆古烈自憐其生其生豈偶三辰垂精德業未進敢不戰兢我心伊何常念厥𥘉感彼霜露愴然躊躇奉先如在宗戚相於亦有諼草髙堂可娛惟忠惟孝立身有本嗟尓後進朂哉自勉万有能銷斯道無泯溫恭朝夕云胡不謹顯親揚名俾昌俾熾善保家聲期于勿替尚念前人留心譜系受天之慶逺及苗裔臨川吳先生讀之而嘆曰純粹忠厚自德性流出油然沖和之意真古人之詩也蓋其有本是以若此又曰中山年少於吾吾不敢以友命之也泰定甲子十月十九日國子司業蜀郡虞集書思親詩豫讀魯齊許文正公七月望日思親詩因見其天理沛然自胸襟流出永感者聞之必增其悲具慶偏侍者繇此寧不加敬自思兄弟往年當喪亂之餘不幸失怙藉慈母教養成人真昊天罔拯之恩也輒推廣其意而𫐠五言古詩一篇五十二句以紀平居之懷納之書藏將示後人俾知所自云尓庚戌歲二月望日中山居士趙由儕識一自先君逝行將四十春音容尋舊夢感慨試詳陳巳歎生緣淺還思故國屯吳江悲血戰粵嶠困車轔共吒艱危甚尤驚賦㰸頻朔風吹廣野赤日照流塵既灑呼天淚方為辟地民撫時非往昔感憤竟湮淪翕霍傳梅外倉皇問水濵諸孤隨弱母大慟向秋旻越歲寧戈甲歸鄉辨穸窀酹觴號雪夜扶柩復霜晨家緒中微甚人間事一新孩提慙不肖操守賴慈親絡緯燈前教襜䄖膝下馴田廬勤保任門户幾憂辛文獻由先德扶持荷化鈞萱華明晚景荆樹際芳辰眉壽斟瓊蟻春暉奉繡茵雖非登執要自不厭清貧弩力尊天爵勤心報大倫歸全期不忝化俗異還淳信墨存家乘傳芳待後人年年思雨露嵗嵗省松筠至念通天地長歌感鬼神珍藏歸韞櫝大孝慕終身南豐趙母立夫人曠志云歲下丑佇禹公殁子㑪六歲份四歲耳夫人出万死一生親葬公而教養其子以成其家㑪既尊德樂道價又勤生致養能如㑪之志其女適危氏者孝敬亦不移夫人身安心和享孝養者三十餘年而後終君子曰此非宜報其勤苦也蓋其積德之盛所以感畜沖和者有非偶然矣集與㑪有千載丗外之交信其內行淳備故知其所以事親者非止甘旨之奉溫清之宜宴間之樂而巳夫人讀書習禮亦未易以丗人之學恱之也臨川吳先生讀其述祖思親之詩而嘆曰真哉所發哀而不傷此古之作者非常人所及也集竊感吳先生之知言故書而識之俾示其子孫泰定元年嵗在甲子十一月巳酉國子司業蜀郡虞集書郭君彥真定人海東青海東俊鳥異雕鶚金晴玉爪不凡材八月風髙度海來剱翮怒斫雲陳開虞人設網心獨苦獲之不敢觸毛羽為言此鳥獻天子年年進入明光裏驛使長懷万里憂傷者還同殺人罪君不見唐太宗魏公入奏久未去不知鐵鷂死袖中小臣伹願聖皇修德放此鳥自有鳯凰逺㗸瑞圖飛下五雲表入京五首虎踞龍蟠十二門王侯第宅若雲屯百蠻入貢天威逺四海朝元國勢尊曉日旌旗明禁路春風蕭鼓沸名園唐堯虞舜今皇是未必江潭老屈原蓬萊御氣挹晨嘏萬國河山擁帝家金殿勢吞滄海日王樓光映赤城霞巨鰲偃蹇乘丹闕舞鳯飄颻翼翠華遙望至尊遊幸處六龍髙駕五雲車鳯凰城闕壓金湯龍虎旌旗護未央方國衣冠朝五座百蠻歌舞進瑶觴花迎宫扇紅雲曉日照天𫀆翠霧光江海小臣無以報空將詩句美成康大明宫闕勢岧嶤方歲聲髙山動搖金殿九重明日月玉樓十二插雲霄青絲馬上玉孫貴舟轂車中趙女嬌自是鳯城春色好肯將心事許漁樵翠輦氊車往復回風暗九陌障黃埃鎌𫀆公子呼鷹出茜帽僧宫躍馬來雲外笙歌聲宛轉水邊樓閣勢崔嵬少年自有看花興欲賦觀光愧不才野寺晚景寺對清溪水繞關泠然鍾鼓翠微間樓臺無影日沉海松檜有聲風滿山猿嘨石亭遊客散龍歸雲洞老僧間詩成一笑歸來晚獨棹扁舟泛月還送泗洲同知偰丗南赴仕夢喜三刀驗之官正少年龍纏倚天劒虹繞載春船淮泗名先振湘潭政可傳門間多喜氣屢見出英賢錦衣臨泗水仙境足吟哦煙樹連淮逺雲山入楚多濟川功不小經丗意如何會見沙堤上春風響玉珂西山道院幽居絶瀟灑深院鹿成群山色開窗得泉聲隔竹聞猿啼臨水樹風送渡溪雲客至渾無事談詩到夜分宫詞宮娃辮髮綰垂鬟嬌面團如白玉盤出入紅門能走馬繡衣縹眇似乘鵉年少宫官著繡衣麒麟寶帶束腰圍日斜醉出金門裏騎得龍間白馬歸間居春晚深巷絶行人一鳥鳴髙樹不知春色深花落夜來雨早春湖上柳芽黃淺不勝春沙暖泥香草色新鸂鶒雙飛湖水濶相思愁殺倚闌人秋郊路穿黃葉林馬嘶秋色裏白鳥何處來飛下野塘水張鳴善平陽人李陵臺晚眺次吳真人韻雲黃沙白繞平原獨立崇臺思黯然地僻尚知秦逺塞草青不是漢新年非慚步武賢王後反欲捐生太史前誰謂茂陵明似日重光惟照漠南天秋興亭欠韻巫峽秋濤万里長荻花楓葉亂蒼茫青山礙目無間地白鴈牽愁有夕陽神禹柏殘扶大氣長庚星墮靜南荒巳將今古同行客何必登臨憶侍郎題史橘齊山水手卷神仙中人丞相子五色玉立瑶池芝謝傳風流歌舞處羊公慷慨登臨時興來醉泗雪煙繞身後名隨日月遲安得飊車從上下蓬萊指點青參差見釣者宇宙俱為客江湖獨釣翁笛聲吹海月竿影倚秋風天定行藏拙時清禮法通古今惟范蠡落落幾人同送人遊廬山曾到國廬境巉峰際碧空方松無路入一水與天通白鹿眠晴晝清猿肅晚風洪崖如可約吾亦訪雲中次廬參書御溝水韻二首華清波色漢楊溝不似𥻘𥻘暖緑柔飄盡上林紅萬點又從天上送春愁堤頭春漲碧琉璃堤外春隂海子時同是玉泉山下水可憐波浪大參差貟怡然關中人送陳文理還京師十年不見老元龍髯鬢蕭蕭帶朔風万里關河秋月白九重宮闕曉雲紅功名有分皆身外聚散無慿似夢中問我能來定何日移家今在五門東訪原頭范君才長憶原頭范隱君我來蹤迹不相聞林鳩屋角啼淸晝山犬籬邊卧白雲藥右猶能資疾疾丹青元不畫功勳藻陂家主應逢念一路秋陽草樹熏修琴桐梓年深半裂開嶧陽道士獨憐材細磨蛇腹秋風起輕鑿龍池夜雨來此日銘邊重注字當年焚下欲成灰何時試鼓陽春曲預坲空山小石臺月中桂雪風吹老樹婆娑輪滿旁枝長漸多方古秋香懸宇宙一株晴影照山河雲間㗸子無黃鵠天上看花有素娥折向人間應不識九重清露􅊜鳴珂寶應寺塔五色雲中現七層不知何代法門興歸來逺客長迎望老去間僧已倦登金鐸無聲風不起寶瓶有影日𥘉升時聞𣑽唄盤空下知是檀那夜施燈楊信可臨江人和揭曼碩兼懷武昌名勝親友日以疏江漢日以深孤雲懷海嶠倦翮思長林終然念所知沿流動悲吟豈無後日期邈若隔千岑安得好風來冷然入中襟日與親友會微言自規針和盧子儀寄懷盧肅政上巴陵王侯人生有知遇永懷不可忘俯視萬丈淵仰睇千仞岡青山何其髙江水空自長忽憶石潨叟别我半載強昨者從湘中歲曼歸朔方孤舟渡淮水遺歌滿滄浪迢迢天際雲青青陌上桑次韻酬吕文學後會未可必前路轉多山雞鳴發孤館蒼涼雲樹間俯視清溪流仰睇髙鳥還念此别離情南山正孱頑鹿角站阻風風送洞庭沙維舟隱荻花水枯魚上罶秋老燕移家日期長河急天寒去路賖故鄉三十驛歸夢繞天涯奉别存𥘉郎中臨湘月下泛舟西風吹老白蘋洲天上郎星月下遊過鴈影沉湘水碧斷猿聲入楚山秋歌翻白紵猗葌泣夢落黃陵帝子愁夜半鍾聲天曉角猶疑身在鳯池頭望池州作黃蘆瑟瑟草油油樓閣參差瞰碧流萬里長江秋色逺一帆斜日過池州鄧德良南昌人涉圃林塘草樹接江干一日三回涉圃看白鴈不來緣地暖黃花微瘦覺秋乾隔溪煙火人家靜傍水樵蘇野氣寒柴户反關生事了晚菘種罷雨漫漫晚眺晚步從容出薜蘿吟詩聊當竹枝歌寒流漸縮溪船少臘雪不成山霧多官賦人歸荒嶺路野燒煙起夕陽坡江鄉盡處閩鄉近老盡塘蒲無鴈過送陳杏林赴潮州醫學教授三千驛路上灘船九品醫官半百年藥市得錢添月俸杏林收谷當公田北書漸覺江鴻少南食𥘉嘗海鱷鮮不用越巫驅瘴癘家家傳取衛生篇寓舍春晚柘隂𥘉合豆𥘉畦門掩春寒落絮遲薄暮一樽還獨酌坐看微雨􅊜荼䕷中秋憶家千里星河一鏡圎杜陵兒女隔秋煙遙憐此夕柴門裏相對清樽説去年早冬過聶氏西岡别墅紅葉青山載酒行山人新結野菴成西􅉉一樹梧桐好他日重來聽雨聲清景亭邊秀作堆竹聲松影共徘徊野藤繞屋多秋實時見山禽引子來李宗冽旴江人題嶽溪禪林精舍朝逰適嘉霽遂暢尋山願崖日破曾隂晨經罷幽殿年深樹益繁像古閣重建夜來天地霜松色了無變宛然巉崒間廬嶽復兹見山僧四五人屢訪期識面和傳作永月夜泛舟夕霏巳掃林緑波際遙天浮雲蕩倒影相與渡清川愛此山水趣聞歌心益便沿洄隨意逺落月照歸船古隴頭吟天寒壠水鳴嗚咽夜領鋭兵從此發海風吹人眼欲枯上壠猶看嶺西月悲笳蕭蕭霜滿天十里一堠烽火連去年𥘉度彈筝鋏今年復引月支泉從軍辛苦事征討將軍功大殘兵老秋夕江上水館螢飛入沉沉夜未眠衆星搖雨後孤月轉河邊章木寧悲候江山不記年忽聞吹急管况有估人船代項氏怨并序燕山項氏其夫江南人行賈燕蘇間聘項與居未幾夫死項時年二十奉柩回江南誓以夫餘資養姑以自終比至姑改適項勵志子居以守夫祀余憫其事而賦之少無依倚老何堪白髮婆娑亂不簮夢裏尚思江北好悔捋夫骨葬江南䁬深上人處處隨緣到經年此託蹤不言卿國逺惟指對門峰王尚志臨川人暹國回使歌并序暹赤眉遺種天曆𥘉嘗遣使入貢今天子嗣位繼進金字表章九尾龜一象孔雀鸚鵡各二朝廷以馬十匹賜其國主授使者武略將軍順昌州知州使者錢塘人江東羅警作歌僕遂和之江東先生逺扣門口誦暹國回使歌髙秋夜靜客不寐歌辝激烈聲滂沱東南島夷三百六大者只數暹與倭暹人云是赤眉種自昔奔竄來海阿先皇在位歷五載風清孤嶼無揚波方今聖人霑德化繼逞壤貢朝鵉和紫金為泥寫鳯表靈龜馴象懸鳴珂􅊮庭懷逺何所賜黃驪白駱兼青驒卉裳玊者錢塘客能以朔譯通南訛遙授將軍領州牧拜舞兩頰生微渦樓船歸指西洋路向國夜夜瞻星河金雞啁哳火龍出三山宮闕光嵯峩鄱陽驛吏親為説今年回使重經過先生作歌既有以却念黎獠頻驚吪田橫乘傳嗟已矣徐福永仙胡尓詑豈如暹國效忠義勳名万丗同不磨音渦音訓欺同鎮陽李先輩登臨川擬峴臺楚塞蕭條客復耒已無秋渚藕花開西風曠野孤城出落日西江白浪回山似襄陽非故國地連吳會有高臺南歸万里頻回首㴎倒徒傷賈傳才季冬𥘉三夜見月向晚西簷月令人生夜思山川徂杪歲雲漢負秋期素魄窺恆滿良宵惜屢移清輝可攬結脈脈寸心知送孔椽之鰲溪古縣青山裏溪橋春水流沙明殘雪在市散夕嵐收𪠘宇鄰仙洞更聲雜戍樓憐君趍幕舍微祿暫淹留登冷仙岩仙岩酌酒杏花紅滿地金濤日上東洞底香風散靈氣逰人都在紫雲中舒州張萬户征西賊馬𬒳箭數十猶載其王以馳每寒氣襲之則輒朴而能終惠飬之舒州營裏將軍馬曾向西征破賊來伏攊金創秋氣重斷腸當日戰𥘉回南園蒼苔翠竹轉林暉野菊花開過客稀樹砥秋蟲作寒繭雨晴黃蝶滿園飛徐天逸臨川人擬古皎皎機上絲織為逰子衣遊子蕩風塵素衣化成緇風塵不可避四顧將何之豈不念潔白徒重翟子悲朂哉加浣濯河水清且漪娉婷閨中女天質知自愛空懷蘋藻心日月苦行邁家修意良勤遲遲如有待未嫁庸何傷失身將重悔婉娩自結髮伉􅓻情義深夫征日易久魚鴈成銷沈自憐鏡中貌衰白將駸駸有衣為誰熏有花為誰簮顧影雖無儔秉心猶斷金青天懸明月照影不照心君馬黃君馬黃我馬白青絲聮絡黃金勒長安紫陌爭馳驅一日秋風各南北酌君酒君莫辝與君更作汗漫期神龍不可豢天駿不可羈乾坤浩蕩信所之人生行志當及時雨情繾綣將何為丈夫不作兒女悲田家詞犁田無牛秧易老飬蠶未繭桑巳空二月新絲五月榖如何解折今年窮秋風詞秋風一舸歸晚泊芙蓉渚折房遺所思的的中心苦清明有感菽水歡娛淺松楸感慨長西家白頭嫗門外倚斜陽山中𥘉霽久雨客不來燕坐了晨夕今日出東郊門外草三尺施性𥘉臨川人古井地脈深三丈寒甘潄石罌最宜探月色獨坐聽泉聲旱許鄰人汲廢餘秋草生元非投轄處水不近交情秋日田家髙髙青櫟樹忽有鵓鴣鳴雨後晚田熟門前秋水生鄰家賽社去野犬吠人行泥潦相淹久眀朝歸討成郊園宴集得荷字脫帽長松下探幽到薜蘿翠禽翻岸篠紫芡刺池荷人影追涼散蟬聲入暮多當携謝公妓載酒重經過萬年平坐雨復此留三日秋隂未肯睛雨懸沙樹白坡落石泉清未可言羈寓聊堪遣性情草蛩籬落下時作不平鳴喜塗宗道自金陵歸雲樹相思久年年賦式徴淮南芳草歇江上故人歸日夕開新酒天涼換夾衣從容亦自好墨綬與心違李道傳留九江以詩見寄水鄉城郭晚煙稠遙想思歸上庾樓潮落湓城魚作浪雨餘淮甸麥先秋一樽濁酒懷親友數首新詩歎客愁我正山中招隱者秋風應棹木蘭舟雨中同從弟宿田舍鶺鴒相逐暮天隂破帽長江覔短吟十頃水田春布穀一天風雨夜同衾草腥宿鴈投湖水煙暝歸牛入桕林明日東鄰赴雞黍汝還不飲我孤斟傳謙則學正東山有鴟梟金衣菊裳海頭鶻胡不啄此鴟梟目劒翎鈎瓜韝上鷹胡不食此鴟桑肉東飛西飛正頡頏開口呀呀無飽足天何生此不祥鳥白日妖呼鬼夜哭羽毛似可美外飾腸膽豈知懷內酷月明風淡霜氣寒三繞髙枝鵲驚宿綢繆牖户固根本一斗一鳴千百毒將軍只逐天邊鹿誰敢挾彈滄江曲偽鈔為弊善良破家故賦此皇元風雅卷之五
